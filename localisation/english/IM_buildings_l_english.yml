l_english:
 government_building:0 "Hosudarstvennaya admnystratsyya" 
 government_building_desc:0 "This zdanye obespechyvaet hosudarstvo bazovymy potrebnostyamy for hrazhdanskoho governance. Zdes hrazhdane mohut poluchat yurydycheskye dokumenty, oplachyvat nalohy and dobyvatsya spravedlyvosty. \n §g+0.02 Ezhenedelnaya stabylnost§! \n §g+0.01 Ezhednevnyy pryrost polytycheskoy power§! \n §g+0.20% Pryrost sotrudnychestva in rehyone§! \n §O+2% Speed remonta fabryk§!"
 government_building_plural:0 "Hosudarstvennaya admnystratsyya"
 education_infrastructure:0 "Uchebnoe zavedenye"
 education_infrastructure_desc:0 "This zdanye obespechyvaet hosudarstvo systemoy obrazovanyya, obuchaya and napravlyaya nashu molodezh — ot shkol in detstve do unyversytetov vo vzroslom vozraste.\n §C+1% Speed yssledovanyy§! \n §G+1% Dostupnoe naselenye for pryzyva§! \n §O+1% Speed stroytelstva§!"
 education_infrastructure_plural:0 "Uchebnoe zavedenye"
 military_base:0 "Voennaya baza"
 military_base_desc:0 "This zdanye pozvolyaet nashym voenachalnykam, ofytseram and soldatam koordynyrovat deystvyya, orhanyzovyvat and planyrovat voennye operatsyy.\n §G+1% Orhanyzatsyya armyy§! \n §G+1% Ataka armyy§! \n §G+1% Oborona armyy§! \n §G+1% Maksymalnoe planyrovanye§! \n §G+1% Pryrost opyta komandyrov§! \n §g+0.05 Ezhednevnyy pryrost armeyskoho opyta§!"
 military_base_plural:0 "Voennaya baza"
 naval_military_base:0 "Voenno-morskaya baza"
 naval_military_base_desc:0 "This zdanye pozvolyaet nashym morskym komandyram, ofytseram and moryakam koordynyrovat deystvyya, orhanyzovyvat and planyrovat morskye operatsyy, a takzhe sluzhyt mestom for stoyanky korabley.\n §B+1% Effektyvnost myssyy po okhrane konvoev§! \n §B+1% Effektyvnost ekranyrovanyya§! \n §B+1% Speed vosstanovlenyya flota§! \n §B+1% Uron flota§! \n §g+0.05 Ezhednevnyy pryrost morskoho opyta§!"
 naval_military_base_plural:0 "Voenno-morskaya baza"
 air_command_base:0 "Voenno-vozdushnaya baza"
 air_command_base_desc:0 "This zdanye pozvolyaet nashym voenachalnykam VVS, ofytseram and letchykam koordynyrovat deystvyya, orhanyzovyvat and planyrovat vozdushnye operatsyy.\n §R+1% Effektyvnost myssyy vozdushnoy podderzhky§! \n §R+1% Effektyvnost myssyy perekhvata§! \n §R+1% Effektyvnost blyzhney avyatsyonnoy podderzhky§! \n §R-1% Shans avyatsyonnykh avaryy§! \n §g+0.05 Ezhednevnyy pryrost avyatsyonnoho opyta§!"
 air_command_base_plural:0 "Voenno-vozdushnaya baza"
 media_complex:0 "Radyostantsyya"
 media_complex_desc:0 "This zdanye predostavlyaet hosudarstvu bazovye razvlekatelnye and ynformatsyonnye usluhy through televydenye and radyo for shyrokykh mass.\n §g+0.01 Ezhenedelnaya stabylnost§! \n §g+0.01 Ezhenedelnaya podderzhka voyny§! \n §g+0.02 Ezhednevnyy pryrost polytycheskoy power§! \n §W+0.05 Ezhednevnyy pryrost sotrudnychestva in rehyone§! \n §Y-2% Resursy on rynok§! \n §-2% Vremya opravdanyya tsely voyny§!"
 media_complex_plural:0 "Radyostantsyya"
 hospital:0 "Hospytal"
 hospital_desc:0 "This zdanye predostavlyaet hosudarstvu medytsynskye usluhy kak for hrazhdanskykh, tak and for voennykh.\n §G+0.2% Ezhemesyachnyy pryrost naselenyya§! \n §G+1% Speed vosstanovlenyya dyvyzyy§! \n §G-1% Potery opytnykh soldat§! \n §G-0.5% Vremya obuchenyya§!"
 hospital_plural:0 "Hospytal"
 housing_project:0 "Residential District"
 housing_project_desc:0 "Residential District predostavlyaet hosudarstvu novye doma and kvartyry, kuda mohut pereezzhat hrazhdane. Zaselenye zhyteley sposobstvuet razvytyyu novykh kommercheskykh predpryyatyy.\n §g+2 Stroytelnykh slota§! \n §g+0.3% Fabryk tovarov narodnoho potreblenyya§! \n §O+1% Proyzvodytelnost fabryk§! \n §O+1% Bazovaya effektyvnost proyzvodstva§! \n §O+1% Maksymalnaya effektyvnost proyzvodstva§! \n §O+1% Pryrost effektyvnosty proyzvodstva§!"
 housing_project_plural:0 "Residential District"
 industrial_yard:0 "Promyshlennyy kompleks"
 industrial_yard_desc:0 "This stroenye obedynyaet mnozhestvo nebolshykh fabryk in odyn promyshlennyy kompleks, chto pozvolyaet proyzvodyt hrazhdanskye and voennye tovary in odnom meste, no pry etom sushchestvuet rysk potery preymushchestv oboykh vydov produktsyy in sluchae povrezhdenyya.\n §O+1 Hrazhdanskaya fabryka§! \n §G+1 Voennaya fabryka§!"
 industrial_yard_plural:0 "Promyshlennyy kompleks"

