 MENU_UPDATELOGO:0 "§OCurrent version: Alpha 0.0.1§!\n\n§HWHAT'S PLANNED FOR RELEASE 0.1:§!\n- §R[WIP]§! Content for Ukraine, the Russian Federation, the Donetsk People's Republic, the Luhansk People's Republic, the Kharkiv People's Republic, and the Odessa People's Republic.\n- §G[DONE]§! New unique map of Eastern Europe.\n- §G[DONE]§! Unique "Regional Separatism" GUI for Ukraine.\n- §G[DONE]§! Unique Euromaidan radicalization mechanics for Ukraine.\n- §Y[DEMO]§! Unique Verkhovna Rada GUI for Ukraine.\n- §R[WIP]§! National spirits for all countries\n- §G[DONE]§! Updated minimalistic game interface for a more enjoyable gameplay\n- §G[DONE]§! New scenario selection menu\n- §G[DONE]§! Specially selected music for better immersion in the atmosphere of the mod\n- §R[WIP]§! Unique presidential election mechanics for Ukraine\n- §R[WIP]§! Unique branches for the presidents of Ukraine\n- §R[WIP]§! Unique General Staff mechanics for all sides\n- §R[WIP]§! Unique artillery strike mechanics for all sides\n- §G[DONE]§! Decisions on the creation of volunteer battalions for the ATO zone for Ukraine\n- §R[WIP]§! Portraits for everyone Country rulers on the map as of November 21, 2013 - §R[WIP]§! Unique escalation mechanics. §YFollow the mod updates§! on our §CDiscord server§! and §CTelegram channel!§!"

