 SEPARATISM_GUI_HELP_BUTTON:0 "§YSeparatism GUI Handbook§!\n\n\nThe Separatism GUI displays the level of separatist sentiment and the readiness of regions for an uprising. The higher this indicator, the more units, weapons, and territory the separatists will receive if an uprising begins.\n\nRegional separatism reflects the mood of the population living in the selected regions.\n§RWith high pro-Russian sentiment, separatists receive additional buffs, the population supports them more actively, and joins their ranks more often.§!\n§5With high pro-Ukrainian sentiment, a similar principle applies - the number of buffs for the Ukrainian Armed Forces increases, and the population gives them greater support.§!"

