 separatismgui_prorussian_rally_tt:0 "Holding a rally in support of rapprochement with Russia. This mass event should strengthen the position of Russia's supporters and weaken the influence of §Cpro-Ukrainian forces§!\n \n §YAction upon choice:§!\n The §Rpro-Russian population§! will increase by §G+5%§!\n §Loyalty to Ukraine§ will decrease!\n §YDecision cost:§! £pol_power §Y25§!\n §YRecharge:§! §Y14§! days."
 separatism_prorussian_incerase_tt:0 "Launch a broad pro-Russian propaganda campaign aimed at popularizing Russian values ​​and weakening §Cpro-Ukrainian sentiment§! in the region.\n \n §YAction upon choice:§!\n §Rpro-Russian population§! will increase by §G+5%§!\n §Loyalty to Ukraine§ will decrease!\n §YDecision cost:§! £pol_power §Y25§!\n §YRecharge:§! §Y14§! days."
 separatism_radicalize_people_tt:0 "Formation and support of radical pro-Russian groups ready to confront §Cpro-Ukrainian organizations§! and destabilize the situation in the region.\n \n §YAction upon choice:§!\n The §Rpro-Russian population§! will increase by §G+5%§!\n §Loyalty to Ukraine§ will decrease!\n §YDecision cost:§! £pol_power §Y25§!\n §YRecharge:§! §Y14§! days."
 arms_supplies_from_russia_tt:0 "Organize arms supply channels and contraband from Russian territory to support pro-Russian forces and weaken the §Cpro-Ukrainian population§!\n \n §YAction upon choice:§!\n Increase §Rpro-Russian population§! by §G+5%§!\n Decrease §Loyalty to Ukraine§!\n §YDecision cost:§! £pol_power §Y25§!\n §YReload:§! §Y14§! days."

 separatism_hold_proukranian_rally_tt:0 "Holding a rally in support of unity with Ukraine.\n \n §YAction upon choice:§!\n Increase §Cpro-Ukrainian population§! by §G+5%§!\n Decrease §RSeparatist activity§!\n §YCost of decision:§! £pol_power §Y25§!\n §YCan be used again in:§! §Y14§! days."
 separatism_proukranian_incerase_tt:0 "Organization of a large-scale information campaign in support of the course of rapprochement with Ukraine.\n \n §YAction upon selection:§!\n The §Cpro-Ukrainian population§! will increase by §G5%§!\n §RSeparatist activity§ will decrease!\n §YCost of decision:§! £pol_power §Y25§!\n §YCan be used again in:§! §Y14§! days."
 separatism_deradicalize_people_tt:0 "A program to strengthen the loyalty of the population and reduce the influence of radical elements.\n \n §YAction upon choice:§!\n The §Cpro-Ukrainian population§! will increase by §G5%§!\n §RSeparatist activity§ will decrease!\n §YCost of decision:§! £pol_power §Y25§!\n §YCan be used again in:§! §Y14§! days."
 fight_smuggling_from_russia_tt:0 "Stop arms supplies to separatists from Russia. Identify caches, block illegal routes, and detain smugglers to restore control of the region.\n \n §YAction upon choice:§!\n Increase §Cpro-Ukrainian population§! by §G5%§!\n Decrease §RSeparatist activity§!\n §YCost of decision:§! £pol_power §Y25§!\n §YCan be used again in:§! §Y14§! days."

