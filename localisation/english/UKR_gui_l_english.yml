 SEPARATISM_GUI_HELP_BUTTON:0 "§YSpravochnyk for HUY separatyzma§!\n\n\nHUY separatyzma otobrazhaet uroven separatystskykh nastroenyy and hotovnost rehyonov k vosstanyyu. Chem vyshe etot pokazatel, tem bolshe podrazdelenyy, vooruzhenyya and terrytoryy poluchat separatysty in sluchae nachala vosstanyya.\n\nRehyonalnyy separatyzm otrazhaet nastroenye naselenyya, prozhyvayushcheho in vybrannykh rehyonakh.\n§RPry vysokom urovne prorossyyskykh nastroenyy separatysty poluchayut dopolnytelnye baffy, naselenye aktyvnee podderzhyvaet ykh and chashche prysoedynyaetsya k ykh ryadam.§!\n§5Pry vysokom urovne proukraynskykh nastroenyy deystvuet analohychnyy pryntsyp - uvelychyvaetsya kolychestvo baffov u VSU, a naselenye okazyvaet ym bolshuyu podderzhku.§!"

