l_english:
 BM_HISTORY_TITLE:0 "Brief History"
 EUROMAIDAN_NAME:0 "  Euromaidan"
 EUROMAIDAN_DESC:0 "On the evening of November 21, 2013, following the government's unexpected decision to suspend preparations for signing the EU Association Agreement, around 1,500–2,000 students and activists—organized through social media—gathered on Independence Square (Maidan Nezalezhnosti) in Kyiv. They came with Ukrainian and European flags, protesting a political shift toward the Customs Union and demonstrating support for Ukraine’s European course. The crowd remained peaceful yet firm and determined: candles burned, songs were sung, people shared slogans and posters, greeted one another, and spoke with hope for change—symbolizing nonviolent resistance, unity, and civic solidarity. Despite the late-night cold and darkness, the participants’ energy and confidence filled the square—everyone felt they were becoming part of a historic moment that could change the country’s судьбу and define its future. This spontaneous gathering became the first mass action that launched a long protest movement. In the days and weeks that followed, it gradually grew into months-long demonstrations involving tens of thousands across the country, united by the idea of a European choice, the desire for reforms, the determination to defend their rights, and support for democratic values. These events became a symbol of civic solidarity and of the people’s resolve to influence the political course and protect democratic principles. This day entered history as the beginning of one of the largest democratic movements in Ukraine’s history, leaving an indelible mark on society’s consciousness and inspiring many to join the struggle for freedom and the country’s future."
 UKR_EC_DESC:0 "The country balances between the European Union and Russia. The authorities tighten control, the economy is unstable, yet the course toward integration with the West still remains. Refusing the EU agreement becomes a turning point: protests erupt, a political crisis begins, followed by a change of regime, the loss of territory, and armed conflict."
 RUS_EC_DESC:0 "The country is stable, with the Sochi Olympics ahead—an important image project. The economy is sustained by resources, power is centralized, and foreign policy focuses on preserving influence in the region. Rising tensions in Ukraine pose new challenges for the leadership. Moscow seeks a balance between countering the West and maintaining domestic stability."
 BLR_EC_DESC:0 "§RCOUNTRY WITHOUT CONTENT!§! Closely tied to Russia in politics, the economy, and defense. The authorities control the internal situation by suppressing the opposition. The economy depends on Russian support. Foreign policy is oriented toward alliance with Russia and confrontation with the West."
 ROM_EC_DESC:0 "§RCOUNTRY WITHOUT CONTENT!§! The country continues to strengthen Euro-Atlantic ties, develop its economy, and modernize its armed forces. Foreign policy focuses on regional security and integration with the West. Rising tensions in neighboring Ukraine cause concern. Bucharest increases measures to protect its interests and stability along the eastern borders."
 POL_EC_DESC:0 "§RCOUNTRY WITHOUT CONTENT!§! The country strengthens its position in the European Union and NATO, actively modernizing its army and economy. Poland seeks to expand its influence in Eastern Europe and maintain stability along its borders. The escalation of the crisis in Ukraine raises alarm and encourages active participation in regional security. Warsaw prepares for new challenges in Eastern Europe."
 MOL_EC_DESC:0 "§RCOUNTRY WITHOUT CONTENT!§! The country strengthens ties with Europe while balancing Russia’s influence. The economy remains weak, and domestic problems and the Transnistria conflict sustain instability."
 TMR_EC_DESC:0 "§RCOUNTRY WITHOUT CONTENT!§! A self-proclaimed unrecognized entity with steady Russian support. It controls its territory and has its own armed formations and administrative structures. Transnistria remains isolated, maintaining the status quo in a frozen conflict with Moldova."
 SOONDONBASS_WAR_NAME:0 "Donbas Ablaze"
 SOONDONBASS_WAR_DESC:0 "After months of protests, political crises, and the annexation of Crimea, the situation in eastern Ukraine rapidly escalated. Pro-Russian forces and separatists launched active operations in Donetsk and Luhansk regions, seizing administrative buildings, blocking roads, and destabilizing the lives of local communities. Cities and towns sank into an atmosphere of anxiety and uncertainty as residents tried to understand how to stay safe and protect their families. The authorities are preparing to begin an Anti-Terrorist Operation (ATO) in the coming days to restore control over the seized territories, protect civilians, and stabilize the situation. The military, security services, and volunteers mobilize for a complex and dangerous task—everyone understands that the actions ahead will be a test and will shape what comes next. This period became a critical moment for all sides of the conflict: Ukrainian forces, the local population, and pro-Russian formations. Each day brought new challenges and напряжение; each week could change the balance of power in the region. Decisions made at this moment determined the future of the country’s east, the political and military situation, and Ukraine’s internal and external prospects. Soon these events grew into a full-scale conflict affecting tens of thousands, strengthening national unity while deepening divisions in society. This period entered history as a time of severe trial for the country—a symbol of citizens’ determination to defend their rights, territorial integrity, and democratic values—leaving a deep mark on society’s consciousness and inspiring many to take part in defending Ukraine’s future."
 HUN_EC_DESC:0 "§RCOUNTRY WITHOUT CONTENT!§! The country remains a member of the EU and NATO, but increasingly pursues a pragmatic policy, trying to maintain workable relations with both the West and Moscow. Economic interests and energy issues play a central role, which is why Budapest avoids sharp moves in foreign policy. Rising tensions around Ukraine are seen as a risk to regional stability."
 CRI_EC_DESC:0 "§RCOUNTRY WITHOUT CONTENT!§! An autonomy within Ukraine—an important strategic region with Russia’s Black Sea Fleet base and a complex domestic political environment. Society is divided, pro-Russian sentiment is strong, and the question of status and Moscow’s influence is constantly present on the agenda. Against the backdrop of the Ukrainian crisis, Crimea becomes one of the main pressure points and a potential trigger for escalation."
 LIT_EC_DESC:0 "§RCOUNTRY WITHOUT CONTENT!§! The country strengthens ties within the EU and NATO and views Russia as the primary source of threats in the region. Lithuania supports Ukraine’s European course and closely watches events in Kyiv, considering them important for Eastern Europe’s security. Rising tensions push Vilnius to strengthen defense and дипломатическую activity."
 UKR_DW_DESC:0 "After the annexation of Crimea and the outbreak of fighting in the east, the country enters a phase of open war. Kyiv conducts mobilization and deploys the ATO, trying to restore control over territories and keep the state governable. The economy and society operate in crisis mode, and the cost of mistakes rises with each month."
 RUS_DW_DESC:0 "Moscow consolidates the results of the Crimea operation and increases pressure on Ukraine, seeking to preserve influence in the region. Amid sanctions and international isolation, the authorities rely on мобилизационную rhetoric and a display of force. The Kremlin aims to keep the conflict in a manageable form, preventing Ukraine’s final pivot to the West."
 DPR_DW_DESC:0 "Self-proclaimed structures attempt to hold Donetsk and key hubs, forming their own governing bodies and armed detachments. External support and an influx of volunteers increase their staying power, but the front quickly turns the region into a zone of destruction. The conflict radicalizes local politics and deepens the break with Kyiv."
 LPR_DW_DESC:0 "In Luhansk region, separatist forces entrench themselves in cities and along communications, building a parallel system of власти. The fighting becomes protracted, and control of territory constantly shifts. The region sinks into a humanitarian and governance crisis."
 POL_DW_DESC:0 "§RCOUNTRY WITHOUT CONTENT!§! Poland views the war in Ukraine as a direct threat to Eastern Europe’s security and actively supports Kyiv politically. Warsaw advocates strengthening NATO and pressuring Russia through sanctions, preparing for a prolonged crisis on its borders. Domestically, defense modernization and coordination with allies accelerate."
 LIT_DW_DESC:0 "§RCOUNTRY WITHOUT CONTENT!§! Lithuania takes the toughest stance against Russia’s actions and is among Ukraine’s strongest supporters in the EU and NATO. Vilnius backs sanctions and insists on reinforcing the Alliance’s eastern flank. The conflict accelerates defense and cyber measures inside the country."
 ROM_DW_DESC:0 "§RCOUNTRY WITHOUT CONTENT!§! Romania increases its focus on Black Sea security and its eastern borders amid war next door. Bucharest supports the EU and NATO course, advocating a stronger Allied presence in the region. Additional concern comes from the Moldova and Transnistria factor."
 MOL_DW_DESC:0 "§RCOUNTRY WITHOUT CONTENT!§! The country faces increased pressure due to the nearby war and the risk of destabilization around Transnistria. Chișinău tries to maintain a European course, but a weak economy and internal divisions limit its options. The authorities strengthen security measures and cautiously balance in foreign policy."
 HUN_DW_DESC:0 "§RCOUNTRY WITHOUT CONTENT!§! Hungary follows a cautious line and avoids sharp moves, relying on pragmatic diplomacy within the EU. Economic and energy risks, as well as the issue of the Hungarian minority in Zakarpattia, increase sensitivity to the conflict. Budapest supports general Western decisions but prefers softer rhetoric."
 SER_DW_DESC:0 "§RCOUNTRY WITHOUT CONTENT!§! Serbia maintains neutrality and tries not to sever ties with either the EU or Russia, viewing the war as a dangerous precedent. Belgrade limits itself to cautious statements and diplomatic balancing, avoiding direct support for either side. Domestic debates about foreign-policy orientation intensify."
 BLR_DW_DESC:0 "§RCOUNTRY WITHOUT CONTENT!§! Belarus remains closely tied to Russia but seeks not to be drawn directly into the war, maintaining control over the internal situation. Minsk uses the role of a venue for talks and contacts while minimizing risks from sanctions and escalation. Foreign policy is subordinated to preserving the regime and stability."
 TMR_DW_DESC:0 "§RCOUNTRY WITHOUT CONTENT!§! A self-proclaimed unrecognized entity with steady Russian support. The war in Ukraine increases the region’s strategic significance and heightens concerns among neighbors. Transnistria maintains the status quo, relying on its own security structures and external guarantees, remaining a постоянный pressure factor on Moldova."
