l_english:
 BM_HISTORY_TITLE: "Brief History"
 EUROMAIDAN_NAME: "Euromaidan"
 EUROMAIDAN_DESC: "Evening 21 November 2013, after the government paused preparations to sign the EU Association Agreement, around 1,500 or 2,000 students and activists gathered on Kyiv's Independence Square. They came with Ukrainian and EU flags, protesting the turn towards the Customs Union and supporting Ukraine’s European course. Despite the cold and dark, participants remained peaceful but determined, lighting candles, singing, and sharing hope for change. This spontaneous gathering marked the start of a long protest movement, eventually involving tens of thousands across the country, united by the idea of European choice, reforms, and defending democratic values."
 
 UKR_EC_DESC: "The country balances between the EU and Russia. The government tightens control, the economy is unstable, but the course toward Western integration remains. The EU agreement rejection triggers protests, a political crisis, regime change, territorial loss, and armed conflict."
 RUS_EC_DESC: "The country is stable, with the Sochi Olympics ahead as a major image project. The economy relies on resources, authority is centralized, and foreign policy focuses on regional influence. Rising tensions in Ukraine pose new challenges for the leadership. Moscow seeks balance between countering the West and maintaining domestic stability."
 BLR_EC_DESC: "Closely linked with Russia in politics, economy, and defense. The government controls internal affairs, suppressing opposition. Economy depends on Russian support. Foreign policy aligns with Russia and opposes the West."
 ROM_EC_DESC: "The country strengthens Euro-Atlantic ties, develops the economy, and modernizes armed forces. Foreign policy focuses on regional security and integration with the West. Rising tensions in neighboring Ukraine cause concern. Bucharest takes measures to protect its interests and stability on eastern borders."
 POL_EC_DESC: "The country consolidates its position in the EU and NATO, actively modernizing army and economy. Poland seeks influence in Eastern Europe and to maintain border stability. The Ukraine crisis raises concerns and prompts active engagement in regional security. Warsaw prepares for new challenges in Eastern Europe."
 MOL_EC_DESC: "The country strengthens European ties while balancing Russian influence. The economy remains weak, internal issues and the Transnistria conflict sustain instability."
 TMR_EC_DESC: "A self-proclaimed, unrecognized entity supported by Russia. Controls its territory, has armed forces and administrative structures. Remains isolated, maintaining the frozen conflict status quo with Moldova."
 SOONDONBASS_WAR_NAME: "Donbass in Flames"
 SOONDONBASS_WAR_DESC: "After months of protests, political crises, and Crimea's annexation, eastern Ukraine escalated. Pro-Russian forces and separatists acted in Donetsk and Luhansk, seizing buildings, blocking roads, and destabilizing civilians. Cities were tense, residents tried to stay safe, and authorities prepared an Anti-Terrorist Operation (ATO). Military, security forces, and volunteers mobilized. This period became critical for all sides: Ukrainian forces, locals, and pro-Russian groups."
