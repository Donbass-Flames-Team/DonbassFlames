 UKR_EC_DESC: "The country is already on fire. 21.11.2013 marks the start of the Maidan protests. After preparations to sign the EU Association Agreement were halted, protests in Kyiv and major cities stop being isolated rallies and turn into a fierce confrontation between Euromaidan supporters and the authorities. Society splits over the country’s direction—into pro-Russian, pro-European, and nationalist camps."

 RUS_EC_DESC: "§YA country with lightly developed content§! The country is stable; the Sochi Olympics are ahead—an important image project. The economy rests on resources, power is centralized, and foreign policy focuses on maintaining influence in the region. Rising tension in Ukraine poses new tasks for the leadership. Moscow seeks a balance between countering the West and maintaining domestic stability."
 BLR_EC_DESC: "§RNO CONTENT COUNTRY!§! Closely tied to Russia in politics, economy, and defense. The authorities control the domestic situation by suppressing the opposition. The economy depends on Russian support. Foreign policy is oriented toward alliance with Russia and confrontation with the West."
 ROM_EC_DESC: "§RNO CONTENT COUNTRY!§! The country continues strengthening Euro-Atlantic ties, developing the economy, and modernizing its armed forces. Foreign policy focuses on regional security and integration with the West. Rising tension in neighboring Ukraine causes concern. Bucharest increases measures to protect its interests and stability on its eastern borders."
 POL_EC_DESC: "§RNO CONTENT COUNTRY!§! The country strengthens its position in the EU and NATO and actively modernizes its army and economy. Poland seeks to increase influence in Eastern Europe and maintain stability on its borders. The escalation of the crisis in Ukraine raises alarm and encourages active involvement in regional security. Warsaw is preparing for new challenges in Eastern Europe."
 MOL_EC_DESC: "§RNO CONTENT COUNTRY!§! The country strengthens ties with Europe while balancing Russia’s influence. The economy remains weak, and internal problems and the Transnistrian conflict preserve instability."
 TMR_EC_DESC: "§YA country with lightly developed content§! A self-proclaimed unrecognized entity with steady Russian support. It controls its own territory and has its own armed formations and administrative structures. Transnistria remains isolated, maintaining the status quo in a frozen conflict with Moldova."
 HUN_EC_DESC: "§RNO CONTENT COUNTRY!§! The country remains an EU and NATO member but increasingly pursues pragmatic policies, trying to keep working relations with both the West and Moscow. Economic interests and energy dominate, which makes Budapest avoid sharp moves in foreign policy. Rising tension around Ukraine is seen as a risk to regional stability."
 CRI_EC_DESC: "§RNO CONTENT COUNTRY!§! An autonomy within Ukraine, a strategically important region with Russia’s Black Sea Fleet base and a complex internal political landscape. Society is divided, pro-Russian sentiments are strong, and the question of status and Moscow’s influence is constantly on the agenda. Against the backdrop of the Ukrainian crisis, Crimea becomes one of the main pressure points and a potential escalation hotspot."
 LIT_EC_DESC: "§RNO CONTENT COUNTRY!§! The country strengthens ties within the EU and NATO and views Russia as the main source of threats in the region. Lithuania supports Ukraine’s European course and closely watches events in Kyiv, seeing them as crucial for Eastern Europe’s security. Rising tension pushes Vilnius to strengthen defense and diplomatic activity."

 UKR_DW_DESC: "After the annexation of Crimea and the outbreak of fighting in the east, the country enters a phase of open war. Kyiv carries out mobilization and launches the ATO, trying to restore control over territories and keep the state governable. The economy and society operate in crisis mode, and the price of mistakes rises with each month."
 RUS_DW_DESC: "§YA country with lightly developed content§! Moscow consolidates the results of the Crimea operation and increases pressure on Ukraine, trying to maintain influence in the region. Amid sanctions and international isolation, the authorities rely on mobilizing rhetoric and a show of force. The Kremlin seeks to keep the conflict manageable, preventing Ukraine’s final turn toward the West."
 DPR_DW_DESC: "§YA country with lightly developed content§! Self-proclaimed structures try to hold Donetsk and key hubs, forming their own governing bodies and armed detachments. External support and an inflow of volunteers increase resilience, but the front quickly turns the region into a zone of destruction. The conflict radicalizes local politics and deepens the rupture with Kyiv."
 LPR_DW_DESC: "§YA country with lightly developed content§! In Luhansk oblast, separatist forces entrench in cities and on key routes, building a parallel system of power. Fighting becomes protracted, and control over territory constantly shifts. The region sinks into a humanitarian and governance crisis."
 POL_DW_DESC: "§RNO CONTENT COUNTRY!§! Poland views the war in Ukraine as a direct threat to Eastern Europe’s security and actively supports Kyiv politically. Warsaw advocates for strengthening NATO and pressuring Russia through sanctions, preparing for a long crisis on its borders. Defense modernization and coordination with allies accelerate at home."
 LIT_DW_DESC: "§RNO CONTENT COUNTRY!§! Lithuania takes the hardest stance against Russia’s actions and is among Ukraine’s strongest supporters in the EU and NATO. Vilnius supports sanctions and insists on strengthening the Alliance’s eastern flank. The conflict accelerates defense and cyber measures inside the country."
 ROM_DW_DESC: "§RNO CONTENT COUNTRY!§! Romania increases its focus on Black Sea security and its eastern borders amid war next door. Bucharest supports the EU and NATO course, insisting on a stronger Alliance presence in the region. The Moldova/Transnistria factor adds extra concern."
 MOL_DW_DESC: "§RNO CONTENT COUNTRY!§! The country faces increased pressure due to the nearby war and the risk of destabilization around Transnistria. Chișinău tries to keep its European course, but a weak economy and internal divisions limit capabilities. The authorities strengthen security measures and carefully balance foreign policy."
 HUN_DW_DESC: "§RNO CONTENT COUNTRY!§! Hungary follows a cautious line and avoids sharp steps, betting on pragmatic diplomacy inside the EU. Economic and energy risks, as well as the issue of the Hungarian minority in Zakarpattia, increase sensitivity to the conflict. Budapest supports general Western decisions but prefers softer rhetoric."
 SER_DW_DESC: "§RNO CONTENT COUNTRY!§! Serbia maintains neutrality and tries not to break ties with either the EU or Russia, viewing the war as a dangerous precedent. Belgrade limits itself to cautious statements and diplomatic balancing, avoiding direct support for either side. Domestic debates about foreign-policy choice intensify."
 BLR_DW_DESC: "§RNO CONTENT COUNTRY!§! Belarus remains closely linked to Russia but seeks not to be drawn directly into the war, maintaining control over the domestic situation. Minsk uses the role of a negotiation platform and contact venue, while minimizing risks from sanctions and escalation. Foreign policy is subordinated to preserving the regime and stability."
 TMR_DW_DESC: "§YA country with lightly developed content§! A self-proclaimed unrecognized entity with steady Russian support. The war in Ukraine increases the region’s strategic importance and heightens anxiety among neighbors. Transnistria maintains the status quo, relying on its own силовые structures and external guarantees, remaining a constant pressure factor on Moldova."
