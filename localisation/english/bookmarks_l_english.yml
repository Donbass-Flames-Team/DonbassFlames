 EUROMAIDAN_DESC: "On the evening of November 21, 2013, after the government unexpectedly decided to suspend preparations for signing the EU Association Agreement, around 1,500–2,000 students and activists—organized through social networks—gathered on Independence Square (Maidan Nezalezhnosti) in Kyiv. They came out with Ukrainian and European flags, protesting the policy pivot toward the Customs Union and supporting Ukraine’s European course. The crowd maintained a peaceful, yet firm and determined mood: candles burned, songs were sung, people held signs and slogans, and shared hope for change—symbolizing unity and civic solidarity. Despite the cold and late hour, the Maidan felt charged with energy and confidence—many understood they were becoming part of a historic moment. This spontaneous gathering became the first mass demonstration that launched a prolonged protest movement. In the following days and weeks it grew into months-long actions with tens of thousands of participants across the country, united by the idea of a European choice, a drive for reforms, and the defense of democratic values. These events entered history as the beginning of one of the largest democratic movements in Ukraine.\n\n\n\n\n\n This scenario begins on 21.11.2013 — the day the Maidan protests started. You will have to go through the key events of Euromaidan: from the first rallies and the political crisis to the change of power and the subsequent escalation of the conflict that led to the war in Donbas.\n\nYou will make decisions that can change the course of history: pursue compromise, suppress the protests by force, or allow the President’s arrest. Each choice affects the country’s stability, international relations, and the further development of events—opening both historical and alternative paths."

