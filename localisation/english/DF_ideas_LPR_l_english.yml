﻿l_english:
 LPR_republic_without_power:0 "Republic Without Power"
 LPR_republic_without_power_desc:0 "Formally, there is a government, but chaos and lawlessness reign locally."
 
 LPR_power_of_gun:0 "Power of the Gun"
 LPR_power_of_gun_desc:0 "Power is held through weapons; local groups control districts, decisions are made by force, not law."
 
 LPR_fragmented_gangs:0 "Fragmented Gangs"
 LPR_fragmented_gangs_desc:0 "Territories are divided among local armed groups; each district lives by its own rules, robberies and resource control are common."
 
 LPR_eastern_intervention:0 "Eastern Intervention"
 LPR_eastern_intervention_desc:0 "Covert support from the east: equipment, advisors, regular forces deciding the outcome of battles in the shadows."
 
 LPR_unauthorized_commanders:0 "Unauthorized Commanders"
 LPR_unauthorized_commanders_desc:0 "Local leaders emerge who decide how to act on their own. Each detachment acts independently, pursuing its own goals without regard for the republic's formal orders. Decisions are often made impulsively, and conflicts between groups intensify the chaos."
 
 LPR_mercenaries_and_supporters:0 "Mercenaries and Supporters"
 LPR_mercenaries_and_supporters_desc:0 "Mercenaries and advisors from abroad operate in the region, forming combat groups and supporting chaos on the front line."
