 russia.11.t: "Minsk Protocols"
 russia.11.d: "The Minsk Protocols were signed to settle the conflict in eastern Ukraine between government forces and pro-Russian separatists. The document provides for a ceasefire, the exchange of prisoners, and constitutional reform in Ukraine to grant greater autonomy to the Donetsk and Luhansk regions. However, despite the signing of the protocols, hostilities continued, with both sides accusing each other of violating the agreement."
 russia.11.a: "Excellent"
 russia.12.t: "Cutting off Water Supply to Crimea"
 russia.12.d: "As a result of the water supply to Crimea being cut off, local residents and Russian military forces faced serious difficulties in maintaining the region's vital functions."
 russia.12.a: "Outrageous!"

 news_events.9.t: "Poroshenko Becomes President"
 news_events.9.d: "Following the events of Euromaidan and the flight of Viktor Yanukovych, Ukraine found itself in a state of political and economic crisis. In May 2014, early presidential elections were held, in which businessman and politician Petro Poroshenko won a decisive victory in the first round. He promised the nation a path to Europe, an end to the war in the East, and reforms. However, many doubted whether he would be able to fulfill these promises amidst an intense struggle against separatism, external pressure, and a collapsing economy."
 news_events.9.a: "A new hope"
 news_events.9.b: "An illegitimate president"
 news_events.9.c: "Interesting"
 news_events.10.t: "USA: 2016 Presidential Election Results"
 news_events.10.d: "On November 8, 2016, presidential elections were held in the United States. Following the vote, Donald Trump emerged victorious. The results of the campaign caused a wide resonance both domestically and abroad."
 news_events.10.a: "I see"
 news_events.11.t: "USA: 2020 Presidential Election Results"
 news_events.11.d: "On November 3, 2020, presidential elections took place in the United States. Joe Biden emerged victorious. A period of forming a new administration and transferring power begins."
 news_events.11.a: "I see"
 news_events.12.t: "USA: 2024 Presidential Election Results"
 news_events.12.d: "On November 5, 2024, presidential elections were held in the United States. Donald Trump emerged victorious. The election results are becoming a major factor in the international agenda."
 news_events.12.a: "I see"
 news_events.13.a: "I see"
 news_events.13.t: "Boeing 777 Crash in Donetsk Region"
 news_events.13.d: "A Malaysia Airlines Boeing 777-200ER airliner was performing scheduled flight MH17 from Amsterdam to Kuala Lumpur, but approximately 2 hours and 49 minutes after takeoff, it was struck by an anti-aircraft missile fired from an unknown surface-to-air missile system and broke into several pieces. The wreckage of the liner crashed near the villages of Hrabove, Rozsypne, Petropavlivka, and the urban-type settlement of Rozsypne. All 298 people on board—283 passengers and 15 crew members—perished. The Ukrainian side claims the plane was shot down by pro-Russian forces using a SAM system supplied by Russia; Russian officials reject all accusations and blame Ukraine for the catastrophe."
 news_events.13.a: "HORRIBLE"

 ukraine.1.t: "Yanukovych has Left Kyiv"
 ukraine.1.d: "Immediately after signing the agreement to resolve the crisis in Ukraine, President Viktor Yanukovych left Kyiv for an unknown destination. No official statements are being made, no decrees are being signed, and communication with the administration has been severed. Government buildings remain without political leadership."
 ukraine.1.a: "Where did he go?"
