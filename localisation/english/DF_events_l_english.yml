﻿l_english:
 russia.1.t: "Operation in Crimea"
 russia.1.d: "Amidst the political chaos in Kyiv and the flight of President Yanukovych, the question of the security of the Black Sea Fleet and the Russian-speaking population of Crimea arises. We must take control of the situation using 'self-defense forces' and special units to prevent the destabilization of the peninsula and pave the way for its reunification with Russia."
 russia.1.a: "Get to work!"
 russia.2.t: "Crimea Has Returned to Its Native Harbor"
 russia.2.d: "Following the referendum and the signing of the treaty on the admission of the Republic of Crimea into the Russian Federation, the peninsula has officially become part of our country. Sevastopol is once again a city of Russian glory within Russia. The world's reaction is mixed, but historical justice has prevailed."
 russia.2.a: "Returned to the native harbor!"
 russia.3.t: "The War Drags On"
 russia.3.d: "What was planned as a swift operation to stabilize the situation has devolved into a protracted armed conflict. The front lines have stabilized, and now both sides are digging in. The economy and diplomacy are shifting into a long-term confrontation mode."
 russia.3.a: "I see."
 russia.4.t: "Ukraine Accepts Agreements"
 russia.4.d: "Diplomatic pressure and successes on the front have borne fruit. Kyiv has agreed to sign the settlement terms we proposed. This gives us time to consolidate our gains and de-escalate on our own terms."
 russia.4.a: "Good."
 russia.5.t: "Ukraine Rejects Agreements"
 russia.5.d: "The Kyiv regime has rejected all our proposals for a peaceful settlement, choosing the path of further escalation and reliance on Western aid. This means the conflict will continue until a victorious end."
 russia.5.a: "Bastards."  
 russia.6.t: "Coup in Ukraine"
 russia.6.d: "Events on the Maidan have reached a breaking point. Radicals have seized the government quarter, and the legitimate president, Viktor Yanukovych, has been forced into hiding. A coup d'état has effectively taken place in the country. The President's life is in danger."
 russia.6.a: "We must urgently evacuate Yanukovych!"
 russia.7.t: "Yanukovych Was Evacuated"
 russia.7.d: "In a flawless operation by our special services, Viktor Yanukovych was extracted from Ukrainian territory and brought to Russia. We now hold a trump card in the form of the legitimate, albeit exiled, head of state, who can testify to the illegality of the new Kyiv authorities."
 russia.7.a: "Well done!"
 russia.8.t: "Yanukovych Detained"
 russia.8.d: "Despite all efforts, the evacuation failed. Viktor Yanukovych was detained by forces loyal to the new government in Kyiv. Now he faces trial, and we have lost a significant tool of diplomatic influence."
 russia.8.a: "Shit."
 russia.10.t: "Referendum in Crimea"
 russia.10.d: "The residents of Crimea and Sevastopol have gone to the polls to determine their future. The overwhelming majority voted to join the Russian Federation. This day will go down in history as a symbol of the people's will."
 russia.10.a: "Crimea returns to its native harbor!"
 russia.11.t: "The Minsk Protocols"
 russia.11.d: "The Minsk Protocols were signed to settle the conflict in eastern Ukraine between government forces and pro-Russian separatists. The document provides for a ceasefire, prisoner exchange, and constitutional reform in Ukraine to grant greater autonomy to the Donetsk and Luhansk regions. However, despite the signing, hostilities continued, with both sides accusing each other of violating the agreement."
 russia.11.a: "Excellent."
 russia.12.t: "Cutting Off Water to Crimea"
 russia.12.d: "As a result of the cutoff of water supplies to Crimea through the North Crimean Canal, local residents and Russian military forces faced serious difficulties in ensuring the region's vital functions. Ukraine is using the water blockade as a tool of pressure, creating the threat of a humanitarian catastrophe."
 russia.12.a: "Outrageous!"
 russia.13.t: "The Second Minsk Agreement"
 russia.13.d: "Due to the ongoing escalation, the parties signed an expanded agreement, including reinforced ceasefire measures, the withdrawal of troops and heavy weaponry, the restoration of Ukrainian control over the border, and constitutional reform with local elections in Donbas. Minsk II became the key international mechanism for de-escalation, although compliance remained problematic."
 russia.13.a: "Excellent." 


 news_events.1.t: "Change of Power in Ukraine"
 news_events.1.d: "After months of protests, street violence and political paralysis, power in Ukraine is passing to new forces. The current president has left the capital, while parliament has taken the initiative and announced the formation of a new political course. For some states this is a victory of popular protest and a chance for democratic reforms. For others it is an unconstitutional coup creating a dangerous precedent of changing power under pressure from the streets."
 news_events.1.a: "The end of dictatorship!"
 news_events.1.b: "Coup!"
 news_events.1.c: "Understood"

 news_events.2.t: "Creation of the DPR"
 news_events.2.d: "Amid the change of power in Kyiv and the collapse of the governing vertical in the east of the country, the protest movement in Donetsk takes on a new form. Buildings of the regional administration and security services have been seized. New symbols of power are raised above them. Self-proclaimed leaders announce the creation of the Donetsk People's Republic. They declare a refusal to recognize the decisions of the central government of Ukraine and a course toward an independent political future. Temporary authorities, armed security units and their own administration are being formed."
 news_events.2.a: "Separatists!"
 news_events.2.b: "Russians forward!"
 news_events.2.c: "Understood"

 news_events.3.t: "Creation of the LPR"
 news_events.3.d: "Amid the change of power in Kyiv and the collapse of the governing vertical in the east of the country, the protest movement in Luhansk takes on a new form. Buildings of the regional administration and security services have been seized. New symbols of power are raised above them. Self-proclaimed leaders announce the creation of the Luhansk People's Republic. They declare a refusal to recognize the decisions of the central government of Ukraine and a course toward an independent political future. Temporary authorities, armed security units and their own administration are being formed."
 news_events.3.a: "Separatists!"
 news_events.3.b: "Russians forward!"
 news_events.3.c: "Understood"

 news_events.4.t: "Creation of the HPR"
 news_events.4.d: "Amid the change of power in Kyiv and the collapse of the governing vertical in the east of the country, the protest movement in Kharkiv takes on a new form. Buildings of the regional administration and security services have been seized. New symbols of power are raised above them. Self-proclaimed leaders announce the creation of the Kharkiv People's Republic. They declare a refusal to recognize the decisions of the central government of Ukraine and a course toward an independent political future. Temporary authorities, armed security units and their own administration are being formed."
 news_events.4.a: "Separatists!"
 news_events.4.b: "Russians forward!"
 news_events.4.c: "Understood"

 news_events.5.t: "Creation of the OPR"
 news_events.5.d: "Amid the change of power in Kyiv and the collapse of the governing vertical in the east of the country, the protest movement in Odesa takes on a new form. Buildings of the regional administration and security services have been seized. New symbols of power are raised above them. Self-proclaimed leaders announce the creation of the Odesa People's Republic. They declare a refusal to recognize the decisions of the central government of Ukraine and a course toward an independent political future. Temporary authorities, armed security units and their own administration are being formed."
 news_events.5.a: "Separatists!"
 news_events.5.b: "Russians forward!"
 news_events.5.c: "Understood"

 news_events.6.t: "Little Green Men in Crimea"
 news_events.6.d: "Unknown armed units without insignia have appeared on the territory of the Autonomous Republic of Crimea. Men in modern military uniforms equipped with the latest small arms and communications equipment began occupying key infrastructure facilities: the buildings of the Crimean parliament and government, airports, communication hubs and military bases. Their affiliation has not been officially confirmed. Representatives of the Russian Federation claim that these are 'local self-defense forces' acting to protect the Russian-speaking population and prevent chaos after the change of power in Kyiv. The Ukrainian leadership, in turn, calls what is happening an act of external aggression and a violation of the country's territorial integrity."
 news_events.6.a: "Russian occupiers!"
 news_events.6.b: "The beginning of the Crimean Spring"
 news_events.6.c: "Horrible!"

 news_events.7.t: "Annexation of Crimea"
 news_events.7.d: "After the rapid events of February, a referendum on the status of the peninsula was held in Crimea. According to official data from the Crimean authorities, the majority of participants supported leaving Ukraine and joining the Russian Federation. The vote took place under the effective control of armed formations without insignia. Shortly afterward, the Russian Federation announced the acceptance of the Republic of Crimea and the city of Sevastopol into its territory. In Moscow the signing of the relevant documents was presented as a 'restoration of historical justice' and the realization of the right of peoples to self-determination. Ukraine and the overwhelming majority of the world's states refused to recognize the referendum results, calling it an illegal annexation and a gross violation of international law. In response to Russia's actions the first sanctions were introduced, marking the beginning of a long political and economic confrontation between Russia and the West."
 news_events.7.a: "Russian occupiers!"
 news_events.7.b: "The beginning of the Crimean Spring"
 news_events.7.c: "Horrible!"

 news_events.8.t: "Crimean Referendum"
 news_events.8.d: "Amid the political crisis in Ukraine and the effective control of Crimea by armed formations without insignia, the authorities of the Autonomous Republic of Crimea announced an extraordinary referendum on the future status of the peninsula. Residents were asked to choose between leaving Ukraine and subsequently joining the Russian Federation or restoring the 1992 Constitution of Crimea. The option of maintaining the previous autonomous status within Ukraine was not included in the ballot. According to official data from the organizers, turnout exceeded 80%, and an overwhelming majority voted in favor of joining Russia. The results were quickly approved by local authorities and supported by the leadership of the Russian Federation."
 news_events.8.a: "Russian occupiers!"
 news_events.8.b: "The Crimean people made their choice"
 news_events.8.c: "Horrible!"

 news_events.9.t: "Poroshenko Becomes President"
 news_events.9.d: "After the events of Euromaidan and the flight of Viktor Yanukovych, Ukraine found itself in a state of political and economic crisis. In May 2014 early presidential elections were held, in which businessman and politician Petro Poroshenko won a decisive victory in the first round. He promised the nation a path toward Europe, an end to the war in the East and major reforms. However many doubted whether he would be able to fulfill these promises amid the fierce struggle with separatism, external pressure and a collapsing economy."
 news_events.9.a: "A new hope"
 news_events.9.b: "An illegitimate president"
 news_events.9.c: "Interesting"

 news_events.13.t: "Boeing 777 Disaster in Donetsk Region"
 news_events.13.d: "A Malaysia Airlines Boeing 777-200ER operating flight MH17 from Amsterdam to Kuala Lumpur was struck by an anti-aircraft missile approximately two hours and forty-nine minutes after takeoff. The aircraft broke apart in midair and crashed near the villages of Hrabove, Rozsypne and Petropavlivka. All 298 people on board were killed. Ukraine claims the aircraft was shot down by pro-Russian forces using a system supplied by Russia. Russian officials reject these accusations and blame Ukraine for the catastrophe."
 news_events.13.a: "HORRIBLE"
 news_events.14.t: "Bus Shelled Near Volnovakha"
 news_events.14.d: "A tragedy near Volnovakha shocked the international community when a passenger bus came under artillery fire near a checkpoint. Civilians traveling on their daily routes became victims of the attack. Both sides of the conflict quickly accused each other, but one fact remains clear: civilians continue to suffer the most in this war."
 news_events.14.a: "Terrible"

 news_events.15.t: "EU Imposes Sanctions"
 news_events.15.d: "In response to Russia's actions in Ukraine and the annexation of Crimea, the European Union announced a package of economic and personal sanctions. These measures aim to restrict Russian companies' access to Western capital and technologies and freeze the assets of several officials."
 news_events.15.a: "Understood"
 news_events.16.t: "Minsk Protocols"
 news_events.16.d: "After months of heavy fighting in eastern Ukraine and rising international pressure, agreements known as the Minsk Protocols were signed in the Belarusian capital. Representatives of Ukraine, Russia and the OSCE participated, along with delegates from the self-proclaimed Donetsk and Luhansk People's Republics. The goal of the protocols was an immediate ceasefire and a political solution to the conflict."
 news_events.16.a: "Peace at last?"
 news_events.17.t: "Minsk II Agreement"
 news_events.17.d: "Following the escalation of fighting during the winter of 2014-2015 and the battle for Debaltseve, leaders of Germany, France, Ukraine and Russia met in Minsk in the so-called Normandy Format. After long negotiations they signed a document known as the 'Package of Measures for the Implementation of the Minsk Agreements', commonly called Minsk II."
 news_events.17.a: "Peace at last?"
 news_events.18.t: "Fighting Resumes"
 news_events.18.d: "Despite the signing of the Minsk Protocols in September 2014, hostilities in eastern Ukraine did not fully stop. Within weeks both sides accused each other of repeated ceasefire violations. Skirmishes and artillery strikes gradually escalated into renewed large-scale clashes."
 news_events.18.a: "Terrible!"
 news_events.19.t: "Partial Mobilization in Ukraine"
 news_events.19.d: "After Russia's intervention and the annexation of Crimea, the Ukrainian government announced a partial mobilization to defend the country's sovereignty. Reservists were called up and military units were placed on high alert while recruitment centers began gathering additional manpower."
 news_events.19.a: "Glory to Ukraine!"
 news_events.19.b: "Another Act of Aggression"
 news_events.19.c: "Understood"
 news_events.20.t: "Separatists Capture Debaltseve"
 news_events.20.d: "In February separatist forces captured Debaltseve, a key railway and road junction in the Donbas. After intense fighting Ukrainian units withdrew from the city, suffering heavy losses. The fall of the city was widely seen as a significant shift in the balance of power in the region."
 news_events.20.a: "Terrible!"
 news_events.20.b: "Freedom for Donbas!"
 news_events.20.c: "Understood"

 news_events.21.t: "Bilateral Talks in Minsk"
 news_events.21.d: "Talks were held in Minsk between Russian President Vladimir Putin and Ukrainian President Petro Poroshenko. EU foreign policy chief Catherine Ashton described the conversation as frank but constructive."
 news_events.21.a: "Excellent!"
 news_events.21.b: "Excellent!"
 news_events.21.c: "Understood"

 news_events.22.t: "Shelling of the Beach in Zugres"
 news_events.22.d: "International media reported a tragic incident in the city of Zugres where an artillery strike hit a public beach filled with civilians. Women and children were among the victims, sparking outrage and mutual accusations between the sides of the conflict."
 news_events.22.a: "Terrible!"
 news_events.22.b: "Bandera Criminals!"
 news_events.22.c: "Terrible!"

 news_events.23.t: "Assassination of Alexander Zakharchenko"

 news_events.24.t: "Victory of Yulia Tymoshenko"
 news_events.24.d: "According to the results of the presidential election in Ukraine, Yulia Tymoshenko has won the vote. After counting the ballots the Central Election Commission announced her as the new President of the country. The elections were held amid a serious political crisis and the ongoing conflict in eastern Ukraine."
 news_events.24.a: "A New Hope!"
 news_events.24.b: "We Recognize Only One President"
 news_events.24.c: "Understood"

 ukraine.1.t: "Yanukovych Has Left Kyiv"
 ukraine.1.d: "Immediately after signing the settlement agreement, President Viktor Yanukovych fled Kyiv in an unknown direction. No official statements are made, no decrees signed, and contact with the administration is severed. Government buildings are left without political leadership."
 ukraine.1.a: "Where did he go?"
 ukraine.2.t: "Loss of Control Over Donetsk"
 ukraine.2.d: "The situation in the east of the country has spiraled out of control. Today, organized groups of armed men calling themselves 'people's militia,' supported by protesters, stormed the regional administration building in Donetsk. Ukrainian flags were torn down, replaced by the banners of the self-proclaimed 'republic.' The local police largely refused to resist or openly defected. The central government has effectively lost control over the key industrial center of Donbas."
 ukraine.2.a: "This is only a temporary crisis."
 ukraine.2.b: "We no longer obey Kyiv."
 ukraine.3.t: "Uprising in Luhansk Region"
 ukraine.3.d: "A wave of protests and seizures of government buildings has swept through Luhansk. Groups of activists, armed and supported by the local population, have declared their defiance of the Kyiv authorities. Militia units are being formed, and the flags of a new republic are being raised over the city."
 ukraine.3.a: "Glory to Ukraine!"
 ukraine.3.b: "Freedom for Donbas!"
 ukraine.4.t: "Uprising in Kharkiv Region"
 ukraine.4.d: "The situation in Kharkiv has reached a boiling point. Pro-Russian activists seized the Regional State Administration building and announced the creation of the Kharkiv People's Republic. Clashes between Maidan supporters and their opponents are occurring in the streets. The fate of the region hangs by a thread."
 ukraine.4.a: "Glory to Ukraine!"
 ukraine.4.b: "Freedom for Novorossiya!"
 ukraine.5.t: "Uprising in Odesa Region"
 ukraine.5.d: "Odesa has become an arena of fierce confrontation. Anti-Maidan activists have set up a tent camp on Kulikovo Pole, demanding federalization and the protection of the Russian language. Tension grows daily, threatening to erupt into open conflict."
 ukraine.5.a: "Glory to Ukraine!"
 ukraine.5.b: "Freedom for Novorossiya!"
 ukraine.6.t: "Chto delat dalshe?"
 ukraine.6.d: "In stolytse nachynayutsya massovye aktsyy protesta posle decisions pravytelstva yzmenyt vneshnepolytycheskyy course countries. On tsentralnye ploshchady vykhodyat tysyachy lyudey - studenty, aktyvysty and oppozytsyonnye forces trebuyut peresmotra reshenyy power and prodolzhenyya evropeyskoy yntehratsyy. Sytuatsyya ostayotsya napryazhyonnoy, protesty poka nosyat myrnyy kharakter, odnako ykh masshtaby bystro rastut. Rehyonalnye admynystratsyy vnymatelno sledyat for razvytyem sobytyy, a mezhdunarodnoe soobshchestvo uzhe delaet pervye zayavlenyya. We dolzhny reshyt, kakym putyom deystvovat dalshe - ydty on ustupky yly popytatsya vosstanovyt polnyy control nad ulytsamy."
 ukraine.6.a: "Nuzhno reshyt etot vremennyy crisis"
 ukraine.7.t: "Pro-Russian Protests in Luhansk"
 ukraine.7.d: "Thousands of Luhansk residents took to the streets demanding a referendum and closer ties with Russia. Protesters are outraged by the new government's policies and are ready to defend their interests by any means."
 ukraine.7.a: "Protests are intensifying!"
 ukraine.8.t: "Pro-Ukrainian Protests in Luhansk"
 ukraine.8.d: "Despite the pressure, supporters of Ukrainian unity held a rally in Luhansk. They state that Donbas is Ukraine and oppose the interference of a neighboring state in their region's affairs."
 ukraine.8.a: "Protests are intensifying!"
 ukraine.9.t: "Pro-Russian Protests in Donetsk"
 ukraine.9.d: "Donetsk is boiling. Lenin Square is filled with people carrying Russian tricolors. Slogans for Donbas independence sound louder, and local authorities seem paralyzed in the face of the massive crowd."
 ukraine.9.a: "Protests are intensifying!"
 ukraine.10.t: "Pro-Ukrainian Protests in Donetsk"
 ukraine.10.d: "Activists for Ukrainian unity gathered in the center of Donetsk to show the city does not want to separate. The action takes place in a tense atmosphere, under the threat of attack from radical opponents."
 ukraine.10.a: "Protests are intensifying!"
 ukraine.11.t: "Pro-Russian Protests in Kharkiv"
 ukraine.11.d: "Supporters of federalization gather at the Lenin monument in Kharkiv. They demand autonomy for the region and do not recognize the legitimacy of the Kyiv government, calling for a referendum."
 ukraine.11.a: "Protests are intensifying!"
 ukraine.12.t: "Pro-Ukrainian Protests in Kharkiv"
 ukraine.12.d: "The Kharkiv EuroMaidan continues its actions. People demand the rule of law and the preservation of territorial integrity, fearing a 'Crimean scenario' in their city."
 ukraine.12.a: "Protests are intensifying!"
 ukraine.13.t: "Pro-Russian Protests in Odesa"
 ukraine.13.d: "A march of Anti-Maidan supporters passed through the streets of Odesa. Participants advocate for maintaining ties with Russia and oppose the influence of radical nationalists on state policy."
 ukraine.13.a: "Protests are intensifying!"
 ukraine.14.t: "Pro-Ukrainian Protests in Odesa"
 ukraine.14.d: "Odesans supporting the new government took to the streets for a unity march. They emphasize the city's multi-ethnic character and its unbreakable bond with Ukraine."
 ukraine.14.a: "Protests are intensifying!"
 ukraine.15.t: "Pro-Russian Protests in Crimea"
 ukraine.15.d: "Mass rallies are held in Sevastopol and Simferopol. People demand protection from the 'fascist threat' from Kyiv and call on Russia to intervene."
 ukraine.15.a: "Protests are intensifying!"
 ukraine.16.t: "Pro-Ukrainian Protests in Crimea"
 ukraine.16.d: "Crimean Tatars and Ukrainian activists gathered at the Supreme Council of Crimea to prevent the adoption of separatist decisions. The situation is extremely tense, and clashes are likely."
 ukraine.16.a: "Protests are intensifying!"
 ukraine.17.t: "2014 Elections"
 ukraine.17.d: "The 2014 elections were successful. The government elected a new president and parliament. However, the situation in the country remains tense, and many regions demand greater autonomy. The government tries to find a compromise, but without success."
 ukraine.17.a: "Understood."
 ukraine.18.t: "Protests Intensify"
 ukraine.18.d: "Protests are intensifying in Kyiv and across Ukraine. Protesters demand the government's resignation and new elections. The government tries to suppress the protests, but fails. Local authorities state they cannot control the situation."
 ukraine.18.a: "We must restore order immediately!"
 ukraine.19.t: "Nationalists Launch Riots"
 ukraine.19.d: "Nationalists from 'Right Sector' and 'Svoboda' have organized riots in Donetsk and Luhansk, trashing administration buildings and attacking local officials. Police did not intervene, and local authorities claimed they could not control the situation."
 ukraine.19.a: "We must restore order immediately!"
 ukraine.21.t: "2014 Elections"
 ukraine.21.d: "The 2014 elections were successful. The government elected a new president and parliament. However, the situation remains tense, and many regions demand autonomy."
 ukraine.21.a: "Understood."
 ukraine.22.t: "Yanukovych in Donetsk"
 ukraine.22.d: "Former President Viktor Yanukovych arrived in Donetsk, where he was met by local authorities and pro-Russian activists. Yanukovych stated he does not recognize the legitimacy of the current government and is ready to cooperate with the Donetsk People's Republic. His arrival sparked a wave of protests in Kyiv."
 ukraine.22.a: "We must catch him!"
 ukraine.22.b: "He poses no threat."
 ukraine.23.t: "Release of 'Servant of the People'"
 ukraine.23.d: "The satirical TV series 'Servant of the People' premieres, telling the story of an ordinary history teacher who unexpectedly becomes president. Intended as a comedy, the show quickly becomes a cultural phenomenon, highlighting the gap between the authorities and society. For many, it transforms into a public demand for renewal and justice."
 ukraine.23.a: "Understood."
 ukraine.24.t: "Fire at the Trade Unions House in Odesa"
 ukraine.24.d: "Amidst sharp political confrontation in Odesa, clashes between pro-Ukrainian and pro-Russian groups escalated into mass riots. Protesters took refuge in the Trade Unions House on Kulikovo Pole. During the clashes, a fire broke out in the building. Smoke and flames quickly engulfed the premises, leading to numerous casualties. Dozens died, and many were injured."
 ukraine.24.a: "Horrible."
 ukraine.25.t: "Snap Elections to the Verkhovna Rada"
 ukraine.25.d: "Following Yanukovych's flight and the start of the political crisis, the government decided to hold snap elections to the Verkhovna Rada to stabilize the country."
 ukraine.25.a: "Understood."
 ukraine.26.t: "The Capture of Sloviansk"
 ukraine.26.d: "Armed men in camouflage without insignia seized administration buildings in Sloviansk, proclaiming the creation of the Donetsk People's Republic. This marked the beginning of the armed conflict in eastern Ukraine."
 ukraine.26.a: "To arms, brothers! Time to defend the Motherland!"
 ukraine.27.t: "Russian Military Spotted in Crimea"
 ukraine.27.d: "Russian military personnel without insignia have been spotted in Crimea, causing international concern and heightening regional tensions."
 ukraine.27.a: "Occupiers!"
 ukraine.28.t: "First Wave of Mobilization"
 ukraine.28.d: "The Ukrainian government announced the first wave of mobilization in response to the growing threat of separatism and external intervention. Thousands were called to military service to protect Ukraine's territorial integrity."
 ukraine.28.a: "For the Motherland!"
 ukraine.29.t: "Second Wave of Mobilization"
 ukraine.29.d: "The government announced a second wave of mobilization as the threat in the east continued to grow."
 ukraine.29.a: "For Batkivshchynu!"
 ukraine.30.t: "Third Wave of Mobilization"
 ukraine.30.d: "The government announced a third wave of mobilization to further bolster defenses in the east."
 ukraine.30.a: "For the Motherland!"
 ukraine.31.t: "Bloodshed in Kyiv"
 ukraine.31.d: "A sharp escalation occurred, accompanied by mass bloodshed. Renewed clashes between protesters and police, involving unknown snipers, led to the deaths of dozens of participants and officers. At least 77 people were killed."
 ukraine.31.a: "How terrible!"
 ukraine.32.t: "Titushky from Russia"
 ukraine.32.d: "Russia has sent groups of 'Titushky' to support pro-Russian forces in eastern Ukraine. These men are well-prepared and equipped, significantly strengthening Anti-Maidan positions."
 ukraine.32.a: "They will come in handy."
 ukraine.33.t: "Volnovakha Bus Shelling"
 ukraine.33.d: "On January 13, 2015, a passenger bus near Volnovakha was hit by shelling near a checkpoint. The incident led to many deaths and injuries. Both sides exchange blame, but the safety of civilians in the combat zone remains a primary concern."
 ukraine.33.a: "We must take action!"
 ukraine.34.t: "Our Il-76 Shot Down Near Luhansk"
 ukraine.34.d: "A Ukrainian Il-76MD transport plane was shot down by separatists using an 'Igla' MANPADS while landing at Luhansk airport. 9 crew members and 40 paratroopers from the 25th Airborne Brigade perished in the crash."
 ukraine.34.a: "A great loss..."
 ukraine.35.t: "Ambush in Mariupol"
 ukraine.35.d: "On June 14, 2014, a tragedy occurred in Mariupol. Pro-Russian militants under 'Mangust' ambushed a border guard column near the Azovstal plant. 5 servicemen were killed and 7 wounded. The Azov Battalion arrived to clear the area."
 ukraine.35.a: "What the hell are they doing there?!"
 ukraine.36.t: "Malaysian Boeing Shot Down"
 ukraine.36.d: "Malaysia Airlines flight MH17 was struck by a missile over Donetsk region. All 298 people on board were killed."
 ukraine.36.a: "Fucking Russians."
 ukraine.37.t: "Expansion of the Right Sector"
 ukraine.37.d: "The Right Sector has expanded by several battalions."
 ukraine.37.a: "Glory to Ukraine!"
 ukraine.38.a: "Foreign Aid"
 ukraine.38.d: "France and the USA have sent military aid, including thousands of bulletproof vests, medical kits, and equipment to support the Ukrainian army."
 ukraine.38.t: "It'll do..."
 ukraine.39.t: "Scandal in the Verkhovna Rada"
 ukraine.39.d: "NABU investigation revealed that some deputies' votes were bought."
 ukraine.39.a: "Damn!"
 ukraine.40.t: "Russia Sends Special Services"
 ukraine.40.d: "In response to the instability, Russia has decided to send intelligence officers to provide organizational and advisory support to local anti-Maidan forces."
 ukraine.40.a: "Excellent."
 ukraine.41.t: "Russia Funds Anti-Maidan Media"
 ukraine.41.d: "Russia is funding pro-Kremlin TV channels and social media troll farms to undermine trust in the protesters and boost pro-Russian sentiment."
 ukraine.41.a: "Thanks to Mother Russia!"

 ukraine.42.t: "People's Assembly in Kyiv"
 ukraine.42.d: "The 'March of Millions' took place in Kyiv. Protesters demanded that Ukraine does not join the Customs Union. Barriers were erected, and the city center was effectively paralyzed. The statue of Lenin was toppled."
 ukraine.42.a: "Horror!"

 ukraine.43.t: "Attempt to Suppress Maidan"
 ukraine.43.d: "Our security forces tried to push protesters out of the central square, but failed. Public disappointment in the authorities is growing."
 ukraine.43.a: "Understood."
 ukraine.44.t: "Resignation of Azarov"
 ukraine.44.d: "To find a compromise, the government of Mykola Azarov has been dismissed."
 ukraine.44.a: "We don't need a civil war."
 ukraine.45.t: "Battle for Donetsk Airport"
 ukraine.45.d: "Separatist forces are advancing on the airport."
 ukraine.45.a: "This is a violation of the peace!"
 ukraine.46.t: "We Held the Airport"
 ukraine.46.d: "Ukrainian forces successfully repelled the separatist attack on the airport."
 ukraine.46.a: "Excellent!"
 ukraine.47.t: "We Lost the Airport"
 ukraine.47.d: "Separatist forces have seized Donetsk airport after a fierce assault."
 ukraine.47.a: "Horrible!"
 ukraine.48.t: "Border Clarification in Kherson Region"
 ukraine.48.d: "Russian units have withdrawn from positions on the Chongar peninsula back to the Crimean administrative line. While Crimea remains occupied, this is a diplomatic success."
 ukraine.48.a: "A first victory."
 ukraine.49.t: "Shooting on Rymarska Street"
 ukraine.49.d: "In Kharkiv, a clash between pro-Russian activists and 'Prosvita' members led to gunfire and explosions. Two people were killed."
 ukraine.49.a: "Oh my God!"
 ukraine.50.t: "Battles on Hrushevskoho"
 ukraine.50.d: "Protests turned violent following the 'dictatorship laws.' Clashes with Berkut police led to the first deaths among EuroMaidan participants."
 ukraine.50.a: "This isn't our fault!"
 ukraine.51.t: "Restoring Order in Kharkiv"
 ukraine.51.d: "The government has successfully cleared administrative buildings and restored security in Kharkiv."
 ukraine.51.a: "Excellent."
 ukraine.52.t: "Separatists Advance on Avdiivka"
 ukraine.52.d: "Following the fall of the airport, separatists are shelling and attacking Avdiivka, causing a humanitarian crisis."
 ukraine.52.a: "Send reinforcements!"
 ukraine.53.t: "Restoration of the NGU"
 ukraine.53.d: "The National Guard of Ukraine was officially restored to combat terrorism and protect territorial integrity."
 ukraine.53.a: "Excellent."
 ukraine.54.t: "Resumption of Hostilities"
 ukraine.54.d: "Following the Volnovakha tragedy, we must respond to separatist violations of the Minsk agreements."
 ukraine.54.a: "For the Motherland!"
 ukraine.55.t: "Crisis Settlement Agreement"
 ukraine.55.d: "An agreement was signed between the President and the opposition to stop the bloodshed and return to the 2004 Constitution."
 ukraine.55.a: "Excellent!"
 ukraine.56.t: "Yulia Tymoshenko Released"
 ukraine.56.d: "Former PM Yulia Tymoshenko has been released from prison following a court ruling. She immediately began her campaign."
 ukraine.56.a: "Understood."
 ukraine.57.t: "Formation of the Right Sector"
 ukraine.57.d: "Radical nationalist organizations have united under the name 'Right Sector'."
 ukraine.57.a: "What did our grandfathers fight for??"
 ukraine.58.t: "March on the Verkhovna Rada"
 ukraine.58.d: "A 'peaceful offensive' turned into street battles in Kyiv. Offices were burned, and the country entered a phase of open violence."
 ukraine.58.a: "Stop this!"
 ukraine.59.t: "SBU Statement"
 ukraine.59.d: "The SBU announced the start of an Anti-Terrorist Operation (ATO) due to the use of firearms by extremists."
 ukraine.59.a: "Suppress them!"
 ukraine.60.t: "Shooting on the Maidan"
 ukraine.60.d: "The most violent phase of the protests. Snipers opened fire on protesters, leading to a massive increase in casualties."
 ukraine.60.a: "Horror!"
 ukraine.61.t: "Anti-Maidan Actions in Donetsk"
 ukraine.61.d: "A mass rally against EuroMaidan was held in Donetsk, showing regional support for the current government."
 ukraine.61.a: "Our people!"
 ukraine.62.t: "Torchlight Procession in Kyiv"
 ukraine.62.d: "Activists held a torchlight march in honor of Stepan Bandera, causing controversy."
 ukraine.62.a: "Fascists!"
 ukraine.63.t: "Trial of Yanukovych"
 ukraine.63.d: "A trial has begun in Kyiv regarding the treason charges against former President Viktor Yanukovych."
 ukraine.63.a: "Justice will be served."
 ukraine.64.t: "Geneva Talks"
 ukraine.64.d: "Ukraine, Russia, the US, and the EU agreed on measures to de-escalate the crisis and disarm illegal groups."
 ukraine.64.a: "The bloodshed must stop!"
 ukraine.65.t: "Failure of the Geneva Agreements"
 ukraine.65.d: "The discovery of tortured bodies in the Donets river led the government to resume the ATO, citing a total failure of the peace talks."
 ukraine.65.a: "No mercy for terrorists!"
 ukraine.66.t: "Rocket Attack Near Zelenopillya"
 ukraine.66.d: "A massive rocket strike devastated Ukrainian positions near the border, causing heavy casualties."
 ukraine.66.a: "We must regroup..."
 ukraine.67.t: "Shelling of Eastern District in Mariupol"
 ukraine.67.d: "Residential areas in Mariupol were hit by heavy rocket fire, killing dozens of civilians."
 ukraine.67.a: "Terrorists!"
 ukraine.68.t: "Rocket Strike on Kramatorsk"
 ukraine.68.d: "Kramatorsk residential areas and the ATO headquarters were hit by 'Smerch' rockets."
 ukraine.68.a: "Horror!"
 ukraine.69.t: "Mass Border Crossing by RF Troops"
 ukraine.69.d: "As Ukrainian forces neared total victory, regular Russian army units crossed the border to intervene."
 ukraine.69.a: "Putin, do not send troops!!!"
 ukraine.70.t: "Border Crossing in Novoazovsk"
 ukraine.70.d: "Russian armored columns have crossed the border near Novoazovsk, opening a new front."
 ukraine.70.a: "Shit."
 ukraine.71.t: "Loss of Control in Kharkiv Region"
 ukraine.71.d: "Uprisings have spread beyond Kharkiv city to surrounding towns like Izium and Kupiansk."
 ukraine.71.a: "Send more forces!"
 ukraine.72.t: "Sammyt «Vostochnoho partnyorstva»"
 ukraine.72.d: "In Vylnyuse proshyol sammyt «Vostochnoho partnyorstva», on kotorom agreement ob association Ukraine with Evropeyskym soyuzom podpysano ne bylo. This reshenye vyzvalo razocharovanye sredy storonnykov evroyntehratsyy. 29 noyabrya orhkomytet Evromaydana obyavyl o prekrashchenyy aktsyy. On ploshchady Independence ostalys lysh okolo 200–400 chelovek, reshyvshykh provesty poslednyuyu noch protesta."
 ukraine.72.a: "Zachem nam nuzhna Heyropa?"
 ukraine.73.t: "Protyvostoyanye «Maydanovtsev» and «Antymaydanovtsev»"
 ukraine.73.d: "With 14 dekabrya Partyya rehyonov nachala bessrochnuyu aktsyyu «Antymaydan» in podderzhku deystvuyushchey power on Evropeyskoy ploshchady and in Maryynskom parke. In techenye 14–15 dekabrya protyvostoyanye storonnykov and protyvnykov power dostyhlo pyka, in Kyeve vpervye odnovremenno proshly dva massovykh mytynha - Maydan and Antymaydan. Ocherednoe «narodnoe veche», sobravshee, po raznym otsenkam, do 200 tysyach chelovek, pokazalo yzmenenye povestky protesta. On pervyy plan vyshlo trebovanye ne dopustyt podpysanyya agreement o vstuplenyy Ukraine in Tamozhennyy soyuz on fone predstoyashcheho vyzyta prezydenta Vyktora Yanukovycha in Moskvu."
 ukraine.73.a: "Lyudy for nas!"
 ukraine.74.t: "Sozdanye obedynenyya «Maydan»"
 ukraine.74.d: "On ocherednom «Narodnom veche» bylo obyavleno o sozdanyy obshchestvennoy orhanyzatsyy Narodnoe obedynenye «Maydan». Sopredsedatelyamy Soveta obedynenyya staly lydery oppozytsyy and obshchestvennye deyately, vklyuchaya Oleha Tyahnyboka, Vytalyya Klychko, Arsenyya Yatsenyuk, Yuryya Lutsenko, Yulyyu Tymoshenko, Ruslanu Lyzhychko and Serheya Kvyta.yu"
 ukraine.74.a: "Yes cheho ony khotyat?"
 ukraine.75.t: "Napadenye on studencheskyy horodok in Kharkove"
 ukraine.75.d: "Pozdno vecherom 11 yyunya 2015 hoda in Kharkove proyzoshlo rezonansnoe napadenye on terrytoryyu studencheskoho horodka, hde raspolozheny obshchezhytyya neskolkykh vysshykh uchebnykh zavedenyy. Okolo soroka napadavshykh, skryvavshykh lytsa pod maskamy and futbolkamy, vorvalys on ulytsu Otakara Yarosha and ustroyly massovyy pohrom, prymenyaya kholodnoe oruzhye, palky and podruchnye predmety.Napadenye nosylo khaotychnyy, no krayne zhestokyy kharakter, napadavshye yzbyvaly vsekh, kto popadalsya ym on puty, razrushaly ymushchestvo and napadaly on prokhozhykh. Osnovnoy udar pryshyolsya po ynostrannym studentam, prozhyvavshym in obshchezhytyyakh. In rezultate ataky postradaly devyat chelovek, shestero byly hospytalyzyrovany, in tom chysle chetyre hrazhdanyna Yordanyy, dvoe yz kotorykh nakhodylys in krytycheskom sostoyanyy. Dva cheloveka pohybly, ymy okazalys lytsa without postoyannoho mesta zhytelstva. Pravookhranytelnye orhany vozbudyly uholovnye dela po statyam o khulyhanstve, pokushenyy on ubyystvo and razboe. Byly zaderzhany pyatero podozrevaemykh, odnako vposledstvyy ony byly otpushcheny. Predstavytely mylytsyy zayavyly, chto ne usmatryvayut pryznakov mezhetnycheskoho konflykta, chto vyzvalo rezkuyu krytyku so storony obshchestvennosty and pravozashchytnykov."
 ukraine.75.a: "Takoe nedopustymo!"
 ukraine.76.t: "Oleh Morhun arestovan"
 ukraine.76.d: "Sehodnya for predelamy Maryupolya, on odnom yz blokpostov, yspolnyayushchyy obyazannosty nachalnyka horodskoy mylytsyy Oleh Morhun byl zaderzhan narodnym deputatom Olehom Lyashko and boytsamy dobrovolcheskoho batalona «Shakhtyorsk». Lyashko zayavyl, chto zaderzhanye proyzoshlo po podozrenyyu in kontaktakh with separatystamy posle sobytyy maya 2014 hoda. Morhun on moment zaderzhanyya otrytsaet obvynenyya and utverzhdaet, chto deystvoval in ramkakh svoykh polnomochyy."
 ukraine.76.a: "Excellent"
 ukraine.77.t: "Protyvostoyanye in Maryupole"
 ukraine.77.d: "Vecherom 3 maya in Maryupole proyzoshla rezkaya destabylyzatsyya obstanovky. In tsentralnykh rayonakh horoda byla zafyksyrovana strelba and podzhohy, chto vyzvalo panyku sredy myrnoho naselenyya. Mestnye zhytely vosprynyaly proyskhodyashchee kak nachalo aktyvnoy fazy antyterrorystycheskoy operatsyy. Po soobshchenyyam ochevydtsev, in horode deystvovaly neyzvestnye vooruzhyonnye lytsa in chyornoy forme and maskakh without opoznavatelnykh znakov. In khode nochnykh besporyadkov byly podozhzheny avtomobylnye pokryshky, zahorelos zdanye kommercheskoho banka, povrezhdeny avtomobyly and torhovye pomeshchenyya, razhromlen ofys odnoho yz kandydatov in prezydenty Ukraine. Sohlasno ofytsyalnoy ynformatsyy pravookhranytelnykh orhanov, dnyom 3 maya hruppa lyts pod vydom dostavky prodovolstvyya prybyla on blokpost Vooruzhyonnykh syl Ukraine in rayone posyolka Rybatskoe. In produktakh soderzhalys preparaty, vyvedshye yz stroya voennosluzhashchykh. Pyatero ukraynskykh soldat byly zakhvacheny vmeste with oruzhyem and dostavleny in zdanye horodskoho soveta, nakhodyvsheesya pod kontrolem prorossyyskykh syl. Posle perehovorov plennye byly osvobozhdeny, odnako zakhvachennoe oruzhye vozvrashcheno ne bylo."
 ukraine.77.a: "Horrible!"
 ukraine.78.t: "Zakhvat horsoveta in Maryupole"
 ukraine.78.d: "13 aprelya in Maryupole proshyol massovyy prorossyyskyy mytynh, kotoryy bystro pereros in sylovuyu aktsyyu. Okolo tysyachy protestuyushchykh prorvaly mylytseyskyy zaslon and zanyaly zdanye horodskoy admynystratsyy. With fasada byly snyaty hosudarstvennye flahy Ukraine, vmesto nykh vyvesheny flahy Donetskoy oblasty, krasnoe znamya and flah samoprovozhlashyonnoy Donetskoy Narodnoy Respublyky. On zdanyy poyavylsya transparant «Donetskaya Narodnaya Respublyka». Vkhody in horsovet byly zabarrykadyrovany, terrytoryya vokruh obnesena kolyuchey provolokoy. Uchastnyky zakhvata obyavyly o rospuske deystvuyushcheho deputatskoho korpusa and provozhlasyly horod chastyu DPR. Nesmotrya on polnuyu boevuyu hotovnost, podrazdelenyya mylytsyy ne staly shturmovat zdanye, opasayas massovykh zhertv.\n\nVo vtoroy polovyne dnya neskolko soten radykalno nastroennykh aktyvystov napravylys k zdanyyu horodskoho governance mylytsyy, hde prokhodyl nebolshoy mytynh in podderzhku terrytoryalnoy tselostnosty Ukraine. Proyzoshlo zhestokoe yzbyenye uchastnykov mytynha, devyat chelovek poluchyly tyazhyolye travmy, shestero byly hospytalyzyrovany in reanymatsyyu, vklyuchaya deputata horodskoho soveta.\n\nHorodskoy holova Yuryy Khotlubey vystupyl with obrashchenyem, pryzvav storony ne dopustyt krovoprolytyya and zayavyv o hotovnosty k perehovoram. Vecherom zakhvatchyky obyavyly o formyrovanyy sobstvennoho «horodskoho soveta» and yzbranyy «narodnoho mera», kotoryy must byl yspolnyat obyazannosty do osvobozhdenyya prezhneho rukovodstva. Perehovory with mylytsyey velys through predstavyteley samoprovozhlashyonnykh vlastey.\n\nNesmotrya on zakhvat admynystratyvnoho zdanyya, in pervye dny in nyom ne bylo zafyksyrovano marodyorstva. Sotrudnykam horsoveta predlozhyly prodolzhyt rabotu, odnako dostup in zdanye ostavalsya ohranychennym. Sytuatsyya in horode ostavalas krayne napryazhyonnoy and svydetelstvovala o faktycheskoy utrate Kyevom kontrolya nad Maryupolem."
 ukraine.78.a: "Horrible!" 
 ukraine.79.t: "Nochnaya attempt vernut horsovet Maryupolya"
 ukraine.79.d: "In noch on 24 aprelya okolo 30 proukraynskykh aktyvystov in maskakh and with bytamy popytalys vybyt storonnykov DPR yz zdanyya Maryupolskoho horsoveta. In khode stolknovenyy byly raneny 5 chelovek. Posle prybytyya mylytsyy napadavshye skrylys. MVD Ukraine zayavylo, chto in aktsyy uchastvovaly mestnye hrazhdanskye aktyvysty. Byly otkryty uholovnye dela. Utrom mer Yuryy Khotlubey and sylovyky popytalys dohovorytsya with predstavytelyamy DPR ob osvobozhdenyy zdanyya, no bezrezultatno. Otseplenye snyaly, nad horsovetom vnov podnyaly rossyyskyy flah.\n\nPry osmotre zdanyya obnaruzheny butylky with zazhyhatelnoy smesyu and oruzhye. Vecherom u horsoveta proshyol mytynh okolo 1000 storonnykov DPR. Aktyvysty zayavyly o podhotovke k referendumu 11 maya and otkazalys pryznat vlast horodskoho holovy."
 ukraine.79.a: "Clear"
 ukraine.80.t: "Rost vlyyanyya DPR in Maryupole"
 ukraine.80.d: "In kontse aprelya poyavylys soobshchenyya o podhotovke storonnykov DPR k vozmozhnomu zakhvatu Maryupolya. 30 aprelya posle lokalnykh mytynhov nad zdanyyamy rayonnykh admynystratsyy byly vyvesheny flahy DPR. Po dannym Henprokuratury Ukraine, flahy ustanavlyvalys aktyvystamy samovolno, without polnoho zakhvata zdanyy.\n\n1 maya in horode proshly massovye pervomayskye shestvyya pod flahamy DPR and KPU. Neskolko tysyach chelovek skandyrovaly lozunhy in podderzhku referenduma and Rossyy. Aktyvysty DPR zayavyly o «smene» horodskykh sylovykh rukovodyteley and usylenyy davlenyya on orhany power.\n\nIn tot zhe den novym nachalnykom horodskoy mylytsyy byl naznachen polkovnyk Valeryy Andrushchuk. Odnako vskore poyavylys soobshchenyya o eho otstavke posle konflykta with aktyvystamy DPR. Posle etoho nad zdanyyamy mylytsyy, SBU and prokuratury byly podnyaty flahy DPR."
 ukraine.80.a: "Chto zhe tvorytsya??"
 ukraine.81.t: "Sobytyya in Donetske"
 ukraine.81.d: "1 marta prorossyyskye aktyvysty zakhvatyly zdanye Donetskoy OHA and podnyaly rossyyskyy flah. Proyzoshly stolknovenyya so storonnykamy Evromaydana. Donetskyy oblsovet pod davlenyem mytynhuyushchykh podderzhal ydeyu referenduma and vydvyzhenye Pavla Hubareva in kachestve «narodnoho hubernatora».\n\n2 marta and.o. prezydenta Aleksandr Turchynov uvolyl hubernatora Andreya Shyshatskoho and naznachyl Serheya Tarutu. This reshenye vyzvalo novye mytynhy and radykalyzatsyyu protestov. Posle otkaza oblsoveta pryznat Hubareva protestuyushchye vnov zakhvatyly zdanye OHA.\n\nIn posleduyushchye dny in Donetske proshly kak prorossyyskye, tak and proukraynskye mytynhy. 5 marta aktyvysty zakhvatyly zdanyya hoskaznacheystva and telekompanyy «Donbass», a takzhe napaly on uchastnykov aktsyy «For edynuyu Ukraynu».\n\n6 marta mylytsyya vosstanovyla control nad zakhvachennymy zdanyyamy. Vecherom toho zhe dnya Pavel Hubarev byl zaderzhan SBU po obvynenyyam in separatyzme and nasylstvennom zakhvate power, a zatem arestovan sudom on dva mesyatsa."
 ukraine.81.a: "Clear" 
 ukraine.82.t: "Stolknovenyya mytynhov in Donetske"
 ukraine.82.d: "13 marta in Donetske in techenye dnya prokhodyl massovyy prorossyyskyy mytynh pod rossyyskymy flahamy and lozunhamy protyv NATO, EU and «polytycheskykh repressyy». Vecherom nachalas aktsyya in podderzhku edynstva Ukraine, odnako ona byla atakovana znachytelno bolee mnohochyslennymy prorossyyskymy aktyvystamy.In khode stolknovenyy prymenyalys petardy, dymovye shashky and kamny. Byly atakovany avtomobyly mylytsyy, predprynymalys popytky ykh perevernut. Po ofytsyalnym dannym, postradaly okolo 50 chelovek, pohybly dvoe, sredy nykh — Heroy Ukraine Dmytryy Chernyavskyy.Mylytsyya zaderzhyvala naybolee ahressyvnykh uchastnykov, odnako pod davlenyem tolpy byla vynuzhdena otpustyt zaderzhannykh. Sobytyya prodemonstryrovaly utratu kontrolya nad ulychnoy sytuatsyey in horode."
 ukraine.82.a: "Horrible!!"
 ukraine.83.t: "Yhor Strelkov lykvydyrovan"
 ukraine.83.d: "In khode ozhestochyonnykh boyov for Slavyansk postupyly podtverzhdyonnye soobshchenyya o hybely Yhorya Strelkova. Po ymeyushchymsya dannym, on pohyb neposredstvenno vo vremya boevykh stolknovenyy in horode, nakhodyas in zone aktyvnykh boevykh actions. Smert Strelkova stala seryoznym udarom for syl, oboronyavshykh Slavyansk. Eho utrata pryvela k dezorhanyzatsyy governance, snyzhenyyu boevoho dukha and usylenyyu raznohlasyy sredy komandyrov. Boy for horod prodolzhayutsya, odnako sytuatsyya for protyvostoyashchey storony zametno oslozhnylas."
 ukraine.83.a: "Excellent!"
 ukraine.84.t: "Kollona Strelkova pokydaet Slavyansk"
 ukraine.84.d: "uslovyyakh usylyvayushchehosya davlenyya and nekhvatky resursov kolonna syl pod komandovanyem Yhorya Strelkova nachala orhanyzovannyy vykhod yz Slavyanska. Pod pokrovom nochy podrazdelenyya pokydayut horod, ostavlyaya pozytsyy and tekhnyku, kotoruyu nevozmozhno evakuyrovat."
 ukraine.84.a: "Excellent!"
 ukraine.85.t: "Sozdanye Azova"
 ukraine.85.d: "On fone eskalatsyy konflykta and nekhvatky boesposobnykh podrazdelenyy in yuho-vostochnykh rehyonakh Ukraine nachynaetsya formation new dobrovolcheskoho batalona - «Azov». In eho osnovu vkhodyat aktyvysty, dobrovoltsy and byvshye sylovyky, hotovye uchastvovat in boevykh deystvyyakh protyv vooruzhyonnykh formyrovanyy separatystov."
 ukraine.85.a: "Excellent!"
 ukraine.85.b: "Slava Azovu!"
 ukraine.86.t: "Okruzhenye and ostavlenye blokposta 32"
 ukraine.86.d: "With oktyabrya ukraynskyy blokpost nomer 32, raspolozhennyy on perekryostke «Bakhmutskoy trassy» R66 (T1303) vblyzy sela Smeloe, okazalsya faktychesky zablokyrovan vooruzhyonnymy formyrovanyyamy protyvnyka. Postavky water, prodovolstvyya and boeprypasov byly pererezany, chto rezko ukhudshylo polozhenye harnyzona. Ukraynskoe komandovanye predprynyalo neskolko popytok deblokyrovanyya, zadeystvovav podrazdelenyya 24-y mekhanyzyrovannoy bryhady, Natsyonalnoy hvardyy and desantnykov. Odnako pochty kazhdaya attempt proryva soprovozhdalas seryoznymy poteryamy in lychnom sostave and bronetekhnyke. Po podtverzhdyonnym dannym, bylo poteryano ne menee 16 voennosluzhashchykh and 17 edynyts bronetekhnyky.\n\nK kontsu oktyabrya sytuatsyya on blokpostu stala krytycheskoy, znachytelnaya chast lychnoho sostava byla ystoshchena and vyvedena yz stroya boleznyamy. 27 oktyabrya, in sootvetstvyy with dostyhnutymy dohovoryonnostyamy, ukraynskye voyska orhanyzovanno pokynuly blokpost nomer 32."
 ukraine.86.a: "This narushenye Mynskykh protokolov!"
 ukraine.87.t: "Sbytyy vertolyot pod Slavyanskom"
 ukraine.87.d: "Vo vremya implementation zadachy po snabzhenyyu ukraynskykh podrazdelenyy and rotations lychnoho sostava in rayone Slavyanska byl sbyt vertolyot Natsyonalnoy hvardyy Ukraine. Mashyna vozvrashchalas on bazu posle dostavky prodovolstvyya on blokpost vozle hory Karachun, kohda byla porazhena raketoy yz perenosnoho zenytnoho kompleksa, vypushchennoy sylamy DPR.Vertolyot poterpel krushenye and vzorvalsya posle udara o zemlyu.\n\nPohybly 12 voennosluzhashchykh, sredy nykh heneral-mayor Serhey Kulchytskyy, dobrovolno otpravyvshyysya on vypolnenye myssyy. Vyzhyl tolko shturman, dostavlennyy in tyazhyolom sostoyanyy in bolnytsu Kharkova."
 ukraine.87.a: "Otdat chest heroyam..."
 ukraine.88.t: "Rossyya predlahaet provesty vstrechu in Mynske"
 ukraine.88.d: "On fone prodolzhayushchehosya konflykta and eskalatsyy nasylyya in Donbasse Rossyya vystupyla with ynytsyatyvoy provedenyya vstrechy in Mynske with uchastyem predstavyteley Ukraine, Rossyy, OBSE and lyderov samoprovozhlashyonnykh respublyk. Tselyu vstrechy bylo obsuzhdenye putey deeskalatsyy konflykta, prekrashchenyya ohnya and nachala political dyaloha. Ynytsyatyva byla vosprynyata with ostorozhnostyu, odnako mnohye vydely in ney shans on dostyzhenye myra."
 ukraine.88.a: "Nadeemsya on myr!"
 ukraine.89.t: "Telefonnyy razhovor prezydentov Ukraine and Rossyy"
 ukraine.89.d: "Prezydent Ukraine provyol telefonnyy razhovor with prezydentom Rossyy, stremyas dobytsya nemedlennoho prekrashchenyya boevykh actions on Donbasse. Po ytoham besedy ukraynskaya storona zayavyla o dostyzhenyy vzaymoponymanyya otnosytelno shahov, neobkhodymykh for ustanovlenyya rezhyma prekrashchenyya ohnya and nachala myrnoho urehulyrovanyya konflykta."
 ukraine.89.a: "Nadeemsya on myr!"
 ukraine.90.t: "Zabastovka srochnykov Natshvardyy"
 ukraine.90.d: "In Kyeve srochnyky Natsyonalnoy hvardyy ustroyly zabastovku, in kotoroy uchastvuet bolee 500 soldat, kolonna napravlyaetsya in storonu admynystratsyy prezydenta. Protestuyushchye trebuyut provesty demobylyzatsyyu. Po slovam voennosluzhashchykh, vmesto odnoho hoda ony otsluzhyly uzhe poltora. In Kyeve seychas usyleny mery bezopasnosty, po trevohe podnyaty praktychesky vse mylytsyonery. Ony otsepyly zdanye admynystratsyy prezydenta. "
 ukraine.90.a: "Understood"
 ukraine.91.t: "Formyrovanyya pravytelstva Yatsenyuk"
 ukraine.91.d: "Posle smeny power in Kyeve Verkhovnaya rada sformyrovala novoe government. Premer-mynystrom byl naznachen Arsenyy Yatsenyuk, kotoromu poruchyly vozhlavyt cabinet in krayne slozhnyy for countries peryod. Novoe government zayavylo o namerenyy stabylyzyrovat ekonomyku, nachat reformy and vosstanovyt control state nad sytuatsyey in rehyonakh. In sostav kabyneta voshly predstavytely razlychnykh polytycheskykh syl and obshchestvennykh dvyzhenyy, podderzhavshykh novuyu vlast posle sobytyy Evromaydan. Pered pravytelstvom stoyaly seryoznye zadachy, provedenye reforms, borba with korruptsyey and urehulyrovanye kryzysa on vostoke countries."
 ukraine.91.a: "Excellent!"
 ukraine.92.t: "Raspad koalytsyy in parlamente"
 ukraine.92.d: "In Verkhovna Rada proyzoshyol polytycheskyy crisis. Fraktsyy Vseukraynskoe obedynenye «Svoboda» and UDAR obyavyly o vykhode yz parlamentskoy koalytsyy «European vybor». In rezultate coalition, podderzhyvavshaya government Arsenyy Yatsenyuk, faktychesky prekratyla sushchestvovanye. Raspad koalytsyy byl svyazan with polytycheskymy raznohlasyyamy and namerenyem provesty dosrochnye parliamentary elections. Teper pered ukraynskym rukovodstvom stoyt vopros o formyrovanyy new bolshynstva yly podhotovke k novym vyboram in parliament."
 ukraine.92.a: "Yesrmoedy!"
 ukraine.93.t: "Formation vtoroho pravytelstva Yatsenyuk"
 ukraine.93.d: "Posle parlamentskykh elections and dlytelnykh perehovorov between polytycheskymy sylamy in Verkhovna Rada bylo sformyrovano novoe koalytsyonnoe majority. Partyy dohovorylys o raspredelenyy mynysterskykh portfeley and prohramme dalneyshykh reforms state. On post premer-mynystra vnov byl predlozhen Arsenyy Yatsenyuk. Verkhovnaya Rada podderzhala kandydaturu Yatsenyuk and utverdyla novyy sostav Kabyneta mynystrov. Second government zayavylo o namerenyy prodolzhat ekonomycheskye reformy, ukreplyat armyyu and provodyt course on sblyzhenye with Evropeyskym soyuzom. Novomu kabynetu predstoyalo rabotat in uslovyyakh prodolzhayushchehosya konflykta on vostoke countries and slozhnoy ekonomycheskoy sytuatsyy."
 ukraine.93.a: "Good"
 ukraine.94.t: "Rospusk Verkhovna Rada"
 ukraine.94.d: "Prezydent Ukraine Petr Poroshenko dosrochno prekratyl polnomochyya Verkhovna Rada and pryzval demokratycheskye forces vyyty on elections edynoy komandoy.\n\n'Majority ymenno etykh deputatov prynymaly dyktatorskye zakony, kotorye unesly zhyzny Nebesnoy sotny. For this nado otvechat… Pyataya kolonna sostoyt yz desyatkov yakoby nardepov. Tolko ony predstavlyayut ynteresy yavno ne toho naroda, kotoryy ykh vybyral' — dobavyl prezydent"
 ukraine.94.a: "Understood"
 ukraine.95.t: "Pereformatyrovanye TRO"
 ukraine.95.d: "In uslovyyakh prodolzhayushchykhsya boevykh actions komandovanye prynyalo reshenye o reorhanyzatsyy chasty podrazdelenyy terrytoryalnoy oborony. Yznachalno sozdannye for zashchyty horodov and okhrany obektov, mnohye yz etykh podrazdelenyy uzhe poluchyly boevoy opyt and nachaly uchastvovat in operatsyyakh on lynyy fronta. In svyazy with etym bylo prynyato reshenye o pereformatyrovanyy ryada otryadov TRO in polnotsennye motopekhotnye podrazdelenyya. Boytsy poluchat dopolnytelnuyu podhotovku, novoe vooruzhenye and budut yntehryrovany in strukturu rehulyarnykh chastey. Ozhydaetsya, chto this pozvolyt povysyt boesposobnost armyy and luchshe yspolzovat uzhe ymeyushchyysya boevoy opyt dobrovoltsev."
 ukraine.95.a: "Zashchytym Ukraynu!"
 ukraine.96.t: "Battle for Debaltsevo"
 ukraine.96.d: "In rayone stratehychesky vazhnoho transportnoho uzla Debaltsevo razvernulys ozhestochyonnye boy between ukraynskymy voyskamy and sylamy DPR and LPR. Horod and okruzhayushchye naselyonnye punkty prevratylys in odyn yz klyuchevykh uchastkov fronta, tak kak control nad zheleznodorozhnym and avtomobylnym uzlom pozvolyal vlyyat on snabzhenye and peredvyzhenye voysk."
 ukraine.96.a: "Znyshchymo voroha!"
 ukraine.97.t: "Yesrt Alekseevych Veyder podaet svoyu kandydaturu"
 ukraine.97.d: "Predstavytel ynternet-partyy ofytsyalno podal dokumenty for uchastyya in vyborakh. Kandydatom stal chelovek pod ymenem Yesrt Alekseevych Veyder, yzvestnyy svoym obrazom personazha yz Zvyozdnykh Voyn. Eho poyavlenye in yzbyratelnoy kampanyy vyzvalo burnuyu reaktsyyu obshchestva and SMY. Odny vosprynyaly this kak political satyru and protest protyv tradytsyonnoy polytyky, a druhye kak popytku pryvlech vnymanye k yzbyratelnomu protsessu neobychnym sposobom. Nesmotrya on neobychnyy obraz kandydata, podacha dokumentov byla ofytsyalnoy protseduroy, and yzbyratelnaya komyssyya dolzhna byla rassmotret vozmozhnost eho rehystratsyy for uchastyya in vyborakh."
 ukraine.97.a: "This nedopustymo!"
 ukraine.97.b: "Pust uchastvuet"
 ukraine.98.t: "Vybor favorytnoho kandydata on elections"
 ukraine.98.d: "Pryblyzhayutsya prezydentskye elections, and polytycheskye forces dolzhny opredelytsya with hlavnym kandydatom, kotoryy budet predstavlyat ykh ynteresy in yzbyratelnoy honke. Raznye partyy and dvyzhenyya vedut perehovory, obsuzhdayut vozmozhnye kandydatury and pytayutsya obedynyt podderzhku vokruh naybolee populyarnoy and strong fyhury. Vybor favorytnoho kandydata mozhet syhrat reshayushchuyu rol in predstoyashchykh vyborakh. Udachnaya kandydatura sposobna obedynyt elektorat and povysyt shansy on pobedu, tohda kak vnutrennye raznohlasyya mohut oslabyt pozytsyy political laherya."
 ukraine.98.a: "Petr Poroshenko"
 ukraine.98.b: "Yulyya Tymoshenko"
 ukraine.98.c: "Oleh Lyashko"
 ukraine.98.g: "Spysok dalshe"
 ukraine.99.t: "Vybor favorytnoho kandydata on elections"
 ukraine.99.d: "Pryblyzhayutsya prezydentskye elections, and polytycheskye forces dolzhny opredelytsya with hlavnym kandydatom, kotoryy budet predstavlyat ykh ynteresy in yzbyratelnoy honke. Raznye partyy and dvyzhenyya vedut perehovory, obsuzhdayut vozmozhnye kandydatury and pytayutsya obedynyt podderzhku vokruh naybolee populyarnoy and strong fyhury. Vybor favorytnoho kandydata mozhet syhrat reshayushchuyu rol in predstoyashchykh vyborakh. Udachnaya kandydatura sposobna obedynyt elektorat and povysyt shansy on pobedu, tohda kak vnutrennye raznohlasyya mohut oslabyt pozytsyy political laherya."
 ukraine.99.a: "Yesrt Alekseevych Veyder"
 ukraine.99.g: "Spysok nazad"




 DPR.1.t: "Russia Enters"
 DPR.1.d: "The Russian Federation has decided to officially send its units to the republics to ensure peace and security. Columns of equipment are moving to the contact line to the cheers of local residents."
 DPR.1.a: "Hooray!! Glory to Russia!"
 DPR.2.t: "Donetsk Airport is Ours!"
 DPR.2.d: "After months of bloody fighting, the 'Cyborgs' have been driven out. The airport is under DPR control."
 DPR.2.a: "Hooray!! Glory to Novorossiya!"
 DPR.3.t: "Fiasco at Donetsk Airport"
 DPR.3.d: "The assault failed with heavy losses. The airport remains in Ukrainian hands."
 DPR.3.a: "They attacked first!"
 DPR.4.t: "Girkin in Sloviansk"
 DPR.4.d: "A group of volunteers led by Igor 'Strelkov' Girkin has occupied Sloviansk, sparking the armed resistance."
 DPR.4.a: "Excellent."
 DPR.5.t: "Formation of Oplot"
 DPR.5.d: "The 'Oplot' battalion has been formed to serve as a core fighting force for the republic."
 DPR.5.a: "Let's work, brothers!"
 DPR.6.t: "Formation of Diesel"
 DPR.6.d: "A separate tank battalion, 'Diesel,' has been created to provide heavy fire support."
 DPR.6.a: "Let's work, brothers!"
 DPR.7.t: "Formation of Sparta"
 DPR.7.d: "Arsen 'Motorola' Pavlov has announced the creation of the 'Sparta' reconnaissance and assault battalion."
 DPR.7.a: "Let's work, brothers!"
 DPR.8.t: "Formation of Somali"
 DPR.8.d: "Mikhail 'Givi' Tolstykh has taken command of the 'Somali' assault battalion."
 DPR.8.a: "Let's work, brothers!"
 DPR.12.t: "Arrival of DSHRG 'Rusich'"
 DPR.12.d: "Volunteers from the 'Rusich' group have arrived to fight for the Russian world."
 DPR.12.a: "Arrival of DSHRG 'Rusich'"
 DPR.13.t: "Prybytye DShRH «Rusych»"
 DPR.13.d: "Prybyly dobrovoltsy yz DShRH rusych, hotovye srazhatsya for ynteresy russkoho myra. Ety opytnye boytsy znachytelno usylyat nash potentsyal in provedenyy dyversyonnykh and razvedyvatelnykh operatsyy."
 DPR.13.a: "Prybytye DShRH «Rusych»"
 DPR.14.t: "Prybytye DShRH «Rusych»"
 DPR.14.d: "Prybyly dobrovoltsy yz DShRH rusych, hotovye srazhatsya for ynteresy russkoho myra. Ety opytnye boytsy znachytelno usylyat nash potentsyal in provedenyy dyversyonnykh and razvedyvatelnykh operatsyy."
 DPR.14.a: "Prybytye DShRH «Rusych»"
 DPR.15.t: "Kolonna Hyrkyna vyekhala yz Slavyanska"
 DPR.15.d: "Kolonna Hyrkyna vyekhala yz Slavyanska"
 DPR.15.a: "Understood"
 DPR.16.t: "Yhor Strelkov Hyrkyn ubyt"
 DPR.16.d: "In khode ozhestochyonnykh boyov for Slavyansk postupyly podtverzhdyonnye soobshchenyya o hybely Yhorya Strelkova. Po ymeyushchymsya dannym, on pohyb neposredstvenno vo vremya boevykh stolknovenyy in horode, nakhodyas in zone aktyvnykh boevykh actions. Smert Strelkova stala seryoznym udarom for syl, oboronyavshykh Slavyansk. Eho utrata pryvela k dezorhanyzatsyy governance, snyzhenyyu boevoho dukha and usylenyyu raznohlasyy sredy komandyrov. Boy for horod prodolzhayutsya, odnako sytuatsyya for protyvostoyashchey storony zametno oslozhnylas."
 DPR.16.a: "Horrible!"
 DPR.18.t: "Obstrel plyazha in Zuhrese"
 DPR.18.d: "In DPR postupyly soobshchenyya o trahycheskom obstrele horodskoho plyazha in Zuhrese. In moment udara on berehu nakhodylys myrnye zhytely, mnohye pryshly otdokhnut u water. Artylleryyskyy snaryad razorvalsya pryamo in zone otdykha, vyzvav mnohochyslennye zhertvy and ranenyya sredy hrazhdanskoho naselenyya. Etot udar stal dokazatelstvom uhrozy for myrnykh horodov Donbassa and podcherknul neobkhodymost zashchyty nashykh hrazhdan ot ahressyy Kyevskoy khunty."
 DPR.18.a: "Banderovskye zhyvotnye!"

