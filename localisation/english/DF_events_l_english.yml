 news_events.9.t: "Poroshenko Becomes President"
 news_events.9.d: "After the events of Euromaidan and the flight of Viktor Yanukovych, Ukraine found itself in a state of political and economic crisis. In May 2014, early presidential elections were held, in which businessman and politician Petro Poroshenko achieved a confident victory in the first round. He promised the nation a path to Europe, an end to the war in the East, and reforms. However, many doubted whether he could fulfill these promises amid fierce separatist conflict, external pressure, and economic decline."
 news_events.9.a: "A new hope"
 news_events.9.b: "Illegitimate president"
 news_events.9.c: "Interesting"

