 ukraine.17.t: "2014 Elections"
 ukraine.17.d: "The 2014 elections were held successfully. The government has elected a new president and parliament. However, the situation in the country remains tense, and many regions are demanding greater autonomy. The government is trying to find a compromise, but without success."
 ukraine.17.a: "I see"
 ukraine.18.t: "Protests are Intensifying"
 ukraine.18.d: "Protests are intensifying in the city of Kyiv and across Ukraine. Protesters are demanding the resignation of the government and new elections. The government is trying to suppress the protests, but without success. The situation is becoming increasingly tense. Local authorities state they can no longer control the situation."
 ukraine.18.a: "Order must be restored immediately!"
 ukraine.19.t: "Nationalists Incite Riots"
 ukraine.19.d: "Nationalists from 'Right Sector' and 'Svoboda' have incited riots in Donetsk and Luhansk, ransacking several administrative buildings and assaulting local officials. The police did not intervene, and local authorities stated they were unable to control the situation."
 ukraine.19.a: "Order must be restored immediately!"
 ukraine.21.t: "2014 Elections"
 ukraine.21.d: "The 2014 elections were held successfully. The government has elected a new president and parliament. However, the situation in the country remains tense, and many regions are demanding greater autonomy. The government is trying to find a compromise, but without success."
 ukraine.21.a: "I see"
 ukraine.22.t: "Yanukovych in Donetsk"
 ukraine.22.d: "Former President of Ukraine Viktor Yanukovych has arrived in Donetsk, where he was met by local authorities and pro-Russian activists. Yanukovych stated that he does not recognize the legitimacy of the current Ukrainian government and is ready to cooperate with the Donetsk People's Republic. His arrival triggered a wave of protests in Kyiv and other Ukrainian cities."
 ukraine.22.a: "We must catch him!"
 ukraine.22.b: "He poses no threat"
 ukraine.23.t: "Release of 'Servant of the People' Series"
 ukraine.23.d: "A satirical series 'Servant of the People' is released on television, telling the story of an ordinary history teacher who unexpectedly becomes the president of the country. The project was intended as a comedy and social satire mocking corruption, bureaucracy, and the gap between the authorities and society; however, the series quickly transcends the entertainment format. The characters' lines become popular quotes, scenes are actively discussed in society, and the image of the 'simple man in power' becomes a cultural phenomenon. For some viewers, the series turns into a form of public demand for renewal and justice, while for others, it remains a successful television fantasy."
 ukraine.23.a: "I see"
 ukraine.24.t: "Fire at the House of Trade Unions in Odesa"
 ukraine.24.d: "Amidst sharp political confrontation in Odesa, clashes between pro-Ukrainian and pro-Russian groups escalated into mass riots. Street fights, the use of improvised weapons, and chaos led to protesters taking cover in the House of Trade Unions on Kulykove Pole. During the clashes, a fire broke out in the building. Fire and smoke quickly engulfed the premises, leading to numerous casualties. Dozens of people died, and many were injured."
 ukraine.24.a: "Horrible"
 ukraine.25.t: "Snap Elections to the Verkhovna Rada"
 ukraine.25.d: "Following Yanukovych's flight and the beginning of the political crisis in Ukraine, the government decided to hold snap elections to the Verkhovna Rada to stabilize the situation in the country."
 ukraine.25.a: "I see"
 ukraine.26.t: "Capture of Sloviansk"
 ukraine.26.d: "Armed men in camouflage uniforms without insignia captured administrative buildings in Sloviansk, proclaiming the creation of the Donetsk People's Republic. They established control over the city, leading to the start of the armed conflict in eastern Ukraine."
 ukraine.26.a: "To arms, brothers! It is time to defend the Motherland!"
 ukraine.27.t: "Russian Military Spotted in Crimea"
 ukraine.27.d: "Russian military personnel without insignia were spotted in Crimea, causing concern in the international community and increasing tension in the region."
 ukraine.27.a: "Occupiers!"
 ukraine.28.t: "First Wave of Mobilization"
 ukraine.28.d: "The Ukrainian government announced the first wave of mobilization in response to the growing threat of separatism and external interference in the east of the country. Thousands of citizens were called up for military service to protect Ukraine's territorial integrity."
 ukraine.28.a: "For the Motherland!"
 ukraine.29.t: "Second Wave of Mobilization"
 ukraine.29.d: "The Ukrainian government announced the second wave of mobilization in response to the ongoing threat of separatism and external interference in the east of the country. Thousands of citizens were called up for military service to protect Ukraine's territorial integrity."
 ukraine.29.a: "For the Motherland!"
 ukraine.30.t: "Third Wave of Mobilization"
 ukraine.30.d: "The Ukrainian government announced the third wave of mobilization in response to the ongoing threat of separatism and external interference in the east of the country. Thousands of citizens were called up for military service to protect Ukraine's territorial integrity."
 ukraine.30.a: "For the Motherland!"
 ukraine.31.t: "Bloodshed in Kyiv"
 ukraine.31.d: "A sharp escalation of the situation occurred, accompanied by mass bloodshed. Renewed clashes between protesters and the police, accompanied by the actions of unknown snipers, led to the deaths of dozens of protesters and law enforcement officers. According to the Ministry of Health of Ukraine, 77 people died in Kyiv."
 ukraine.31.a: "What a horror!"
 ukraine.32.t: "Titushky from Russia"
 ukraine.32.d: "Russia has sent a group of new 'Titushky' to support pro-Russian forces in eastern Ukraine. These individuals are well-trained and equipped, significantly strengthening the Anti-Maidan positions in the region."
 ukraine.32.a: "They will come in handy"
 ukraine.33.t: "Shelling of a Bus near Volnovakha"
 ukraine.33.d: "On January 13, 2015, near Volnovakha on the highway close to a checkpoint, a passenger bus carrying civilians came under fire. According to reports from the scene, the bus was traveling a route through the frontline zone when shells exploded near the road, and shrapnel pierced the hull.\n\nThere are dead and wounded as a result of the attack. Some victims sustained severe shrapnel wounds. Medics and rescuers arrived at the scene; the wounded are being evacuated to nearby hospitals, and victim lists are being clarified.\n\nThe incident sharply increased tensions in the region. The parties to the conflict are exchanging accusations of involvement in the shelling, and the safety of civilian transport in the combat zone has once again come to the forefront."
 ukraine.33.a: "Measures must be taken!"
 ukraine.34.t: "Downing of our Il-76 near Luhansk"
 ukraine.34.d: "An Il-76MD military transport aircraft of the Ukrainian Armed Forces was shot down by separatists using an 'Igla' MANPADS while landing at the Luhansk airport. On board were 9 crew members and 40 paratroopers from the 25th Separate Airborne Brigade. The aircraft was operated by a crew from the 25th Transport Aviation Brigade under the leadership of the deputy squadron commander, Guards Lieutenant Colonel Oleksandr Bilyi. Preliminary reports indicate all crew and paratroopers perished in the crash."
 ukraine.34.a: "A great loss..."
 ukraine.35.t: "Ambush in Mariupol"
 ukraine.35.d: "On July 14, 2014, a tragedy occurred in Mariupol. Pro-Russian militants, under the leadership of 'Mangust', fired upon a column of border guards on a bridge near the 'Azovstal' plant. The terrorists used small arms and grenade launchers in a densely populated area. As a result of the attack, 5 servicemen were killed and 7 were wounded. Fighters from the 'Azov' battalion arrived at the scene to repel the attack and clear the territory."
 ukraine.35.a: "What the hell are they doing there?!"
 ukraine.36.t: "Downing of the Malaysian Boeing"
 ukraine.36.d: "A Malaysia Airlines Boeing 777-200ER airliner was performing scheduled flight MH17 from Amsterdam to Kuala Lumpur, but approximately 2 hours and 49 minutes after takeoff, it was struck by an anti-aircraft missile fired from an unknown SAM system and broke into several pieces. The wreckage fell near the villages of Hrabove, Rozsypne, Petropavlivka, and the settlement of Rozsypne. All 298 people on board—283 passengers and 15 crew members—perished."
 ukraine.36.a: "F***ing Russians"
 ukraine.37.t: "Expansion of the Right Sector"
 ukraine.37.d: "The Right Sector has expanded by several battalions."
 ukraine.37.a: "Glory to Ukraine!"
 ukraine.38.a: "Foreign Aid"
 ukraine.38.d: "France sent 1,000 bulletproof vests and medical aid kits to the Ukrainian army. On the same day, the USA delivered 2,000 bulletproof vests, 1,500 medical kits, 1,000 sleeping mats, 3,600 camouflage jackets, 400 boxes of gauze bandages, and 1,000 helmet covers."
 ukraine.38.t: "It'll do..."
 ukraine.39.t: "Scandal in the Verkhovna Rada"
 ukraine.39.d: "NABU conducted an investigation and discovered that the votes of some deputies were bought."
 ukraine.39.a: "Damn!"
 ukraine.40.t: "Russia Sent its Intelligence Services"
 ukraine.40.d: "Amidst mass protests and growing instability in Ukraine, the Russian leadership views the situation as a threat to regional security and its own interests. Through closed channels, a decision is made to send Russian intelligence officers to provide advisory and organizational assistance to our security structures."
 ukraine.40.a: "Excellent"
 ukraine.41.t: "Russia Funds Anti-Maidan Media"
 ukraine.41.d: "Russia is funding Anti-Maidan media, supporting pro-Kremlin TV channels, financing bots and trolls, and spreading fake news and disinformation, which undermines trust in the protesters and strengthens pro-Russian sentiment."
 ukraine.41.a: "Thank you, Mother Russia!"

 ukraine.42.t: "'People's Veche' in Kyiv"
 ukraine.42.d: "The second 'People's Veche', known as the 'March of Millions', took place in Kyiv. To the traditional pro-European and anti-government slogans, a demand to prevent Ukraine's entry into the Customs Union was added, which participants linked to President Yanukovych's recent meeting with Vladimir Putin in Sochi.\n\nSince the morning, security forces blocked access to the government quarter. Simultaneously, a rally of government supporters took place in Mariinsky Park in support of the President's course and a peaceful resolution. The Ministry of Internal Affairs called on citizens to obey the law and promised to investigate cases of excessive force.\n\nFrom the Maidan stage, opposition leaders announced the expansion of the protest. Mass columns were organized to Hrushevskoho and Instytutska streets; barricades were built and tents set up near the Cabinet of Ministers, the Officers' House, and along key streets. By evening, movement in the government quarter was almost completely paralyzed. The opposition declared factual control over the territory and formed at least 15 civil self-defense units.\n\nAt the same time, ultimatums were issued: if the government refused to resign, the opposition threatened to blockade the presidential residence and state institutions. The SBU opened a criminal investigation into actions aimed at seizing state power.\n\nIn the evening, the Lenin monument on Bessarabska Square was toppled. The 'Svoboda' party took responsibility, while other opposition leaders claimed a lack of coordination and refused to take responsibility."
 ukraine.42.a: "Horrible!"

 ukraine.43.t: "Attempt to Suppress Maidan"
 ukraine.43.d: "Our security forces tried to push the protesters out of the central square, but this was unsuccessful, and people began to grow increasingly disillusioned with us."
 ukraine.43.a: "I see"
 ukraine.44.t: "Resignation of Azarov"
 ukraine.44.d: "In search of a compromise with the protesters, we fulfilled one of their demands and dismissed the Azarov government."
 ukraine.44.a: "We do not need a civil war"
 ukraine.45.t: "Battle for Donetsk Airport"
 ukraine.45.d: "Separatist forces are advancing on the airport."
 ukraine.45.a: "This is a violation of the peace!"
 ukraine.46.t: "We held the Airport"
 ukraine.46.d: "Separatist forces are advancing on the airport."
 ukraine.46.a: "Excellent!"
 ukraine.47.t: "We Lost the Airport"
 ukraine.47.d: "Separatist forces captured Donetsk Airport during their offensive."
 ukraine.47.a: "Horrible!"
 ukraine.48.t: "Russia Leaves Honchar and Half of the Arabat Spit"
 ukraine.48.d: "Russia is vacating the Honchar Peninsula and half of the Arabat Spit."
 ukraine.48.a: "Excellent"
 ukraine.49.t: "Shooting on Rymarska Street"
 ukraine.49.d: "On the night of May 14-15 in Kharkiv, a battle took place on Rymarska Street. Pistol and automatic shots were heard, along with grenade explosions and the cries of the wounded... The conflict began around 9 PM on Liberty Square; unknown individuals in a minibus with Dnipropetrovsk plates supposedly harassed people wearing St. George ribbons. The minibus passengers intentionally engaged in conflict with pro-Russian activists, threw firecrackers, and then drove to the 'Prosvita' office on Rymarska Street. Pro-Russian activists followed and attempted to storm the building. Shooting began from the building, and Molotov cocktails were thrown from the windows. Two people died in the shootout; one from a gunshot wound, the second from a traumatic weapon."
 ukraine.49.a: "Oh my God!"
 ukraine.50.t: "Clashes on Hrushevskoho"
 ukraine.50.d: "This week saw turning-point events as the protest ceased to be peaceful. Participants, outraged by the passage of the 'dictatorship laws', began an advance on the Verkhovna Rada and clashed with security forces. 'Berkut' responded with rubber bullets, flashbangs, and water cannons. The fighting lasted several days; the first blood was spilled—four Euromaidan participants were killed."
 ukraine.50.a: "It's not our fault!"
 ukraine.51.t: "Restoring Order in Kharkiv"
 ukraine.51.d: "Following a series of protests and riots in Kharkiv, the Ukrainian government decided to restore order in the city. Security measures were strengthened, arrests were made, and additional patrols were introduced to ensure public safety."
 ukraine.51.a: "Excellent"
 ukraine.52.t: "Separatists Advancing on Avdiivka"
 ukraine.52.d: "After the capture of Donetsk Airport, separatists began an offensive on the nearby city of Avdiivka. The city came under intense shelling and attacks, leading to significant destruction and civilian casualties. Ukrainian forces tried to hold the city, but the separatists continued their advance, causing a serious humanitarian crisis in the region."
 ukraine.52.a: "Send reinforcements!"
 ukraine.53.t: "Restoration of the National Guard"
 ukraine.53.d: "The National Guard of Ukraine (NGU) was officially restored in April 2014 in response to growing instability and the threat of separatism. The new National Guard was created on the basis of the Internal Troops of the Ministry of Internal Affairs and is intended to ensure public safety, combat terrorism, and defend the territorial integrity of the country."
 ukraine.53.a: "Excellent"
 ukraine.54.t: "Resumption of Hostilities"
 ukraine.54.d: "After the signing of the Minsk agreements, separatists violated them by shelling a bus near Volnovakha, resulting in a large number of civilian deaths. We cannot leave this unanswered and must resume military operations against the separatists."
 ukraine.54.a: "For the Motherland!"
 ukraine.55.t: "Agreement on the Settlement of the Crisis in Ukraine"
 ukraine.55.d: "After months of street protests, clashes, and hundreds of casualties, the capital stands on the brink of a total collapse of state governance. Under pressure from the streets, security forces, oligarchic groups, and international mediators, the parties enter negotiations. The President of Ukraine and the leaders of the parliamentary opposition sign an agreement intended to immediately stop the bloodshed and return the conflict to a political track. Representatives of the European Union act as mediators. A Russian representative participates but does not sign the document. The agreement provides for a return to the 2004 Constitution, limits on presidential power, the formation of a national trust government, and early presidential elections. In exchange, the opposition commits to ending the violence and disarming protesters."
 ukraine.55.a: "Excellent!"
 ukraine.56.t: "Yulia Tymoshenko Released"
 ukraine.56.d: "Former Prime Minister of Ukraine Yulia Tymoshenko was released from custody after the Supreme Court of Ukraine overturned her conviction for abuse of office. The court's decision was seen as a step toward political reconciliation and improving relations with the EU. Immediately after her release, Tymoshenko began an active election campaign."
 ukraine.56.a: "I see"
 ukraine.57.t: "Formation of the Right Sector"
 ukraine.57.d: "Against the backdrop of ongoing protests on the Maidan, the unification of several radical nationalist organizations under the common name 'Right Sector' has been recorded. The new structure declares independent coordination of actions and refuses to obey both opposition politicians and state bodies."
 ukraine.57.a: "Is this what our grandfathers fought for??"
 ukraine.58.t: "March on the Verkhovna Rada"
 ukraine.58.d: "In the morning, the opposition announced a 'peaceful offensive' on the Verkhovna Rada, demanding an immediate return to the 2004 Constitution. A column of protesters, led by deputies and Maidan self-defense fighters, was stopped by police cordons near the government quarter. Clashes quickly escalated into street battles: trucks were set on fire, Molotov cocktails, flashbangs, and tear gas were used.\n\nBy midday, riots engulfed central Kyiv. Fierce clashes occurred on Instytutska and Hrushevskoho streets, barricades were built, and the city was shrouded in smoke. The Officers' House was seized and used as a temporary medical point. Protesters reported capturing 'Berkut' officers.\n\nBy evening, the situation spiraled completely out of control. The Party of Regions office was set on fire, gunshot wounds were recorded on both sides, and reports of unknown snipers appeared. On the night of February 19, weapons seizures began in the west of the country. The nation entered a phase of open violence."
 ukraine.58.a: "Stop!"
 ukraine.59.t: "SBU Statement"
 ukraine.59.d: "Amidst the rapid escalation of violence, the Security Service of Ukraine (SBU) announced preparations for an anti-terrorist operation within the country. According to the SBU, the events of the past 24 hours indicate the mass use of firearms by extremist groups and the transition of the protest into a phase of organized armed confrontation."
 ukraine.59.a: "Suppress them!"
 ukraine.60.t: "Shooting on the Maidan"
 ukraine.60.d: "During the escalation of the confrontation in central Kyiv, the Maidan protests turned into their bloodiest phase. Throughout the morning and afternoon, numerous cases of gunshot wounds among protesters were recorded. According to eyewitnesses and subsequent investigations, the shooting was carried out using sniper rifles.\n\nFire was opened on protesters from various positions around the Maidan and adjacent streets. Deaths and injuries were primarily caused by aimed shots, indicating the organized nature of the weapon use. Within a short time, the death toll rose sharply, leading to mass panic and disorganization on the square."
 ukraine.60.a: "Horrible!"
 ukraine.61.t: "Anti-Maidan Rallies in Donetsk"
 ukraine.61.d: "A mass rally against Euromaidan took place in Donetsk. According to organizers and the police, between 12,000 and 15,000 people participated. Demonstrators expressed support for the current government and condemned the actions of opposition forces on the Maidan. The event was peaceful, without serious incidents, but served as an indicator of the regional split in public opinion."
 ukraine.61.a: "Ours!"
 ukraine.62.t: "Torchlight Procession in Kyiv"
 ukraine.62.d: "A torchlight procession of 'Svoboda' party activists and football fans took place in Kyiv to honor Stepan Bandera's birthday. UDAR leader Vitali Klitschko emphasized that the action was solely an initiative of the 'Svoboda' party and had no connection to the all-Ukrainian Maidan. During the march, a smoke bomb was thrown into the Premier Palace Hotel; subsequently, the party announced the disciplinary expulsion of two participants for the incident."
 ukraine.62.a: "Fascists!"

