 ukraine.17.t: "2014 Elections"
 ukraine.17.d: "The 2014 elections were held successfully. The government chose a new president and parliament. However, the situation in the country remains tense, and many regions demand greater autonomy. The government tries to find a compromise, but without success."
 ukraine.17.a: "Understood"
 ukraine.18.t: "Protests Intensify"
 ukraine.18.d: "Protests are intensifying in Kyiv and across Ukraine. Protesters demand the resignation of the government and new elections. The government attempts to suppress the protests, but unsuccessfully. The situation is becoming more tense. Local authorities declare they cannot control the situation."
 ukraine.18.a: "We must restore order immediately!"
 ukraine.19.t: "Nationalists Riot"
 ukraine.19.d: "Nationalists from the 'Right Sector' and 'Svoboda' carried out riots in Donetsk and Luhansk, storming several administrative buildings and beating local officials. The police did not intervene, and local authorities declared they could not control the situation."
 ukraine.19.a: "We must restore order immediately!"
 ukraine.21.t: "2014 Elections"
 ukraine.21.d: "The 2014 elections were held successfully. The government chose a new president and parliament. However, the situation in the country remains tense, and many regions demand greater autonomy. The government tries to find a compromise, but without success."
 ukraine.21.a: "Understood"
 ukraine.22.t: "Yanukovych in Donetsk"
 ukraine.22.d: "previous president of Ukraine Viktor Yanukovych arrived in Donetsk, where he was meet by local government and pro-Russian activists. Yanukovych stated, that he does not recognizes the legitimacy of present Ukrainian government and is open for cooperation with the Donetsk People's Republic. His visit called a wave of protests in Kyiv and other Ukrainian cities."
 ukraine.22.a: "We must catch him!"
 ukraine.22.b: "He is not a threat"
 ukraine.23.t: "The release of the series «Servant of the People»"
 ukraine.23.d: "A satirical series called «Servant of the People» is coming to television, telling a story of a ordinary history teacher, who unexpectedly becomes the president of the country.The project was conceived as a comedy and social satire, mocking corruption, bureaucracy, and the gap between government and society. However, the series quickly transcends its entertainment format. The characters' lines become quotable, scenes are hotly debated, and the image of the «common man in power» becomes a cultural phenomenon. For some viewers, the series becomes a form of social demand for renewal and justice, while for others, it remains a successful television fantasy."
 ukraine.23.a: "Understood"
 ukraine.24.t: "Fire at the Trade Union House in Odessa"
 ukraine.24.d: "Amidst a sharp political confrontation in Odessa, clashes between pro-Ukrainian and pro-Russian groups escalated into mass riots. Street fights, regular use of improvised means and chaos led to the point of some protesters taking shelter in Trade Union House on Kulikovo Field. During the clashes, a fire started in the building. Blaze and smoke cought on building quickly, what led to numerous victims. Dozens of people died and many were injured."
 ukraine.24.a: "Truly a horror"
 ukraine.25.t: "Early elections to the Verkhovna Rada"
 ukraine.25.d: "After the escape of Yanukovych and start of the political crisis in Ukraine, government decided to conduct early elections to the Verkhovna Rada, to stabilaze the situation in the country."
 ukraine.25.a: "Understood"
 ukraine.26.t: "Occupation of Slovyansk"
 ukraine.26.d: "Armed people in camouflage uniform without identification marks seized administrative buildings in Slovyansk, proclaiming the creation of the Donetsk People's Republic. They established control of the city, sparking armed conflict in eastern Ukraine.
 ukraine.26.a: "To arms, brothers! Time to defend Motherland!"
 ukraine.27.t: "Russian soldiers noted in Crimea"
 ukraine.27.d: "Russian soliders without identification marks was noted in Crimea region, this event led to concern of international community and increased tensions in the region."
 ukraine.27.a: "Occupiers!"
 ukraine.28.t: "First wave of mobilization"
 ukraine.28.d: "The government of Ukraine announced first wave of mobilization taking place in response to growing threat of separatism and external intervention in the east of the country. Thousands of citizens were called up for military service to defend the territorial integrity of Ukraine."
 ukraine.28.a: "For Motherland!!"
 ukraine.29.t: "Second wave of mobilization"
 ukraine.29.d: "The government of Ukraine announced second wave of mobilization taking place in response to growing threat of separatism and external intervention in the east of the country. Thousands of citizens were called up for military service to defend the territorial integrity of Ukraine."
 ukraine.29.a: For Motherland!"
 ukraine.30.t: "Third wave of mobilization"
 ukraine.30.d: "The government of Ukraine announced third wave of mobilization taking place in response to growing threat of separatism and external intervention in the east of the country. Thousands of citizens were called up for military service to defend the territorial integrity of Ukraine."
 ukraine.30.a: "For Motherland!"
 ukraine.31.t: "Bloodshed in Kyiv"
 ukraine.31.d: "A sharp escalation of the situation happened, accompanied by massive bloodshed.The clashes between protesters and police started to resumed, accompanied by actions of unknown snipers, led to death of tens of protests's participants and law enforcement officers.According to the Ukrainian Ministry of Health, 77 people have died in Kyiv."
 ukraine.31.a: "What a horror!"
 ukraine.32.t: "Titushki from Russia"
 ukraine.32.d: "Russian has send a new group of «Titushki» fighters to support pro-Russian movement taking place in east of Ukraine. Those people are well treained and equiped, which significantly strengthens the position of the anti-Maidan in the region."
 ukraine.32.a: "They will come in handy"
 