l_english:
LOADING_TIP_0: "Study history! Prepare for revolution! Leave the classroom! Take to the streets! – Serhiy Zhadan"
LOADING_TIP_1: "Freedom stands on three pillars: the market, democracy, and bullets in bellies. – Serhiy Zhadan"
LOADING_TIP_2: "Mom, what draft office? We haven't been at war with anyone for ages. We're a non-aligned country. Have you seen our defense minister? That's what all our defense is like. Our defense is worse than Chelsea’s defense. Anyway, Mom, I’m out, I’m not going. – Serhiy Zhadan"
LOADING_TIP_3: "Comrade Moskal, don’t joke about Ukraine. – Petro Poroshenko"
LOADING_TIP_4: "The Novorossiya project has failed. – Petro Poroshenko"
LOADING_TIP_5: "If you want to carry weapons – sign up as a volunteer at the draft office. – Petro Poroshenko"
LOADING_TIP_5: "Farewell, unwashed Russia. – Petro Poroshenko"
LOADING_TIP_6: "Ukraine did not listen to our peaceful proposal, so we’ll resolve the issue differently. – Alexander Zakharchenko"
LOADING_TIP_7: "If it’s a bullet to the forehead – then so be it. – Arseniy Yatsenyuk"
LOADING_TIP_8: "We move forward. This is our land! – Yuliy Mamchur"
LOADING_TIP_9: "No one overthrew me – I had to leave Ukraine under the direct threat to my life and my family. – Viktor Yanukovych"
LOADING_TIP_10: "The people of Crimea appealed to Russia. We could not ignore them. – Vladimir Putin"
LOADING_TIP_11: "Crimea will become a sacred center for Russia, like the Temple Mount. – Vladimir Putin"
LOADING_TIP_12: "Moscow is primitive. Abroad, they laugh at it. – Mustafa Dzhemilev"
LOADING_TIP_13: "We had one big schizophrenic... a short schizophrenic. – Ihor Kolomoyskyi"
LOADING_TIP_14: "For Minister Lavrov, lying is like a drunkard drinking vodka. – Arsen Avakov"
LOADING_TIP_15: "The gunpowder must stay dry. – Petro Poroshenko"
LOADING_TIP_16: "We didn’t start the war. – Petro Poroshenko"
LOADING_TIP_17: "Should we take back Crimea by force? Crimea must be taken back with intelligence. – Petro Poroshenko"
LOADING_TIP_18: "I don’t want war or revenge, I want peace and unity. – Petro Poroshenko"
LOADING_TIP_19: "The Russian language should not face any restrictions. – Petro Poroshenko"
LOADING_TIP_20: "Living freely means freely using your native language. – Petro Poroshenko"
LOADING_TIP_21: "The Ukrainian people are the greatest and most beautiful people in the world. – Petro Poroshenko"
LOADING_TIP_22: "Army! Language! Faith! – Petro Poroshenko"
LOADING_TIP_23: "We are parting with Moscow once and for all. – Petro Poroshenko"
LOADING_TIP_24: "I try not to get nervous, but sometimes in meetings it just bursts out. – Alexander Yaroshuk"
LOADING_TIP_25: "In Russia, we must realize the best ideals of Holy Rus’, the Caliphate, and the USSR. – Vsevolod Chaplin"
LOADING_TIP_26: "Morons, fuck! – Sergey Lavrov"
LOADING_TIP_27: "No problem. No criminality. – Patriarch Kirill"
LOADING_TIP_28: "To properly build economic policy, one needs both mind and heart. – Vladimir Putin"
LOADING_TIP_29: "Not only Russia – the whole world is looking to Asia. – Vladimir Putin"
LOADING_TIP_30: "Global security is gone – the destruction of key institutions guarantees chaos. – Vladimir Putin"
LOADING_TIP_31: "I don’t agree that serious politics means pounding the table with your fist. – Yevgeny Primakov"
LOADING_TIP_32: "The USA is the strongest, but not a superpower. – Yevgeny Primakov"
LOADING_TIP_33: "Russia is a continent. – Viktor Chernomyrdin"
LOADING_TIP_34: "We must not allow the rewriting of the outcomes of World War II. – Arseniy Yatsenyuk"
LOADING_TIP_35: "Our goal is not war. – Petro Poroshenko"
LOADING_TIP_36: "If sanctions hadn’t happened, they would have needed to be invented. – Patriarch Kirill"
LOADING_TIP_37: "I rule out the prospect of using force in the conflict with Ukraine. – Yevgeny Primakov"
LOADING_TIP_38: "Pounding your fist on the table is no sign of greatness. – Yevgeny Primakov"
LOADING_TIP_39: "Russia is capable of producing any goods independently. – Patriarch Kirill"
LOADING_TIP_40: "The closer the referendum, the less clear the outcome. – Leonid Radzikhovsky"
LOADING_TIP_41: "He told me: don’t you understand that crime is a tool of governance? – Viktor Yanukovych"
LOADING_TIP_42: "The Soviet facade wasn’t bad, but the Iron Curtain was a harsh system. – Dmytro Gordon"
LOADING_TIP_43: "What do I need such a president and such an opposition for? – Dmytro Gordon"
LOADING_TIP_44: "Why don’t they all just go to hell? – Dmytro Gordon"
LOADING_TIP_45: "Let them count Russian submarines in their neutral waters and protect themselves together with Ukraine. – Yulia Tymoshenko"
LOADING_TIP_46: "Traitors should not be destroyed – they’ll collapse on their own. – Vladimir Putin"
LOADING_TIP_47: "Soap with the scent of rubles. You shower – and immediately think of taxes. – Aman Tuleyev"
LOADING_TIP_48: "Get ready for sanctions to last 10 years. – Boris Nemtsov"
LOADING_TIP_49: "Putin, like any gangster, respects strength. – Boris Nemtsov"
LOADING_TIP_50: "If you want to carry weapons – sign up as a volunteer at the draft office. – Petro Poroshenko"
LOADING_TIP_51: "Sasha, what’s with you? Pour me a drink so I won’t feel ashamed. – Viktor Yanukovych"
LOADING_TIP_52: "A unique swindler. He even scammed our oligarch Abramovich two or three years ago. As we say in enlightened intellectual circles, 'he conned him'. – Vladimir Putin"

