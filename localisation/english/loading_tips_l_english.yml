LOADING_TIP_0: "«And not everyone can look into tomorrow today. Or rather, watching isn’t something just anyone can do — very few can actually.» — Vitali Klitschko"
LOADING_TIP_1: "«I have two deputies, four of whom have been lying in the Cabinet for a month.» — Vitali Klitschko"
LOADING_TIP_2: "«The only thing is, there’s this Mr. Vakarov — if he ever deigns to return to his homeland instead of staying in the Russian Federation, I’d gladly show him how Adam’s apples get ripped out. Lightly. Elegantly. With a move. Of the right. Hand. Or the left…» — Dmytro Gordon"
LOADING_TIP_3: "«Ha‑ha‑ha‑ha, a bald wig with hair underneath… Interesting thought, someone has exposed me.» — Dmytro Gordon, in response to Vladimir Solovyov"
