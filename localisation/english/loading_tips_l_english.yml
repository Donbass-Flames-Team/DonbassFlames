LOADING_TIP_16: "«In the case of a nuclear war, not all of us will die.» — Maksym Kats"
LOADING_TIP_17: "«Don’t call him “ass‑headed,” that’s not funny anymore — call him “ass‑headed,” that will be new.» — Dmytro Gordon, responding to an insult from Vladimir Solovyov"
LOADING_TIP_18: "«Well then, Vladimir Rudolfovich Solovyov — he’s Volodya, he’s Goga, he’s Gosha — I think that secretly at night you jerk off to me, otherwise how else to explain why you show me so often and talk so much about me?» — Dmytro Gordon"
LOADING_TIP_19: "«Dear Ukrainians, I promise you I will go for President of Ukraine and I’m doing it right now: I am running for President of Ukraine! Let’s do this together. Happy New Year with the new Servant of the People!» — Volodymyr Zelenskyy in his New Year’s address on 31 December 2018 on channel “1+1”"
LOADING_TIP_20: "«If you don’t understand — we’re rapidly heading toward catastrophe.» — Ihor Strelkov"
LOADING_TIP_21: "«I need weapons, not a taxi.» — Volodymyr Zelenskyy"
LOADING_TIP_22: "«How much is it? 375? Safonov, pay! Come on. How much is it? Safonov, pay! And how much is it? Yeah… Safonov, put it in the register and pay, try it. I’m disabled…» — Vladimir Zhirinovsky, giving instructions to an aide in a pharmacy"
LOADING_TIP_23: "«The militia didn’t shoot down the Boeing.» — Ihor Strelkov (Girkin), in an interview with Dmytro Gordon"
LOADING_TIP_24: "«Without communication with intelligent people, even enemies, development is impossible.» — Ihor Strelkov (Girkin)"
LOADING_TIP_25: "«Even if everything in Russia is fucked up — Vova is pounding Ukraine and trading the “Russian World” he will sell his own mother; Solovyov is terribly shady, even Putin realized it, but someone who lies this much is very hard to find.» — Dmytro Gordon in his song about Vladimir Solovyov “Italian Partisan”"
LOADING_TIP_26: "«First of all, I am not your opponent, I am your verdict.» — Volodymyr Zelenskyy, during debates with Petro Poroshenko"
LOADING_TIP_27: "«Don’t you show up in front of my eyes — I’ll rip out your Adam’s apple, bitch! Who told you to die? You told me to die? Come here and say it to my face if you have the courage.» — Dmytro Gordon, in response to Ihor Stepura"
LOADING_TIP_28: "«All the residents of Bryansk who filmed impacts and complained that air defenses didn’t work — they are scum and they should be in jail.» — Vladimir Solovyov"
LOADING_TIP_29: "«Yeah, Vov, you were a colonel and you sing better too; I’ll tell you a secret — your dick is bigger, just don’t cry.» — Dmytro Gordon, in response to Vladimir Solovyov"
LOADING_TIP_30: "«I want to tell the Russian army: fuck off out of here, you fucking motherfuckers!» — Dmytro Gordon in an interview on TV Rain"
LOADING_TIP_31: "«Russian warship, go fuck yourself!» — Border guard from Snake Island, in response to the cruiser Moskva’s ultimatum to surrender on 24 February 2022"
LOADING_TIP_32: "«Good afternoon, we are from the Donetsk People’s Republic!» — Local TikTok trend of spring 2022, remade from a Ukrainian track"
LOADING_TIP_33: "«I’m sending you candy, a mug, and my fiery greeting — don’t forget about me and I won’t forget about you.» — Dmytro Gordon, address to Vladimir Solovyov"
LOADING_TIP_34: "«The President is here. We are all here. Defending our independence.» — Volodymyr Zelenskyy (25 February 2022)"
LOADING_TIP_35: "«Without light or without you? Without you.» — Volodymyr Zelenskyy"
LOADING_TIP_36: "«You can’t see anything without contact lenses; the leather suitcases of lawyers protect you — captains please, no tears, tell me afterward what liberalism is.» — Serhiy Zhadan in his song “Somali”"
LOADING_TIP_37: "«Mom, what draft board? We haven’t been fighting anyone for a long time — we are a non‑aligned country. Did you see our Minister of Defense? Our whole defense is like that. Our defense is worse than Chelsea’s. Well, mom, why? Because I’m an idiot! You understand — idiot! And idiots aren’t drafted into the army, not even ours, Ukrainian!» — Serhiy Zhadan in his song “Voienkomat” (2008)"
LOADING_TIP_38: "«Now for Belarusians we have a present, for Ukrainians and Europe — we will cut off gas.» — Vladimir Putin"
LOADING_TIP_39: "«Now listen to me, fuck — these are someone’s fuckin’ fathers and someone’s sons, and those bastards who are not giving us ammunition, fuck, will be in hell eating their guts, fuck! Fucking bastards. We’re short 70% of ammo, Shoigu, Gerasimov, where, fuck, are the ammo? Look at them, fuck!» — Yevgeny Prigozhin"
LOADING_TIP_40: "«Like it or not — deal with it, my beauty.» — Vladimir Putin"
LOADING_TIP_41: "«We haven’t even seriously begun yet.» — Vladimir Putin"
LOADING_TIP_42: "«— Password! — NKVD, let us through! — We don’t let people like that through! I ask you — what’s the password? — That’s something you need to know, not me. — Your gun’s safety is on. — Are you sure? — Definitely, yes. — It still shoots quite well. I ask you — what’s the password! Are you a Moskal? — I’m Russian. Russian! — Ruski? — Russian? — Say the password then I’ll let you in. — I won’t say it. We’ll just stand here with you a long time. — Well then we’re leaving.» — Oleh Tsariev, speaking with a guard at the entrance to the Lviv restaurant “Kryivka”"
LOADING_TIP_43: "«The special operation is going strictly according to plan.» — Igor Konashenkov"
LOADING_TIP_44: "«— When did World War II begin? — What? — When did World War II begin? — The Volhynia massacre was in… — When did World War II begin? — In ’41. — Really? — Yes yes. — Not in ’39? — No. — Not in September ’39? — No. — Not with the partition of Poland? — No.» — Oleh Tsariev, in a well‑known interview with Roman Skrypin"
LOADING_TIP_45: "«By the way, that pale spirochete, that person — a used fucker.» — Vladimir Solovyov"
LOADING_TIP_46: "«Banderite ideology is when people were killed by the hundreds of thousands because they were not Ukrainians… yes, the Volhynia massacre.» — Oleh Tsariev"
LOADING_TIP_47: "«This is Lyashko, good day, and we’re stuck in the elevator — how’s it goin’?! Listen, he says “good”.» — Oleh Lyashko"
LOADING_TIP_48: "«Show your documents! This is a restricted area, you couldn’t just get in here, key! Where’s the key?! Stand still or we’ll fight, fuck! I’ll show you! I said, documents and the key. Did you hear or not? Stand still I said! Ah, you feel bad now, yes? You want to fight?» — Oleh Lyashko"
LOADING_TIP_49: "«Russia doesn’t end anywhere.» — Vladimir Putin"
LOADING_TIP_50: "«Well then, finished assholes, happy now? Took Kyiv, huh, NATO fought well? Divided Europe with America? A bunch of old fantasists who have nothing but bravado in their souls. What, you bastards, couldn’t even sit still on your ass? You should’ve watched cartoons about rockets flying to Miami. So why did you come here?» — Maksym Kats"
LOADING_TIP_51: "«Moreover, at the start of the footage we established that not even the entire Russian president’s administration can cover up tracks, and here — a Mariupol school, of course that couldn’t have happened.» — Maksym Kats"
LOADING_TIP_52: "«Friends, the news from around Kramatorsk is alarming. Right now it’s in a semicircle. Very unpleasant news, but we must view the situation soberly.» — Denis Pushilin"
LOADING_TIP_53: "«There is an old Russian interjection “Goida!”, meaning a call to immediate action. How much we needed that now!» — Ivan Okhlobystin"
LOADING_TIP_54: "«Take that idiot woman away from here! Remove this prostitute, this filth from here! Black filth! Horrible woman! Fucking last one!» — Vladimir Zhirinovsky"
LOADING_TIP_55: "«Dear Mykola Yanovych, today you will be sent to the outhouse with all the bloodsuckers, your Cabinet of Ministers is ineffective, you’ve driven people to ruin, and when you talk about the economy you crap on your predecessors…» — Oleh Lyashko"
LOADING_TIP_56: "«I am very angry, I am very angry at Yulka.» — Oleh Lyashko"
LOADING_TIP_57: "«Sick of it, you bastards.» — Oleh Lyashko"
LOADING_TIP_58: "«If you want to live — run. If you want to live — surrender. If you want to live — fight. Fight on your streets and for your freedom. You already have had everything taken from you. Or do any of you have oil rigs? Palaces? Vineyards? Or maybe a yacht or a bank? What are you fighting for? You only have debts, something to eat in the evening, and now mobilization. Fight for what’s yours, don’t come onto our land.» — Volodymyr Zelenskyy"
LOADING_TIP_59: "«To return this land to fictitious babies, the state — and that’s it, we won’t even announce these people’s names.» — Viktor Yanukovych"
LOADING_TIP_60: "«If we’re serious, then we will defend Mariupol. That’s the question: are we serious or not? Are we Europe, the West, NATO? And one thing is clear — Macron isn’t serious. That’s a big problem. He goes and offers Putin “Finlandization” of Ukraine… that’s a catastrophe.» — Günter Fellinger‑Jan"
LOADING_TIP_61: "«On 9 February 2022 in Mariupol, I called on NATO to defend Mariupol, but we couldn’t… Free Mariupol and don’t sell it to Russia. Any agreement must include Mariupol in NATO and the EU.» — Günter Fellinger‑Jan"
LOADING_TIP_62: "«How did you not notice — we were fighting over my Ukraine today! The air is different, the sky is bluer and the land is greener.» — Leonid Bykov"
