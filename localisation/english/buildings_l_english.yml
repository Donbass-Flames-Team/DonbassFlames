l_english:
 social_infrastructure: "Social Infrastructure"
 social_infrastructure_desc: "Facilities related to supporting daily life and providing services to the population."
 offices_building: "Office"
 offices_building_plural: "Offices"
 offices_building_desc: "Dnipro is offices, SOHO and escorts, luxury life, scammers and drugs. Dnipro is unemployment, alcoholic neighbors, five-on-two sleepless nights, nooses and windowsills."
 infrastructure: "Infrastructure"
 infrastructure_plural: "Infrastructure"
 infrastructure_desc: "This building improves the region's infrastructure, increasing supply capacity and the movement speed of your divisions."
 network_infrastructure: "Network Infrastructure"
 network_infrastructure_plural: "Network Infrastructure"
 network_infrastructure_desc: "This building improves the region's communications, increasing the speed and quality of communication and thereby developing the region's economy."
 arms_factory: "Military Factory"
 arms_factory_plural: "Military Factories"
 arms_factory_desc: "This building provides the region with new military equipment. If necessary, it can be converted into a factory producing civilian goods."
 dockyard: "Dockyard"
 dockyard_plural: "Dockyards"
 dockyard_desc: "This building provides the region with new ships."
 agro_industrial_complex: "Agro-Industrial Complex"
 agro_industrial_complex_plural: "Agro-Industrial Complexes"
 agro_industrial_complex_desc: "This enterprise provides the country with food for domestic consumption and export.\n\n1 unit of this enterprise adds 100 million dollars to GDP."
 dam: "Dam"
 dam_plural: "Dams"
 dam_desc: "Dams provide the region with additional electricity, increasing industrial efficiency and resource extraction."
 dam_mountain: "$dam$"
 dam_mountain_plural: "$dam_plural$"
 dam_mountain_desc: "$dam_desc$"
 industrial_complex: "Factory"
 industrial_complex_plural: "Factories"
 industrial_complex_desc: "This building provides the region with consumer goods and allows new buildings to be constructed. If necessary, it can be converted into a factory producing military goods."
 air_base: "Air Base"
 air_base_plural: "Air Bases"
 air_base_desc: "This building allows you to station your air forces in the region."
 naval_base: "Naval Base"
 naval_base_plural: "Naval Bases"
 naval_base_desc: "Extends the range of your fleet and allows it to be repaired. Enables supply delivery and resource export by sea. A higher level increases supply throughput."
 bunker: "Fortification"
 bunker_plural: "Fortifications"
 bunker_desc: "This building applies a penalty to the attacker in land combat — $VALUE|+%0$ for each fortification level. Attacks from multiple directions reduce the effect of fortifications."
 coastal_bunker: "Coastal Fortification"
 coastal_bunker_plural: "Coastal Fortifications"
 coastal_bunker_desc: "This building applies a penalty to the attacker in naval combat — $VALUE|+%0$ for each fortification level."
 anti_air_building: "Anti-Air"
 anti_air_building_plural: "Anti-Air"
 anti_air_building_desc: "This building protects the region from enemy bombers and fires at enemy aircraft."
 synthetic_refinery: "Oil Refinery"
 synthetic_refinery_plural: "Oil Refineries"
 synthetic_refinery_desc: "This building produces in the region"
 synthetic_refinery_amount: "$VALUE|Y0=$"
 synthetic_refinery_resource: "£resources_strip|$FRAME$"
 radar_station: "Radar Station"
 radar_station_plural: "Radar Stations"
 radar_station_desc: "Radar provides you with information about enemy troops in nearby regions.\nThe higher its level, the greater its range.\nIt also allows more effective detection of enemy aircraft in the region, increasing your pilots' chances of success.\nIn addition, radars improve the detection of enemy fleets."
 rocket_site: "Rocket Site"
 rocket_site_plural: "Rocket Sites"
 rocket_site_desc: "This building allows you to deploy rockets you have produced in the region."
 nuclear_reactor_heavy_water: "Heavy Water Nuclear Reactor"
 nuclear_reactor_heavy_water_plural: "Heavy Water Nuclear Reactors"
 nuclear_reactor_heavy_water_desc: "This building produces enriched uranium in the region for use in nuclear weapons.\nHeavy water nuclear reactors are somewhat cheaper than graphite-based alternatives, but produce less material for nuclear weapons."
 nuclear_reactor: "Nuclear Reactor"
 nuclear_reactor_plural: "Nuclear Reactors"
 nuclear_reactor_desc: "This building produces enriched uranium in the region for use in atomic weapons."
 commercial_nuclear_reactor: "Civilian Nuclear Reactor"
 commercial_nuclear_reactor_plural: "Civilian Nuclear Reactors"
 commercial_nuclear_reactor_desc: "This enterprise provides the country with enriched uranium for the production of nuclear weapons and generates electricity for the civilian economy."
 nuclear_facility: "Nuclear Research Center"
 nuclear_facility_plural: "Nuclear Research Centers"
 nuclear_facility_desc: "Experimental nuclear research centers allow special projects involving nuclear energy to be launched."
 air_facility: "Institute of Aerodynamics and Avionics"
 air_facility_plural: "Institutes of Aerodynamics and Avionics"
 air_facility_desc: "Experimental institutes for the study of aerodynamics and avionics allow projects related to aviation, rockets, and electronics to be launched."
 naval_facility: "Institute of Naval Engineering"
 naval_facility_plural: "Institutes of Naval Engineering"
 naval_facility_desc: "Experimental institutes of naval engineering allow projects for the development of surface ships and submarines to be launched.\nSuch an institute can only be built in a coastal province."
 mega_gun_emplacement: "Multi-Charge Large-Caliber Gun"
 mega_gun_emplacement_plural: "Multi-Charge Guns"
 mega_gun_emplacement_desc: "This large-caliber gun, operating on the principle of a multi-charge propulsion system, has unprecedented firing range. Using a series of underground tunnels, it accelerates projectiles to supersonic speed before launching them at distant targets."
 stronghold_network: "Fortification Network"
 stronghold_network_plural: "Fortification Networks"
 stronghold_network_desc: "An extensive defensive system of massive bunkers and heavily fortified positions, built to repel enemy offensives and ensure the security of key strategic areas."
 land_facility: "Institute of Land Warfare"
 land_facility_plural: "Institutes of Land Warfare"
 land_facility_desc: "Experimental institutes of land warfare allow projects for the study and development of weapons for land warfare to be launched — special tanks, artillery, and similar equipment."
