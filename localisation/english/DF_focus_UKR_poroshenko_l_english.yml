﻿l_english:

  UKR_poroshenko_victory: "Poroshenko Victory"
  UKR_poroshenko_victory_desc: "Elections zaversheny, country needs clear course and unified center responsibility. We will consolidate legitimacy power and will begin to gather pro-European majority. This point start for reforms and foreign-policy turn."

  UKR_por_2014_parliamentary_election: "2014 Parliamentary Election"
  UKR_por_2014_parliamentary_election_desc: "Renewal Verkhovna Rada and formation new political bolshynstva. Result will determine speed reforms and stability pravytelstva."

  UKR_por_european_ukraine_coalition: "European Ukraine Coalition"
  UKR_por_european_ukraine_coalition_desc: "Gather proevropeyskye forces in koalytsyyu and zafyksyrovat common plan actions. Without bolshynstva in Rada reformy will remain words."

  UKR_por_support_yatsenyuk_government: "Support the Yatsenyuk Government"
  UKR_por_support_yatsenyuk_government_desc: "Reformist cabinet must hold stranu and launch changes. We will give political support, to pass through crisis decisions."

  UKR_por_support_groysman_government: "Support the Groysman Government"
  UKR_por_support_groysman_government_desc: "Stabilization governance and continuation kursa reforms. Focus on pragmatic decisions and control implementation."

  UKR_por_keep_semi_presidential_model: "Keep the Semi-Presidential Model"
  UKR_por_keep_semi_presidential_model_desc: "Sokhranenye balance branches power for governability state. This compromise between strong executive vlastyu and parliamentary kontrolem."

  UKR_por_cadre_rotations: "Cadre Rotations"
  UKR_por_cadre_rotations_desc: "Pereformatyrovanye vertykaly governance pod novyy polytycheskyy course. We will renew key appointments, will strengthen discipline and responsibility."

  # EU BRANCH
  UKR_por_association_agreement_EU: "Association Agreement with the EU"
  UKR_por_association_agreement_EU_desc: "Zakrepyt stratehycheskyy European vybor and ynstytutsyonalnuyu yntehratsyyu. This ramka, po kotoroy strana budet perestrayvat pravyla and rynky."

  UKR_por_dcfta_launch: "Launch the DCFTA"
  UKR_por_dcfta_launch_desc: "Deep and Comprehensive Free Trade Area — ekonomycheskaya osnova evroyntehratsyy. Otkroem rynky and will begin vyravnyvat standarty."

  UKR_por_adopt_eu_directives_1: "Adopt EU Directives I"
  UKR_por_adopt_eu_directives_1_desc: "Pervyy paket harmonyzatsyy zakonodatelstva with normamy Evrosoyuza. Nachynaem pryvodyt pravyla k obshchemu evropeyskomu standartu."

  UKR_por_adopt_eu_directives_2: "Adopt EU Directives II"
  UKR_por_adopt_eu_directives_2_desc: "Vtoroy paket harmonyzatsyy — systemnye changes in rehulyrovanyy and upravlenyy. Ukrepym ynstytutsyy and control yspolnenyya."

  UKR_por_adopt_eu_directives_3: "Adopt EU Directives III"
  UKR_por_adopt_eu_directives_3_desc: "Tretyy paket harmonyzatsyy — zavershenye bazovoho vyravnyvanyya pravyl. This podhotovka k bolee hlubokym etapam sblyzhenyya with EU."

  UKR_por_customs_modernization: "Customs Modernization"
  UKR_por_customs_modernization_desc: "Renewal protsedur and kontrolnykh mekhanyzmov po evropeyskym standartam. Menshe serykh skhem — bolshe prozrachnoy torhovly."

  UKR_por_border_management_eu: "Evropeyskoe upravlenye hranytsey"
  UKR_por_border_management_eu_desc: "Usylenye ynfrastruktury and protsedur on hranytse. Sdelaem peresechenye bolee bezopasnym and predskazuemym."

  UKR_por_visa_free_regime: "Bezvyzovyy rezhym"
  UKR_por_visa_free_regime_desc: "Praktycheskyy result yntehratsyy — svoboda peredvyzhenyya for hrazhdan. This doverye, zarabotannoe reformamy."

  UKR_por_eu_energy_integration: "Yntehratsyya in enerhorynok EU"
  UKR_por_eu_energy_integration_desc: "Sblyzhenye pravyl, setey and standartov with evropeyskoy enerhosystemoy. Snyzym zavysymost and will strengthen stability."

  UKR_por_unbundle_energy_sector: "Anbandlynh enerhosektora"
  UKR_por_unbundle_energy_sector_desc: "Razdelenye funktsyy and povyshenye prozrachnosty rynka. Sozdadym ponyatnye pravyla and menshe monopolyzma."

  UKR_por_eu_transport_corridors: "Transportnye korydory in Evropu"
  UKR_por_eu_transport_corridors_desc: "Ynfrastrukturnaya svyaznost with EU kak stratehycheskyy pryorytet. Dorohy and lohystyka — this realnaya yntehratsyya."

  UKR_por_eu_macro_financial_aid: "Makrofynansovaya pomoshch EU"
  UKR_por_eu_macro_financial_aid_desc: "Podderzhka byudzheta and reforms through evropeyskye mekhanyzmy. Poluchym resurs, no and obyazatelstva po yzmenenyyam."

  UKR_por_eu_investment_platform: "European ynvestplatforma"
  UKR_por_eu_investment_platform_desc: "Launch prohramm ynvestytsyy and vosstanovlenyya ekonomyky. Pryvlechyom kapytal and uskorym modernyzatsyyu."

  UKR_por_eu_reforms_monitoring: "Monytorynh reforms po standartam EU"
  UKR_por_eu_reforms_monitoring_desc: "Formalyzatsyya kontrolya implementation obyazatelstv and dorozhnykh kart. Prozrachnost prohressa — klyuch k doveryyu."

  UKR_por_eu_candidate_application: "Podat zayavku on status kandydata"
  UKR_por_eu_candidate_application_desc: "Polytycheskyy shah: zapros on pryznanye evroyntehratsyonnoho puty. Yeslshe — perehovory and tyazhyolaya rabota po hlavam."

  UKR_por_eu_candidate_negotiations: "Perehovory o statuse kandydata"
  UKR_por_eu_candidate_negotiations_desc: "Sohlasovanye uslovyy and ramok budushcheho chlenstva. Vazhny temp reforms and podderzhka partnyorov."

  UKR_por_open_eu_chapters_justice: "Otkryt hlavy: Pravosudye"
  UKR_por_open_eu_chapters_justice_desc: "Sudebnye and pravovye standarty — klyuch k doveryyu Evropy. Will strengthen nezavysymost and predskazuemost systemy."

  UKR_por_open_eu_chapters_economy: "Otkryt hlavy: Ekonomyka"
  UKR_por_open_eu_chapters_economy_desc: "Edynye pravyla rynka and konkurentnoy sredy. This zashchyta ynvestytsyy and rost vozmozhnostey."

  UKR_por_open_eu_chapters_security: "Otkryt hlavy: Bezopasnost"
  UKR_por_open_eu_chapters_security_desc: "Sblyzhenye system bezopasnosty and governance ryskamy. Sylnye ynstytuty — fundament ustoychyvosty."

  UKR_por_eu_pre_accession_funds: "Predvstupytelnye fondy EU"
  UKR_por_eu_pre_accession_funds_desc: "Fynansyrovanye reforms and modernyzatsyy pered chlenstvom. Yspolzuem sredstva for ynfrastruktury and ynstytutsyy."

  UKR_por_eu_accession_treaty: "Dohovor o vstuplenyy in EU"
  UKR_por_eu_accession_treaty_desc: "Fynalnyy polytyko-pravovoy dokument chlenstva. Poslednyy shah pered ystorycheskym reshenyem."

  UKR_por_join_european_union: "Vstupyt in European Soyuz"
  UKR_por_join_european_union_desc: "Ystorycheskaya victory: Ukraine stanovytsya chastyu EU. This novye pravyla, novye vozmozhnosty and novaya harantyya budushcheho."

  # NATO BRANCH
  UKR_por_nato_cooperation_no_membership: "Sotrudnychestvo with NATO"
  UKR_por_nato_cooperation_no_membership_desc: "Sblyzhenye with Alyansom through praktycheskye prohrammy and dyaloh. Will begin with sovmestnykh proektov and doveryya."

  UKR_por_nato_trust_building: "Narashchyvat doverye with NATO"
  UKR_por_nato_trust_building_desc: "Postoyannye kontakty and partnyorstva — osnova budushcheho chlenstva. Chem bolshe sovmestymosty, tem menshe ryskov."

  UKR_por_defense_institutions_reform: "Reforma oboronnykh ynstytutov"
  UKR_por_defense_institutions_reform_desc: "Perestroyka governance oboronoy po sovremennym standartam. Ukrepym planyrovanye, control and responsibility."

  UKR_por_nato_interoperability_program: "Prohramma sovmestymosty"
  UKR_por_nato_interoperability_program_desc: "Ynteroperabelnost with sylamy NATO on urovne protsedur and planyrovanyya. Hotovymsya deystvovat po obshchym pravylam."

  UKR_por_joint_exercises_and_training: "Sovmestnye uchenyya and podhotovka"
  UKR_por_joint_exercises_and_training_desc: "Povyshenye kachestva voysk through sovmestnye trenyrovky. Praktyka vazhnee zayavlenyy."

  UKR_por_secure_communication_standards: "Bezopasnye standarty svyazy"
  UKR_por_secure_communication_standards_desc: "Edynye protocols and zashchyshchyonnye kanaly kommunykatsyy. This povyshaet upravlyaemost and zhyvuchest armyy."

  UKR_por_nato_logistics_reform: "Reforma lohystyky"
  UKR_por_nato_logistics_reform_desc: "Snabzhenye, remont and upravlenye zapasamy po standartam NATO. Without lohystyky net ustoychyvoy oborony."

  UKR_por_nato_officer_corps_training: "Podhotovka ofytserskoho korpusa"
  UKR_por_nato_officer_corps_training_desc: "Systemnaya podhotovka komandnoho sostava. Kachestvo reshenyy nachynaetsya with kachestva obuchenyya."

  UKR_por_civilian_control_of_military: "Hrazhdanskyy control nad armyey"
  UKR_por_civilian_control_of_military_desc: "Demokratycheskyy pryntsyp governance oboronoy kak trebovanye Alyansa. Will strengthen prozrachnost and podotchyotnost."

  UKR_por_nato_anti_corruption_in_defense: "Antykorruptsyya in oboronnoy sfere"
  UKR_por_nato_anti_corruption_in_defense_desc: "Prozrachnost zakupok and governance — klyuch k doveryyu partnyorov. Zakroem lazeyky and will strengthen control."

  UKR_por_nato_map_request: "Zaprosyt PDCh (MAP)"
  UKR_por_nato_map_request_desc: "Formalnyy zapros on Plan actions po chlenstvu. This syhnal, chto we hotovy ydty do kontsa."

  UKR_por_nato_map_granted: "Poluchyt PDCh (MAP)"
  UKR_por_nato_map_granted_desc: "Polytycheskoe pryznanye prohressa and launch protsessa chlenstva. Teper vsyo zavysyt ot tempa reforms."

  UKR_por_nato_accession_protocols: "Protocols o prysoedynenyy"
  UKR_por_nato_accession_protocols_desc: "Yurydycheskoe oformlenye vstuplenyya in Alyans. Podhotovym dokumenty and podderzhku soyuznykov."

  UKR_por_nato_membership_vote: "Ratyfykatsyya chlenstva"
  UKR_por_nato_membership_vote_desc: "Fynalnyy etap — ratyfykatsyya and sohlasovanye uslovyy. Will consolidate reshenye on urovne zakonov."

  UKR_por_join_nato: "Vstupyt in NATO"
  UKR_por_join_nato_desc: "Ystorycheskaya victory: Ukraine stanovytsya chlenom Severoatlantycheskoho alyansa. This harantyya bezopasnosty and common shchyt."

  # COURSE / IDENTITY
  UKR_por_no_multivector_policy: "Otkaz ot mnohovektornosty"
  UKR_por_no_multivector_policy_desc: "Chyotkaya vneshnepolytycheskaya lynyya: EU and NATO kak pryorytet. Polumery bolshe ne rabotayut."

  UKR_por_constitution_EU_NATO_course: "Zakrepyt course EU/NATO in Konstytutsyy"
  UKR_por_constitution_EU_NATO_course_desc: "Yurydycheskoe zakreplenye stratehycheskoho vybora kak neobratymoho. This zashchyta kursa ot otkatov."

  UKR_por_decommunization_laws: "Zakony o dekommunyzatsyy"
  UKR_por_decommunization_laws_desc: "Razryv with sovetskym nasledyem and pereosmyslenye polytyky pamyaty. Symvoly and pravyla dolzhny otrazhat sovremennuyu Ukraynu."

  UKR_por_rename_cities_and_streets: "Pereymenovat horoda and ulytsy"
  UKR_por_rename_cities_and_streets_desc: "Symvolycheskoe yzmenenye publychnoho prostranstva. Will consolidate novuyu ydentychnost in povsednevnoy zhyzny."

  UKR_por_remove_soviet_symbols: "Ubrat sovetskuyu symvolyku"
  UKR_por_remove_soviet_symbols_desc: "Demontazh symvolov proshloho for novoy ydentychnosty. This shah k samostoyatelnoy ystorycheskoy polytyke."

  UKR_por_state_language_policy: "Polytyka hosudarstvennoho yazyka"
  UKR_por_state_language_policy_desc: "Ukreplenye natsyonalnoy ydentychnosty and kulturnoho prostranstva. Hosudarstvennyy yazyk — osnova edynstva."

  UKR_por_information_resilience: "Ynformatsyonnaya stability"
  UKR_por_information_resilience_desc: "Povyshenye stoykosty obshchestva k ynformatsyonnym atakam. Will strengthen medya-polytyky and zashchytu ynfrastruktury."

  UKR_por_limit_russian_info_space: "Ohranychyt rossyyskoe ynfopole"
  UKR_por_limit_russian_info_space_desc: "Sokrashchenye vlyyanyya vrazhdebnoy propahandy. Zashchytym obshchestvo ot manypulyatsyy and raskola."

  UKR_por_block_russian_services: "Zablokyrovat rossyyskye servysy"
  UKR_por_block_russian_services_desc: "Snyzhenye uyazvymosty through ohranychenyya tsyfrovykh ynstrumentov ahressora. This vopros bezopasnosty, a ne udobstva."

  UKR_por_army_language_faith: "Armyya. Yazyk. Vera."
  UKR_por_army_language_faith_desc: "Mobylyzatsyonnyy narratyv and ukreplenye vnutrenney konsolydatsyy. Focus on edynstvo, stability and smysl."

  UKR_por_autocephaly_campaign: "Kampanyya for avtokefalyyu"
  UKR_por_autocephaly_campaign_desc: "Prodvyzhenye tserkovnoy independence kak elementa suverenyteta. This and polytyka, and symvol state."

  UKR_por_tomos_PCU: "Tomos for PTsU"
  UKR_por_tomos_PCU_desc: "Ystorycheskoe oformlenye tserkovnoy independence. Will consolidate dukhovnuyu avtonomyyu kak chast suverenyteta."

  # INSTITUTIONS / ANTI-CORRUPTION
  UKR_por_create_NABU: "Sozdat NABU"
  UKR_por_create_NABU_desc: "Postroenye novoy antykorruptsyonnoy arkhytektury state. Needs orhan, kotoryy smozhet rabotat nezavysymo."

  UKR_por_create_SAPO: "Sozdat SAP"
  UKR_por_create_SAPO_desc: "Spetsyalyzyrovannoe antykorruptsyonnoe presledovanye on novom urovne. Zakroem razryv between rassledovanyem and sudom."

  UKR_por_create_NAZK: "Sozdat NAPK"
  UKR_por_create_NAZK_desc: "Profylaktyka korruptsyy and control deklaratsyy. Systemnaya proverka vazhnee razovykh kampanyy."

  UKR_por_e_declarations: "Elektronnye deklaratsyy"
  UKR_por_e_declarations_desc: "Prozrachnost dokhodov chynovnykov kak polytycheskaya norma. Pust obshchestvo vydyt, kto and on chyom nazhyvaetsya."

  UKR_por_public_procurement_reform: "Reforma hoszakupok"
  UKR_por_public_procurement_reform_desc: "Prozrachnye protsedury and snyzhenye korruptsyonnykh ryskov. Konkurentsyya vmesto dohovornyakov."

  UKR_por_state_audit_service_strengthen: "Strengthen hosaudyt"
  UKR_por_state_audit_service_strengthen_desc: "Control raskhodov and dystsyplyna byudzheta. Effektyvnost trat — this doverye lyudey."

  # ECONOMY / IMF
  UKR_por_imf_deal_stabilization: "Agreement with MVF"
  UKR_por_imf_deal_stabilization_desc: "Makroekonomycheskaya stabilization tsenoy zhyostkykh reforms. This boleznenno, no dayot shans hold ekonomyku."

  UKR_por_raise_utilities_tariffs: "Povysyt taryfy on kommunalnye usluhy"
  UKR_por_raise_utilities_tariffs_desc: "Nepopulyarnaya mera for balansyrovky systemy. Prydyotsya obyasnyat obshchestvu tsenu subsydyy and dolhov."

  UKR_por_energy_market_reform: "Reforma enerhorynka"
  UKR_por_energy_market_reform_desc: "Sozdanye konkurentnoho and prozrachnoho enerhetycheskoho sektora. Pravyla vmesto ruchnoho governance."

  UKR_por_partial_deregulation: "Chastychnaya derehulyatsyya"
  UKR_por_partial_deregulation_desc: "Snyzhenye admynystratyvnykh barerov for byznesa. Yesdym ekonomyke dyshat svobodnee."

  UKR_por_industrial_recovery_program: "Prohramma promyshlennoho vosstanovlenyya"
  UKR_por_industrial_recovery_program_desc: "Launch rosta and perezapusk proyzvodstvennykh moshchnostey. Yndustryya dolzhna rabotat on eksport and armyyu."

  UKR_por_export_push_to_eu: "Eksportnyy ryvok in EU"
  UKR_por_export_push_to_eu_desc: "Pereoryentatsyya torhovly on evropeyskye rynky. Standarty and lohystyka reshayut vsyo."

  UKR_por_hryvnia_stabilization: "Stabilization hryvny"
  UKR_por_hryvnia_stabilization_desc: "Vozvrat doveryya k natsyonalnoy valyute. Stabylnaya hryvna — this stabylnye tseny and plany."

  UKR_por_nationalize_privatbank: "Natsyonalyzatsyya PryvatBanka"
  UKR_por_nationalize_privatbank_desc: "Fynansovaya stabilization through control systemnoho banka. Ne will give obrushyt vsyu bankovskuyu systemu."

  UKR_por_infrastructure_acceleration: "Uskoryt ynfrastrukturnye proekty"
  UKR_por_infrastructure_acceleration_desc: "Dorohy and ynfrastruktura kak osnova rosta and svyaznosty. This rabochye mesta and realnaya modernization."

  UKR_por_road_corridors_to_eu: "Dorozhnye korydory in Evropu"
  UKR_por_road_corridors_to_eu_desc: "Lohystyka and transport kak realnaya yntehratsyya with EU. Bystree hruzy — sylnee ekonomyka."

  UKR_por_defense_industry_modernization: "Modernyzatsyya oboronnoy promyshlennosty"
  UKR_por_defense_industry_modernization_desc: "Rost proyzvodstva and renewal oboronnoho kompleksa. Focus on sobstvennye moshchnosty and tekhnolohyy."

  UKR_por_military_budget_increase: "Uvelychyt oboronnyy byudzhet"
  UKR_por_military_budget_increase_desc: "Kontsentratsyya resursov on bezopasnosty state. Without etoho reformy ne perezhyvut uhroz."

  UKR_por_partial_nato_standards: "Perekhod on standarty NATO (chastychno)"
  UKR_por_partial_nato_standards_desc: "Pervyy etap standartyzatsyy and strukturnykh yzmenenyy. Will begin with protsedur, obuchenyya and sovmestymosty."

  UKR_por_full_nato_standards_transition: "Polnyy perekhod on standarty NATO"
  UKR_por_full_nato_standards_transition_desc: "Zavershenye systemnoy standartyzatsyy oborony. Armyya dolzhna rabotat kak unified mekhanyzm with soyuznykamy."

  # DIPLOMACY AGAINST RUSSIA
  UKR_por_sanctions_diplomacy_against_russia: "Sanktsyonnaya dyplomatyya protyv Rossyy"
  UKR_por_sanctions_diplomacy_against_russia_desc: "Konsolydatsyya partnyorov vokruh sanktsyonnoho davlenyya. Vazhno derzhat front podderzhky edynym."

  UKR_por_anti_putin_coalition: "Antyputynskaya coalition"
  UKR_por_anti_putin_coalition_desc: "Shyrokaya set podderzhky protyv ahressora. Chem bolshe soyuznykov, tem menshe prostranstva for shantazha."

  UKR_por_international_lawsuits: "Mezhdunarodnye ysky protyv Rossyy"
  UKR_por_international_lawsuits_desc: "Yurydycheskoe davlenye and fyksatsyya responsibility. This dolhyy protsess, no on formyruet tsenu ahressyy."

  UKR_por_security_coop_anglosphere: "Bezopasnostnoe sotrudnychestvo with anhlosferoy"
  UKR_por_security_coop_anglosphere_desc: "Uhlublenye svyazey with klyuchevymy soyuznykamy. Sovmestnye prohrammy dadut oruzhye, obuchenye and razvedku."

  # FINALS
  UKR_por_europe_choice_locked_in: "European vybor zakreplyon"
  UKR_por_europe_choice_locked_in_desc: "Course on EU and NATO prevrashchaetsya in neobratymuyu stratehyyu. Teper otkat nazad stanet polytychesky nevozmozhnym."

  UKR_por_eu_nato_victory: "Victory: EU and NATO"
  UKR_por_eu_nato_victory_desc: "Ukraine zakreplyaet sebya in zapadnom myre — polytychesky, ynstytutsyonalno and voenno. This ytoh dolhoho puty and tsena, kotoruyu we zaplatyly."

  UKR_por_eu_public_admin_reform: "Reforma hosupravlenyya po standartam EU"
  UKR_por_eu_public_admin_reform_desc: "Systemnaya perestroyka ynstytutov for European kachestva governance. Uberyom khaos and will strengthen servys for hrazhdan."

  UKR_por_eu_civil_service_law: "Zakon o hossluzhbe"
  UKR_por_eu_civil_service_law_desc: "Professyonalyzatsyya and depolytyzatsyya hosudarstvennoy sluzhby. Karera po pravylam, a ne po svyazyam."

  UKR_por_eu_e_governance: "Elektronnoe hosudarstvo"
  UKR_por_eu_e_governance_desc: "Tsyfrovyzatsyya governance and servysov for hrazhdan. Menshe bumahy — menshe korruptsyy and bystree decisions."

  UKR_por_eu_competition_policy: "Polytyka konkurentsyy EU"
  UKR_por_eu_competition_policy_desc: "Ukreplenye chestnoy konkurentsyy and rynka. Monopolyy budut slabet, byznes — rasty."

  UKR_por_eu_state_aid_rules: "Pravyla hospomoshchy"
  UKR_por_eu_state_aid_rules_desc: "Pryvedenye mekhanyzmov podderzhky k evropeyskym normam. Pomoshch dolzhna byt prozrachnoy and chestnoy."

  UKR_por_eu_anti_monopoly_enforcement: "Antymonopolnoe pravoprymenenye"
  UKR_por_eu_anti_monopoly_enforcement_desc: "Realnoe prymenenye pravyl protyv monopolyy. Zakony dolzhny rabotat, a ne lezhat on polke."

  UKR_por_eu_food_safety: "Evropeyskye standarty pyshchevoy bezopasnosty"
  UKR_por_eu_food_safety_desc: "Harmonyzatsyya norm kachestva and bezopasnosty produktsyy. This doverye potrebyteley and dostup k rynkam."

  UKR_por_eu_agri_exports: "Rasshyryt ahroeksport in EU"
  UKR_por_eu_agri_exports_desc: "Preodolenye barerov and rost eksporta. Ukrepym pozytsyy on evropeyskom rynke."

  UKR_por_eu_industry_certification: "European sertyfykatsyya promyshlennosty"
  UKR_por_eu_industry_certification_desc: "Edynye standarty kachestva for vykhoda on rynky EU. Sertyfykatsyya otkroet dvery for ukraynskoy produktsyy."

  UKR_por_nato_c2_modernization: "Modernyzatsyya governance and svyazy (C2)"
  UKR_por_nato_c2_modernization_desc: "Sovremennye systemy governance and koordynatsyy voysk. Bystree svyaz — bystree decisions."

  UKR_por_nato_medical_support: "Medytsynskoe obespechenye po standartam NATO"
  UKR_por_nato_medical_support_desc: "Povyshenye vyzhyvaemosty and effektyvnosty armyy. Podhotovka, evakuatsyya and snabzhenye dolzhny rabotat without sboev."

  UKR_por_nato_engineer_units: "Ynzhenernye podrazdelenyya new obraztsa"
  UKR_por_nato_engineer_units_desc: "Fortyfykatsyya, razmynyrovanye and podderzhka operatsyy. Ynzhenery — this speed and bezopasnost on fronte."

  UKR_por_nato_nco_corps: "Korpus serzhantov"
  UKR_por_nato_nco_corps_desc: "Professyonalnyy korpus NSO kak osnova boesposobnosty. Serzhanty derzhat poryadok and obuchayut soldat."

  UKR_por_nato_procurement_standards: "Standarty zakupok NATO"
  UKR_por_nato_procurement_standards_desc: "Prozrachnye zakupky and sovmestymost postavok. Denhy dolzhny prevrashchatsya in result, a ne in skhemy."

  UKR_por_nato_ammunition_supply: "Stabylnoe snabzhenye boeprypasamy"
  UKR_por_nato_ammunition_supply_desc: "Rasshyrenye proyzvodstva and lohystyky. Boeprypasy — this stability oborony kazhdyy den."

  UKR_por_eu_nato: "European Dream"
  UKR_por_eu_nato_desc: "Ukraine zakreplyaet svoyo mesto in evropeyskoy seme and systeme kollektyvnoy bezopasnosty. This ne symvolyka, a rabotayushchye pravyla, zashchyta and vozmozhnosty for lyudey. Posle let reforms and poter we vybyraem normalnuyu zhyzn doma — with dostoynstvom and spravedlyvostyu."
