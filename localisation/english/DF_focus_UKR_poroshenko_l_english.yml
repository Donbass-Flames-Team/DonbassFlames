l_english:

 UKR_poroshenko_victory: "Poroshenko's Victory"
 UKR_poroshenko_victory_desc: "The elections are over; the country needs a clear course and a single center of responsibility. We will consolidate the legitimacy of power and begin building a pro-European majority. This is the starting point for reforms and a foreign policy pivot."

 UKR_por_2014_parliamentary_election: "2014 Parliamentary Elections"
 UKR_por_2014_parliamentary_election_desc: "Renewal of the Verkhovna Rada and the formation of a new political majority. The result will determine the speed of reforms and the stability of the government."

 UKR_por_european_ukraine_coalition: "European Ukraine Coalition"
 UKR_por_european_ukraine_coalition_desc: "Gather pro-European forces into a coalition and establish a common action plan. Without a majority in the Rada, reforms will remain mere words."

 UKR_por_support_yatsenyuk_government: "Support the Yatsenyuk Government"
 UKR_por_support_yatsenyuk_government_desc: "The reformist cabinet must hold the country together and launch changes. We will provide the political support needed to push through difficult crisis decisions."

 UKR_por_support_groysman_government: "Support the Groysman Government"
 UKR_por_support_groysman_government_desc: "Stabilization of governance and continuation of the reform course. A bet on pragmatic solutions and oversight of implementation."

 UKR_por_keep_semi_presidential_model: "Maintain the Semi-Presidential Model"
 UKR_por_keep_semi_presidential_model_desc: "Preserving the balance of branches of power for the sake of state manageability. This is a compromise between strong executive power and parliamentary oversight."

 UKR_por_cadre_rotations: "Personnel Rotations"
 UKR_por_cadre_rotations_desc: "Reformatting the management vertical for the new political course. We will refresh key appointments, strengthening discipline and accountability."

 # EU BRANCH
 UKR_por_association_agreement_EU: "EU Association Agreement"
 UKR_por_association_agreement_EU_desc: "Secure the strategic European choice and institutional integration. This is the framework through which the country will rebuild its rules and markets."

 UKR_por_dcfta_launch: "Launch of DCFTA"
 UKR_por_dcfta_launch_desc: "The Deep and Comprehensive Free Trade Area is the economic foundation of European integration. We will open markets and begin aligning standards."

 UKR_por_adopt_eu_directives_1: "Implement EU Directives I"
 UKR_por_adopt_eu_directives_1_desc: "The first package of legislative harmonization with European Union norms. We begin bringing our rules to a common European standard."

 UKR_por_adopt_eu_directives_2: "Implement EU Directives II"
 UKR_por_adopt_eu_directives_2_desc: "The second package of harmonization—systemic changes in regulation and management. We will strengthen institutions and implementation oversight."

 UKR_por_adopt_eu_directives_3: "Implement EU Directives III"
 UKR_por_adopt_eu_directives_3_desc: "The third package of harmonization—completion of the basic alignment of rules. This prepares us for deeper stages of convergence with the EU."

 UKR_por_customs_modernization: "Customs Modernization"
 UKR_por_customs_modernization_desc: "Updating procedures and control mechanisms according to European standards. Fewer grey schemes mean more transparent trade."

 UKR_por_border_management_eu: "European Border Management"
 UKR_por_border_management_eu_desc: "Strengthening infrastructure and procedures at the border. We will make crossings safer and more predictable."

 UKR_por_visa_free_regime: "Visa-Free Regime"
 UKR_por_visa_free_regime_desc: "A practical result of integration—freedom of movement for citizens. This is the trust earned through reforms."

 UKR_por_eu_energy_integration: "Integration into the EU Energy Market"
 UKR_por_eu_energy_integration_desc: "Alignment of rules, grids, and standards with the European energy system. We will reduce dependency and strengthen resilience."

 UKR_por_unbundle_energy_sector: "Energy Sector Unbundling"
 UKR_por_unbundle_energy_sector_desc: "Separation of functions and increased market transparency. We will create clear rules and reduce monopolism."

 UKR_por_eu_transport_corridors: "Transport Corridors to Europe"
 UKR_por_eu_transport_corridors_desc: "Infrastructural connectivity with the EU as a strategic priority. Roads and logistics represent real integration."

 UKR_por_eu_macro_financial_aid: "EU Macro-Financial Assistance"
 UKR_por_eu_macro_financial_aid_desc: "Budgetary support and reform backing through European mechanisms. We receive resources, but also obligations for change."

 UKR_por_eu_investment_platform: "European Investment Platform"
 UKR_por_eu_investment_platform_desc: "Launch of investment programs and economic recovery. We will attract capital and accelerate modernization."

 UKR_por_eu_reforms_monitoring: "EU-Standard Reform Monitoring"
 UKR_por_eu_reforms_monitoring_desc: "Formalization of oversight for the implementation of obligations and roadmaps. Transparency of progress is the key to trust."

 UKR_por_eu_candidate_application: "Apply for Candidate Status"
 UKR_por_eu_candidate_application_desc: "A political step: a request for recognition of our Euro-integration path. Next come negotiations and hard work on the chapters."

 UKR_por_eu_candidate_negotiations: "Candidate Status Negotiations"
 UKR_por_eu_candidate_negotiations_desc: "Agreement on the conditions and framework for future membership. The pace of reforms and the support of partners are vital."

 UKR_por_open_eu_chapters_justice: "Open Chapters: Justice"
 UKR_por_open_eu_chapters_justice_desc: "Judicial and legal standards are the key to Europe's trust. We will strengthen the independence and predictability of the system."

 UKR_por_open_eu_chapters_economy: "Open Chapters: Economy"
 UKR_por_open_eu_chapters_economy_desc: "Unified market rules and a competitive environment. This protects investments and increases opportunities."

 UKR_por_open_eu_chapters_security: "Open Chapters: Security"
 UKR_por_open_eu_chapters_security_desc: "Alignment of security systems and risk management. Strong institutions are the foundation of resilience."

 UKR_por_eu_pre_accession_funds: "EU Pre-Accession Funds"
 UKR_por_eu_pre_accession_funds_desc: "Funding for reforms and modernization prior to membership. We will use these funds for infrastructure and institutions."

 UKR_por_eu_accession_treaty: "EU Accession Treaty"
 UK_por_eu_accession_treaty_desc: "The final politico-legal document of membership. The last step before the historic decision."

 UKR_por_join_european_union: "Join the European Union"
 UK_por_join_european_union_desc: "An historic victory: Ukraine becomes part of the EU. This means new rules, new opportunities, and a new guarantee for the future."

 # NATO BRANCH
 UKR_por_nato_cooperation_no_membership: "Cooperation with NATO"
 UKR_por_nato_cooperation_no_membership_desc: "Convergence with the Alliance through practical programs and dialogue. We begin with joint projects and building trust."

 UKR_por_nato_trust_building: "Build Trust with NATO"
 UKR_por_nato_trust_building_desc: "Constant contact and partnerships are the basis for future membership. The more compatibility there is, the lower the risks."

 UKR_por_defense_institutions_reform: "Reform of Defense Institutions"
 UKR_por_defense_institutions_reform_desc: "Restructuring defense management according to modern standards. We will strengthen planning, oversight, and accountability."

 UKR_por_nato_interoperability_program: "Interoperability Program"
 UKR_por_nato_interoperability_program_desc: "Interoperability with NATO forces at the procedural and planning levels. Preparing to act according to common rules."

 UKR_por_joint_exercises_and_training: "Joint Exercises and Training"
 UKR_por_joint_exercises_and_training_desc: "Improving the quality of troops through joint drills. Practice is more important than declarations."

 UKR_por_secure_communication_standards: "Secure Communication Standards"
 UKR_por_secure_communication_standards_desc: "Unified protocols and protected communication channels. This increases the manageability and survivability of the army."

 UKR_por_nato_logistics_reform: "Logistics Reform"
 UKR_por_nato_logistics_reform_desc: "Supply, repair, and stockpile management according to NATO standards. There is no sustainable defense without logistics."

 UKR_por_nato_officer_corps_training: "Officer Corps Training"
 UKR_por_nato_officer_corps_training_desc: "Systemic training for the command staff. The quality of decisions begins with the quality of education."

 UKR_por_civilian_control_of_military: "Civilian Control of the Military"
 UKR_por_civilian_control_of_military_desc: "The democratic principle of defense management as required by the Alliance. We will increase transparency and accountability."

 UKR_por_nato_anti_corruption_in_defense: "Anti-Corruption in the Defense Sector"
 UKR_por_nato_anti_corruption_in_defense_desc: "Transparency in procurement and management is the key to partners' trust. We will close loopholes and strengthen oversight."

 UKR_por_nato_map_request: "Request a MAP"
 UKR_por_nato_map_request_desc: "A formal request for a Membership Action Plan. This is a signal that we are ready to go all the way."

 UKR_por_nato_map_granted: "Receive a MAP"
 UKR_por_nato_map_granted_desc: "Political recognition of progress and the launch of the membership process. Now everything depends on the pace of reforms."

 UKR_por_nato_accession_protocols: "Accession Protocols"
 UKR_por_nato_accession_protocols_desc: "The legal formalization of joining the Alliance. We will prepare the documents and secure allies' support."

 UKR_por_nato_membership_vote: "Ratification of Membership"
 UKR_por_nato_membership_vote_desc: "The final stage—ratification and agreement of terms. We will secure the decision at the legislative level."

 UKR_por_join_nato: "Join NATO"
 UKR_por_join_nato_desc: "An historic victory: Ukraine becomes a member of the North Atlantic Alliance. This is a guarantee of security and a common shield."

 # COURSE / IDENTITY
 UKR_por_no_multivector_policy: "Abandonment of Multi-Vector Policy"
 UKR_por_no_multivector_policy_desc: "A clear foreign policy line: EU and NATO as the priority. Half-measures no longer work."

 UKR_por_constitution_EU_NATO_course: "Enshrine EU/NATO Course in Constitution"
 UKR_por_constitution_EU_NATO_course_desc: "Legal anchoring of the strategic choice as irreversible. This protects the course from rollbacks."

 UKR_por_decommunization_laws: "Decommunization Laws"
 UKR_por_decommunization_laws_desc: "Breaking with the Soviet legacy and rethinking memory politics. Symbols and rules must reflect modern Ukraine."

 UKR_por_rename_cities_and_streets: "Rename Cities and Streets"
 UKR_por_rename_cities_and_streets_desc: "Symbolic change of public space. We will anchor the new identity in everyday life."

 UKR_por_remove_soviet_symbols: "Remove Soviet Symbols"
 UKR_por_remove_soviet_symbols_desc: "Dismantling symbols of the past for the sake of a new identity. This is a step toward an independent historical policy."

 UKR_por_state_language_policy: "State Language Policy"
 UKR_por_state_language_policy_desc: "Strengthening national identity and the cultural space. The state language is the foundation of unity."

 UKR_por_information_resilience: "Information Resilience"
 UKR_por_information_resilience_desc: "Increasing society's resilience to information attacks. We will strengthen media policies and infrastructure protection."

 UKR_por_limit_russian_info_space: "Limit Russian Info-Space"
 UKR_por_limit_russian_info_space_desc: "Reducing the influence of hostile propaganda. We will protect society from manipulation and division."

 UKR_por_block_russian_services: "Block Russian Services"
 UKR_por_block_russian_services_desc: "Reducing vulnerability through restrictions on the aggressor's digital tools. This is a matter of security, not convenience."

 UKR_por_army_language_faith: "Army! Language! Faith!"
 UKR_por_army_language_faith_desc: "A mobilization narrative and strengthening internal consolidation. A bet on unity, resilience, and meaning."

 UKR_por_autocephaly_campaign: "Campaign for Autocephaly"
 UKR_por_autocephaly_campaign_desc: "Promoting church independence as an element of sovereignty. This is both politics and a symbol of the state."

 UKR_por_tomos_PCU: "Tomos for the OCU"
 UKR_por_tomos_PCU_desc: "The historic formalization of church independence. We will secure spiritual autonomy as part of sovereignty."

 # INSTITUTIONS / ANTI-CORRUPTION
 UKR_por_create_NABU: "Create NABU"
 UKR_por_create_NABU_desc: "Building a new anti-corruption architecture for the state. We need a body that can operate independently."

 UKR_por_create_SAPO: "Create SAPO"
 UKR_por_create_SAPO_desc: "Specialized anti-corruption prosecution on a new level. Closing the gap between investigation and trial."

 UKR_por_create_NAZK: "Create NAPC"
 UKR_por_create_NAZK_desc: "Prevention of corruption and oversight of asset declarations. Systemic verification is more important than one-off campaigns."

 UKR_por_e_declarations: "Electronic Declarations"
 UKR_por_e_declarations_desc: "Transparency of officials' income as a political norm. Let society see who is profiting from what."

 UKR_por_public_procurement_reform: "Public Procurement Reform"
 UKR_por_public_procurement_reform_desc: "Transparent procedures and reduction of corruption risks. Competition instead of backroom deals."

 UKR_por_state_audit_service_strengthen: "Strengthen State Audit"
 UKR_por_state_audit_service_strengthen_desc: "Expenditure control and budget discipline. The efficiency of spending is what builds people's trust."

 # ECONOMY / IMF
 UKR_por_imf_deal_stabilization: "IMF Agreement"
 UKR_por_imf_deal_stabilization_desc: "Macroeconomic stabilization at the cost of tough reforms. This is painful, but it gives us a chance to hold the economy together."

 UKR_por_raise_utilities_tariffs: "Raise Utility Tariffs"
 UKR_por_raise_utilities_tariffs_desc: "An unpopular measure to balance the system. We will have to explain to society the cost of subsidies and debt."

 UKR_por_energy_market_reform: "Energy Market Reform"
 UKR_por_energy_market_reform_desc: "Creating a competitive and transparent energy sector. Rules instead of manual control."

 UKR_por_partial_deregulation: "Partial Deregulation"
 UKR_por_partial_deregulation_desc: "Reducing administrative barriers for business. Let the economy breathe more freely."

 UKR_por_industrial_recovery_program: "Industrial Recovery Program"
 UKR_por_industrial_recovery_program_desc: "Launching growth and restarting production facilities. Industry must work for export and the army."

 UKR_por_export_push_to_eu: "Export Push to the EU"
 UKR_por_export_push_to_eu_desc: "Reorienting trade toward European markets. Standards and logistics are everything."

 UKR_por_hryvnia_stabilization: "Hryvnia Stabilization"
 UKR_por_hryvnia_stabilization_desc: "Restoring trust in the national currency. A stable hryvnia means stable prices and plans."

 UKR_por_nationalize_privatbank: "Nationalization of PrivatBank"
 UKR_por_nationalize_privatbank_desc: "Financial stabilization through control of a systemic bank. We won't allow the entire banking system to collapse."

 UKR_por_infrastructure_acceleration: "Accelerate Infrastructure Projects"
 UKR_por_infrastructure_acceleration_desc: "Roads and infrastructure as the basis for growth and connectivity. These are jobs and real modernization."

 UKR_por_road_corridors_to_eu: "Road Corridors to Europe"
 UKR_por_road_corridors_to_eu_desc: "Logistics and transport as real integration with the EU. Faster cargo—stronger economy."

 UKR_por_defense_industry_modernization: "Modernization of the Defense Industry"
 UKR_por_defense_industry_modernization_desc: "Growth in production and renewal of the defense complex. A bet on domestic capacity and technology."

 UKR_por_military_budget_increase: "Increase Defense Budget"
 UKR_por_military_budget_increase_desc: "Concentrating resources on state security. Without this, reforms will not survive the threats."

 UKR_por_partial_nato_standards: "Start the Transition to NATO Standards"
 UKR_por_partial_nato_standards_desc: "The first stage of standardization and structural changes. We start with procedures, training, and compatibility."

 UKR_por_full_nato_standards_transition: "Full Transition to NATO Standards"
 UKR_por_full_nato_standards_transition_desc: "Completion of systemic defense standardization. The army must work as a single mechanism with allies."

 # DIPLOMACY AGAINST RUSSIA
 UKR_por_sanctions_diplomacy_against_russia: "Sanctions Diplomacy against Russia"
 UKR_por_sanctions_diplomacy_against_russia_desc: "Consolidation of partners around sanctions pressure. It is vital to keep the support front unified."

 UKR_por_anti_putin_coalition: "Anti-Putin Coalition"
 UKR_por_anti_putin_coalition_desc: "A broad network of support against the aggressor. The more allies we have, the less room there is for blackmail."

 UKR_por_international_lawsuits: "International Lawsuits against Russia"
 UKR_por_international_lawsuits_desc: "Legal pressure and establishing accountability. This is a long process, but it sets the price of aggression."

 UKR_por_security_coop_anglosphere: "Security Cooperation with the Anglosphere"
 UKR_por_security_coop_anglosphere_desc: "Deepening ties with key allies. Joint programs will provide weapons, training, and intelligence."

 # FINALS
 UKR_por_europe_choice_locked_in: "European Choice Locked In"
 UKR_por_europe_choice_locked_in_desc: "The course toward the EU and NATO becomes an irreversible strategy. Now, a rollback will be politically impossible."

 UKR_por_eu_nato_victory: "Victory: EU and NATO"
 UKR_por_eu_nato_victory_desc: "Ukraine cements itself in the Western world—politically, institutionally, and militarily. This is the result of a long journey and the price we paid."

 UKR_por_eu_public_admin_reform: "Public Admin Reform by EU Standards"
 UKR_por_eu_public_admin_reform_desc: "Systemic restructuring of institutions for the sake of European-quality management. We will remove chaos and strengthen services for citizens."

 UKR_por_eu_civil_service_law: "Law on Civil Service"
 UKR_por_eu_civil_service_law_desc: "Professionalization and de-politicization of state service. A career based on rules, not connections."

 UKR_por_eu_e_governance: "E-Governance"
 UKR_por_eu_e_governance_desc: "Digitalization of management and services for citizens. Less paper means less corruption and faster decisions."

 UKR_por_eu_competition_policy: "EU Competition Policy"
 UKR_por_eu_competition_policy_desc: "Strengthening fair competition and the market. Monopolies will weaken; business will grow."

 UKR_por_eu_state_aid_rules: "State Aid Rules"
 UKR_por_eu_state_aid_rules_desc: "Aligning support mechanisms with European norms. Aid must be transparent and fair."

 UKR_por_eu_anti_monopoly_enforcement: "Anti-Monopoly Enforcement"
 UKR_por_eu_anti_monopoly_enforcement_desc: "Real enforcement of rules against monopolies. Laws must work, not just sit on a shelf."

 UKR_por_eu_food_safety: "European Food Safety Standards"
 UKR_por_eu_food_safety_desc: "Harmonization of quality and product safety norms. This means consumer trust and market access."

 UKR_por_eu_agri_exports: "Expand Agri-Exports to the EU"
 UKR_por_eu_agri_exports_desc: "Overcoming barriers and growing exports. We will strengthen our position in the European market."

 UKR_por_eu_industry_certification: "European Industrial Certification"
 UKR_por_eu_industry_certification_desc: "Unified quality standards for entering EU markets. Certification will open doors for Ukrainian products."

 UKR_por_nato_c2_modernization: "Modernization of Command and Control"
 UKR_por_nato_c2_modernization_desc: "Modern systems for commanding and coordinating troops. Faster communication means faster decisions."

 UKR_por_nato_medical_support: "Medical Support by NATO Standards"
 UKR_por_nato_medical_support_desc: "Increasing the survivability and efficiency of the army. Training, evacuation, and supply must work without failure."

 UKR_por_nato_engineer_units: "New-Model Engineering Units"
 UKR_por_nato_engineer_units_desc: "Fortification, demining, and operations support. Engineers mean speed and safety at the front."

 UKR_por_nato_nco_corps: "Non-Commissioned Officer Corps"
 UKR_por_nato_nco_corps_desc: "A professional NCO corps as the backbone of combat readiness. Sergeants maintain order and train the soldiers."

 UKR_por_nato_procurement_standards: "NATO Procurement Standards"
 UKR_por_nato_procurement_standards_desc: "Transparent procurement and supply compatibility. Money must translate into results, not schemes."

 UKR_por_nato_ammunition_supply: "Stable Ammunition Supply"
 UKR_por_nato_ammunition_supply_desc: "Expanding production and logistics. Ammunition is the foundation of daily defense resilience."

 UKR_por_eu_nato: "European Dream"
 UKR_por_eu_nato_desc: "Ukraine secures its place in the European family and the collective security system. This is not about symbolism, but working rules, protection, and opportunities for people. After years of reforms and losses, we choose a normal life at home—with dignity and justice."
