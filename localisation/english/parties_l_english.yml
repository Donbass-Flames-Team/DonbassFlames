 liberalism:0 "Liberalism"
 liberalism_desc:0 "Liberal democracy defends individual freedom, the rule of law, and human rights as the core values of the state. Its priority is protecting free elections, the independence of the judiciary, and the press. This system assumes minimal state interference in the personal and economic life of citizens. Liberal democracy strives for a balance between individual freedom and the common good, while actively supporting globalism, expanded human rights, and progressiveness."

 social_democracy:0 "Social Democracy"
 social_democracy_desc:0 "Social democracy seeks to create an equal society by combining a market economy with strong social guarantees. Its core idea is the redistribution of wealth to reduce economic inequality and ensure decent living conditions for all. Social democrats advocate progressive taxation, accessible healthcare and education, as well as the protection of labor rights and, often, the environment."

 conservatism:0 "Conservatism"
 conservatism_desc:0 "Conservative democracy combines adherence to democratic principles with respect for traditional values such as family, religion, and order. This ideology aims to preserve the foundations of society, strengthen national sovereignty and stability through gradual, cautious reforms rather than radical change. It supports a strong state and emphasizes the importance of shared historical and cultural roots."

 autoritarian_democractic:0 "Avtorytarnaya Demokratyya"
 autoritarian_democractic_desc:0 "Avtorytarnaya demokratyya predstavlyaet soboy compromise between elementamy demokratyy and zhyostkym tsentralyzovannym upravlenyem. In ney sokhranyayutsya elections (kotorye, vprochem, praktychesky vsehda falsyfytsyruyutsya and nuzhny lysh for sozdanyya vydymosty demokratyy) and pryntsypy razdelenyya vlastey, no oppozytsyya ohranychyvaetsya, a prava and svobody hrazhdan chasto podavlyayutsya for sokhranenyya poryadka and kontrolya. Eta systema obespechyvaet stabylnost, no tsenoy polytycheskykh svobod and obshchestvennoho mnohoobrazyya. Neredko avtorytarnaya demokratyya pryvodyt k poyavlenyyu populystskoy (chashche vseho tsentrystskoy and apolytychnoy) dyktatury."

 communistic:0 "Kommunyzm"
 communistic_desc:0 "Kommunyzm provozhlashaet ydeal bezklassovoho obshchestva, in kotorom sredstva proyzvodstva prynadlezhat vsemu narodu, a resursy raspredelyayutsya po potrebnostyam. Eta ydeolohyya otverhaet chastnuyu sobstvennost and rynochnuyu ekonomyku, zamenyaya ykh tsentralyzovannym planyrovanyem. Kommunyzm predlahaet radykalnuyu transformatsyyu obshchestva, chasto through revolyutsyyu, and aktsentyruet vnymanye on borbe rabocheho klassa protyv ekspluatatsyy."

 socialistic:0 "Sotsyalyzm"
 socialistic_desc:0 "Sotsyalyzm predstavlyaet soboy ydeolohyyu, stremyashchuyusya k sotsyalnoy spravedlyvosty and ravenstvu putyom usylenyya roly state in ekonomyke. Pry etom dopuskaetsya sokhranenye nekotorykh otdelnykh rynochnykh mekhanyzmov, no vse key otrasly and resursy kontrolyruyutsya hosudarstvom. Sotsyalyzm vystupaet for dostupnost bazovykh blah, sotsyalnykh usluh and protyv chrezmernoy kontsentratsyy kapytala in rukakh otdelnykh hrupp. Zachastuyu sotsyalyzm yavlyaetsya etapom, predshestvuyushchym kommunyzmu."


 nationalistic:0 "Natsyonalyzm"
 nationalistic_desc:0 "Natsyonalyzm aktsentyruet vnymanye on ynteresakh sobstvennoho naroda and stremlenyy ukrepyt natsyonalnuyu ydentychnost. On mozhet prynymat raznye formy — ot kulturnoho edynstva and hrazhdanskoho natsyonalyzma do radykalnoho, ahressyvnoho prevoskhodstva odnoy natsyonalnosty (yly etnycheskoy hruppy) nad druhoy. Eta ydeolohyya chasto stavyt ynteresy state vyshe mezhdunarodnoho sotrudnychestva and prodvyhaet ydey zashchyty suverenyteta, natsyonalnoy (suverennoy) ekonomyky and terrytoryalnoy tselostnosty."

 fascism_ideology:0 "Fascism"
 fascism_ideology_desc:0 "Fascism is a radical totalitarian ideology that rejects democracy and liberalism in favor of complete state control over citizens in all spheres of life. It is based on a cult of personality (leaderism), militarism, and radical nationalism. Fascism emphasizes national unity through the suppression of dissent, a rigid social hierarchy, and aggressive foreign policy, usually aimed at territorial expansion."

 nazism:0 "Nazism"
 nazism_desc:0 "Natsyonal-sotsyalyzm — this krayne radykalnaya forma fashyzma, osnovannaya on psevdonauchnykh teoryyakh rasovoho prevoskhodstva and antysemytyzme. Ydeolohyya natsyzma podrazumevaet zhestkoe totalytarnoe upravlenye, stremlenye k zakhvatu «zhyznennoho prostranstva» for «vysshey rasy» and polnoe yskorenenye lyubykh form political yly etnycheskoho ynakomyslyya. In otlychye ot klassycheskoho fashyzma, natsyzm stavyt rasovuyu ydentychnost vyshe hosudarstvennoy."


 UKR_fascism_party:0 "Right Sector"
 UKR_fascism_party_desc:0 "«Pravyy sektor» voznyk kak obedynenye radykalnykh natsyonalystycheskykh orhanyzatsyy in khode sobytyy Evromaydana. Dvyzhenye vystupaet for zhestkuyu natsyonalnuyu polytyku, reshytelnuyu borbu with rossyyskym vlyyanyem and formation Ukraine kak unytarnoho natsyonalnoho state. Partyya opyraetsya on dobrovolcheskye formyrovanyya and pryderzhyvaetsya ydealov ukraynskoho natsyonalyzma nachala XX veka."

 UKR_conservatism_democratic_party_batkivshchyna:0 "Batkyvshchyna"
 UKR_conservatism_democratic_party_batkivshchyna_desc:0 "Vseukraynskoe obedynenye «Batkyvshchyna» — stareyshaya parlamentskaya partyya sovremennoy Ukraine, vozhlavlyaemaya Yulyey Tymoshenko. Partyya pryderzhyvaetsya proevropeyskoho kursa, sochetaya konservatyvnye vzhlyady on kulturu and tradytsyy with sotsyalno-oryentyrovannoy ekonomycheskoy prohrammoy, chasto prybehaya k populystskoy rytoryke."

 UKR_communism_party:0 "CPU"
 UKR_communism_party_desc:0 "Kommunystycheskaya partyya Ukraine yavlyaetsya ydeolohycheskoy preemnytsey sovetskoy kompartyy. Ona vystupaet for vosstanovlenye hosudarstvennoho kontrolya nad ekonomykoy, tesnyy soyuz with Rossyey and sokhranenye sovetskoho kulturnoho nasledyya. In uslovyyakh sovremennoho kryzysa partyya stolknulas with zhestkym davlenyem so storony vlastey and radykalnykh hrupp."

 UKR_autoritarian_democracy_party:0 "Party of Regions"
 #UKR_autoritarian_democracy_party_desc:0 "For a long time, the Party of Regions was the largest political force representing the interests of the industrial East and South of Ukraine. Relying on the support of big business and the Russian-speaking population, the party advocated pragmatic relations with Russia and the preservation of the country's non-aligned status, until the internal crisis and the flight of its leader led to the effective collapse of the structure."

 UKR_conservatism_democracy_party_bpp:0 "Blok Petra Poroshenko"
 UKR_conservatism_democracy_party_bpp_desc:0 "Blok Petra Poroshenko «Solydarnost» byl sformyrovan kak shyrokaya coalition in podderzhku kursa pyatoho prezydenta Ukraine. Osnovnymy stolpamy partyy staly lozunhy «Armyya, Yazyk, Vera», napravlennye on ukreplenye natsyonalnoy ydentychnosty, yntehratsyyu in NATO and EU, a takzhe provedenye rynochnykh reforms in uslovyyakh voennoho konflykta."


 RUS_autoritarian_democracy_party:0 "United Russia"
 #RUS_autoritarian_democracy_party_desc:0 ""United Russia" is the so-called "party of power", ensuring political stability and support for the president's course. The party's program is based on centrism, strengthening the "vertical of power", state patriotism, and the preservation of traditional values. Possessing an overwhelming majority in parliament, it is the main instrument for implementing state policy."
