 liberalism: "Liberalism"
 liberalism_desc: "Liberal democracy defends individual freedom, the rule of law, and human rights as the core values of the state. Its priority is protecting free elections, the independence of the judiciary, and the press. This system assumes minimal state interference in the personal and economic life of citizens. Liberal democracy strives for a balance between individual freedom and the common good, while actively supporting globalism, expanded human rights, and progressiveness."

 social_democracy: "Social Democracy"
 social_democracy_desc: "Social democracy seeks to create an equal society by combining a market economy with strong social guarantees. Its core idea is the redistribution of wealth to reduce economic inequality and ensure decent living conditions for all. Social democrats advocate progressive taxation, accessible healthcare and education, as well as the protection of labor rights and, often, the environment."

 conservatism: "Conservatism"
 conservatism_desc: "Conservative democracy combines adherence to democratic principles with respect for traditional values such as family, religion, and order. This ideology aims to preserve the foundations of society, strengthen national sovereignty and stability through gradual, cautious reforms rather than radical change. It supports a strong state and emphasizes the importance of shared historical and cultural roots."

 authoritarian_democracy: "Authoritarian Democracy"
 authoritarian_democracy_desc: "Authoritarian democracy represents a compromise between democratic elements and rigid centralized control. Elections remain (though they are almost always falsified and serve only to create the appearance of democracy), as do principles of separation of powers, but the opposition is restricted, and citizens' rights and freedoms are often suppressed in the name of order and control. This system ensures stability but at the cost of political freedoms and social diversity. Frequently, authoritarian democracy leads to the rise of a populist dictatorship, usually centrist and apolitical."

 communism: "Communism"
 communism_desc: "Communism proclaims the ideal of a classless society in which the means of production belong to the people as a whole, and resources are distributed according to needs. This ideology rejects private property and the market economy, replacing them with centralized planning. Communism calls for radical social transformation, often through revolution, and focuses on the struggle of the working class against exploitation."

 socialism: "Socialism"
 socialism_desc: "Socialism is an ideology that strives for social justice and equality by strengthening the role of the state in the economy. Some market mechanisms may remain, but all key sectors and resources are controlled by the state. Socialism advocates for accessible basic goods and social services and opposes the excessive concentration of capital in the hands of a few groups. It is often viewed as a transitional stage preceding communism."


 nationalism: "Nationalism"
 nationalism_desc: "Nationalism emphasizes the interests of one’s own people and the strengthening of national identity. It can take various forms — from cultural unity and civic nationalism to radical, aggressive superiority of one nationality (or ethnic group) over others. This ideology often prioritizes the interests of the state above international cooperation and promotes the protection of sovereignty, a national economy, and territorial integrity."

 fascism_ideology: "Fascism"
 fascism_ideology_desc: "Fascism is a radical totalitarian ideology that rejects democracy and liberalism in favor of complete state control over citizens in all spheres of life. It is based on a cult of personality (leaderism), militarism, and radical nationalism. Fascism emphasizes national unity through the suppression of dissent, a rigid social hierarchy, and aggressive foreign policy, usually aimed at territorial expansion."

 nazism: "Nazism"
 nazism_desc: "National Socialism is an extremely radical form of fascism, based on pseudoscientific theories of racial superiority and anti-Semitism. Nazi ideology embraces strict totalitarian rule, the pursuit of 'living space' for a 'master race,' and the complete eradication of any form of political or ethnic dissent. Unlike classical fascism, Nazism places racial identity above national identity."

