l_english:
  world_events.1.t:0 "Scottish Independence Referendum"
  world_events.1.d:0 "The Scottish independence referendum took place on September 18, 2014. Voters were asked: 'Should Scotland be an independent country?' with the answer options 'Yes' and 'No'. The franchise included residents of Scotland, including EU and Commonwealth citizens permanently living in the region, and for the first time in a UK-wide vote, 16- and 17-year-olds. Turnout reached 84.6%, one of the highest in modern British history. Independence was rejected by 55.3% (2,001,926 votes), while 44.7% (1,617,989 votes) voted in favor. After the defeat of the independence camp, First Minister Alex Salmond announced his resignation. In the referendum's aftermath, the British authorities initiated a further devolution of powers to the Scottish Parliament, later enshrined by subsequent legislation."
  world_events.1.a:0 "Understood"
  world_events.2.t:0 "Ebola Outbreak in West Africa"
  world_events.2.d:0 "The West African Ebola outbreak began in late 2013 in southeastern Guinea and was officially declared by the WHO on March 23, 2014. The disease later spread primarily to Guinea, Liberia, and Sierra Leone, where the main epidemic centers emerged. On August 8, 2014, the WHO declared the situation a Public Health Emergency of International Concern. As part of the international response, on September 19, 2014, the UN created UNMEER, the first emergency health mission in UN history. According to the WHO, more than 28,600 infections and 11,325 deaths were recorded in total. In June 2016, the WHO declared the outbreak over."
  world_events.2.a:0 "Concerning"
  world_events.3.t:0 "ISIS"
  world_events.3.d:0 "In June 2014, the radical Islamist organization Islamic State (ISIS) launched a rapid offensive across Iraq and Syria. On June 10, 2014, its fighters captured Mosul, Iraq's second-largest city. On June 29, 2014, the group's leader Abu Bakr al-Baghdadi proclaimed the creation of a 'caliphate' and declared himself caliph. The organization announced the abolition of the border between Iraq and Syria and claimed authority over all Muslims. At the peak of its power in 2014-2015, ISIS controlled vast territories populated by several million people. The international community formed a US-led coalition to fight the group, beginning airstrikes in August 2014. By March 2019, ISIS had lost the last populated place under its control in Syria, although individual cells continued to operate underground."
  world_events.3.a:0 "Dangerous"
  world_events.4.t:0 "Paris Attacks"
  world_events.4.d:0 "On November 13, 2015, a series of coordinated terrorist attacks struck Paris and the suburb of Saint-Denis. The attacks included explosions near the Stade de France, shootings and a bombing at cafes and restaurants in Paris's 10th and 11th arrondissements, as well as a hostage-taking and mass killing at the Bataclan concert hall. According to Europol, 130 people were killed and 368 were injured. The Islamic State claimed responsibility for the attacks. French President François Hollande described them as 'an act of war'. Immediately after the attacks, France declared a state of emergency by decree on November 14, 2015. The attacks became the deadliest terrorist incident in modern French history and one of the deadliest in the EU since the 2004 Madrid bombings."
  world_events.4.a:0 "Horrific"
  world_events.5.t:0 "Paris Climate Agreement"
  world_events.5.d:0 "The UN Climate Change Conference COP21 took place in Paris from November 30 to December 11, 2015, and ended with the adoption of the Paris Agreement through decision 1/CP.21. The agreement set the long-term goal of keeping the rise in average global temperature well below 2°C above pre-industrial levels and pursuing efforts to limit warming to 1.5°C. It introduced a system of nationally determined contributions (NDCs), under which states submit and update plans to reduce emissions and adapt to climate change. It also established a regular cycle for increasing ambition, a global stocktake of progress, and enhanced transparency and reporting requirements regarding action and support. The Paris Agreement entered into force on November 4, 2016, after reaching the ratification threshold of at least 55 parties representing at least 55% of global emissions."
  world_events.5.a:0 "Noted"
  world_events.6.t:0 "European Migrant Crisis"
  world_events.6.d:0 "The European migrant crisis was marked by a sharp increase in the number of refugees and migrants arriving in European Union countries in 2015-2016 via the Mediterranean Sea and the Balkan route. The main flow consisted of people from Syria, Iraq, Afghanistan, and several African states fleeing armed conflicts and humanitarian crises. In 2015, more than one million people reached Europe by sea. Greece and Italy became the main countries of first entry. The crisis was accompanied by heavy loss of life during attempts to cross the sea. It triggered serious political disagreements within the EU over refugee redistribution and the tightening of border controls. In March 2016, the EU and Turkey concluded an agreement aimed at curbing irregular migration."
  world_events.6.a:0 "Understood"
  world_events.7.t:0 "Brexit"
  world_events.7.d:0 "On June 23, 2016, the United Kingdom held a referendum in which 51.9% of voters supported leaving the EU, while 48.1% voted to remain. After the referendum, Prime Minister David Cameron announced his resignation. On March 29, 2017, the government formally notified the EU of its intention to withdraw, triggering the Article 50 procedure under the Treaty on European Union. Negotiations lasted more than three years and were accompanied by a political crisis in the British Parliament. On January 31, 2020, the United Kingdom formally left the EU and entered a transition period. On December 24, 2020, the UK and the EU signed the Trade and Cooperation Agreement. The transition period ended on December 31, 2020, after which relations were governed by the new treaty. Brexit became the first case of a member state leaving the European Union."
  world_events.7.a:0 "Wow"
  world_events.8.t:0 "Attempted Coup in Turkey"
  world_events.8.d:0 "On the night of July 15-16, 2016, an attempted military coup took place in Turkey. A group of servicemen tried to seize control of key sites in Ankara and Istanbul, including bridges, airports, and the parliament building. More than 250 people were killed in the clashes, and over two thousand were injured. Turkish President Recep Tayyip Erdoğan called on citizens to take to the streets to resist the coup plotters. The coup attempt was suppressed within a day, and the authorities blamed the movement of Fethullah Gülen for organizing it. A state of emergency was introduced for two years. In the following months, large-scale purges began in the army, judiciary, police, educational institutions, and media. The events of 2016 strengthened presidential power and paved the way for Turkey's transition to a presidential system after the 2017 constitutional referendum."
  world_events.8.a:0 "Bad"
  world_events.9.t:0 "Battle of Aleppo"
  world_events.9.d:0 "The Battle of Aleppo was a series of major engagements during the Syrian civil war that lasted from 2012 to 2016. Aleppo was the country's largest economic center and held major strategic importance. In 2012, the city was divided between government forces and various opposition groups. The decisive stage came in 2016, when the Syrian army, supported by Russia and allied formations, launched an offensive against the eastern districts of the city. Airstrikes and artillery were widely used during the operation, causing large-scale destruction of infrastructure. In December 2016, government forces established full control over the city after the evacuation of opposition fighters and civilians. The loss of Aleppo was a major strategic defeat for the armed opposition. The battle is widely regarded as a turning point in the war that strengthened the Syrian government's position."
  world_events.9.a:0 "Understood"
  world_events.10.t:0 "Tests in North Korea"
  world_events.10.d:0 "In 2016-2017, the Democratic People's Republic of Korea conducted a series of missile and nuclear tests. Nuclear tests were carried out in January and September 2016, and testing continued at higher intensity in 2017. In July 2017, North Korea announced the successful launch of an intercontinental ballistic missile capable of reaching the United States. On September 3, 2017, it conducted its sixth and most powerful nuclear test. In response, the UN Security Council adopted several resolutions that significantly tightened international sanctions against the country. The restrictions targeted exports of coal, textiles, seafood, and supplies of refined petroleum products. The United States, South Korea, and Japan also intensified military cooperation and expanded missile defense systems."
  world_events.10.a:0 "Concerning"
  world_events.11.t:0 "Constitutional Crisis in Spain"
  world_events.11.d:0 "Spain's constitutional crisis of 2017 was linked to Catalonia's attempt to achieve independence. On October 1, 2017, the regional authorities held an independence referendum that Spain's Constitutional Court had declared illegal. The vote was accompanied by police intervention and mass protests. On October 27, 2017, the Catalan Parliament adopted a declaration of independence. That same day, the Spanish government invoked Article 155 of the Constitution, temporarily suspending the region's autonomy and dissolving the Catalan Parliament. Some independence leaders were arrested, while others left the country. Early regional elections were held in Catalonia in December 2017."
  world_events.11.a:0 "Understood"
  world_events.12.t:0 "Yellow Vest Protests"
  world_events.12.d:0 "The Yellow Vest protests began in France in late 2018 as a grassroots movement against a planned fuel tax increase and the rising cost of living. Demonstrations quickly expanded into a broader protest against social inequality, declining purchasing power, and President Emmanuel Macron's policies. Protesters organized road blockades and mass rallies, especially on Saturdays, often centered in Paris and other major cities. Some demonstrations turned violent and were accompanied by clashes with police, arson, vandalism, and thousands of arrests. In response, the French government suspended the fuel tax increase and later introduced a package of social measures. The movement became one of the most significant waves of protest in modern France."
  world_events.12.a:0 "Troubling"
  world_events.13.t:0 "COVID-19 Pandemic"
  world_events.13.d:0 "The COVID-19 pandemic began with the emergence of a new coronavirus, SARS-CoV-2, identified in late 2019 in Wuhan, China. In March 2020, the World Health Organization officially declared the outbreak a pandemic. The disease spread rapidly around the world, causing millions of deaths and placing unprecedented strain on healthcare systems. Governments introduced lockdowns, travel restrictions, quarantines, and mass vaccination campaigns. The pandemic triggered a global economic downturn, disrupted supply chains, and transformed work, education, and social life. In the following years, the spread of new variants led to repeated waves of infection, while mass vaccination significantly reduced mortality in many countries."
  world_events.13.a:0 "Pandemic..."
  world_events.14.t:0 "Black Lives Matter Protests"
  world_events.14.d:0 "In May 2020, mass protests under the slogan Black Lives Matter erupted in the United States after the killing of George Floyd by a police officer in Minneapolis. The demonstrations quickly spread across the country and then to other states around the world. Protesters demanded action against police brutality, racism, and systemic discrimination. In many cities, peaceful marches were accompanied by riots, looting, arson, and clashes with police. The movement became one of the largest protest waves in modern US history and sparked broad debate over policing, racial justice, historical memory, and institutional reform."
  world_events.14.a:0 "A wave of unrest"
  world_events.15.t:0 "War in Tigray"
  world_events.15.d:0 "The war in Tigray began in November 2020 in northern Ethiopia after a sharp escalation between the federal government and the Tigray People's Liberation Front. Ethiopian Prime Minister Abiy Ahmed announced a military operation, accusing Tigrayan forces of attacking federal army bases. The conflict quickly turned into a large-scale war involving regular troops, militias, and Eritrean forces. The fighting caused a severe humanitarian crisis, mass displacement, famine, and widespread allegations of war crimes. The conflict lasted about two years and formally ended with the signing of the Pretoria agreement in November 2022."
  world_events.15.a:0 "Understood"
  world_events.16.t:0 "Belarusian Protests of 2020"
  world_events.16.d:0 "Mass protests erupted in Belarus after the presidential election of August 9, 2020, whose official results declared Alyaksandr Lukashenka the winner. A large part of society viewed the vote as falsified. The protests involved hundreds of thousands of people, especially in Minsk and other major cities. Participants demanded Lukashenka's resignation, new elections, and an end to police violence. The authorities responded with a harsh crackdown, thousands of detentions, torture allegations, and criminal cases against opposition figures. By the end of 2020, the street protest movement had largely been suppressed, but the political crisis in the country continued."
  world_events.16.a:0 "Resistance"
  world_events.17.t:0 "Suez Canal Blocked"
  world_events.17.d:0 "On March 23, 2021, the container ship Ever Given ran aground in the southern section of the Suez Canal, completely blocking traffic along one of the world's key trade routes. The nearly 400-meter vessel was traveling from China to the Netherlands. The blockage lasted six days and created a queue of hundreds of ships. The Suez Canal handles a significant share of global maritime trade and is a critical link between Europe and Asia. The incident delayed deliveries of oil, gas, and industrial goods. Tugboats and dredgers were deployed to free the vessel, and extensive dredging operations were carried out. On March 29, 2021, the ship was successfully refloated and traffic resumed."
  world_events.17.a:0 "Incredible"
  world_events.18.t:0 "Storming of the US Capitol"
  world_events.18.d:0 "On January 6, 2021, supporters of outgoing President Donald Trump stormed the US Capitol in Washington, D.C., during a joint session of Congress convened to certify the results of the 2020 presidential election. The attack followed weeks of false claims of electoral fraud. Protesters broke through police lines, entered the building, and disrupted the proceedings. The violence caused deaths, injuries, and major political shock. The National Guard and federal forces were deployed to restore order. The event became one of the most dramatic internal political crises in modern US history."
  world_events.18.a:0 "Shock"
  world_events.19.t:0 "Global Energy Crisis"
  world_events.19.d:0 "The global energy crisis of 2021-2022 was marked by a sharp rise in prices for gas, oil, coal, and electricity. The reasons included post-pandemic demand recovery, market imbalances, supply constraints, logistical disruptions, and later the geopolitical consequences of the war in Ukraine. Europe was hit particularly hard because of its dependence on imported gas. The crisis led to inflation, industrial difficulties, government support measures, and a search for alternative suppliers and energy sources. Many states accelerated efforts to diversify supplies and strengthen energy security."
  world_events.19.a:0 "Not good"
  world_events.20.t:0 "Russian Invasion of Ukraine"
  world_events.20.d:0 "On February 24, 2022, Russia launched a full-scale invasion of Ukraine, expanding the war that had begun in 2014. Russian forces attacked from several directions, including from Belarus, occupied Crimea, and Russian territory. The invasion caused thousands of deaths, massive destruction, millions of refugees, and global political upheaval. Ukraine declared martial law and began nationwide resistance. Western countries imposed unprecedented sanctions on Russia and increased military, financial, and humanitarian support for Ukraine. The war became the largest armed conflict in Europe since World War II."
  world_events.20.a:0 "War"
  world_events.21.t:0 "Protests in Iran"
  world_events.21.d:0 "Mass protests broke out in Iran in September 2022 after the death of Mahsa Amini, who had been detained by the morality police. The demonstrations began as outrage over women's rights and compulsory hijab laws but soon turned into a broader anti-government movement. The protests spread across many cities and were met with a harsh response from the authorities. Security forces used force, and thousands of people were detained. The unrest became one of the most serious domestic crises in Iran in recent years."
  world_events.21.a:0 "Outrage"
  world_events.22.t:0 "Return of the Taliban"
  world_events.22.d:0 "In 2021, after the United States decided to end its military mission, the phased withdrawal of US and NATO troops from Afghanistan began. The Taliban offensive intensified in the spring and summer of 2021 and was accompanied by the rapid capture of provincial centers. On August 15, 2021, the Taliban entered Kabul, after which President Ashraf Ghani left the country. Government forces largely ceased resistance, and power passed to the Taliban. A massive evacuation of foreign nationals and Afghans who had cooperated with international organizations took place at Kabul airport. On August 31, 2021, the United States officially ended its military presence in the country. The restoration of the Islamic Emirate of Afghanistan was announced. After the transfer of power, the international community imposed restrictions and froze part of Afghanistan's assets, worsening the country's economic crisis."
  world_events.22.a:0 "Understood"
  world_events.23.t:0 "New Wave of COVID-19"
  world_events.23.d:0 "A new wave of COVID-19 was recorded in many countries in late 2021 and early 2022. The increase in infections was linked to the spread of new variants of the virus, including the Omicron strain. It was characterized by high transmissibility and rapid spread. Many governments reintroduced restrictions on mass gatherings and movement. Healthcare systems faced a growing number of hospitalizations. At the same time, mortality in a number of countries was lower than in previous waves thanks to vaccination and the buildup of collective immunity. Authorities intensified booster and revaccination campaigns. The new wave demonstrated the continued evolution of the virus and the need to adapt public health measures."
  world_events.23.a:0 "Again..."
  world_events.24.t:0 "Suez Canal Blocked"
  world_events.24.d:0 "On March 23, 2021, the container ship Ever Given ran aground in the southern section of the Suez Canal, completely blocking traffic along one of the world's key trade routes. The nearly 400-meter vessel was traveling from China to the Netherlands. The blockage lasted six days and created a queue of hundreds of ships. The Suez Canal handles a significant share of global maritime trade and is a critical link between Europe and Asia. The incident delayed deliveries of oil, gas, and industrial goods. Tugboats and dredgers were deployed to free the vessel, and extensive dredging operations were carried out. On March 29, 2021, the ship was successfully refloated and traffic resumed."
  world_events.24.a:0 "Incredible"
  world_events.25.t:0 "Pegasus"
  world_events.25.d:0 "Pegasus is spyware developed by the Israeli company NSO Group. The software is capable of covertly infiltrating smartphones and gaining access to messages, microphones, cameras, and other device data. In 2021, an international journalistic investigation known as the Pegasus Project reported the possible use of the software to surveil journalists, politicians, and human rights activists in various countries. The investigation caused major international repercussions and diplomatic disputes. Several states launched inquiries and legal proceedings. The developer maintained that it sold the software only to government bodies for fighting terrorism and crime. The scandal intensified the debate over regulation of cyber-surveillance and the protection of digital human rights."
  world_events.25.a:0 "Brutal"
  world_events.26.t:0 "Death of Elizabeth II"
  world_events.26.d:0 "Elizabeth II, Queen of the United Kingdom, died on September 8, 2022, at Balmoral Castle in Scotland at the age of 96. She had reigned since 1952 and was the longest-serving monarch in British history. After her death, the throne automatically passed to her son, proclaimed King Charles III. A ten-day period of national mourning was declared in the country. The lying in state took place at Westminster Hall, where hundreds of thousands of people came to pay their respects. The state funeral was held in London on September 19, 2022, attended by representatives of dozens of states. Elizabeth II's death marked a major moment in British history and the end of an era defined by her 70-year reign."
  world_events.26.a:0 "An era has ended"
  world_events.27.t:0 "2022 FIFA World Cup in Qatar"
  world_events.27.d:0 "The 2022 FIFA World Cup took place in Qatar from November 20 to December 18, 2022. The tournament was the first World Cup ever held in the Middle East and, for the first time, was staged in winter. Thirty-two national teams took part. Matches were played in eight stadiums across five cities. The final was held at Lusail Stadium. Argentina won the title, defeating France in the final on penalties after a 3-3 draw. The tournament was accompanied by heightened security measures and intense international attention. It became one of the most watched sporting events in the world."
  world_events.27.a:0 "Football!"
  world_events.28.t:0 "Israel-Hamas War"
  world_events.28.d:0 "The armed conflict between Israel and Hamas sharply escalated on October 7, 2023, after a large-scale Hamas attack on southern Israel. During the assault, hundreds of people were killed and taken hostage. Israel declared a state of war and launched a major military operation in the Gaza Strip. Intense airstrikes and ground operations followed. The fighting caused heavy casualties and widespread destruction of infrastructure. The conflict triggered a humanitarian crisis in Gaza and major international diplomatic efforts to achieve a ceasefire. The situation was accompanied by rising tensions across the Middle East."
  world_events.28.a:0 "Horrific"
  world_events.29.t:0 "Earthquakes in Turkey and Syria"
  world_events.29.d:0 "On February 6, 2023, powerful earthquakes of magnitude 7.8 and 7.5 struck southeastern Turkey and northern Syria. The epicenter was in Kahramanmaraş Province. The disaster caused massive destruction in dozens of cities, including Gaziantep, Antakya, and Aleppo. More than 50,000 people were killed, and hundreds of thousands were left homeless. Residential buildings, hospitals, roads, and infrastructure facilities were destroyed. The earthquakes were among the most devastating disasters in modern Turkish history. The catastrophe further worsened the humanitarian situation in Syria, already damaged by years of armed conflict."
  world_events.29.a:0 "Our condolences"
  world_events.30.t:0 "AI Boom"
  world_events.30.d:0 "From 2022-2023 onward, generative artificial intelligence models became widely adopted in business, education, and the creative industries. Technologies based on large language and multimodal models began to be used for automating text processing, generating images, programming, and data analytics. Companies started integrating AI tools into workflows, accelerating digital transformation and changing the structure of employment. Educational institutions faced the need to revise approaches to learning and assessment. Labor markets are adapting to the emergence of new professions and the transformation of existing specialties. Intensified competition between technology companies accelerated investment in AI infrastructure. This text was generated using artificial intelligence technologies."
  world_events.30.a:0 "A new era"
  world_events.31.t:0 "USA: Results of the 2016 Presidential Election"
  world_events.31.d:0 "The US presidential election took place on November 8, 2016. Donald Trump was the Republican Party candidate, and Hillary Clinton represented the Democratic Party. Trump won 304 electoral votes, while Clinton received 227. At the same time, Clinton won the national popular vote, but the election is decided by the Electoral College. Turnout was about 55% of registered voters. The election was accompanied by an intense campaign and major public attention. In January 2017, Donald Trump officially took office as the 45th President of the United States."
  world_events.31.a:0 "Understood"
  world_events.32.t:0 "USA: Results of the 2020 Presidential Election"
  world_events.32.d:0 "The US presidential election took place on November 3, 2020. Joe Biden was the Democratic Party candidate, while incumbent President Donald Trump represented the Republican Party. Biden won 306 electoral votes, while Trump received 232. In the nationwide popular vote, Biden received more than 81 million votes, which was a record at the time. Turnout was one of the highest in decades. The election took place against the backdrop of the COVID-19 pandemic, which led to large-scale early and mail-in voting. On January 6, 2021, Congress certified the Electoral College results. On January 20, 2021, Joe Biden took office as the 46th President of the United States."
  world_events.32.a:0 "Understood"
  world_events.33.t:0 "USA: Results of the 2024 Presidential Election"
  world_events.33.d:0 "The US presidential election was held on November 5, 2024. Donald Trump, running as the Republican Party nominee, defeated Democratic Party candidate Kamala Harris and won 312 electoral votes, exceeding the 270 needed for victory. Trump also won the national popular vote, becoming the first Republican since 2004 to do so after his defeat in 2020. Kamala Harris received 226 electoral votes and conceded defeat. The results were officially confirmed by Congress in January 2025, and on January 20, 2025, Trump took office as the 47th President of the United States. Trump's victory was historically notable because he became only the second president in US history to win a non-consecutive second term."
  world_events.33.a:0 "Understood"