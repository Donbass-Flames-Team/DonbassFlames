l_english:
 DPR_republic_without_state:0 "Republic Without a State"
 DPR_republic_without_state_desc:0 "The DPR has declared independence, but without an army, budget, or recognition. In reality, it's a territory where laws exist only on paper, and every day is a struggle for survival."
 
 DPR_power_of_bandits:0 "Power of Bandits"
 DPR_power_of_bandits_desc:0 "The republic is controlled by militants and criminal authorities like Motorola, Givi, and Bezler. Each controls their own districts and resources, while political structures are nominal. Fear and weapons decide everything."
 
 DPR_russian_spring:0 "Russian Spring"
 DPR_russian_spring_desc:0 "The ideology of the 'Russian World' justifies the uprising. Moscow provides covert support, and slogans like 'for the Motherland, against fascism' motivate the fighters. The republic receives external support but loses some autonomy."
 
 DPR_blockade_and_chaos:0 "Blockade and Chaos"
 DPR_blockade_and_chaos_desc:0 "The economy is paralyzed, supplies are cut off. Humanitarian aid, contraband, and weapons flow through their own channels. Urban chaos strengthens lawlessness and partisan activity."
 
 DPR_war_for_donbass:0 "War for Donbass"
 DPR_war_for_donbass_desc:0 "Every city, every block is a battlefield. Everything is at stake: homes, streets, people's lives. War ceases to be politicsвЂ”it's now the daily reality of the region."
 
 DPR_hidden_presence:0 "Hidden Presence"
 DPR_hidden_presence_desc:0 "Forces operate in the republic that are officially unnoticed: regular military, advisors, equipment. They decide the outcome of battles but remain in the shadows, creating the sense that the war is waged 'on its own.'"
 
