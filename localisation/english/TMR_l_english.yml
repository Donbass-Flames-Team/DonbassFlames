l_english:
 TMR_accept_refugees: "Accept Pro-Russian Refugees"
 TMR_accept_refugees_desc: "After the failure of the ONR, the situation has become sharply aggravated: detentions, checks, and pressure have begun on people suspected of sympathizing with pro-Russian forces. We cannot leave them to their fate. Transnistria is obliged to open its doors to refugees and take on the humanitarian burden, even if it hits internal stability."
 TMR_border_deployments: "Border Deployment"
 TMR_border_deployments_desc: "We are moving units to key sectors and organizing supply hubs. We need communications, rear posts, and ready routes for rapid maneuver. The border must look like a real line of threat, not a formality."
 TMR_border_hardening: "Harden Border Security"
 TMR_border_hardening_desc: "Restructure border control for a prolonged crisis: more checks, faster reactions, fewer vulnerable areas. This does not solve the problem completely, but it increases predictability."
 TMR_bridgeheads: "Establish Bridgeheads"
 TMR_bridgeheads_desc: "We are securing key lines and creating conditions for further advancement. Taking control of roads, crossings, and communication hubs to maintain momentum. Any pause now is a chance for the enemy to regroup."
 TMR_broadcasting_concept_2014: "New Information Strategy"
 TMR_broadcasting_concept_2014_desc: "Restructure media policy for the crisis period: unified talking points, clearer communication with the population, and modernization of core broadcasting tools."
 TMR_call_kremlin: "Call to the Kremlin"
 TMR_call_kremlin_desc: "We are requesting a political decision on the operation and the format of possible support. Moscow's response will determine whether we act relying on allied resources or take everything upon ourselves. After this step, the room for maneuver narrows sharply."
 TMR_condemn_kyiv_protests: "Official Condemnation of Maidan"
 TMR_condemn_kyiv_protests_desc: "Establish a position at the level of leadership and state structures: the protests are viewed as a source of chaos and a threat to security. This will help consolidate the apparatus and public opinion."
 TMR_conflict_escalation: "Russian Spring"
 TMR_conflict_escalation_desc: "Ukraine is bursting at the seams: the 'Russian Spring' is igniting in the largest Russian-speaking cities. Crimea has already returned to Russia, while in Luhansk, Odesa, and Kharkiv, protesters are taking control of administrative buildings. The DPR has been proclaimed in Donetsk. The Kyiv authorities are preparing a security operation, but the wave has already started. If the ONR holds, we will have a chance to break the blockade."
 TMR_coordination_with_russia: "Establish Direct Coordination with Moscow"
 TMR_coordination_with_russia_desc: "Strengthen permanent channels of communication and coordination. The faster consultations and information exchange proceed, the easier it is to keep the situation under control during external turbulence."
 TMR_depots_and_logistics: "Rear Depots and Logistics"
 TMR_depots_and_logistics_desc: "Create a material margin of safety: transport, rail logistics, and minimal fuel reserves. Even a small reserve can become critical during a sudden escalation."
 TMR_employment_program: "Adaptation and Employment Program"
 TMR_employment_program_desc: "Shift focus from emergency response to long-term integration: employment, retraining, and reducing the social burden on the budget."
 TMR_energy_contracts: "Energy Supply Guarantees"
 TMR_energy_contracts_desc: "Secure agreements on energy resources and reduce the likelihood of disruptions. Energy is the foundation of both the economy and social stability."
 TMR_eu_stub: "European Pivot"
 TMR_eu_stub_desc: "§RThis path will be expanded later§!: diplomacy, economics, and a gradual distancing from Russian structures of influence."
 TMR_fuel_and_supplies_opr: "Supplies"
 TMR_fuel_and_supplies_opr_desc: "Transfer critical resources: fuel, transport, and minimal rail logistics. The goal is to maintain pace and ensure infrastructure functionality."
 TMR_gkchs_extra_session: "Extraordinary Session of the SCSE"
 TMR_gkchs_extra_session_desc: "Convene relevant bodies and move management to high-response mode. The main goal is readiness for sharp changes in the situation on the borders and within the region."
 TMR_humanitarian_corridor_opr: "Humanitarian Corridor"
 TMR_humanitarian_corridor_opr_desc: "Open a support channel that looks humanitarian but strengthens the resilience of allies and reduces internal turbulence on their side."
 TMR_integration_course_rf: "Course Toward Deeper Integration with the RF"
 TMR_integration_course_rf_desc: "Bet on a closer economic and political link with Russia. This improves interaction with the RF but inevitably worsens relations with Moldova and Ukraine."
 TMR_intelligence_liaison_opr: "Financial Aid"
 TMR_intelligence_liaison_opr_desc: "We will allocate funds to support the ONR and develop their capabilities. The money will go toward supplies, the army, and strengthening administrative mechanisms."
 TMR_internal_stabilization: "Internal Stabilization"
 TMR_internal_stabilization_desc: "The ONR is destroyed—and with it, our hopes for a quick exit from isolation have collapsed. Now something else is more important: maintaining order inside and relieving tension. We are stabilizing the system and returning to normal life."
 TMR_kolbasna_mine_depots: "Mine the Warehouse District"
 TMR_kolbasna_mine_depots_desc: "Prepare the facility for destruction in case of enemy capture. Laying measures to blow up infrastructure and key storage hubs to deny the enemy trophies. This is an extreme insurance policy, but sometimes it decides everything."
 TMR_kolbasna_unseal_depots: "Unseal Depots in Kolbasna"
 TMR_kolbasna_unseal_depots_desc: "Unseal the reserves and bring the warehouses into working order. Simultaneously strengthen security and conduct inventory to avoid losses and chaos. Kolbasna is a real resource that must not be missed."
 TMR_kremlin_approval: "Permission Granted"
 TMR_kremlin_approval_desc: "Moscow has given the go-ahead. Now actions can be planned based on broader possibilities."
 TMR_local_fuel_rationing: "Austerity Regime"
 TMR_local_fuel_rationing_desc: "Saving today is a maneuver tomorrow."
 TMR_local_support_only: "Reliance on Own Resources"
 TMR_local_support_only_desc: "Acting without an allied shoulder: fewer opportunities, higher risks, and a higher price for mistakes. Priorities will have to be strictly set and everything possible saved. On the plus side, decisions are made faster—and the responsibility is entirely ours."
 TMR_local_workshops: "Workshops and Assembly Points"
 TMR_local_workshops_desc: "Set up repairs and supplies locally to compensate for the shortage of external deliveries. Workshops will speed up the restoration of equipment and gear, and assembly points will handle replenishment and distribution. Under pressure, this turns into a survival system."
 TMR_obey_kremlin: "Obey the Kremlin"
 TMR_obey_kremlin_desc: "The direct course toward the operation is being curtailed for political reasons. We are shifting focus to indirect tools and supporting allies where possible. Sometimes a pause is not weakness, but calculation."
 TMR_ogrw_training: "OGRF Exercises"
 TMR_ogrw_training_desc: "The OGRF begins exercises, practicing a possible 'Crimean scenario': lightning-fast deployment, blocking military units, and taking control of administrative buildings."
 TMR_operational_planning: "Operational Planning"
 TMR_operational_planning_desc: "Translate the political decision into a specific map of actions: directions, timelines, and reserves. Clarify headquarters interaction and decision-making procedures. The plan must be simple and executable even in conditions of chaos."
 TMR_opr_blacksea_route: "Southern Logistics Route"
 TMR_opr_blacksea_route_desc: "Expand supply through alternative directions and create backup delivery options. This increases the mobility of allies and reduces dependence on a single corridor. The more routes there are, the less chance of being cut off."
 TMR_opr_expand_support: "Expand Support for the ONR"
 TMR_opr_expand_support_desc: "Increase the volume of aid and make support regular. It is important not only to transfer resources but also to maintain their delivery. The more stable the supply, the more resilient the ally."
 TMR_opr_failure: "ONR Failed to Materialize"
 TMR_opr_failure_desc: "The ONR project has failed; internal stability and risk minimization become the priority. The time for loud steps is passing—it is more important to maintain control over the situation at home."
 TMR_opr_intel_exchange: "Intelligence Exchange"
 TMR_opr_intel_exchange_desc: "Information is time, and time is an advantage. Organize constant data exchange and coordination of situational assessments. Coordination reduces the risk of errors and increases the accuracy of actions."
 TMR_opr_open_confrontation: "Open Confrontation"
 TMR_opr_open_confrontation_desc: "Transition from indirect tools to direct force pressure. This increases the chances of a quick result but sharply increases the risk of the conflict expanding. Such a step requires a readiness to pay the price."
 TMR_opr_success: "ONR Held On"
 TMR_opr_success_desc: "The success of the ONR changes the rules of the game. A chance appears to gain a foothold in the southern direction, create a base for further steps, and move closer to exiting isolation. Now we must not lose momentum: support, supply, and coordination must turn success into a sustainable result."
 TMR_opr_support_pipeline: "Open Support"
 TMR_opr_support_pipeline_desc: "We have officially recognized the ONR—and thereby removed the last restrictions on cooperation. Now aid will no longer be 'unofficial': we can openly supply weapons, ammunition, and gear, send instructors, and strengthen supply lines. The ONR will become our reliable outpost, and any attack on them will be perceived as a challenge to us."
 TMR_opr_training_camps: "Training Camps for the ONR"
 TMR_opr_training_camps_desc: "Training personnel is more important than one-off deliveries: people decide the outcome of clashes. Instructors and training increase discipline, resilience, and manageability. This is an investment that works longer than any convoy."
 TMR_passportization: "Accelerate Passport Procedures"
 TMR_passportization_desc: "Simplify bureaucracy and speed up the processing of documents for the population. In practice, this strengthens the institutional link to the Russian space."
 TMR_quiet_life_end: "Continue Isolationist Policy"
 TMR_quiet_life_end_desc: "Bet on self-preservation: fewer external obligations, more internal discipline and caution. This is a step that requires discipline and quick decisions. The consequences will be felt both inside the region and beyond."
 TMR_raise_folk_militias: "Raise People's Militias"
 TMR_raise_folk_militias_desc: "If external support is limited, we will have to rely on internal resources. Form volunteer structures for guarding hubs, patrols, and rear tasks. This is not a replacement for the army, but a way to cover vulnerable spots."
 TMR_raise_ogrw_readiness: "Alert the OGRF"
 TMR_raise_ogrw_readiness_desc: "Move the OGRF to high readiness and accelerate deployment. Strengthen facility security and practice rapid response scenarios. The demonstration of force must be convincing, or it is useless."
 TMR_recognize_opr: "Recognize the ONR"
 TMR_recognize_opr_desc: "Make a political step that strengthens the alliance and improves relations with the ONR. This raises the stakes in the region and makes support more overt."
 TMR_refugee_registration: "Registration and Flow Filtering"
 TMR_refugee_registration_desc: "Bring order to the flows: accounting, verification, routing. This reduces the risks of threats penetrating but requires tough decisions and political costs."
 TMR_request_recognition: "Seek Recognition of Sovereignty"
 TMR_request_recognition_desc: "Transition from hints to official diplomatic steps. Recognition is a tool for legitimation, but it sharpens conflicts of interest with neighboring states."
 TMR_request_russian_aid: "Request Economic Support from the RF"
 TMR_request_russian_aid_desc: "Apply for financial stabilization mechanisms: subsidies, preferential conditions, and support for key industries. In conditions of uncertainty, this becomes a matter of budget survival."
 TMR_return_to_opr_support: "Return to ONR Support"
 TMR_return_to_opr_support_desc: "If the direct path is closed, the southern direction remains a chance to expand opportunities. The focus is on supply, coordination, and strengthening allies. Support must be systemic, not one-off."
 TMR_rus_support_package: "RF Aid Package"
 TMR_rus_support_package_desc: "Permission granted—support can move from words to resources. Specify supply volumes, instructors, and coordination at the headquarters level. This increases resilience and expands the room for action."
 TMR_second_direction_threat: "Threat from the South"
 TMR_second_direction_threat_desc: "Armed confrontation begins in the Donbas, and Kyiv is pulling its main forces to the east. We must force the Ukrainian command to keep part of its resources at our border: exercises, demonstrative movements, and hardening the border regime will force them to scatter their attention and forces."
 TMR_security_border_filtering: "Strengthen Border Control"
 TMR_security_border_filtering_desc: "Toughen checks, fine-tune flow filtering, and close loopholes for provocations. This will not solve the political crisis, but it will reduce the risk of sudden destabilization."
 TMR_seize_border_posts: "Seizure of Border Hubs"
 TMR_seize_border_posts_desc: "Checkpoints, junctions, and bridges determine the speed of force entry and supply. We are taking key hubs under control to exclude disruptions and delays. Border infrastructure must work for us."
 TMR_send_advisors: "Send Advisors and Instructors"
 TMR_send_advisors_desc: "Organize assistance in training and management, strengthening the command component of allies. This is cheaper than direct intervention and often more effective than supplying equipment alone."
 TMR_smuggling_to_opr: "Contraband Supplies"
 TMR_smuggling_to_opr_desc: "Establish covert supplies of equipment. This increases the ONR's success without requiring official intervention and maintaining room for denial."
 TMR_start_operation: "Begin Operation"
 TMR_start_operation_desc: "Moving from preparation to action—the conflict enters an open phase. Any mistake now will be costly both on the front and in diplomacy. Stopping a war is harder than starting one."
 TMR_subsidies_and_credits: "Secure Subsidies and Credit Lines"
 TMR_subsidies_and_credits_desc: "Formalize specific sources of money and aid conditions to cover the most vulnerable expenditure items. This will provide a breather and reduce the risk of internal social pressure."
 TMR_support_crimea_operation: "Support the Russian Operation in Crimea"
 TMR_support_crimea_operation_desc: "Openly endorse Russia's actions and state one's position in the regional conflict. This strengthens the link to the Russian course but simultaneously increases tension with neighbors."
 TMR_support_euromaidan: "Support the Protest Movement"
 TMR_support_euromaidan_desc: "Openly declare support for the change of course in Kyiv and try to restructure foreign policy under the new reality. §RIn the current version, this branch is disabled§!."
 TMR_support_yanukovych: "Side with the Current Authorities in Kyiv"
 TMR_support_yanukovych_desc: "Publicly support the official Kyiv line and indicate rejection of street chaos. This strengthens the pro-Russian vector and sets the tone for further steps."
 TMR_temporary_shelters: "Deploy Temporary Accommodation Centers"
 TMR_temporary_shelters_desc: "Organize reception points, housing, and primary aid. A costly and unpopular measure, but it reduces social tension and makes the process manageable."
 TMR_tourists: "'Tourists'"
 TMR_tourists_desc: "Send a limited contingent and additional supplies under the guise of civilian movements. The task is to reinforce the ONR without direct escalation at the diplomatic level."
 TMR_war_choice_after_failure: "Revenge"
 TMR_war_choice_after_failure_desc: "If the chance is missed, the option of a forceful response remains—even without an allied bridgehead. This is a step that requires discipline and quick decisions. The consequences will be felt both inside the region and beyond."
 TMR_war_economy_rails: "Put Economy on a War Footing"
 TMR_war_economy_rails_desc: "Open confrontation will require mobilization of industry, transport, and finance. Transitioning to military supply norms and accelerating the production of everything the front needs."
 TMR_wargoal_ukraine: "Begin Operation"
 TMR_wargoal_ukraine_desc: "Political decision made. Time to move to action. This is a step that requires discipline and quick decisions. The consequences will be felt both inside the region and beyond."
 TMR_we_wont_abandon_ours: "We Don't Abandon Our Own"
 TMR_we_wont_abandon_ours_desc: "The decision is made: we act even without external approval. This is a path with fewer resources and a higher price for errors, but retreating means losing the initiative. Now everything depends on our readiness and discipline."

 tmr.1.a: "Give the go-ahead"
 tmr.1.b: "Do not allow"
 tmr.1.d: "Tiraspol requests a political decision: allow the preparation of an operation against Ukraine or prohibit any actions."
 tmr.1.t: "Call from Tiraspol"
 tmr.2.a: "Excellent"
 tmr.2.d: "Request approved. Now action can be taken relying on Moscow's support."
 tmr.2.t: "Moscow Gave the Go-Ahead"
 tmr.3.a: "Obey the Kremlin"
 tmr.3.b: "We don't abandon our own"
 tmr.3.d: "Request denied. A choice must be made: obey or act independently."
 tmr.3.t: "Moscow Refused"
 tmr.4.d: "Tiraspol has announced the start of a military operation against Ukraine."
 tmr.4.t: "PMR Begins Operation"
 tmr.5.d: "OGRF units are moving out from their permanent deployment sites."
 tmr.5.t: "OGRF Leaves Permanent Deployment Points"
 tmr.6.d: "The OGRF announces taking control of key facilities in the north of the region, including the warehouse district in Kolbasna."
 tmr.6.t: "OGRF Takes Control of Northern Transnistria"
 tmr.7.d: "Reports indicate a devastating explosion in the warehouse district near Kolbasna. The parties accuse each other of a catastrophic escalation."
 tmr.7.t: "Explosion in the Kolbasna Area"
 tmr.8.a: "Save these fools"
 tmr.8.b: "Hold the Kolbasna warehouse"
 tmr.8.d: "Tiraspol has proceeded to action without our political permission. A decision must be made: save them or hold the warehouse in Kolbasna."
 tmr.8.t: "PMR Started Operation Without Consent"
 tmr.9.a: "Attack the OGRF"
 tmr.9.b: "Do not touch them"
 tmr.9.d: "OGRF units have taken control of the warehouse in Kolbasna. Attack them or avoid expanding the war."
 tmr.9.t: "OGRF at Kolbasna"
 tmr.10.a: "Side with the OGRF"
 tmr.10.b: "Do not interfere"
 tmr.10.d: "Ukraine attacked the OGRF. Question: enter the war or limit ourselves to statements?"
 tmr.10.t: "Side with the OGRF?"
 tmr.12.a: "Keep for self"
 tmr.12.b: "Transfer to Moldova"
 tmr.12.d: "After the fall of Transnistrian structures, Ukraine controls key territories of the region. The question arises: hold these lands or transfer them to Moldova."
 tmr.12.t: "Fate of Transnistria"
 tmr.13.a: "Excellent."
 tmr.13.d: "Ukrainian forces have taken control of the warehouse district in Kolbasna. Resistance is suppressed, facilities captured with almost no losses. Stocks pass to the control of Kyiv."
 tmr.13.t: "Capture of the Kolbasna Warehouse"
 tmr.14.t: "Fate of the New Lands"
 tmr.14.d: "After our stunning victorious operation on Ukrainian territory to liberate the Russian people, we must decide what to do with the newly acquired land. Should we grant independence to the Odesa People's Republic or create a confederation?"
 tmr.14.a: "Create the Odesa-Transnistrian Confederation"
 tmr.14.b: "Restore the ONR"

 TMR_dig_in_tiraspol: "Dig in at Tiraspol"
 TMR_return_OPR: "Restore the ONR"
 TMR_dig_in_tiraspol_tt: "§YFortifications will be erected in the vicinity of Tiraspol§!"
 TMR_mobilization_tt: "§YPeople's mobilization into self-defense units will be carried out§!"
 TMR_end_operation_tt: "§YTransnistria will cease the operation and withdraw troops§!"
