l_english:
  TMR_accept_refugees:0 "Accept Pro-Russian Refugees"
  TMR_accept_refugees_desc:0 "After the OPR collapses, the situation hardens sharply: detentions, checks, and pressure begin against people suspected of sympathizing with pro-Russian forces. We cannot leave them to their fate. Transnistria must open its doors to refugees and shoulder the humanitarian burden, even if it undermines internal stability."
 TMR_border_deployments:0 "Razvyortyvanye u hranytsy"
 TMR_border_deployments_desc:0 "Perebrasyvaem podrazdelenyya k klyuchevym uchastkam and pryvodym in poryadok uzly podvoza. Nuzhny svyaz, tylovye punkty and hotovye marshruty for bystroho manyovra. Hranytsa dolzhna vyhlyadet kak realnaya lynyya uhrozy, a ne formalnost."
  TMR_border_hardening:0 "Tighten the Border Security Regime"
  TMR_border_hardening_desc:0 "Rebuild border control for a prolonged crisis: more checks, faster response, fewer vulnerable sections. It won’t solve the problem completely, but it increases predictability."
 TMR_bridgeheads:0 "Sozdat platsdarmy"
 TMR_bridgeheads_desc:0 "We are consolidating on key defensive lines and creating conditions for further advance. We are taking roads, crossings, and communications hubs under control so as not to lose momentum. Any pause now gives the enemy a chance to regroup."
  TMR_broadcasting_concept_2014:0 "New Information Strategy"
  TMR_broadcasting_concept_2014_desc:0 "Rebuild media policy for a crisis period: unified messaging, clearer communication with the population, and modernization of key broadcasting tools."
 TMR_call_kremlin:0 "Zvonok in Kreml"
 TMR_call_kremlin_desc:0 "Zaprashyvaem polytycheskoe reshenye po operatsyy and format vozmozhnoy podderzhky. Otvet Moskvy will determine, deystvuem ly we with oporoy on soyuznye resursy yly beryom vsyo on sebya. Posle etoho shaha prostranstvo for manyovra rezko suzhaetsya."
  TMR_condemn_kyiv_protests:0 "Official Condemnation of the Maidan"
  TMR_condemn_kyiv_protests_desc:0 "Fix our stance at the level of leadership and state institutions: the protests are seen as a source of chaos and a threat to security. This helps consolidate both the apparatus and public opinion."
  TMR_conflict_escalation:0 "Russian Spring"
  TMR_conflict_escalation_desc:0 "Ukraine is cracking at the seams: the “Russian Spring” flares up across major Russian-speaking cities. Crimea has already returned to Russia, while in Luhansk, Odesa, and Kharkiv protesters seize administrative buildings. In Donetsk, the DPR has been proclaimed. Kyiv is preparing a forceful operation, but the wave is already rolling. If the OPR holds, we may finally have a chance to break the blockade."
  TMR_coordination_with_russia:0 "Establish Direct Coordination with Moscow"
  TMR_coordination_with_russia_desc:0 "Strengthen permanent channels for consultation and coordination. The faster information is exchanged, the easier it is to keep the situation under control during external turbulence."
  TMR_depots_and_logistics:0 "Rear Depots and Logistics"
  TMR_depots_and_logistics_desc:0 "Create a material buffer: transport, rail logistics, and minimal fuel reserves. Even a small reserve can become critical during a sudden escalation."
  TMR_employment_program:0 "Adaptation and Employment Program"
  TMR_employment_program_desc:0 "Shift from emergency response to long-term integration: employment, retraining, and reducing the social burden on the budget."
  TMR_energy_contracts:0 "Guarantee Energy Supplies"
  TMR_energy_contracts_desc:0 "Lock in energy arrangements and reduce the likelihood of disruptions. Energy is the foundation of both the economy and social stability."
  TMR_eu_stub:0 "European Pivot"
  TMR_eu_stub_desc:0 "§RThis path will be expanded later§!: diplomacy, economy, and a gradual distancing from Russia’s structures of influence."
  TMR_fuel_and_supplies_opr:0 "Fuel and Supplies for the OPR"
  TMR_fuel_and_supplies_opr_desc:0 "Deliver critical resources: fuel, transport, and minimal rail logistics. The goal is to maintain tempo and keep infrastructure functioning."
  TMR_gkchs_extra_session:0 "Extraordinary GChS Session"
  TMR_gkchs_extra_session_desc:0 "Convene relevant bodies and shift governance into an enhanced response mode. The main goal is readiness for abrupt changes both at the borders and inside the region."
  TMR_humanitarian_corridor_opr:0 "Humanitarian Corridor for the OPR"
  TMR_humanitarian_corridor_opr_desc:0 "Open a support channel that looks humanitarian, but strengthens allied resilience and reduces internal turbulence on their side."
  TMR_integration_course_rf:0 "Course Toward Deeper Integration with Russia"
  TMR_integration_course_rf_desc:0 "Bet on a tighter economic and political linkage with Russia. This improves cooperation with Moscow, but inevitably worsens relations with Moldova and Ukraine."
  TMR_intelligence_liaison_opr:0 "Communications and Coordination Channel"
  TMR_intelligence_liaison_opr_desc:0 "Build a stable exchange of information and decision alignment. Without communication, support turns into chaos—coordination determines effectiveness."
  TMR_internal_stabilization:0 "Internal Stabilization"
  TMR_internal_stabilization_desc:0 "The OPR is gone—along with our hopes for a quick break from isolation. Now the priority is different: keep order at home and ease tensions. We stabilize the system and return to ordinary life."
 TMR_kolbasna_mine_depots:0 "Mine the depot area"
 TMR_kolbasna_mine_depots_desc:0 "Hotovym obekt k unychtozhenyyu on sluchay zakhvata protyvnykom. Zakladyvaem mery podryva ynfrastruktury and klyuchevykh uzlov khranenyya, to lyshyt vraha trofeev. This kraynyaya strakhovka, no ynohda ona reshaet vsyo."
 TMR_kolbasna_unseal_depots:0 "Raskonservatsyya skladov in Kolbasne"
 TMR_kolbasna_unseal_depots_desc:0 "We are taking reserve stockpiles out of storage and bringing the depots back into working condition. At the same time, we are strengthening security and conducting an inventory to avoid losses and chaos. Kolbasna is a real resource that cannot be wasted."
 tmr.1.a:0 "Yest dobro"
 tmr.1.b:0 "Ne razreshat"
 tmr.1.d:0 "Tyraspol zaprashyvaet polytycheskoe reshenye: razreshyt podhotovku operatsyy protyv Ukraine yly zapretyt lyubye deystvyya."
 tmr.1.t:0 "Zvonok yz Tyraspolya"
 tmr.2.a:0 "Prekrasno"
 tmr.2.d:0 "Zapros odobren. Teper mozhno deystvovat with oporoy on podderzhku Moskvy."
 tmr.2.t:0 "Moskva dala dobro"
 tmr.3.a:0 "Poslushatsya Kreml"
 tmr.3.b:0 "Svoykh ne brosaem"
 tmr.3.d:0 "Zapros otklonyon. Prydyotsya vybrat: podchynytsya yly deystvovat samostoyatelno."
 tmr.3.t:0 "Moskva otkazala"
 TMR_kremlin_approval:0 "Resolution polucheno"
 TMR_kremlin_approval_desc:0 "Moskva dala dobro. Teper mozhno planyrovat deystvyya, yskhodya yz bolee shyrokykh vozmozhnostey."
 TMR_local_fuel_rationing:0 "Mode ekonomyy "
 TMR_local_fuel_rationing_desc:0 "Ekonomyya sehodnya — this manyovr zavtra."
 TMR_local_support_only:0 "Opora on sobstvennye resursy"
 TMR_local_support_only_desc:0 "Deystvuem without soyuznoho plecha: menshe vozmozhnostey, bolshe ryskov and vyshe tsena oshybok. Prydyotsya zhyostko rasstavlyat pryorytety and ekonomyt vsyo, chto mozhno. Zato decisions prynymayutsya bystree — and responsibility polnostyu nasha."
 TMR_local_workshops:0 "Masterskye and sbornye punkty"
 TMR_local_workshops_desc:0 "Razvorachyvaem remont and snabzhenye on meste, to kompensyrovat defytsyt vneshnykh postavok. Masterskye uskoryat vosstanovlenye tekhnyky and snaryazhenyya, a sbornye punkty — popolnenye and raspredelenye. In uslovyyakh davlenyya this prevrashchaetsya in systemu vyzhyvanyya."
  TMR_november_choice:0 "Tiraspol’s Choice"
  TMR_november_choice_desc:0 "Events in Kyiv become a turning point for the entire region. Tiraspol must decide which line it will publicly support and how to prepare for possible destabilization along the borders."
 TMR_obey_kremlin:0 "Poslushatsya Kreml"
 TMR_obey_kremlin_desc:0 "Pryamoy course on operatsyyu svorachyvaetsya po polytycheskym prychynam. We smeshchaem aktsent on nepryamye ynstrumenty and podderzhku soyuznykov tam, hde this vozmozhno. Ynohda pauza — this ne slabost, a raschyot."
  TMR_ogrw_training:0 "OGRF Exercises"
  TMR_ogrw_training_desc:0 "The OGRF begins exercises, rehearsing a possible “Crimea scenario”: rapid deployment, blocking military units, and taking control of administrative buildings."
 TMR_operational_planning:0 "Operatyvnoe planyrovanye"
 TMR_operational_planning_desc:0 "Svodym polytycheskoe reshenye k konkretnoy karte actions: napravlenyya, sroky and rezervy. Utochnyaem vzaymodeystvye shtabov and poryadok prynyatyya reshenyy. Plan must byt prostym and yspolnymym dazhe in uslovyyakh khaosa."
 TMR_opr_blacksea_route:0 "Lohystycheskyy marshrut on yuh"
 TMR_opr_blacksea_route_desc:0 "Rasshyryaem snabzhenye through alternatyvnye napravlenyya and sozdayom zapasnye varyanty podvoza. This povyshaet mobylnost soyuznykov and snyzhaet zavysymost ot odnoho korydora. Chem bolshe marshrutov — tem menshe shans byt perekrytymy."
 TMR_opr_expand_support:0 "Rasshyryt podderzhku ONR"
 TMR_opr_expand_support_desc:0 "Uvelychyvaem obyomy pomoshchy and delaem podderzhku rehulyarnoy. Vazhno ne tolko peredat resursy, no and hold ykh dostavku. Chem stabylnee snabzhenye, tem ustoychyvee soyuznyk."
  TMR_opr_failure:0 "The OPR Collapses"
  TMR_opr_failure_desc:0 "The OPR project has failed; internal stability and risk minimization become the priority. The time for loud steps is over—what matters now is keeping control at home."
 TMR_opr_intel_exchange:0 "Obmen razveddannymy"
 TMR_opr_intel_exchange_desc:0 "Ynformatsyya — this vremya, a vremya — this preymushchestvo. Orhanyzuem postoyannyy obmen dannymy and sohlasovanye otsenok obstanovky. Koordynatsyya snyzhaet rysk oshybok and povyshaet tochnost actions."
 TMR_opr_open_confrontation:0 "Otkrytoe protyvostoyanye"
 TMR_opr_open_confrontation_desc:0 "Perekhodym ot nepryamykh ynstrumentov k pryamomu sylovomu davlenyyu. This povyshaet shansy on bystryy result, no rezko uvelychyvaet rysk rasshyrenyya konflykta. Takoy shah trebuet hotovnosty platyt tsenu."
  TMR_opr_success:0 "The OPR Holds"
  TMR_opr_success_desc:0 "The OPR’s success changes the rules of the game. A chance appears to entrench ourselves in the southern direction, create a foothold for further steps, and move closer to breaking out of isolation. We must not lose momentum: support, supplies, and coordination must turn this success into a lasting result."
 TMR_opr_support_pipeline:0 "Otkrytaya podderzhka"
 TMR_opr_support_pipeline_desc:0 "We ofytsyalno pryznaly ONR — and tem samym snyaly poslednye ohranychenyya for sotrudnychestva. Teper pomoshch bolshe ne budet «nehlasnoy»: we mozhem otkryto postavlyat oruzhye, boeprypasy and snaryazhenye, napravlyat ynstruktorov and ukreplyat lynyy snabzhenyya. ONR stanet nashym nadezhnym forpostom, a lyubaya ataka on nykh budet vosprynymatsya kak vyzov uzhe nam."
 TMR_opr_training_camps:0 "Uchebnye laherya for ONR"
 TMR_opr_training_camps_desc:0 "Podhotovka kadrov vazhnee edynychnykh postavok: lyudy reshayut yskhod stolknovenyy. Ynstruktory and obuchenye povyshayut discipline, stability and upravlyaemost. This ynvestytsyya, kotoraya rabotaet dolshe lyuboho konvoya."
  TMR_passportization:0 "Accelerate Passport Procedures"
  TMR_passportization_desc:0 "Cut red tape and speed up document processing for the population. In practice, this strengthens institutional ties to the Russian space."
 TMR_prepare_operation_common:0 "Podhotovka operatsyy"
 TMR_prepare_operation_common_desc:0 "Nuzhno svesty polytycheskoe reshenye k konkretnym shaham: planyrovanye, snabzhenye and hotovnost. This shah, kotoryy trebuet dystsyplyny and bystrykh reshenyy. Posledstvyya budut oshchushchatsya kak vnutry rehyona, tak and for eho predelamy."
  TMR_quiet_life_end:0 "Continue the Policy of Isolationism"
  TMR_quiet_life_end_desc:0 "Bet on self-preservation: fewer external obligations, more internal discipline, and caution."
 TMR_raise_folk_militias:0 "Podnyat narodnye druzhyny"
 TMR_raise_folk_militias_desc:0 "Esly vneshnyaya podderzhka ohranychena, prydyotsya opyratsya on vnutrennyy resurs. Formyruem dobrovolcheskye struktury for okhrany uzlov, patruley and tylovykh zadach. This ne zamena armyy, no sposob zakryt uyazvymye mesta."
 TMR_raise_ogrw_readiness:0 "Podnyat OHRV"
 TMR_raise_ogrw_readiness_desc:0 "Perevodym OHRV in povyshennuyu hotovnost and uskoryaem razvyortyvanye. Usylyvaem okhranu obektov and otrabatyvaem stsenaryy bystroho reahyrovanyya. Demonstratsyya forces dolzhna byt ubedytelnoy, ynache ona bespolezna."
  TMR_recognize_opr:0 "Recognize the OPR"
  TMR_recognize_opr_desc:0 "Take a political step that strengthens the alliance and improves relations with the OPR. This raises the stakes in the region and makes support more open."
  TMR_refugee_registration:0 "Registration and Filtering of Flows"
  TMR_refugee_registration_desc:0 "Bring order to the flows: accounting, checks, and routing. This reduces infiltration risks, but requires tough decisions and political costs."
  TMR_request_recognition:0 "Seek Recognition of Sovereignty"
  TMR_request_recognition_desc:0 "Move from hints to formal diplomatic steps. Recognition is a tool of legitimacy, but it sharpens conflicts of interest with neighboring states."
  TMR_request_russian_aid:0 "Request Economic Support from Russia"
  TMR_request_russian_aid_desc:0 "Seek financial stabilization mechanisms: subsidies, preferential terms, and support for key sectors. In an atmosphere of uncertainty, this becomes a question of budget survival."
 TMR_return_to_opr_support:0 "Vernutsya k podderzhke ONR"
 TMR_return_to_opr_support_desc:0 "Esly pryamoy put zakryt, yuzhnoe napravlenye ostayotsya shansom rasshyryt vozmozhnosty. Focus delaetsya on snabzhenye, koordynatsyyu and ukreplenye soyuznykov. Podderzhka dolzhna byt systemnoy, a ne razovoy."
 TMR_rus_recon_support:0 "Koordynatsyya and razvedpodderzhka RF"
 TMR_rus_recon_support_desc:0 "Nalazhyvaem obmen ynformatsyey and sohlasovanye tseley on urovne shtabov. Razveddannye and svyaz umenshayut neopredelyonnost and pozvolyayut deystvovat tochnee. In sovremennoy voyne slepota chasto opasnee nekhvatky oruzhyya."
 TMR_rus_support_package:0 "Paket pomoshchy RF"
 TMR_rus_support_package_desc:0 "Resolution polucheno — podderzhka mozhet pereyty yz slov in resursy. Utochnyaem obyomy snabzhenyya, ynstruktorov and koordynatsyyu on urovne shtabov. This povyshaet stability and rasshyryaet prostranstvo for actions."
  TMR_second_direction_threat:0 "Threat from the South"
  TMR_second_direction_threat_desc:0 "Armed confrontation begins in Donbas, and Kyiv concentrates its main forces in the east. We must force Ukrainian command to keep part of its resources on our frontier: exercises, demonstrative movements, and a tougher border regime will make them disperse attention and manpower."
  TMR_security_border_filtering:0 "Tighten Border Control"
  TMR_security_border_filtering_desc:0 "Strengthen checks, refine the filtering of flows, and close loopholes for provocations. This won’t solve the political crisis, but it will reduce the risk of sudden destabilization."
 TMR_seize_border_posts:0 "Zakhvat pohranychnykh uzlov"
 TMR_seize_border_posts_desc:0 "Checkpoints, junctions, and bridges determine the speed of troop deployment and supply. We are taking key nodes under control to prevent disruption and delays. Border infrastructure must work for us."
  TMR_send_advisors:0 "Send Advisers and Instructors"
  TMR_send_advisors_desc:0 "Organize assistance in training and governance, strengthening the allies’ command element. This is cheaper than direct intervention and often more effective than shipping equipment alone."
  TMR_smuggling_to_opr:0 "Covert Shipments"
  TMR_smuggling_to_opr_desc:0 "Establish discreet deliveries of equipment. This improves the OPR’s chances without requiring official involvement and preserves plausible deniability."
 TMR_start_operation:0 "Nachat operatsyyu"
 TMR_start_operation_desc:0 "Perekhodym ot podhotovky k deystvyyam — konflykt vykhodyt in otkrytuyu fazu. Lyubaya oshybka teper budet stoyt doroho and on fronte, and in dyplomatyy. Stop voynu slozhnee, chem nachat eyo."
  TMR_subsidies_and_credits:0 "Secure Subsidies and Credit Lines"
  TMR_subsidies_and_credits_desc:0 "Formalize concrete funding sources and terms of assistance to cover the most vulnerable expenditures. This provides breathing room and reduces the risk of internal social pressure."
  TMR_support_crimea_operation:0 "Support the Russian Operation in Crimea"
  TMR_support_crimea_operation_desc:0 "Openly endorse Russia’s actions and state our position in the regional conflict. This deepens reliance on Russia’s course, while raising tensions with neighboring states."
  TMR_support_euromaidan:0 "Support the Protest Movement"
  TMR_support_euromaidan_desc:0 "Openly endorse the change of course in Kyiv and try to reshape foreign policy to fit the new reality. §RThis branch is disabled in the current version§!."
  TMR_support_yanukovych:0 "Back the Incumbent Authority in Kyiv"
  TMR_support_yanukovych_desc:0 "Publicly support Kyiv’s official line and reject street chaos. This reinforces a pro-Russian vector and sets the tone for the steps ahead."
  TMR_temporary_shelters:0 "Deploy Temporary Accommodation Centers"
  TMR_temporary_shelters_desc:0 "Organize reception points, housing, and first-line assistance. It is costly and unpopular, but it reduces social tension and makes the process manageable."
  TMR_tourists:0 "“Tourists”"
  TMR_tourists_desc:0 "Send a limited contingent and additional supplies under the cover of civilian movement. The task is to strengthen the OPR without direct diplomatic escalation."
 tmr.4.d:0 "Tyraspol obyavyl o nachale voennoy operatsyy protyv Ukraine."
 tmr.4.t:0 "PMR nachynaet operatsyyu"
 tmr.8.a:0 "Spasty etykh durakov"
 tmr.8.b:0 "Uderzhyvayte sklad Kolbasne"
 tmr.8.d:0 "Tyraspol pereshyol k deystvyyam without nasheho political razreshenyya. Nuzhno reshyt: spasat ykh yly hold sklad in Kolbasnom."
 tmr.8.t:0 "PMR nachala operatsyyu without sohlasyya"
 tmr.7.d:0 "Soobshchaetsya o razrushytelnom vzryve in rayone skladov u Kolbasny. Storony obvynyayut druh druha in katastrofycheskoy eskalatsyy."
 tmr.7.t:0 "Vzryv in rayone Kolbasny"
 tmr.13.a:0 "Excellent."
 tmr.13.d:0 "Ukrainian forces have taken control of the depot area in Kolbasna. Resistance has been suppressed and the facilities captured with almost no losses. The stockpiles are now under Kyiv's control."
 tmr.13.t:0 "Zakhvat sklada in Kolbasne"
 tmr.5.d:0 "Units OHRV vydvyhayutsya yz mest postoyannoy dyslokatsyy."
 tmr.5.t:0 "OHRV pokydaet punkty postoyannoy dyslokatsyy"
 tmr.9.a:0 "Napast on OHRV"
 tmr.9.b:0 "Ne trohat ykh"
 tmr.9.d:0 "OGRF units have taken control of the depot in Kolbasna. Attack them, or avoid widening the war."
 tmr.9.t:0 "OHRV u Kolbasny"
 tmr.12.a:0 "Ostavyt sebe"
 tmr.12.b:0 "Peredat Moldove"
 tmr.12.d:0 "Posle padenyya prydnestrovskykh struktur Ukraine kontrolyruet key terrytoryy rehyona. Vstayot vopros: uderzhyvat ety zemly yly peredat ykh Moldove."
 tmr.12.t:0 "Sudba Prydnestrovya"
 tmr.6.d:0 "The OGRF announces that it has taken control of key facilities in the north of the region, including the depot area in Kolbasna."
 tmr.6.t:0 "OGRF takes control of northern Transnistria"
 tmr.10.a:0 "Vstat on storonu OHRV"
 tmr.10.b:0 "Ne vmeshyvatsya"
 tmr.10.d:0 "Ukraine atakovala OHRV. Vopros: vstupaem in voynu yly ohranychymsya zayavlenyyamy?"
 tmr.10.t:0 "Vstat on storonu OHRV?"
 TMR_war_choice_after_failure:0 "Revansh"
 TMR_war_choice_after_failure_desc:0 "Esly shans upushchen, ostayotsya varyant sylovoho otveta — dazhe without soyuznoho platsdarma. This shah, kotoryy trebuet dystsyplyny and bystrykh reshenyy. Posledstvyya budut oshchushchatsya kak vnutry rehyona, tak and for eho predelamy."
 TMR_war_economy_rails:0 "Perevesty ekonomyku on voennye relsy"
 TMR_war_economy_rails_desc:0 "Otkrytoe protyvostoyanye potrebuet mobylyzatsyy promyshlennosty, transporta and fynansov. Perekhodym on voennye normy snabzhenyya and uskoryaem vypusk vseho, chto nuzhno frontu."
 TMR_wargoal_ukraine:0 "Nachat operatsyyu"
 TMR_wargoal_ukraine_desc:0 "Polytycheskoe reshenye prynyato. Vremya perekhodyt k deystvyyam. This shah, kotoryy trebuet dystsyplyny and bystrykh reshenyy. Posledstvyya budut oshchushchatsya kak vnutry rehyona, tak and for eho predelamy."
 TMR_we_wont_abandon_ours:0 "Cvoykh ne brosaem"
 TMR_we_wont_abandon_ours_desc:0 "Reshenye prynyato: deystvuem dazhe without odobrenyya yzvne. This put with menshymy resursamy and bolshey tsenoy oshybok, no otstuplenye oznachaet poteryu ynytsyatyvy. Teper vsyo zavysyt ot nashey hotovnosty and dystsyplyny."
