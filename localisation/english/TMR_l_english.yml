l_english:

  TMR_november_choice:0 "Tiraspol’s Choice"
  TMR_november_choice_desc:0 "Events in Kyiv become a turning point for the entire region. Tiraspol must decide which line it will publicly support and how to prepare for possible destabilization along the borders."

  TMR_support_euromaidan:0 "Support the Protest Movement"
  TMR_support_euromaidan_desc:0 "Openly endorse the change of course in Kyiv and try to reshape foreign policy to fit the new reality. §RThis branch is disabled in the current version§!."

  TMR_eu_stub:0 "European Pivot"
  TMR_eu_stub_desc:0 "§RThis path will be expanded later§!: diplomacy, economy, and a gradual distancing from Russia’s structures of influence."

  TMR_support_yanukovych:0 "Back the Incumbent Authority in Kyiv"
  TMR_support_yanukovych_desc:0 "Publicly support Kyiv’s official line and reject street chaos. This reinforces a pro-Russian vector and sets the tone for the steps ahead."

  TMR_condemn_kyiv_protests:0 "Official Condemnation of the Maidan"
  TMR_condemn_kyiv_protests_desc:0 "Fix our stance at the level of leadership and state institutions: the protests are seen as a source of chaos and a threat to security. This helps consolidate both the apparatus and public opinion."

  TMR_gkchs_extra_session:0 "Extraordinary GChS Session"
  TMR_gkchs_extra_session_desc:0 "Convene relevant bodies and shift governance into an enhanced response mode. The main goal is readiness for abrupt changes both at the borders and inside the region."

  TMR_security_border_filtering:0 "Tighten Border Control"
  TMR_security_border_filtering_desc:0 "Strengthen checks, refine the filtering of flows, and close loopholes for provocations. This won’t solve the political crisis, but it will reduce the risk of sudden destabilization."

  TMR_coordination_with_russia:0 "Establish Direct Coordination with Moscow"
  TMR_coordination_with_russia_desc:0 "Strengthen permanent channels for consultation and coordination. The faster information is exchanged, the easier it is to keep the situation under control during external turbulence."

  TMR_broadcasting_concept_2014:0 "New Information Strategy"
  TMR_broadcasting_concept_2014_desc:0 "Rebuild media policy for a crisis period: unified messaging, clearer communication with the population, and modernization of key broadcasting tools."

  TMR_public_campaign_solidarity:0 "A Unified Narrative"
  TMR_public_campaign_solidarity_desc:0 "Support the chosen course through managed events, symbolism, and public statements. The point is simple: demonstrate unity and narrow the space for hostile interpretations."

  TMR_request_russian_aid:0 "Request Economic Support from Russia"
  TMR_request_russian_aid_desc:0 "Seek financial stabilization mechanisms: subsidies, preferential terms, and support for key sectors. In an atmosphere of uncertainty, this becomes a question of budget survival."

  TMR_subsidies_and_credits:0 "Secure Subsidies and Credit Lines"
  TMR_subsidies_and_credits_desc:0 "Formalize concrete funding sources and terms of assistance to cover the most vulnerable expenditures. This provides breathing room and reduces the risk of internal social pressure."

  TMR_energy_contracts:0 "Guarantee Energy Supplies"
  TMR_energy_contracts_desc:0 "Lock in energy arrangements and reduce the likelihood of disruptions. Energy is the foundation of both the economy and social stability."

  TMR_depots_and_logistics:0 "Rear Depots and Logistics"
  TMR_depots_and_logistics_desc:0 "Create a material buffer: transport, rail logistics, and minimal fuel reserves. Even a small reserve can become critical during a sudden escalation."

  TMR_emergency_budget:0 "Anti-Crisis Budget Reallocation"
  TMR_emergency_budget_desc:0 "Concentrate resources on priority tasks: governance, social stability, and the functioning of critical infrastructure. Everything secondary is temporarily pushed aside."

  TMR_support_crimea_operation:0 "Support the Russian Operation in Crimea"
  TMR_support_crimea_operation_desc:0 "Openly endorse Russia’s actions and state our position in the regional conflict. This deepens reliance on Russia’s course, while raising tensions with neighboring states."

  TMR_conflict_escalation:0 "Russian Spring"
  TMR_conflict_escalation_desc:0 "Ukraine is cracking at the seams: the “Russian Spring” flares up across major Russian-speaking cities. Crimea has already returned to Russia, while in Luhansk, Odesa, and Kharkiv protesters seize administrative buildings. In Donetsk, the DPR has been proclaimed. Kyiv is preparing a forceful operation, but the wave is already rolling. If the OPR holds, we may finally have a chance to break the blockade."

  TMR_integration_course_rf:0 "Course Toward Deeper Integration with Russia"
  TMR_integration_course_rf_desc:0 "Bet on a tighter economic and political linkage with Russia. This improves cooperation with Moscow, but inevitably worsens relations with Moldova and Ukraine."

  TMR_passportization:0 "Accelerate Passport Procedures"
  TMR_passportization_desc:0 "Cut red tape and speed up document processing for the population. In practice, this strengthens institutional ties to the Russian space."

  TMR_we_want_russia_too:0 "Declare Commitment to the Russian Vector"
  TMR_we_want_russia_too_desc:0 "Make a political statement that locks in the course toward rapprochement. The goal is to shape expectations both at home and abroad: Russia is our key partner."

  TMR_request_recognition:0 "Seek Recognition of Sovereignty"
  TMR_request_recognition_desc:0 "Move from hints to formal diplomatic steps. Recognition is a tool of legitimacy, but it sharpens conflicts of interest with neighboring states."

  TMR_ogrw_training:0 "OGRF Exercises"
  TMR_ogrw_training_desc:0 "The OGRF begins exercises, rehearsing a possible “Crimea scenario”: rapid deployment, blocking military units, and taking control of administrative buildings."

  TMR_second_direction_threat:0 "Threat from the South"
  TMR_second_direction_threat_desc:0 "Armed confrontation begins in Donbas, and Kyiv concentrates its main forces in the east. We must force Ukrainian command to keep part of its resources on our frontier: exercises, demonstrative movements, and a tougher border regime will make them disperse attention and manpower."

  TMR_opr_success:0 "The OPR Holds"
  TMR_opr_success_desc:0 "The OPR’s success changes the rules of the game. A chance appears to entrench ourselves in the southern direction, create a foothold for further steps, and move closer to breaking out of isolation. We must not lose momentum: support, supplies, and coordination must turn this success into a lasting result."

  TMR_opr_failure:0 "The OPR Collapses"
  TMR_opr_failure_desc:0 "The OPR project has failed; internal stability and risk minimization become the priority. The time for loud steps is over—what matters now is keeping control at home."

  TMR_smuggling_to_opr:0 "Covert Shipments"
  TMR_smuggling_to_opr_desc:0 "Establish discreet deliveries of equipment. This improves the OPR’s chances without requiring official involvement and preserves plausible deniability."

  TMR_tourists:0 "“Tourists”"
  TMR_tourists_desc:0 "Send a limited contingent and additional supplies under the cover of civilian movement. The task is to strengthen the OPR without direct diplomatic escalation."

  TMR_send_advisors:0 "Send Advisers and Instructors"
  TMR_send_advisors_desc:0 "Organize assistance in training and governance, strengthening the allies’ command element. This is cheaper than direct intervention and often more effective than shipping equipment alone."

  TMR_humanitarian_corridor_opr:0 "Humanitarian Corridor for the OPR"
  TMR_humanitarian_corridor_opr_desc:0 "Open a support channel that looks humanitarian, but strengthens allied resilience and reduces internal turbulence on their side."

  TMR_fuel_and_supplies_opr:0 "Fuel and Supplies for the OPR"
  TMR_fuel_and_supplies_opr_desc:0 "Deliver critical resources: fuel, transport, and minimal rail logistics. The goal is to maintain tempo and keep infrastructure functioning."

  TMR_intelligence_liaison_opr:0 "Communications and Coordination Channel"
  TMR_intelligence_liaison_opr_desc:0 "Build a stable exchange of information and decision alignment. Without communication, support turns into chaos—coordination determines effectiveness."

  TMR_recognize_opr:0 "Recognize the OPR"
  TMR_recognize_opr_desc:0 "Take a political step that strengthens the alliance and improves relations with the OPR. This raises the stakes in the region and makes support more open."

  TMR_accept_refugees:0 "Accept Pro-Russian Refugees"
  TMR_accept_refugees_desc:0 "After the OPR collapses, the situation hardens sharply: detentions, checks, and pressure begin against people suspected of sympathizing with pro-Russian forces. We cannot leave them to their fate. Transnistria must open its doors to refugees and shoulder the humanitarian burden, even if it undermines internal stability."

  TMR_temporary_shelters:0 "Deploy Temporary Accommodation Centers"
  TMR_temporary_shelters_desc:0 "Organize reception points, housing, and first-line assistance. It is costly and unpopular, but it reduces social tension and makes the process manageable."

  TMR_refugee_registration:0 "Registration and Filtering of Flows"
  TMR_refugee_registration_desc:0 "Bring order to the flows: accounting, checks, and routing. This reduces infiltration risks, but requires tough decisions and political costs."

  TMR_employment_program:0 "Adaptation and Employment Program"
  TMR_employment_program_desc:0 "Shift from emergency response to long-term integration: employment, retraining, and reducing the social burden on the budget."

  TMR_border_hardening:0 "Tighten the Border Security Regime"
  TMR_border_hardening_desc:0 "Rebuild border control for a prolonged crisis: more checks, faster response, fewer vulnerable sections. It won’t solve the problem completely, but it increases predictability."

  TMR_internal_stabilization:0 "Internal Stabilization"
  TMR_internal_stabilization_desc:0 "The OPR is gone—along with our hopes for a quick break from isolation. Now the priority is different: keep order at home and ease tensions. We stabilize the system and return to ordinary life."

  TMR_quiet_life_end:0 "Continue the Policy of Isolationism"
  TMR_quiet_life_end_desc:0 "Bet on self-preservation: fewer external obligations, more internal discipline, and caution."
