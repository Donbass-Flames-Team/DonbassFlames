UKR_volunteer_battalion_11_desc: "Consists of local volunteers. Maintains order in Kyiv and is preparing for combat operations.\n\n\t§G3 divisions will be added to the available forces§!"
UKR_volunteer_battalion_aidar_desc: "Formed from volunteers from the eastern regions. Trained for raids and sweeps, under command control.\n\n\t§G5 divisions will be added to the available forces§!"
UKR_volunteer_battalion_artemivsk_desc: "Includes locals from Artemivsk (Bakhmut). Provides security and order in the city.\n\n\t§G3 divisions will be added to the available forces§!"
UKR_volunteer_battalion_bogdan_desc: "A small unit of volunteers. Maintains order in the region and undergoes basic training.\n\n\t§G1 division will be added to the available forces§!"
UKR_volunteer_battalion_chernigyv_desc: "Consists of locals from Chernihiv. Provides security for public facilities and prepares for redeployment.\n\n\t§G1 division will be added to the available forces§!"
UKR_volunteer_battalion_dnipro_desc: "Includes volunteers from Dnipropetrovsk (Dnipro) and the region. Guards key facilities and prepares for divisional formation.\n\n\t§G5 divisions will be added to the available forces§!"
UKR_volunteer_battalion_dnipro2_desc: "Unit of volunteers from Dnipropetrovsk (Dnipro) and the region. Undergoes tactical training and maintains order.\n\n\t§G4 divisions will be added to the available forces§!"
UKR_volunteer_battalion_dnipropetrovsk_desc: "Formed from local volunteers. Maintains order in Dnipropetrovsk (Dnipro) and prepares for combat.\n\n\t§G3 divisions will be added to the available forces§!"
UKR_volunteer_battalion_kharkov_desc: "Consists of volunteers from Kharkiv. Maintains order in the city and prepares for further deployment.\n\n\t§G3 divisions will be added to the available forces§!"
UKR_volunteer_battalion_kherson_desc: "A small detachment from Kherson. Provides security for urban facilities and prepares for combat tasks.\n\n\t§G1 division will be added to the available forces§!"
UKR_volunteer_battalion_kievskarus_desc: "Unit from Kyiv. Maintains order and prepares for divisional formation.\n\n\t§G3 divisions will be added to the available forces§!"
UKR_volunteer_battalion_kirovograd_desc: "Formed from volunteers of Kirovohrad (Kropyvnytskyi). Trained for raids and sweeps.\n\n\t§G5 divisions will be added to the available forces§!"
UKR_volunteer_battalion_kremenchuk_desc: "A small company from Kremenchuk. Provides security and supports order.\n\n\t§G1 division will be added to the available forces§!"
UKR_volunteer_battalion_krivbas_desc: "Unit from Kryvyi Rih. Maintains order in the region and prepares for divisional formation.\n\n\t§G4 divisions will be added to the available forces§!"
UKR_volunteer_battalion_kulchickogo_desc: "Detachment of volunteers named after Kulchytskyi. Provides security and tactical training.\n\n\t§G4 divisions will be added to the available forces§!"
UKR_volunteer_battalion_luhansk_desc: "Consists of volunteers from Luhansk. Maintains order and prepares for deployment in the combat zone.\n\n\t§G3 divisions will be added to the available forces§!"
UKR_volunteer_battalion_lviv_desc: "Unit from Lviv. Maintains order in the city and undergoes training.\n\n\t§G3 divisions will be added to the available forces§!"
UKR_volunteer_battalion_mikolaiv_desc: "Ready to guard key facilities in Mykolaiv. Consists of local volunteers.\n\n\t§G3 divisions will be added to the available forces§!"
UKR_volunteer_battalion_oun_desc: "Unit for patrolling and supporting operations.\n\n\t§G4 divisions will be added to the available forces§!"
UKR_volunteer_battalion_poltava_desc: "Detachment for guarding and patrolling in Poltava. Consists of local volunteers.\n\n\t§G3 divisions will be added to the available forces§!"
UKR_volunteer_battalion_praviysektor_desc: "Large formation for organizing operations and patrolling.\n\n\t§G6 divisions will be added to the available forces§!"
UKR_volunteer_battalion_shatarsk_desc: "Unit for security and patrolling in Shakhtarsk. Consists of local volunteers.\n\n\t§G3 divisions will be added to the available forces§!"
UKR_volunteer_battalion_sich_desc: "Ready for raids and ensuring security.\n\n\t§G4 divisions will be added to the available forces§!"
UKR_volunteer_battalion_sicheslav_desc: "A small unit for patrolling.\n\n\t§G1 division will be added to the available forces§!"
UKR_volunteer_battalion_slabozansina_desc: "Unit prepared for guarding and local operations.\n\n\t§G3 divisions will be added to the available forces§!"
UKR_volunteer_battalion_svitaz_desc: "A small unit for guarding facilities.\n\n\t§G1 division will be added to the available forces§!"
UKR_volunteer_battalion_vinitsa_desc: "Detachment for patrolling and maintaining order in Vinnytsia. Consists of local volunteers.\n\n\t§G3 divisions will be added to the available forces§!"




