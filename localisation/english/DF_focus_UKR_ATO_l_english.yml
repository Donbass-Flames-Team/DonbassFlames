 UKR_government_in_anarchy: "Government in Anarchy"
 UKR_government_in_anarchy_desc: "The former president has fled the country, and parliament is unable to take the lead. Power is paralyzed, institutions are non-functional. The state is plunging into political chaos, and a power vacuum reigns on the streets of Kyiv. No one is in control of the situation, and everyone is deciding for themselves how to act."
 UKR_start_of_ato: "Beginning of the Anti-Terrorist Operation"
 UKR_start_of_ato_desc: "We are faced with an armed threat that challenges our sovereignty and order. The government decides to launch a large-scale Anti-Terrorist Operation (ATO). The operation will be initiated following a presidential decree and a decision by the National Security and Defense Council."
 UKR_new_parliament_composition: "New Parliament Composition"
 UKR_new_parliament_composition_desc: "A new parliament has been formed following Yanukovych's flight. A new stage in the country's governance begins."
 UKR_mobilization_of_reservists: "Mobilization of Reservists"
 UKR_mobilization_of_reservists_desc: "The mobilization of reservists begins to strengthen defense capabilities and prepare for possible clashes."
 UKR_deal_with_prorussians_protests: "Deal with Pro-Russian Protesters"
 UKR_deal_with_prorussians_protests_desc: "An attempt to negotiate with pro-Russian activists to reduce tensions in the country."
 UKR_recapture_part_of_donetsk_region: "Recapturing parts of Donetsk Region"
 UKR_recapture_part_of_donetsk_region_desc: "Military operations aimed at regaining control over parts of the Donetsk region."
 UKR_recapture_part_of_luhansk_region: "Recapturing parts of Luhansk Region"
 UKR_recapture_part_of_luhansk_region_desc: "Military operations aimed at regaining control over parts of the Luhansk region."
 UKR_send_additional_forces_to_odessa: "Sending Additional Forces to Odesa"
 UKR_send_additional_forces_to_odessa_desc: "Reinforcements are being sent to Odesa to support local forces and stabilize the situation."
 UKR_block_the_crimea: "Blockade of Crimea"
 UKR_block_the_crimea_desc: "A blockade of Crimea begins to restrict movement and supplies."
 UKR_end_of_separatism: "Victory over Separatism"
 UKR_end_of_separatism_desc: "Separatist movements have been suppressed; the country returns to unity."
 UKR_send_militties_to_kharkov: "Sending Militias to Kharkiv"
 UKR_send_militties_to_kharkov_desc: "Local militias are sent to Kharkiv to maintain order and security."
 UKR_crush_kharkov_people_republic: "Crushing the Kharkiv People's Republic"
