UKR_government_in_anarchy: "Anarchy in the Government"
UKR_government_in_anarchy_desc: "The former president has fled the country, and parliament is unable to assume leadership. Power is paralyzed, institutions are dysfunctional. The state is plunging into political chaos, and anarchy reigns on the streets of Kyiv. No one is in control, and everyone decides how to act."
UKR_start_of_ato: "Start of the Anti-Terrorist Operation"
UKR_start_of_ato_desc: "We are faced with an armed threat that challenges sovereignty and order. The government has decided to launch a large-scale Anti-Terrorist Operation. The operation will be launched following a decree from the head of state and a decision by the National Security and Defense Council."
UKR_new_parliament_composition: "New Parliament"
UKR_new_parliament_composition_desc: "A new parliament has been formed after Yanukovych's flight. A new stage in the country's governance begins."
UKR_mobilization_of_reservists: "Mobilization of reservists"
UKR_mobilization_of_reservists_desc: "The mobilization of reservists has begun to strengthen defense capabilities and prepare for possible clashes."
UKR_deal_with_prorussians_protests: "Agreement with pro-Russian protesters"
UKR_deal_with_prorussians_protests_desc: "An attempt to reach an agreement with pro-Russian activists and reduce tensions in the country."
UKR_recapture_part_of_donetsk_region: "Recapture of part of Donetsk Oblast"
UKR_recapture_part_of_donetsk_region_desc: "Military operations are aimed at recapturing part of Donetsk Oblast."
UKR_recapture_part_of_luhansk_region: "Recapture of part of Luhansk Oblast"
UKR_recapture_part_of_luhansk_region_desc: "Military operations are aimed at recapturing part of Luhansk Oblast."
UKR_send_additional_forces_to_odessa: "Sending additional forces to Odessa"
UKR_send_additional_forces_to_odessa_desc: "Reinforcements are being sent to Odessa to support local forces and stabilize the situation."
UKR_block_the_crimea: "Blockade of Crimea"
UKR_block_the_crimea_desc: "A blockade of Crimea begins to restrict movement and supplies."
UKR_end_of_separatism: "Victory over separatism"
UKR_end_of_separatism_desc: "Separatist movements have been suppressed, the country is returning to unity."
UKR_send_militties_to_kharkov: "Sending militias to Kharkiv"
UKR_send_militties_to_kharkov_desc: "Local militias are being sent to Kharkiv to maintain order and security."
UKR_crush_kharkov_people_republic: "The defeat of the Kharkiv People's Republic"
UKR_crush_kharkov_people_republic_desc: "Military actions are aimed at eliminating the self-proclaimed Kharkiv People's Republic."
UKR_humanitarion_help_to_people: "Humanitarian aid to the population"
UKR_humanitarion_help_to_people_desc: "Organizing aid to civilians in conflict zones."
UKR_strengthen_slavyansk: "Strengthening Slovyansk"
UKR_strengthen_slavyansk_desc: "Strengthening defense and security in the city of Slovyansk."
UKR_strengthen_kramatorsk: "Strengthening Kramatorsk"
UKR_strengthen_kramatorsk_desc: "Strengthening defense and security in the city of Kramatorsk."
UKR_emergency_redeployment_of_troops: "Emergency redeployment of troops"
UKR_emergency_redeployment_of_troops_desc: "Rapid deployment of troops to respond to crisis situations."
UKR_organize_frontline: "Forming a frontline"
UKR_organize_frontline_desc: "Measures to stabilize and establish a frontline in the ATO zone."
UKR_organize_defense: "Organizing defense"
UKR_organize_defense_desc: "Measures to organize and strengthen the country's defense."
UKR_prepare_the_defense_of_cities: "Preparing the defense of cities"
UKR_prepare_the_defense_of_cities_desc: "Preparing and strengthening defensive positions in key cities."
UKR_launch_counterattacks: "Beginning counteroffensives"
UKR_launch_counterattacks_desc: "Conducting counteroffensive operations against the rebels."
UKR_volunteer_battalions: "Volunteer Battalions"
UKR_volunteer_battalions_desc: "Formation of volunteer battalions to support the army."
UKR_volunteer_battalion_azov: "Azov Battalion"
UKR_volunteer_battalion_azov_desc: "Creation and deployment of the Azov Battalion to fight separatists."
