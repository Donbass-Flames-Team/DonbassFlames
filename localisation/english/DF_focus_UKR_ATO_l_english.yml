 UKR_volunteer_battalion_11_desc: "Consists of local volunteers. Maintains order in Kyiv and undergoes training for combat operations.\n\n\t§G3 divisions will be added to available forces§!"
 UKR_volunteer_battalion_aidar_desc: "Formed from volunteers from eastern regions. Trained for raids and sweeps, under the control of the command.\n\n\t§G5 divisions will be added to available forces§!"
 UKR_volunteer_battalion_artemivsk_desc: "Includes local residents of Artemivsk (Bakhmut). Engaged in facility protection and organizing order in the city.\n\n\t§G3 divisions will be added to available forces§!"
 UKR_volunteer_battalion_bogdan_desc: "A small unit of volunteers. Maintains order in the region and undergoes basic training.\n\n\t§G1 division will be added to available forces§!"
 UKR_volunteer_battalion_chernigyv_desc: "Consists of local residents of Chernihiv. Provides security for public facilities and prepares for deployment.\n\n\t§G1 division will be added to available forces§!"
 UKR_volunteer_battalion_dnipro_desc: "Includes volunteers from Dnipropetrovsk (Dnipro) and the surrounding region. Protects key facilities and prepares for division formation.\n\n\t§G5 divisions will be added to available forces§!"
 UKR_volunteer_battalion_dnipro2_desc: "A unit of volunteers from Dnipropetrovsk (Dnipro) and the region. Undergoes tactical training and maintains order in the region.\n\n\t§G4 divisions will be added to available forces§!"
 UKR_volunteer_battalion_dnipropetrovsk_desc: "Formed from local volunteers. Ensures order in Dnipropetrovsk (Dnipro) and prepares for possible combat operations.\n\n\t§G3 divisions will be added to available forces§!"
 UKR_volunteer_battalion_kharkov_desc: "Consists of Kharkiv volunteers. Controls order in the city and prepares for further deployment.\n\n\t§G3 divisions will be added to available forces§!"
 UKR_volunteer_battalion_kherson_desc: "A small detachment from Kherson. Engaged in guarding city facilities and preparing for combat missions.\n\n\t§G1 division will be added to available forces§!"
 UKR_volunteer_battalion_kievskarus_desc: "A detachment from Kyiv. Ensures order and prepares for division formation.\n\n\t§G3 divisions will be added to available forces§!"
 UKR_volunteer_battalion_kirovograd_desc: "Formed from volunteers of Kirovohrad (Kropyvnytskyi). Undergoes training for raids and security sweeps.\n\n\t§G5 divisions will be added to available forces§!"
 UKR_volunteer_battalion_kremenchuk_desc: "A small company from Kremenchuk. Engaged in security and order maintenance.\n\n\t§G1 division will be added to available forces§!"
 UKR_volunteer_battalion_krivbas_desc: "A unit from Kryvyi Rih. Controls order in the region and prepares for division formation.\n\n\t§G4 divisions will be added to available forces§!"
 UKR_volunteer_battalion_kulchickogo_desc: "A volunteer detachment named after Kulchytsky. Engaged in security and tactical training.\n\n\t§G1 battalion will be added to available forces§!"
 UKR_volunteer_battalion_luhansk_desc: "Consists of local volunteers from Luhansk. Ensures order and prepares for deployment to the combat zone.\n\n\t§G3 divisions will be added to available forces§!"
 UKR_volunteer_battalion_lviv_desc: "A unit from Lviv. Maintains order in the city and undergoes training.\n\n\t§G3 divisions will be added to available forces§!"
