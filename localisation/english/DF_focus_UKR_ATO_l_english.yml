 # Descriptions
 UKR_volunteer_battalion_11_desc: "Composed of local volunteers. Maintains order in Kyiv and is undergoing combat training.\n\n\t§G3 divisions will be added to available forces§!"
 UKR_volunteer_battalion_aidar_desc: "Formed from volunteers from eastern regions. Trained for raids and clearing operations, under the control of the command.\n\n\t§G5 divisions will be added to available forces§!"
 UKR_volunteer_battalion_artemivsk_desc: "Includes local residents of Artemivsk (Bakhmut). Handles facility protection and organization of order in the city.\n\n\t§G3 divisions will be added to available forces§!"
 UKR_volunteer_battalion_bogdan_desc: "A small unit of volunteers. Maintains order in the region and undergoes basic training.\n\n\t§G1 division will be added to available forces§!"
 UKR_volunteer_battalion_chernigyv_desc: "Consists of local residents of Chernihiv. Ensures the security of public facilities and prepares for deployment.\n\n\t§G1 division will be added to available forces§!"
 UKR_volunteer_battalion_dnipro_desc: "Includes volunteers from Dnipropetrovsk (Dnipro) and the region. Protects key facilities and prepares for the formation of divisions.\n\n\t§G5 divisions will be added to available forces§!"
 UKR_volunteer_battalion_dnipro2_desc: "A unit of volunteers from Dnipropetrovsk (Dnipro) and the region. Undergoes tactical training and maintains order in the region.\n\n\t§G4 divisions will be added to available forces§!"
 UKR_volunteer_battalion_dnipropetrovsk_desc: "Formed from local volunteers. Ensures order in Dnipropetrovsk (Dnipro) and prepares for possible combat operations.\n\n\t§G3 divisions will be added to available forces§!"
 UKR_volunteer_battalion_kharkov_desc: "Consists of Kharkiv volunteers. Controls order in the city and prepares for further deployment.\n\n\t§G3 divisions will be added to available forces§!"
 UKR_volunteer_battalion_kherson_desc: "A small detachment from Kherson. Handles city facility protection and prepares for combat missions.\n\n\t§G1 division will be added to available forces§!"
 UKR_volunteer_battalion_kievskarus_desc: "A detachment from Kyiv. Ensures order and prepares for division formation.\n\n\t§G3 divisions will be added to available forces§!"
 UKR_volunteer_battalion_kirovograd_desc: "Formed from volunteers of Kirovohrad (Kropyvnytskyi). Undergoes training for raids and clearing operations.\n\n\t§G5 divisions will be added to available forces§!"
 UKR_volunteer_battalion_kremenchuk_desc: "A small company from Kremenchuk. Engaged in protection and support of order.\n\n\t§G1 division will be added to available forces§!"
 UKR_volunteer_battalion_krivbas_desc: "A unit from Kryvyi Rih. Controls order in the region and prepares for division formation.\n\n\t§G4 divisions will be added to available forces§!"
 UKR_volunteer_battalion_kulchickogo_desc: "Volunteer detachment named after Kulchytskyi. Engaged in security and tactical training.\n\n\t§G1 battalion will be added to available forces§!"
 UKR_volunteer_battalion_luhansk_desc: "Consists of local Luhansk volunteers. Ensures order and prepares for deployment in the combat zone.\n\n\t§G3 divisions will be added to available forces§!"
 UKR_volunteer_battalion_lviv_desc: "A unit from Lviv. Maintains order in the city and undergoes training.\n\n\t§G3 divisions will be added to available forces§!"
 UKR_volunteer_battalion_mikolaiv_desc: "Ready to protect key facilities in Mykolaiv. Composed of local volunteers.\n\n\t§G3 divisions will be added to available forces§!"
 UKR_volunteer_battalion_oun_desc: "A unit for patrolling and operational support.\n\n\t§G4 divisions will be added to available forces§!"
 UKR_volunteer_battalion_poltava_desc: "A detachment for territory protection and patrolling in Poltava. Composed of local volunteers.\n\n\t§G3 divisions will be added to available forces§!"
 UKR_volunteer_battalion_praviysektor_desc: "A large formation for organizing operations and patrolling.\n\n\t§G6 divisions will be added to available forces§!"
 UKR_volunteer_battalion_shatarsk_desc: "A unit for protection and patrolling of the Shakhtarsk district. Composed of local volunteers.\n\n\t§G3 divisions will be added to available forces§!"
 UKR_volunteer_battalion_sich_desc: "Ready for conducting raids and ensuring security.\n\n\t§G4 divisions will be added to available forces§!"
