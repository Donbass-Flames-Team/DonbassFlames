l_english:
 UKR_government_in_anarchy: "Anarchy in government"
 UKR_government_in_anarchy_desc: "Previous president fled the country, and Parliament can’t take governance into its own hands. Government paralyzed, institutions are not functioning. Government going into political chaos, on the streets of Kyiv anarchy. No one controls the situation, and everyone decides what to do."
 UKR_start_of_ato: "Start of the Anti-Terrorist Operation"
 UKR_start_of_ato_desc: "We are facing an armed threat that challenges sovereignty and order. The government has decided to launch a large-scale Anti-Terrorist Operation. The operation will be initiated following a decree from the head of state and a decision by the National Security and Defense Council."
 UKR_new_parliament_composition: "New parliament Composition"
 UKR_new_parliament_composition_desc: "Created a new Parliament after Yanukovich's escape. A new stage in the management of Ukraine begins"
 UKR_mobilization_of_reservists: "Mobilization of reservistis"
 UKR_mobilization_of_reservists_desc: "Starting mobilization of reservists to strengthen defense capabilities and prepare for possible collisions"
 UKR_deal_with_prorussians_protests: "Deal with prorussians protests"
 UKR_deal_with_prorussians_protests_desc: "We're trying to reach an agreement with pro-Russian protesters and reduce tension in the country"
 UKR_recapture_part_of_donetsk_region: "Recapture part of Donetsk region"
 UKR_recapture_part_of_donetsk_region_desc: "Special war operation aimed at recapturing control over part of the Donetsk region"
 UKR_recapture_part_of_luhansk_region: "Recapture part of Luhansk region"
 UKR_recapture_part_of_luhansk_region_desc: "Special war operation aimed at recapturing control over part of the Luhansk region."
 UKR_send_additional_forces_to_odessa: "Sending additional forces to Odessa"
 UKR_send_additional_forces_to_odessa_desc: "Reinforcements are being sent to Odessa to support local forces and stabilize the situation."
 UKR_block_the_crimea: "Blockade of Crimea"
 UKR_block_the_crimea_desc: "A blockade of Crimea begins to restrict movement and supplies."
 UKR_end_of_separatism: "Victory over separatism"
 UKR_end_of_separatism_desc: "Separatist movements have been suppressed, and the country returns to unity."
 UKR_send_militties_to_kharkov: "Sending militias to Kharkiv"
 UKR_send_militties_to_kharkov_desc: "Local militias are sent to Kharkiv to support order and security."
 UKR_crush_kharkov_people_republic: "Crushing the Kharkiv People's Republic"
 UKR_crush_kharkov_people_republic_desc: "Military operations are aimed at eliminating the self-proclaimed Kharkiv People's Republic."
 UKR_humanitarion_help_to_people: "Humanitarian aid to the population"
 UKR_humanitarion_help_to_people_desc: "Organizing assistance for civilians in conflict zones."
 UKR_strengthen_slavyansk: "Strengthening Sloviansk"
 UKR_strengthen_slavyansk_desc: "Enhancing defense and security in the city of Sloviansk."
 UKR_strengthen_kramatorsk: "Strengthening Kramatorsk"
 UKR_strengthen_kramatorsk_desc: "Enhancing defense and security in the city of Kramatorsk."
 UKR_emergency_redeployment_of_troops: "Emergency redeployment of troops"
 UKR_emergency_redeployment_of_troops_desc: "Rapid redeployment of troops to respond to crisis situations."
 UKR_organize_defense: "Organizing defense"
 UKR_organize_defense_desc: "Measures to organize and strengthen the country's defense."
 UKR_prepare_the_defense_of_cities: "Preparing city defenses"
 UKR_prepare_the_defense_of_cities_desc: "Preparation and fortification of defensive positions in key cities."
 UKR_launch_counterattacks: "Launching counterattacks"
 UKR_launch_counterattacks_desc: "Conducting counteroffensive operations against insurgents."
 UKR_volunteer_battalions: "Volunteer battalions"
 UKR_volunteer_battalions_desc: "Formation of volunteer battalions to support the army."
 UKR_volunteer_battalion_azov: "Volunteer battalion 'Azov'"
 UKR_volunteer_battalion_azov_desc: "Creation and deployment of the 'Azov' battalion to fight separatists."
 UKR_volunteer_battalion_of_mvd: "Volunteer battalion of the Ministry of Internal Affairs"
 UKR_volunteer_battalion_of_mvd_desc: "Formation of a volunteer battalion under the Ministry of Internal Affairs."

