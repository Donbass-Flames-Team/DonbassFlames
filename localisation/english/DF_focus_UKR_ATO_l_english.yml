l_english:
 UKR_government_in_anarchy: "Anarchy in the Government"
 UKR_government_in_anarchy_desc: "The former president has fled the country, and the parliament is unable to assume leadership. Power is paralyzed, and institutions are not functioning. The state is plunging into political chaos, and lawlessness reigns on the streets of Kyiv. No one controls the situation, and everyone decides how to act on their own."

 UKR_start_of_ato: "Start of the Anti-Terrorist Operation"
 UKR_start_of_ato_desc: "We are facing an armed threat that challenges sovereignty and order. The government has decided to begin a large-scale Anti-Terrorist Operation. The operation will begin after a decree from the head of state and a decision of the National Security and Defense Council."

 UKR_new_parliament_composition: "New Composition of Parliament"
 UKR_new_parliament_composition_desc: "A new parliament has been formed after Yanukovych fled the country. A new stage in governing the country begins."

 UKR_mobilization_of_reservists: "Mobilization of Reservists"
 UKR_mobilization_of_reservists_desc: "The mobilization of reservists begins in order to strengthen defense capabilities and prepare for possible clashes."

 UKR_deal_with_prorussians_protests: "Deal with Pro-Russian Protesters"
 UKR_deal_with_prorussians_protests_desc: "An attempt to negotiate with pro-Russian activists and reduce tensions in the country."

 UKR_recapture_part_of_donetsk_region: "Recapture Part of the Donetsk Region"
 UKR_recapture_part_of_donetsk_region_desc: "Military operations aimed at regaining control over parts of the Donetsk region."

 UKR_recapture_part_of_luhansk_region: "Recapture Part of the Luhansk Region"
 UKR_recapture_part_of_luhansk_region_desc: "Military operations aimed at regaining control over parts of the Luhansk region."

 UKR_send_additional_forces_to_odessa: "Send Additional Forces to Odesa"
 UKR_send_additional_forces_to_odessa_desc: "Reinforcements are sent to Odesa to support local forces and stabilize the situation."

 UKR_block_the_crimea: "Blockade of Crimea"
 UKR_block_the_crimea_desc: "A blockade of Crimea begins in order to restrict movement and supplies."

 UKR_end_of_separatism: "Victory over Separatism"
 UKR_end_of_separatism_desc: "Separatist movements have been suppressed, and the country returns to unity."

 UKR_send_militties_to_kharkov: "Send Militias to Kharkiv"
 UKR_send_militties_to_kharkov_desc: "Local militias are sent to Kharkiv to support order and security."

 UKR_crush_kharkov_people_republic: "Crush the Kharkiv People's Republic"
 UKR_crush_kharkov_people_republic_desc: "Military actions aimed at eliminating the self-proclaimed Kharkiv People's Republic."

 UKR_humanitarion_help_to_people: "Humanitarian Aid to the Population"
 UKR_humanitarion_help_to_people_desc: "Organization of assistance for civilians in conflict zones."

