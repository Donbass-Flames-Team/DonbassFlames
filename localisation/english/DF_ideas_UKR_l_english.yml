 UKR_dependence_on_russia: "Dependence on Russia"
 UKR_dependence_on_russia_desc: "Ukraine's dependence on the Russian Federation has historically been shaped by a complex set of economic, energy, and political factors, which, intertwined, have created a stable system of influence, manifested in both trade and security matters. For decades, Ukraine, as part of the post-Soviet space, remained closely tied to Russia through natural gas and oil supplies, which not only determined the structure of its energy balance but also turned the fuel and energy sector into an instrument of political pressure, especially during periods of tension in bilateral relations. Furthermore, the industry of Ukraine's eastern regions, oriented toward cooperation with Russian enterprises, has long been dependent on exporting its products to the Russian market, as a result of which any attempt The reorientation of the economy toward Europe was accompanied by significant difficulties and social costs. Political dependence manifested itself in the fact that Russia, exploiting historical, cultural, and linguistic ties, sought to maintain its influence in Ukrainian domestic and foreign policy, often resorting to economic sanctions, propaganda, and support for pro-Russian forces, which hindered the strengthening of the sovereignty and independence of the Ukrainian state.\n\n\n§ORussian Influence in Ukraine: [?RUS_influence_in_ukraine]%§!"
