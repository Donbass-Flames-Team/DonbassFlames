 UKR_separatism: "Separatism"
 UKR_separatism_desc: "Separatism in Ukraine is gradually gaining strength under the influence of internal contradictions and external pressure, primarily from Russia, which actively supported pro-Russian movements seeking to strengthen their influence in the southeastern regions of the country. Using economic levers, the media space, and the ideology of the Russian world, Russia tried to create a sense of shared historical destiny and cultural closeness among part of the population, contrasting these values ​​with the European vector of development that the Ukrainian leadership was striving for. §O\n\n\nThe level of separatism in Donetsk Oblast: [?DPR_separatism_value]%\nThe level of separatism in Luhansk Oblast: [?LPR_separatism_value]% \nThe level of separatism in Kharkiv Oblast: [?HPR_separatism_value]% \nThe level of separatism in Odessa Oblast: [?OPR_separatism_value]% \nThe level of separatism in Transcarpathia: [?ZKR_separatism_value]%§!"
