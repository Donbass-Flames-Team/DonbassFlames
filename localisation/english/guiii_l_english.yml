 separatismgui_prorussian_rally_tt:0 " Holding a rally in support of closer relations with Russia. The mass event should strengthen the position of Russian supporters and weaken the influence of §Cpro-Ukrainian forces§!.\n \n §YEffect when selected:§!\n §RPro-Russian population§! increases by §G+5%§!\n §CLoyalty to Ukraine§! decreases\n §YDecision cost:§! £pol_power §Y25§!\n §YCooldown:§! §Y14§! days."
 separatism_prorussian_incerase_tt:0 " Launching a large-scale pro-Russian propaganda campaign aimed at promoting Russian values and weakening §Cpro-Ukrainian sentiment§! in the region.\n \n §YEffect when selected:§!\n §RPro-Russian population§! increases by §G+5%§!\n §CLoyalty to Ukraine§! decreases\n §YDecision cost:§! £pol_power §Y25§!\n §YCooldown:§! §Y14§! days."
 separatism_radicalize_people_tt:0 " Formation and support of radical pro-Russian groups ready to confront §Cpro-Ukrainian organizations§! and destabilize the situation in the region.\n \n §YEffect when selected:§!\n §RPro-Russian population§! increases by §G+5%§!\n §CLoyalty to Ukraine§! decreases\n §YDecision cost:§! £pol_power §Y25§!\n §YCooldown:§! §Y14§! days."
 arms_supplies_from_russia_tt:0 " Organizing supply channels for weapons and smuggling from Russia to support pro-Russian forces and weaken the §Cpro-Ukrainian population§!.\n \n §YEffect when selected:§!\n §RPro-Russian population§! increases by §G+5%§!\n §CLoyalty to Ukraine§! decreases\n §YDecision cost:§! £pol_power §Y25§!\n §YCooldown:§! §Y14§! days."

 separatism_hold_proukranian_rally_tt:0 " Holding a rally in support of unity with Ukraine.\n \n §YEffect when selected:§!\n §CPro-Ukrainian population§! increases by §G+5%§!\n §RSeparatist activity§! decreases\n §YDecision cost:§! £pol_power §Y25§!\n §YCan be used again in:§! §Y14§! days."
 separatism_proukranian_incerase_tt:0 " Organizing a large-scale information campaign supporting closer ties with Ukraine.\n \n §YEffect when selected:§!\n §CPro-Ukrainian population§! increases by §G5%§!\n §RSeparatist activity§! decreases\n §YDecision cost:§! £pol_power §Y25§!\n §YCan be used again in:§! §Y14§! days."
 separatism_deradicalize_people_tt:0 " A program to strengthen population loyalty and reduce the influence of radical elements.\n \n §YEffect when selected:§!\n §CPro-Ukrainian population§! increases by §G5%§!\n §RSeparatist activity§! decreases\n §YDecision cost:§! £pol_power §Y25§!\n §YCan be used again in:§! §Y14§! days."
 fight_smuggling_from_russia_tt:0 " Stop weapon supplies to separatists from Russia. Locate hidden caches, block illegal routes and detain smugglers to restore control over the region.\n \n §YEffect when selected:§!\n §CPro-Ukrainian population§! increases by §G5%§!\n §RSeparatist activity§! decreases\n §YDecision cost:§! £pol_power §Y25§!\n §YCan be used again in:§! §Y14§! days."

