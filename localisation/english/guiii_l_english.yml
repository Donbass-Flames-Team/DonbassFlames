 SEPARATISM_GUI_HELP_BUTTON:0 "§YSeparatism GUI Guide§!\n\n\nThe separatism GUI displays the level of separatist sentiment and the readiness of regions for an uprising. The higher this value is, the more divisions, equipment and territories the separatists will receive if the uprising begins.\n\nRegional separatism reflects the mood of the population living in the selected regions.\n§RWith a high level of pro-Russian sentiment, separatists receive additional buffs, the population supports them more actively and more often joins their ranks.§!\n§5With a high level of pro-Ukrainian sentiment, the same principle applies — the number of buffs for the Ukrainian Armed Forces increases and the population provides greater support.§!"

