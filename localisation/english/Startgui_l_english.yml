﻿l_english:
 country_info_startgui_ukr:0 "On November 21, 2013, Euromaidan began in Ukraine — mass protests sparked by the government's decision to suspend the signing of the Association Agreement with the EU. The movement quickly escalated into a full-scale confrontation between citizens and the authorities, expressing dissatisfaction with the corruption and authoritarianism of the Yanukovych regime. By February 2014, the protests reached their peak: bloody clashes occurred in Kyiv, resulting in the deaths of dozens of people. On February 22, Yanukovych fled the country, leading to a change of power. Shortly after, Russia annexed Crimea, and pro-Russian demonstrations began in the eastern regions of Ukraine, which by April 2014 had escalated into an armed conflict in the Donbas."
