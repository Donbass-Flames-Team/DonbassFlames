 country_info_startgui_ukr:0 "On 21 November 2013, Euromaidan - mass protests sparked by the government's decision to suspend the signing of the association agreement with the EU - began in Ukraine. The movement quickly escalated into a large-scale confrontation between citizens and the government, expressing dissatisfaction with corruption and authoritarianism of the Yanukovych regime. By February 2014, the protests had reached a peak, with bloody clashes in Kyiv and dozens of deaths. On 22 February, Yanukovych fled the country and the government was replaced. Shortly thereafter, Russia annexed Crimea, and pro-Russian protests began in Ukraine's eastern regions, which escalated into armed conflict in Donbas by April 2014."
