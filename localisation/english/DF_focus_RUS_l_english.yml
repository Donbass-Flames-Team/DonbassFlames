l_english:
 RUS_sochi_olympics: "Olympics in Sochi"
 RUS_sochi_olympics_desc: "This year, the long-awaited Olympic Games are planned in Sochi. This is the second Olympic Games in Russia, and the first specifically winter Olympics in Russia. The opening of the Olympics will be personally handled by President Vladimir Putin, according to official information will participate more than 88 countries, and the total number of athletes is 2,800 people, the event itself will take place from February 7 to February 23. Organizers promise that the Olympics will be remembered beautifully, and will be a real pride of the city of Sochi."
 RUS_conceal_internal_problems: "Conceal internal problems"
 RUS_conceal_internal_problems_desc: "Russia has undoubtedly passed through the major difficult period that it faced in the 1990s, the difficult times for our country are behind us, and since the beginning of the zero years we have managed to solve many problems. But some of these problems remain to this day, at least a high degree of corruption, oligarchy, nepotism, outdated social institutions, some economic problems, and generally not the better standard of living we could dream of. All these factors damage our image both in the international arena and among our people, and it would be a good thing to hide these problems or downplay their importance."
 RUS_law_from_roskomnadzor: "Law from Roskomnadzor"
 RUS_law_from_roskomnadzor_desc: "Roskomnadzor proposed a project that establishes the obligation for owners of websites and pages on the Internet with daily visits to more than 3 thousand people to register in the registry of Roskomnadzor and be responsible for the information posted. This proposal has been met with criticism, some consider it a restriction of citizens' rights in order to control people by the security structures and on the internet, and some consider it a forced measure for a safe internet"
 RUS_suppress_pro_ukrainian_citizens: "Suppress pro-Ukrainian citizens"
 RUS_suppress_pro_ukrainian_citizens_desc: "There are enough people in Russia who express sympathy for the Ukrainians, praise them for maidan and wish to repeat it at home. We have many such people, Nemtsov, Novodvorskaya, Yavlinsky, who are eager to shed blood on the streets of Russia, and sell our power to the Western elites, bring us back in the 90s briefly. Undoubtedly, this is an opposition mood to undermine the stability of our country, and such people should be seen for their activities. Not to repeat the Ukrainian scenario in Russia."
 RUS_threat_to_the_regime_yanukovych: "Threat to the Yanukovich regime"
 RUS_threat_to_the_regime_yanukovych_desc: "In Ukraine, the political crisis continues, and the risk of the fall of Yanukovych’s government is increasing, and it would not be advantageous for us if a man loyal to us stepped down as president of Ukraine and pro-Western politicians came to replace him. Information is emerging that the Ukrainian opposition and Yanukovych’s government are preparing new negotiations to resolve the crisis, and they will probably at least demand concessions from Yanukovych, and at most demand that he resign. Second Yushchenko in Ukraine we do not need, and if we do not take any measures, then maybe Ukraine will leave our sphere of influence."
 RUS_meeting_in_the_kremlin: "Meeting in the Kremlin"
 RUS_meeting_in_the_kremlin_desc: "Russian Federation President Vladimir Putin has urgently convened the Russian Security Council, which is likely to discuss the tense situation in Ukraine and the possible adoption of forced measures to protect Russia’s national interests. We may have to use the security forces or even the military to deal with the escalation, but in any case, the situation remains dangerous for both Yanukovych’s government and us in the future, and requires some operational solutions while there is still time."
 RUS_assistance_in_organizing_anti_Maidan: "Assistance in organazing anti-Maidan"
 RUS_assistance_in_organizing_anti_Maidan_desc: "In order to prevent the supporters of Maidan from taking full initiative in Ukraine, we need to help organize Anti-Maidan. To finance rallies in support of the government of Yanukovych in all cities of Ukraine, where the population is loyal to the Party of Regions. Perhaps such a move will stabilize the situation and give Viktor Yanukovych support."
 RUS_convene_csto_council: "Convene CSTO council"
 RUS_convene_csto_council_desc: "We will convene the CSTO session to consider issues of collective security in a complex international environment. The joint meeting of foreign ministers, defense ministers and secretaries of security councils of CSTO member states will be held, at which important issues will be considered."
 RUS_coordination_of_ukrainian_security_with_ours: "Cordination of Ukrainian security with ours"
 RUS_coordination_of_ukrainian_security_with_ours_desc: "It can be seen that the Interior Ministry of Ukraine does not deal with all the chaos and violence in the streets of Kiev, which were organized by Maidan’s supporters. The protesters have crossed all lines and borders, taking over government buildings, seizing weapons, erecting barricades, killing people. We already know about the number of deaths among «Berkutov» on Maidan, if we do not stop it, only God knows what it may lead to, but in any case we must intervene while there is time. The Government of Ukraine officially asked us to help them, we agreed this proposal and are ready to lend a hand to our friends."
 RUS_deploy_security_forces_to_ukraine: "Deploy security forces to Ukraine"
 RUS_deploy_security_forces_to_ukraine_desc: "In Ukraine there is such a wonderful phenomenon as «Titusk», in short it is the marginals who are ready for a couple of hundred hryvnias to become a wild card at any protest. Fight with the security forces and with opponents, in the first rows of protesters shout louder than all and foremost. This is how the so-called titles are able to promote pro-Russian rallies and bring them to success. We can hire such people in Rostov-on-Don or in the provisional Belgorod, and bring them to the cities of south-eastern Ukraine."
