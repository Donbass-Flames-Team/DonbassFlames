l_english:
 RUS_sochi_olympics: "Olympics in Sochi"
 RUS_sochi_olympics_desc: "Long waited Olympics in Sochi are planned this year. It will be second time when Olympics and first time for Winter Olympics were held on Russian territory. More then 88 countries were invited, summary number of athletes is bigger then 2000! The Olympics start 7 of February and end 23 of February. Organizers promise that the Olympics will be a truly memorable event and a source of pride for the city of Sochi."
 RUS_conceal_internal_problems: "Conceal internal problems"
 RUS_conceal_internal_problems_desc: "Russia has undoubtedly survived the main difficult period it faced in the 1990s. The difficult times for our country are behind us, and by the early 2000s, we had resolved many problems. But some of these problems remain to this day, including at least a high level of corruption, oligarchy, nepotism, outdated social institutions, some economic problems, and, overall, a standard of living that is far from ideal. All of these factors tarnish our image both internationally and among our own people, and it would be better to conceal these problems or downplay their significance."
 RUS_law_from_roskomnadzor: "Law from Roskomnadzor"
 RUS_law_from_roskomnadzor_desc: "Roskomnadzor (Roskomnadzor) has proposed a bill requiring owners of websites and web pages with more than 3,000 daily visitors to register with Roskomnadzor and be held accountable for the information they post. This proposal has faced widespread criticism, with some considering it a restriction of citizens' rights intended to allow law enforcement agencies to control people online, while others see it as a necessary measure to achieve a safer internet."
 RUS_suppress_pro_ukrainian_citizens: "Suppress Pro-Ukrainian Sentiment"
 RUS_suppress_pro_ukrainian_citizens_desc: "In Russia there is quite a lot of people who express sympathy to Ukrainians, praise them for Maidan and wish to repeat same scenario here, on our land. Nemcov, Novodvorskaia, Yavlinskiy and a lot of others want to spil blood and raise disorganization on streets of Russia. This is undoubtedly an oppositional mood with the aim of undermining stability in our country, цe can't allow them to do so."
 RUS_coup_in_ukraine: "The Coup in Ukraine"
 RUS_coup_in_ukraine_desc: "Bad news has come from Ukraine. We have learned of a successful coup d'état in Ukraine. The Maidan supporters have ultimately achieved their goal and overthrown Ukraine's legitimate president, Viktor Yanukovych. It is not yet clear how we will respond to this news or what steps we will take in the near future. Viktor Yanukovych is currently in a safe location in Rostov-on-Don, in contact with the Russian government. However, despite the fact that the protesters have achieved their goal, this does not mean that the political crisis in Ukraine has ended. In cities across the southeast, specifically in Donetsk, Sevastopol, Odessa, and Kharkov, rallies against the Maidan and in support of Yanukovych are gaining momentum, some of which are pro-Russian." #Russian spelling here used intentionally
 RUS_threat_to_the_regime_yanukovych: "Threat to the Yanukovich Regime"
 RUS_threat_to_the_regime_yanukovych_desc: "The political crisis in Ukraine continues, and the risk of Yanukovych's government falling is growing. It is by no means in our interest for a figure loyal to us to step down as president of Ukraine and be replaced by pro-Western politicians. Reports are emerging that the Ukrainian opposition and Yanukovych's government are preparing new negotiations to resolve the crisis, and at the very least, they will likely demand that Yanukovych make concessions, and at most, they will demand his resignation. We do not need a second Yushchenko in Ukraine, and if we do not take some measures, Ukraine may ultimately slip out of our sphere of influence."
 RUS_meeting_in_the_kremlin: "Meeting in the Kremlin"
 RUS_meeting_in_the_kremlin_desc: "Russian President Vladimir Putin has urgently convened a meeting of the Russian Security Council, where it appears the tense situation in Ukraine will be discussed, along with the possible adoption of necessary measures to protect Russia's national interests. We will likely have to deploy law enforcement agencies or even the armed forces to resolve the escalation, but in any case, the situation remains dangerous both for the Yanukovych government and for us in the future, and requires some immediate decisions before it is too late."
 RUS_assistance_in_organizing_anti_Maidan: "Organize the Anti-Maidan Movement"
 RUS_assistance_in_organizing_anti_Maidan_desc: "To prevent Maidan supporters from gaining full control in Ukraine, we need to help organize an Anti-Maidan movement. We should fund rallies in support of the Yanukovych government in all Ukrainian cities where the population is loyal to the Party of Regions. Perhaps such a move will stabilize the situation and provide Viktor Yanukovych with a base of supporters and public backing."
 RUS_convene_csto_council: "Convene the CSTO Council"
 RUS_convene_csto_council_desc: "We will convene a CSTO session to discuss issues related to collective security in the current complex international environment. A joint meeting of the foreign ministers, defence ministers, and secretaries of the security councils of CSTO member states will be held to address these important issues."
 RUS_coordination_of_ukrainian_security_with_ours: "Coordinate With Ukrainian Security"
 RUS_coordination_of_ukrainian_security_with_ours_desc: "We must help our friends in Ukraine during this difficult time, amid the ongoing street unrest. Unfortunately, Ukrainian security forces are unable to handle such widespread lawlessness on the streets of Kyiv on their own. Therefore, we must coordinate our efforts and make joint decisions to stabilize the situation in the capital. Perhaps then we will be able to calm the Maidan supporters and restore order."
 RUS_deploy_security_forces_to_ukraine: "Deploy Security Forces to Ukraine"
 RUS_deploy_security_forces_to_ukraine_desc: "It is clear that Ukraine's Ministry of Internal Affairs is unable to cope with all the chaos and violence in the streets of Kyiv caused by Maidan supporters. The protesters have crossed every line and gone too far with seizing government buildings, seizing weapons, erecting barricades, and killing people. We already know of casualties among the Berkut officers on Maidan; if we don't stop this, only God knows where it might lead, but in any case, we must intervene while there is still time. The Ukrainian government has officially asked us to help them; we have agreed to this proposal and are ready to lend a helping hand to our friends."
 RUS_import_titushki: "Import Titushki"
 RUS_import_titushki_desc: "In Ukraine, there is a group of people called Titushki. In short, these are marginalized individuals who, for a couple hundred hryvnias, are willing to act as the rowdy element at any protest, fighting with law enforcement and opponents, and shouting louder and sooner than anyone else in the front ranks of the demonstrators. It is precisely these so-called Titushki who are capable of driving pro-Russian rallies and ensuring their success. We can hire such people in Rostov-on-Don or in, say, Belgorod, and transport them to cities in southeastern Ukraine."
 RUS_support_our_regions: "Supporting Our Regions"
 RUS_support_our_regions_desc: "Kharkov, Donetsk, Odessa, Crimea, Lugansk - these are cities and regions where Russian culture is still very much alive; Russian is spoken on every street, Russian signs are displayed in stores, and Russian writers are taught in schools. Undoubtedly, many residents of southeastern Ukraine feel warmly toward Russia, and we must make it clear to them that Russia, too, feels warmly toward them. And that Russia, in particular, stands ready at any moment to extend a helping hand to the Russian-speaking population of Ukraine." #Russian spelling here used intentionally
 RUS_support_pro_kremlin_media_in_ukraine: "Support Ukrainian Pro-Kremlin Media"
 RUS_support_pro_kremlin_media_in_ukraine_desc: "In today's world, the phenomenon of information warfare, a war between media outlets, a war waged by propagandists, journalists, war correspondents, and bloggers is no less significant. People have no idea what is happening hundreds of kilometres away from them, whether in a conflict zone or behind closed doors in politicians' offices, and only the media can tell them about it. But everyone has their own version of the truth, including us. To win the loyalty of the Ukrainian people, we can secretly fund media outlets close to us, such as 112 Ukraine, NewsOne, ZIK, and other Ukrainian TV channels."
 RUS_support_the_party_of_regions: "Supporting the Party of Regions"
 RUS_support_the_party_of_regions_desc: "The Party of Regions is one of the few pro-Russian parties in Ukraine, and undoubtedly the largest among them. To maintain our influence in Ukraine, we need to support the Party of Regions and hope that it will remain at the top of the popularity polls among Ukrainians. Through the Party of Regions, we can influence Ukrainian politics, as if pulling the strings of politicians like puppets who will silently carry out our orders."
