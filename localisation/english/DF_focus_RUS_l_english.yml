 RUS_sochi_olympics: "Olympics in Sochi"
 RUS_sochi_olympics_desc: "Longwaited  Olympics in Sochi are planned this year. It will be second time when Olympics and first time for Winter Olympics were held on russian territory. More then 88 countries were invited, summary number of athletes is bigger then 2000! The Olympics start 7 of February and end 23 of February. Organizers promise that the Olympics will be a truly memorable event and a source of pride for the city of Sochi."
 RUS_conceal_internal_problems: "Conceal internal problems"
 RUS_conceal_internal_problems_desc: "Russia has undoubtedly survived the main difficult period it faced in the 1990s. The difficult times for our country are behind us, and by the early 2000s, we had resolved many problems. But some of these problems remain to this day, including at least a high level of corruption, oligarchy, nepotism, outdated social institutions, some economic problems, and, overall, a standard of living that is far from ideal. All of these factors tarnish our image both internationally and among our own people, and it would be better to conceal these problems or downplay their significance."
 RUS_law_from_roskomnadzor: "Law from Roskomnadzor"
 RUS_law_from_roskomnadzor_desc: "Roskomnadzor (Roskomnadzor) has proposed a bill requiring owners of websites and web pages with more than 3,000 daily visitors to register with Roskomnadzor and be held accountable for the information they post. This proposal has faced widespread criticism, with some considering it a restriction of citizens' rights intended to allow law enforcement agencies to control people online, while others see it as a necessary measure to achieve a safer internet."
 RUS_suppress_pro_ukrainian_citizens: "Suppress pro-Ukrainian citizens"
 RUS_suppress_pro_ukrainian_citizens_desc: "In russia there is quite a lot of people who express sympathy to Ukrainians, praise them for Maidan and wish to repeat same scenario here, on our land. Nemcov, Novodvorskaia, Yavlinskiy and a lot of others want to spil blood and raise dissorganization on streets of russia. This is undoubtedly an oppositional mood with the aim of undermining stability in our country, tse can't allow them to do so."
 RUS_coup_in_ukraine: "Coup in Ukraine"
 RUS_coup_in_ukraine_desc: "Yz Ukraine pryshly plokhye novosty, nam stalo yzvestno o uspeshnom hosudarstvennom perevorote on Ukrayne, storonnyky maydana vse zhe dobylys svoeho, and sverhly lehytymnoho prezydenta Ukraine Vyktora Yanukovycha. Poka neyzvestno kak we otreahyruem on dannuyu novost, and chto budem predprynymat in blyzhayshee vremya, Vyktor Yanukovych seychas in bezopasnom meste in Rostove-on-Donu, on svyazy with pravytelstvom Rossyy. No ne smotrya on to chto protestuyushchye vse zhe and dostyhly svoey tsely, this ne oznachaet chto on Ukrayne polytycheskyy crisis zavershylsya. In horodakh yuho-vostoka, a konkretno in osnovnom in Donetske, Sevastopole, Odesse and Kharkove nabyrayut tempov mytynhy protyv maydana, mytynhy in podderzhku Yanukovycha, chast yz kotorykh yavlyayutsya prorossyyskymy."
