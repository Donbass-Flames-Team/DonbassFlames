 UKR_separatism: "Сепаратизм"
 UKR_separatism_desc: "Сепаратизм в Украине постепенно набирает силу под влиянием внутренних противоречий и внешнего давления, прежде всего со стороны России, которая активно поддерживала пророссийские движения, стремившиеся укрепить своё влияние в юго-восточных регионах страны. Используя экономические рычаги, медийное пространство и идеологию «русского мира», Россия пыталась сформировать у части населения ощущение общности исторической судьбы и культурной близости, противопоставляя эти ценности европейскому вектору развития, к которому стремилось украинское руководство. §O\n\n\nУровень сепаратизма в Донецкой Области: [?DPR_separatism_value]%\nУровень сепаратизма в Луганской Области: [?LPR_separatism_value]% \nУровень сепаратизма в Харьковской Области: [?HPR_separatism_value]% \nУровень сепаратизма в Одесской Области: [?OPR_separatism_value]% \nУровень сепаратизма на Закрапатье: [?ZKR_separatism_value]%§!" 
