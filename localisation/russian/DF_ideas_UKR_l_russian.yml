 UKR_dependence_on_russia: "Зависимость от России"
 UKR_dependence_on_russia_desc: "Зависимость Украины от Российской Федерации исторически формировалась под воздействием целого комплекса экономических, энергетических и политических факторов, которые, переплетаясь между собой, создавали устойчивую систему влияния, проявлявшуюся как в сфере торговли, так и в вопросах безопасности. На протяжении десятилетий Украина, будучи частью постсоветского пространства, оставалась тесно связанной с Россией через поставки природного газа и нефти, что не только определяло структуру её энергетического баланса, но и превращало топливно-энергетический сектор в инструмент политического давления, особенно в периоды обострения двусторонних отношений. Кроме того, промышленность восточных регионов Украины, ориентированная на кооперацию с российскими предприятиями, долгое время зависела от экспорта своей продукции на российский рынок, вследствие чего любая попытка переориентировать экономику на Европу сопровождалась значительными трудностями и социальными издержками. Политическая зависимость проявлялась в том, что Россия, используя исторические, культурные и языковые связи, стремилась сохранить своё влияние в украинской внутренней и внешней политике, нередко прибегая к экономическим санкциям, пропагандистскому воздействию и поддержке пророссийских сил, что препятствовало укреплению суверенитета и независимости украинского государства.\n\n\n§OВлияние России на Украину: [?RUS_influence_in_ukraine]%§!"
