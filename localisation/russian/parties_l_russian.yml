 liberalism: "Либерализм"
 liberalism_desc: "Либеральная демократия отстаивает свободу личности, верховенство закона и права человека как главные ценности государства. Приоритетом является защита свободных выборов, независимости судебной системы и прессы. Такое устройство предполагает минимальное вмешательство государства в личную и экономическую жизнь граждан. Либеральная демократия стремится к балансу между свободой личности и общественным благом, при этом активно поддерживая глобализм, расширенные права человека и прогрессивность."

 social_democracy: "Социал-демократия"
 social_democracy_desc: "Социал-демократия стремится создать равное общество путём сочетания рыночной экономики и сильных социальных гарантий. Основная идея — перераспределение богатств для уменьшения экономического неравенства и обеспечение достойных условий для всех. Социал-демократы выступают за прогрессивное налогообложение, доступное здравоохранение и образование, а также защиту трудовых прав и, зачастую, экологической среды."

 conservatism: "Консерватизм"
 conservatism_desc: "Консервативная демократия сочетает в себе одновременно приверженность демократическим принципам и уважение к традиционным ценностям, таким как семья, религия и порядок. Это идеология, направленная на сохранение устоев общества, укрепление национального суверенитета и стабильности через постепенные, медленные и аккуратные реформы, а не радикальные перемены. Она поддерживает сильное государство, а также акцентирует внимание на роли общих исторических и культурных корней."

 autoritarian_democractic: "Авторитарная Демократия"
 autoritarian_democractic_desc: "Авторитарная демократия представляет собой компромисс между элементами демократии и жёстким централизованным управлением. В ней сохраняются выборы (которые, впрочем, практически всегда фальсифицируются и нужны лишь для создания видимости демократии) и принципы разделения властей, но оппозиция ограничивается, а права и свободы граждан часто подавляются ради сохранения порядка и контроля. Эта система обеспечивает стабильность, но ценой политических свобод и общественного многообразия. Нередко авторитарная демократия приводит к появлению популистской (чаще всего центристской и аполитичной) диктатуры."

 communistic: "Коммунизм"
 communistic_desc: "Коммунизм провозглашает идеал безклассового общества, в котором средства производства принадлежат всему народу, а ресурсы распределяются по потребностям. Эта идеология отвергает частную собственность и рыночную экономику, заменяя их централизованным планированием. Коммунизм предлагает радикальную трансформацию общества, часто через революцию, и акцентирует внимание на борьбе рабочего класса против эксплуатации."

 socialistic: "Социализм"
 socialistic_desc: "Социализм представляет собой идеологию, стремящуюся к социальной справедливости и равенству путём усиления роли государства в экономике. При этом допускается сохранение некоторых отдельных рыночных механизмов, но все ключевые отрасли и ресурсы контролируются государством. Социализм выступает за доступность базовых благ, социальных услуг и против чрезмерной концентрации капитала в руках отдельных групп. Зачастую социализм является этапом, предшествующим коммунизму."


 nationalistic: "Национализм"
 nationalistic_desc: "Национализм акцентирует внимание на интересах собственного народа и стремлении укрепить национальную идентичность. Он может принимать разные формы — от культурного единства и гражданского национализма до радикального, агрессивного превосходства одной национальности (или этнической группы) над другой. Эта идеология часто ставит интересы государства выше международного сотрудничества и продвигает идеи защиты суверенитета, национальной (суверенной) экономики и территориальной целостности."

 fascism_ideology: "Фашизм"
 fascism_ideology_desc: "Фашизм — это радикальная тоталитарная идеология, отвергающая демократию и либерализм в пользу полного контроля государства над гражданами во всех сферах жизни. В её основе лежат культ личности (вождизм), милитаризм и радикальный национализм. Фашизм подчёркивает силу единства нации через подавление инакомыслия, жёсткую социальную иерархию и агрессивную внешнюю политику, которая, как правило, ориентирована на территориальную экспансию."

 nazism: "Нацизм"
 nazism_desc: "Национал-социализм — это крайне радикальная форма фашизма, основанная на псевдонаучных теориях расового превосходства и антисемитизме. Идеология нацизма подразумевает жесткое тоталитарное управление, стремление к захвату «жизненного пространства» для «высшей расы» и полное искоренение любых форм политического или этнического инакомыслия. В отличие от классического фашизма, нацизм ставит расовую идентичность выше государственной."


 UKR_fascism_party: "Правый Сектор"
 UKR_fascism_party_desc: "«Правый сектор» возник как объединение радикальных националистических организаций в ходе событий Евромайдана. Движение выступает за жесткую национальную политику, решительную борьбу с российским влиянием и формирование Украины как унитарного национального государства. Партия опирается на добровольческие формирования и придерживается идеалов украинского национализма начала XX века."

 UKR_conservatism_democratic_party_batkivshchyna: "Батькивщина"
 UKR_conservatism_democratic_party_batkivshchyna_desc: "Всеукраинское объединение «Батькивщина» — старейшая парламентская партия современной Украины, возглавляемая Юлией Тимошенко. Партия придерживается проевропейского курса, сочетая консервативные взгляды на культуру и традиции с социально-ориентированной экономической программой, часто прибегая к популистской риторике."

 UKR_communism_party: "КПУ"
 UKR_communism_party_desc: "Коммунистическая партия Украины является идеологической преемницей советской компартии. Она выступает за восстановление государственного контроля над экономикой, тесный союз с Россией и сохранение советского культурного наследия. В условиях современного кризиса партия столкнулась с жестким давлением со стороны властей и радикальных групп."

 UKR_autoritarian_democracy_party: "Партия Регионов"
 #UKR_autoritarian_democracy_party_desc: "Партия Регионов долгое время была крупнейшей политической силой, представляющей интересы промышленного Востока и Юга Украины. Опираясь на поддержку крупного бизнеса и русскоязычного населения, партия выступала за прагматичные отношения с Россией и сохранение внеблокового статуса страны, пока внутренний кризис и бегство её лидера не привели к фактическому распаду структуры."

 UKR_conservatism_democracy_party_bpp: "Блок Петра Порошенко"
 UKR_conservatism_democracy_party_bpp_desc: "Блок Петра Порошенко «Солидарность» был сформирован как широкая коалиция в поддержку курса пятого президента Украины. Основными столпами партии стали лозунги «Армия, Язык, Вера», направленные на укрепление национальной идентичности, интеграцию в НАТО и ЕС, а также проведение рыночных реформ в условиях военного конфликта."


 RUS_autoritarian_democracy_party: "Единая Россия"
 #RUS_autoritarian_democracy_party_desc: "«Единая Россия» является так называемой «партией власти», обеспечивающей политическую стабильность и поддержку курса президента. Программа партии основана на центризме, укреплении «вертикали власти», государственном патриотизме и сохранении традиционных ценностей. Обладая подавляющим большинством в парламенте, она является главным инструментом реализации государственной политики."
