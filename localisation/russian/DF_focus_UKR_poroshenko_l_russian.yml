l_russian:

  UKR_poroshenko_victory: "Победа Порошенко"
  UKR_poroshenko_victory_desc: "Выборы завершены, стране нужен чёткий курс и единый центр ответственности. Мы закрепим легитимность власти и начнём собирать проевропейское большинство. Это точка старта для реформ и внешнеполитического разворота."

  UKR_por_2014_parliamentary_election: "Парламентские выборы 2014"
  UKR_por_2014_parliamentary_election_desc: "Обновление Верховной Рады и формирование нового политического большинства. Результат определит скорость реформ и устойчивость правительства."

  UKR_por_european_ukraine_coalition: "Коалиция «Европейская Украина»"
  UKR_por_european_ukraine_coalition_desc: "Собрать проевропейские силы в коалицию и зафиксировать общий план действий. Без большинства в Раде реформы останутся словами."

  UKR_por_support_yatsenyuk_government: "Поддержать правительство Яценюка"
  UKR_por_support_yatsenyuk_government_desc: "Реформаторский кабинет должен удержать страну и запустить изменения. Мы дадим политическую опору, чтобы пройти через кризисные решения."

  UKR_por_support_groysman_government: "Поддержать правительство Гройсмана"
  UKR_por_support_groysman_government_desc: "Стабилизация управления и продолжение курса реформ. Ставка на прагматичные решения и контроль выполнения."

  UKR_por_keep_semi_presidential_model: "Сохранить полупрезидентскую модель"
  UKR_por_keep_semi_presidential_model_desc: "Сохранение баланса ветвей власти ради управляемости государства. Это компромисс между сильной исполнительной властью и парламентским контролем."

  UKR_por_cadre_rotations: "Кадровые ротации"
  UKR_por_cadre_rotations_desc: "Переформатирование вертикали управления под новый политический курс. Обновим ключевые назначения, усилим дисциплину и ответственность."

  # EU BRANCH
  UKR_por_association_agreement_EU: "Соглашение об ассоциации с ЕС"
  UKR_por_association_agreement_EU_desc: "Закрепить стратегический европейский выбор и институциональную интеграцию. Это рамка, по которой страна будет перестраивать правила и рынки."

  UKR_por_dcfta_launch: "Запуск УВЗСТ (DCFTA)"
  UKR_por_dcfta_launch_desc: "Углублённая зона свободной торговли — экономическая основа евроинтеграции. Откроем рынки и начнём выравнивать стандарты."

  UKR_por_adopt_eu_directives_1: "Внедрять директивы ЕС I"
  UKR_por_adopt_eu_directives_1_desc: "Первый пакет гармонизации законодательства с нормами Евросоюза. Начинаем приводить правила к общему европейскому стандарту."

  UKR_por_adopt_eu_directives_2: "Внедрять директивы ЕС II"
  UKR_por_adopt_eu_directives_2_desc: "Второй пакет гармонизации — системные изменения в регулировании и управлении. Укрепим институции и контроль исполнения."

  UKR_por_adopt_eu_directives_3: "Внедрять директивы ЕС III"
  UKR_por_adopt_eu_directives_3_desc: "Третий пакет гармонизации — завершение базового выравнивания правил. Это подготовка к более глубоким этапам сближения с ЕС."

  UKR_por_customs_modernization: "Модернизация таможни"
  UKR_por_customs_modernization_desc: "Обновление процедур и контрольных механизмов по европейским стандартам. Меньше серых схем — больше прозрачной торговли."

  UKR_por_border_management_eu: "Европейское управление границей"
  UKR_por_border_management_eu_desc: "Усиление инфраструктуры и процедур на границе. Сделаем пересечение более безопасным и предсказуемым."

  UKR_por_visa_free_regime: "Безвизовый режим"
  UKR_por_visa_free_regime_desc: "Практический результат интеграции — свобода передвижения для граждан. Это доверие, заработанное реформами."

  UKR_por_eu_energy_integration: "Интеграция в энергорынок ЕС"
  UKR_por_eu_energy_integration_desc: "Сближение правил, сетей и стандартов с европейской энергосистемой. Снизим зависимость и усилим устойчивость."

  UKR_por_unbundle_energy_sector: "Анбандлинг энергосектора"
  UKR_por_unbundle_energy_sector_desc: "Разделение функций и повышение прозрачности рынка. Создадим понятные правила и меньше монополизма."

  UKR_por_eu_transport_corridors: "Транспортные коридоры в Европу"
  UKR_por_eu_transport_corridors_desc: "Инфраструктурная связность с ЕС как стратегический приоритет. Дороги и логистика — это реальная интеграция."

  UKR_por_eu_macro_financial_aid: "Макрофинансовая помощь ЕС"
  UKR_por_eu_macro_financial_aid_desc: "Поддержка бюджета и реформ через европейские механизмы. Получим ресурс, но и обязательства по изменениям."

  UKR_por_eu_investment_platform: "Европейская инвестплатформа"
  UKR_por_eu_investment_platform_desc: "Запуск программ инвестиций и восстановления экономики. Привлечём капитал и ускорим модернизацию."

  UKR_por_eu_reforms_monitoring: "Мониторинг реформ по стандартам ЕС"
  UKR_por_eu_reforms_monitoring_desc: "Формализация контроля выполнения обязательств и дорожных карт. Прозрачность прогресса — ключ к доверию."

  UKR_por_eu_candidate_application: "Подать заявку на статус кандидата"
  UKR_por_eu_candidate_application_desc: "Политический шаг: запрос на признание евроинтеграционного пути. Дальше — переговоры и тяжёлая работа по главам."

  UKR_por_eu_candidate_negotiations: "Переговоры о статусе кандидата"
  UKR_por_eu_candidate_negotiations_desc: "Согласование условий и рамок будущего членства. Важны темп реформ и поддержка партнёров."

  UKR_por_open_eu_chapters_justice: "Открыть главы: Правосудие"
  UKR_por_open_eu_chapters_justice_desc: "Судебные и правовые стандарты — ключ к доверию Европы. Усилим независимость и предсказуемость системы."

  UKR_por_open_eu_chapters_economy: "Открыть главы: Экономика"
  UKR_por_open_eu_chapters_economy_desc: "Единые правила рынка и конкурентной среды. Это защита инвестиций и рост возможностей."

  UKR_por_open_eu_chapters_security: "Открыть главы: Безопасность"
  UKR_por_open_eu_chapters_security_desc: "Сближение систем безопасности и управления рисками. Сильные институты — фундамент устойчивости."

  UKR_por_eu_pre_accession_funds: "Предвступительные фонды ЕС"
  UKR_por_eu_pre_accession_funds_desc: "Финансирование реформ и модернизации перед членством. Используем средства для инфраструктуры и институций."

  UKR_por_eu_accession_treaty: "Договор о вступлении в ЕС"
  UKR_por_eu_accession_treaty_desc: "Финальный политико-правовой документ членства. Последний шаг перед историческим решением."

  UKR_por_join_european_union: "Вступить в Европейский Союз"
  UKR_por_join_european_union_desc: "Историческая победа: Украина становится частью ЕС. Это новые правила, новые возможности и новая гарантия будущего."

  # NATO BRANCH
  UKR_por_nato_cooperation_no_membership: "Сотрудничество с НАТО"
  UKR_por_nato_cooperation_no_membership_desc: "Сближение с Альянсом через практические программы и диалог. Начнём с совместных проектов и доверия."

  UKR_por_nato_trust_building: "Наращивать доверие с НАТО"
  UKR_por_nato_trust_building_desc: "Постоянные контакты и партнёрства — основа будущего членства. Чем больше совместимости, тем меньше рисков."

  UKR_por_defense_institutions_reform: "Реформа оборонных институтов"
  UKR_por_defense_institutions_reform_desc: "Перестройка управления обороной по современным стандартам. Укрепим планирование, контроль и ответственность."

  UKR_por_nato_interoperability_program: "Программа совместимости"
  UKR_por_nato_interoperability_program_desc: "Интероперабельность с силами НАТО на уровне процедур и планирования. Готовимся действовать по общим правилам."

  UKR_por_joint_exercises_and_training: "Совместные учения и подготовка"
  UKR_por_joint_exercises_and_training_desc: "Повышение качества войск через совместные тренировки. Практика важнее заявлений."

  UKR_por_secure_communication_standards: "Безопасные стандарты связи"
  UKR_por_secure_communication_standards_desc: "Единые протоколы и защищённые каналы коммуникации. Это повышает управляемость и живучесть армии."

  UKR_por_nato_logistics_reform: "Реформа логистики"
  UKR_por_nato_logistics_reform_desc: "Снабжение, ремонт и управление запасами по стандартам НАТО. Без логистики нет устойчивой обороны."

  UKR_por_nato_officer_corps_training: "Подготовка офицерского корпуса"
  UKR_por_nato_officer_corps_training_desc: "Системная подготовка командного состава. Качество решений начинается с качества обучения."

  UKR_por_civilian_control_of_military: "Гражданский контроль над армией"
  UKR_por_civilian_control_of_military_desc: "Демократический принцип управления обороной как требование Альянса. Усилим прозрачность и подотчётность."

  UKR_por_nato_anti_corruption_in_defense: "Антикоррупция в оборонной сфере"
  UKR_por_nato_anti_corruption_in_defense_desc: "Прозрачность закупок и управления — ключ к доверию партнёров. Закроем лазейки и усилим контроль."

  UKR_por_nato_map_request: "Запросить ПДЧ (MAP)"
  UKR_por_nato_map_request_desc: "Формальный запрос на План действий по членству. Это сигнал, что мы готовы идти до конца."

  UKR_por_nato_map_granted: "Получить ПДЧ (MAP)"
  UKR_por_nato_map_granted_desc: "Политическое признание прогресса и запуск процесса членства. Теперь всё зависит от темпа реформ."

  UKR_por_nato_accession_protocols: "Протоколы о присоединении"
  UKR_por_nato_accession_protocols_desc: "Юридическое оформление вступления в Альянс. Подготовим документы и поддержку союзников."

  UKR_por_nato_membership_vote: "Ратификация членства"
  UKR_por_nato_membership_vote_desc: "Финальный этап — ратификация и согласование условий. Закрепим решение на уровне законов."

  UKR_por_join_nato: "Вступить в НАТО"
  UKR_por_join_nato_desc: "Историческая победа: Украина становится членом Североатлантического альянса. Это гарантия безопасности и общий щит."

  # COURSE / IDENTITY
  UKR_por_no_multivector_policy: "Отказ от многовекторности"
  UKR_por_no_multivector_policy_desc: "Чёткая внешнеполитическая линия: ЕС и НАТО как приоритет. Полумеры больше не работают."

  UKR_por_constitution_EU_NATO_course: "Закрепить курс ЕС/НАТО в Конституции"
  UKR_por_constitution_EU_NATO_course_desc: "Юридическое закрепление стратегического выбора как необратимого. Это защита курса от откатов."

  UKR_por_decommunization_laws: "Законы о декоммунизации"
  UKR_por_decommunization_laws_desc: "Разрыв с советским наследием и переосмысление политики памяти. Символы и правила должны отражать современную Украину."

  UKR_por_rename_cities_and_streets: "Переименовать города и улицы"
  UKR_por_rename_cities_and_streets_desc: "Символическое изменение публичного пространства. Закрепим новую идентичность в повседневной жизни."

  UKR_por_remove_soviet_symbols: "Убрать советскую символику"
  UKR_por_remove_soviet_symbols_desc: "Демонтаж символов прошлого ради новой идентичности. Это шаг к самостоятельной исторической политике."

  UKR_por_state_language_policy: "Политика государственного языка"
  UKR_por_state_language_policy_desc: "Укрепление национальной идентичности и культурного пространства. Государственный язык — основа единства."

  UKR_por_information_resilience: "Информационная устойчивость"
  UKR_por_information_resilience_desc: "Повышение стойкости общества к информационным атакам. Усилим медиа-политики и защиту инфраструктуры."

  UKR_por_limit_russian_info_space: "Ограничить российское инфополе"
  UKR_por_limit_russian_info_space_desc: "Сокращение влияния враждебной пропаганды. Защитим общество от манипуляций и раскола."

  UKR_por_block_russian_services: "Заблокировать российские сервисы"
  UKR_por_block_russian_services_desc: "Снижение уязвимости через ограничения цифровых инструментов агрессора. Это вопрос безопасности, а не удобства."

  UKR_por_army_language_faith: "Армия. Язык. Вера."
  UKR_por_army_language_faith_desc: "Мобилизационный нарратив и укрепление внутренней консолидации. Ставка на единство, устойчивость и смысл."

  UKR_por_autocephaly_campaign: "Кампания за автокефалию"
  UKR_por_autocephaly_campaign_desc: "Продвижение церковной независимости как элемента суверенитета. Это и политика, и символ государства."

  UKR_por_tomos_PCU: "Томос для ПЦУ"
  UKR_por_tomos_PCU_desc: "Историческое оформление церковной независимости. Закрепим духовную автономию как часть суверенитета."

  # INSTITUTIONS / ANTI-CORRUPTION
  UKR_por_create_NABU: "Создать НАБУ"
  UKR_por_create_NABU_desc: "Построение новой антикоррупционной архитектуры государства. Нужен орган, который сможет работать независимо."

  UKR_por_create_SAPO: "Создать САП"
  UKR_por_create_SAPO_desc: "Специализированное антикоррупционное преследование на новом уровне. Закроем разрыв между расследованием и судом."

  UKR_por_create_NAZK: "Создать НАПК"
  UKR_por_create_NAZK_desc: "Профилактика коррупции и контроль деклараций. Системная проверка важнее разовых кампаний."

  UKR_por_e_declarations: "Электронные декларации"
  UKR_por_e_declarations_desc: "Прозрачность доходов чиновников как политическая норма. Пусть общество видит, кто и на чём наживается."

  UKR_por_public_procurement_reform: "Реформа госзакупок"
  UKR_por_public_procurement_reform_desc: "Прозрачные процедуры и снижение коррупционных рисков. Конкуренция вместо договорняков."

  UKR_por_state_audit_service_strengthen: "Усилить госаудит"
  UKR_por_state_audit_service_strengthen_desc: "Контроль расходов и дисциплина бюджета. Эффективность трат — это доверие людей."

  # ECONOMY / IMF
  UKR_por_imf_deal_stabilization: "Соглашение с МВФ"
  UKR_por_imf_deal_stabilization_desc: "Макроэкономическая стабилизация ценой жёстких реформ. Это болезненно, но даёт шанс удержать экономику."

  UKR_por_raise_utilities_tariffs: "Повысить тарифы на коммунальные услуги"
  UKR_por_raise_utilities_tariffs_desc: "Непопулярная мера для балансировки системы. Придётся объяснять обществу цену субсидий и долгов."

  UKR_por_energy_market_reform: "Реформа энергорынка"
  UKR_por_energy_market_reform_desc: "Создание конкурентного и прозрачного энергетического сектора. Правила вместо ручного управления."

  UKR_por_partial_deregulation: "Частичная дерегуляция"
  UKR_por_partial_deregulation_desc: "Снижение административных барьеров для бизнеса. Дадим экономике дышать свободнее."

  UKR_por_industrial_recovery_program: "Программа промышленного восстановления"
  UKR_por_industrial_recovery_program_desc: "Запуск роста и перезапуск производственных мощностей. Индустрия должна работать на экспорт и армию."

  UKR_por_export_push_to_eu: "Экспортный рывок в ЕС"
  UKR_por_export_push_to_eu_desc: "Переориентация торговли на европейские рынки. Стандарты и логистика решают всё."

  UKR_por_hryvnia_stabilization: "Стабилизация гривны"
  UKR_por_hryvnia_stabilization_desc: "Возврат доверия к национальной валюте. Стабильная гривна — это стабильные цены и планы."

  UKR_por_nationalize_privatbank: "Национализация ПриватБанка"
  UKR_por_nationalize_privatbank_desc: "Финансовая стабилизация через контроль системного банка. Не дадим обрушить всю банковскую систему."

  UKR_por_infrastructure_acceleration: "Ускорить инфраструктурные проекты"
  UKR_por_infrastructure_acceleration_desc: "Дороги и инфраструктура как основа роста и связности. Это рабочие места и реальная модернизация."

  UKR_por_road_corridors_to_eu: "Дорожные коридоры в Европу"
  UKR_por_road_corridors_to_eu_desc: "Логистика и транспорт как реальная интеграция с ЕС. Быстрее грузы — сильнее экономика."

  UKR_por_defense_industry_modernization: "Модернизация оборонной промышленности"
  UKR_por_defense_industry_modernization_desc: "Рост производства и обновление оборонного комплекса. Ставка на собственные мощности и технологии."

  UKR_por_military_budget_increase: "Увеличить оборонный бюджет"
  UKR_por_military_budget_increase_desc: "Концентрация ресурсов на безопасности государства. Без этого реформы не переживут угроз."

  UKR_por_partial_nato_standards: "Переход на стандарты НАТО (частично)"
  UKR_por_partial_nato_standards_desc: "Первый этап стандартизации и структурных изменений. Начнём с процедур, обучения и совместимости."

  UKR_por_full_nato_standards_transition: "Полный переход на стандарты НАТО"
  UKR_por_full_nato_standards_transition_desc: "Завершение системной стандартизации обороны. Армия должна работать как единый механизм с союзниками."

  # DIPLOMACY AGAINST RUSSIA
  UKR_por_sanctions_diplomacy_against_russia: "Санкционная дипломатия против России"
  UKR_por_sanctions_diplomacy_against_russia_desc: "Консолидация партнёров вокруг санкционного давления. Важно держать фронт поддержки единым."

  UKR_por_anti_putin_coalition: "Антипутинская коалиция"
  UKR_por_anti_putin_coalition_desc: "Широкая сеть поддержки против агрессора. Чем больше союзников, тем меньше пространства для шантажа."

  UKR_por_international_lawsuits: "Международные иски против России"
  UKR_por_international_lawsuits_desc: "Юридическое давление и фиксация ответственности. Это долгий процесс, но он формирует цену агрессии."

  UKR_por_security_coop_anglosphere: "Безопасностное сотрудничество с англосферой"
  UKR_por_security_coop_anglosphere_desc: "Углубление связей с ключевыми союзниками. Совместные программы дадут оружие, обучение и разведку."

  # FINALS
  UKR_por_europe_choice_locked_in: "Европейский выбор закреплён"
  UKR_por_europe_choice_locked_in_desc: "Курс на ЕС и НАТО превращается в необратимую стратегию. Теперь откат назад станет политически невозможным."

  UKR_por_eu_nato_victory: "Победа: ЕС и НАТО"
  UKR_por_eu_nato_victory_desc: "Украина закрепляет себя в западном мире — политически, институционально и военно. Это итог долгого пути и цена, которую мы заплатили."

  UKR_por_eu_public_admin_reform: "Реформа госуправления по стандартам ЕС"
  UKR_por_eu_public_admin_reform_desc: "Системная перестройка институтов ради европейского качества управления. Уберём хаос и усилим сервис для граждан."

  UKR_por_eu_civil_service_law: "Закон о госслужбе"
  UKR_por_eu_civil_service_law_desc: "Профессионализация и деполитизация государственной службы. Карьера по правилам, а не по связям."

  UKR_por_eu_e_governance: "Электронное государство"
  UKR_por_eu_e_governance_desc: "Цифровизация управления и сервисов для граждан. Меньше бумаги — меньше коррупции и быстрее решения."

  UKR_por_eu_competition_policy: "Политика конкуренции ЕС"
  UKR_por_eu_competition_policy_desc: "Укрепление честной конкуренции и рынка. Монополии будут слабеть, бизнес — расти."

  UKR_por_eu_state_aid_rules: "Правила госпомощи"
  UKR_por_eu_state_aid_rules_desc: "Приведение механизмов поддержки к европейским нормам. Помощь должна быть прозрачной и честной."

  UKR_por_eu_anti_monopoly_enforcement: "Антимонопольное правоприменение"
  UKR_por_eu_anti_monopoly_enforcement_desc: "Реальное применение правил против монополий. Законы должны работать, а не лежать на полке."

  UKR_por_eu_food_safety: "Европейские стандарты пищевой безопасности"
  UKR_por_eu_food_safety_desc: "Гармонизация норм качества и безопасности продукции. Это доверие потребителей и доступ к рынкам."

  UKR_por_eu_agri_exports: "Расширить агроэкспорт в ЕС"
  UKR_por_eu_agri_exports_desc: "Преодоление барьеров и рост экспорта. Укрепим позиции на европейском рынке."

  UKR_por_eu_industry_certification: "Европейская сертификация промышленности"
  UKR_por_eu_industry_certification_desc: "Единые стандарты качества для выхода на рынки ЕС. Сертификация откроет двери для украинской продукции."

  UKR_por_nato_c2_modernization: "Модернизация управления и связи (C2)"
  UKR_por_nato_c2_modernization_desc: "Современные системы управления и координации войск. Быстрее связь — быстрее решения."

  UKR_por_nato_medical_support: "Медицинское обеспечение по стандартам НАТО"
  UKR_por_nato_medical_support_desc: "Повышение выживаемости и эффективности армии. Подготовка, эвакуация и снабжение должны работать без сбоев."

  UKR_por_nato_engineer_units: "Инженерные подразделения нового образца"
  UKR_por_nato_engineer_units_desc: "Фортификация, разминирование и поддержка операций. Инженеры — это скорость и безопасность на фронте."

  UKR_por_nato_nco_corps: "Корпус сержантов"
  UKR_por_nato_nco_corps_desc: "Профессиональный корпус НСО как основа боеспособности. Сержанты держат порядок и обучают солдат."

  UKR_por_nato_procurement_standards: "Стандарты закупок НАТО"
  UKR_por_nato_procurement_standards_desc: "Прозрачные закупки и совместимость поставок. Деньги должны превращаться в результат, а не в схемы."

  UKR_por_nato_ammunition_supply: "Стабильное снабжение боеприпасами"
  UKR_por_nato_ammunition_supply_desc: "Расширение производства и логистики. Боеприпасы — это устойчивость обороны каждый день."

  UKR_por_eu_nato: "European Dream"
  UKR_por_eu_nato_desc: "Украина закрепляет своё место в европейской семье и системе коллективной безопасности. Это не символика, а работающие правила, защита и возможности для людей. После лет реформ и потерь мы выбираем нормальную жизнь дома — с достоинством и справедливостью."
