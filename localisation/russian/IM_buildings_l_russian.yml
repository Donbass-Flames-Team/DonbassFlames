l_russian:
 government_building:0 "Государственная адмнистрация" 
 government_building_desc:0 "Это здание обеспечивает государство базовыми потребностями для гражданского управления. Здесь граждане могут получать юридические документы, оплачивать налоги и добиваться справедливости. \n §g+0.02 Еженедельная стабильность§! \n §g+0.01 Ежедневный прирост политической власти§! \n §g+0.20% Прирост сотрудничества в регионе§! \n §O+2% Скорость ремонта фабрик§!"
 government_building_plural:0 "Государственная адмнистрация"
 education_infrastructure:0 "Учебное заведение"
 education_infrastructure_desc:0 "Это здание обеспечивает государство системой образования, обучая и направляя нашу молодежь — от школ в детстве до университетов во взрослом возрасте.\n §C+1% Скорость исследований§! \n §G+1% Доступное население для призыва§! \n §O+1% Скорость строительства§!"
 education_infrastructure_plural:0 "Учебное заведение"
 military_base:0 "Военная база"
 military_base_desc:0 "Это здание позволяет нашим военачальникам, офицерам и солдатам координировать действия, организовывать и планировать военные операции.\n §G+1% Организация армии§! \n §G+1% Атака армии§! \n §G+1% Оборона армии§! \n §G+1% Максимальное планирование§! \n §G+1% Прирост опыта командиров§! \n §g+0.05 Ежедневный прирост армейского опыта§!"
 military_base_plural:0 "Военная база"
 naval_military_base:0 "Военно-морская база"
 naval_military_base_desc:0 "Это здание позволяет нашим морским командирам, офицерам и морякам координировать действия, организовывать и планировать морские операции, а также служит местом для стоянки кораблей.\n §B+1% Эффективность миссии по охране конвоев§! \n §B+1% Эффективность экранирования§! \n §B+1% Скорость восстановления флота§! \n §B+1% Урон флота§! \n §g+0.05 Ежедневный прирост морского опыта§!"
 naval_military_base_plural:0 "Военно-морская база"
 air_command_base:0 "Военно-воздушная база"
 air_command_base_desc:0 "Это здание позволяет нашим военачальникам ВВС, офицерам и летчикам координировать действия, организовывать и планировать воздушные операции.\n §R+1% Эффективность миссий воздушной поддержки§! \n §R+1% Эффективность миссий перехвата§! \n §R+1% Эффективность ближней авиационной поддержки§! \n §R-1% Шанс авиационных аварий§! \n §g+0.05 Ежедневный прирост авиационного опыта§!"
 air_command_base_plural:0 "Военно-воздушная база"
 media_complex:0 "Радиостанция"
 media_complex_desc:0 "Это здание предоставляет государству базовые развлекательные и информационные услуги через телевидение и радио для широких масс.\n §g+0.01 Еженедельная стабильность§! \n §g+0.01 Еженедельная поддержка войны§! \n §g+0.02 Ежедневный прирост политической власти§! \n §W+0.05 Ежедневный прирост сотрудничества в регионе§! \n §Y-2% Ресурсы на рынок§! \n §-2% Время оправдания цели войны§!"
 media_complex_plural:0 "Радиостанция"
 hospital:0 "Госпиталь"
 hospital_desc:0 "Это здание предоставляет государству медицинские услуги как для гражданских, так и для военных.\n §G+0.2% Ежемесячный прирост населения§! \n §G+1% Скорость восстановления дивизий§! \n §G-1% Потери опытных солдат§! \n §G-0.5% Время обучения§!"
 hospital_plural:0 "Госпиталь"
 housing_project:0 "Жилой район"
 housing_project_desc:0 "Жилой район предоставляет государству новые дома и квартиры, куда могут переезжать граждане. Заселение жителей способствует развитию новых коммерческих предприятий.\n §g+2 Строительных слота§! \n §g+0.3% Фабрик товаров народного потребления§! \n §O+1% Производительность фабрик§! \n §O+1% Базовая эффективность производства§! \n §O+1% Максимальная эффективность производства§! \n §O+1% Прирост эффективности производства§!"
 housing_project_plural:0 "Жилой район"
 industrial_yard:0 "Промышленный комплекс"
 industrial_yard_desc:0 "Это строение объединяет множество небольших фабрик в один промышленный комплекс, что позволяет производить гражданские и военные товары в одном месте, но при этом существует риск потери преимуществ обоих видов продукции в случае повреждения.\n §O+1 Гражданская фабрика§! \n §G+1 Военная фабрика§!"
 industrial_yard_plural:0 "Промышленный комплекс"

