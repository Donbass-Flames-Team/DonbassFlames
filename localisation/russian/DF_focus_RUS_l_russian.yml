l_russian:
 RUS_sochi_olympics: "Олимпиада в Сочи"
 RUS_sochi_olympics_desc: "На этот год в Сочи запланированы долгожданные Олимпийские игры. Это вторые по счету Олимпийские игры на территории России, и первые конкретно зимние Олимпийские игры в России. Открытием Олимпиады будет заниматься лично Президент Владимир Путин, по официальной информации участвовать будут более 88 стран, а суммарное число спортсменов составляет 2800 людей, само мероприятие будет проходить с 7 февраля по 23 февраля. Организаторы обещают что Олимпиада запомнится великолепно, и будет настоящей гордостью города Сочи. "
 RUS_conceal_internal_problems: "Скрыть внутренние проблемы"
 RUS_conceal_internal_problems_desc: "Россия несомненно пережила основной трудный период с которым она столкнулась в 90-х годах, сложные времена для нашей страны остались позади, и с началом нулевых годов мы успели решить множество проблем. Но часть этих проблем осталась по сей день, по крайней мере высокая степень коррупции,  олигархия, кумовство, устарелые социальные институты, некоторые экономические проблемы и в целом не лучший уровень жизни о котором мы можем мечтать. Эти все факторы портят наш имидж как и на международной арене, так и среди нашего народа, и по хорошему было бы скрыть эти проблемы, или же преуменьшить их значение."
 RUS_law_from_roskomnadzor: "Законопроект от Роскомнадзора"
 RUS_law_from_roskomnadzor_desc: "Роскомнадзор предложил проект который закрепляет обязанность для владельцев сайтов и страниц в интернете с ежедневной посещаемостью более 3 тысяч человек регистрироваться в реестре Роскомнадзора и нести ответственность за размещаемую информацию. Данное предложение столкнулось с наплывом критики, некоторые считают это ограничением прав граждан с целью контролировать людей силовыми структурами и в интернете, а некоторые считают это вынужденной мерой для достижения безопасного интернета."
 RUS_suppress_pro_ukrainian_citizens: "Присечь про-украинских граждан"
 RUS_suppress_pro_ukrainian_citizens_desc: "В России имеется достаточно много людей которые выражают сочувствие украинцам, хвалят их за Майдан и мечтают повторить подобное и на родине. Таких людей у нас много, Немцов, Новодворская, Явлинский, так и жаждут пролить кровь на улицах России, и продать нашу державу западным элитам, вернуть нас в 90-х вкратце говоря. Несомненно это оппозиционный настрой с целью подорвать стабильность в нашей стране, и таких людей нужно присечь за их деятельность. Чтобы не повторить украинский сценарий и в России."
 RUS_coup_in_ukraine: "Переворот на Украине"
 RUS_transfer_of_contingent_to_sevastopol: "Отправить армейский контингент в Севастополь"
 RUS_transfer_of_contingent_to_sevastopol_desc: "Прошел период с 1991 года, день когда распался Советский Союз. Мы запомнили 1954, год в который Крым отдали Украине, нынче ситуация в Украине позволяет нам вернуть наши законные земли. Мы отправим в Севастополь наш контингент чтобы проведать ситуацию в Крыму."
 RUS_terminate_kharkov_accords: "Денонсировать Харьковский договор"
 RUS_terminate_kharkov_accords_desc: "Харьковский договор был подписан в 2010 году, который соглашал вопросы по пребываниям нашего флота на территории Украины. Нынче ситуация в Украине заставляет нас денонсировать этот договор, из-за разделения политических направлений и предыдущих ситуаций с Порошенко."
 RUS_return_to_home_port: "Крым вернулся в родную гавань"
 RUS_return_to_home_port_desc: "Наконец, когда Крымский народ угнетал под Киевской властью, мы вернули его, вернули его с честью и так называемым достоинством. Следующая цель для нас освободить Одессу, Донецк, Луганск, все земли где проживает пророссийское население. Теперь Крым будет в нашей родной гавани."
 RUS_russian_spring_in_the_east: "Русская весна на западе"
 RUS_russian_spring_in_the_east_desc: "Русская весна наступила, теперь мы готовы показать что означает Русский дух, дух который может быть даже на землях чужой страны. За работу ребята! У нас очень много задач на новый 2014-ый!"
 RUS_task_for_fsb: "Поставить задачи ФСБ"
 RUS_task_for_fsb_desc: "Имея наши цели, мы должны иметь прикрытие, нашу опору, которая поможет с ситуации внутри государства. Наши государственных службы о этих целях позаботятся, в нынешний момент мы должны поставить задачи для ФСБ что-бы удержать власть над страной."
 RUS_support_prorussians_protests: "Поддержать пророссийские протесты"
 RUS_support_prorussians_protests_desc: "Нынче на Украине, в юго-восточных городах, такие как: Харьков, Донецк, Луганск и другие происходят митинги русских против прозападной власти. Мы их полностью понимаем, и мы готовы предоставить то что они захотят. Еще один ход от наших геополитических политиков."
 RUS_help_to_new_republics: "Отправить помощь к новым республикам"
 RUS_help_to_new_republics_desc: "Мы отправим помощь новым появившимся пророссийским республикам, нашим сородичам оказавшимся в очень плохой ситуации. Ныне ситуация внутри Крыма неплоха, мы провели там референдум, по которому 96% людей выбрали нашу власть а не Украину. Следующий ход нашей страны."
 RUS_fight_with_proukranians_citizens: "Начать борьбу с проукраинскими жителями"
 RUS_fight_with_proukranians_citizens_desc: "В наши дни ситуация на внутреннем фронте нормальная, но мы должны высечь предателей из Украины на нашей родине, которые дезорганизируют правительство в Севастополе, Симферополе, Керче и других городов."
 RUS_task_for_strelkov: "Поставить задачу для стрелков на Донбассе"
 RUS_task_for_strelkov_desc: "Мы дружим с нашей республикой в Донецке(как и с другими народными республиками), мы поставим для них задачи, которые помогут сосредоточиться на внешнем фронте с украиной. Стрелки в Донецке правда показывают хорошие результаты, это вдоохновляет нас, мы покажем чудный Русский мир нашему народу на донбассе который все еще под руками Украины и их правых националистов."
 RUS_volunteers_on_donbass: "Волонтерские части на Донбассе"
 RUS_volunteers_on_donbass_desc: "Пришло время играть по крупному, киевская хунта разогнала свою арму до предела, провела частичную мобилизацию, привела добровольцев к нашим республикам чтобы они уничтожали российских мирных жителей. Мы готовы предоставить народным республикам наши подразделения, поиметь опыт современной войны, в конце концов привести победу республикам (и нам тоже)."
 RUS_ammunition_supply: "Поставки боеприпасов республикам"
 RUS_machinery_supply: "Поставки механизированого вооружения республикам"
 RUS_arms_supply: "Отправка армейского вооружения республикам"
 RUS_russian_regulars_on_donbass: "Отправить регулярные части на Донбасс"
 RUS_show_kyivs_war_crimes: "Показать военные преступления Киевской хунты"
 RUS_open_invasion: "Вторжение в донбасс на стороне народных республик"
 RUS_the_war_has_stalled: "Война была замороженна"
 RUS_victory_of_republics: "Победа народных республик"
 RUS_defeat_of_the_republics: "Проигрыш народных республик"
 RUS_support_the_import_substitution_policy: "Поддержать идеи политики импортозамещения"
 RUS_introduction_of_anti_sanctions: "Введение антисанкций"
 RUS_coup_in_ukraine_desc: "Из Украины пришли плохие новости, нам стало известно о успешном государственном перевороте на Украине, сторонники майдана все же добились своего, и свергли легитимного президента Украины Виктора Януковича. Пока неизвестно как мы отреагируем на данную новость, и что будем предпринимать в ближайшее время, Виктор Янукович сейчас в безопасном месте в Ростове-на-Дону, на связи с правительством России. Но не смотря на то что протестующие все же и достигли своей цели, это не означает что на Украине политический кризис завершился. В городах юго-востока, а конкретно в основном в Донецке, Севастополе, Одессе и Харькове набирают темпов митинги против майдана, митинги в поддержку Януковича, часть из которых являются пророссийскими."
 RUS_threat_to_the_regime_yanukovych: "Угроза режиму Януковича"
 RUS_threat_to_the_regime_yanukovych_desc: "На Украине продолжается политический кризис, и риск падения правительства Януковича стает все выше, и нам не в коем случае не выгодно чтобы лояльный нам человек ушел с поста президента Украины, а на замену ему пришли бы прозападные политики. Появляется информация о том что украинская оппозиция и правительство Януковича готовят новые переговоры по решению кризиса, и вероятно как минимум они потребуют от Януковича пойти на уступки, а как максимум, потребуют уйти в отставку. Второго Ющенка на Украине нам не нужно, и если мы не предпримем какие то меры, то возможно Украина окончательно уйдет с нашей сферы влияния."
 RUS_meeting_in_the_kremlin: "Собрание в Кремле"
 RUS_meeting_in_the_kremlin_desc: "Президент Российской Федерации Владимир Путин срочным образом созвал Совет Безопасности РФ, где судя по всему будет обсуждаться напряженная обстановка на Украине, и возможное принятие вынужденных мер для защиты национальных интересов России. Вероятно нам придется задействовать силовые структуры или даже вооруженные силы для решения эскалации, но в любом случае, ситуация остается опасной как для правительства Януковича так и для нас в будущем, и требует каких то оперативных решений пока не стало поздно."
 RUS_assistance_in_organizing_anti_Maidan: "Помощь в организации анти-майдана"
 RUS_assistance_in_organizing_anti_Maidan_desc: "Чтобы сторонникам Майдана не дать взять полную инициативу на Украине, нам нужно помочь организовать Анти-Майдан. Профинансировать митинги в поддержку правительства Януковича по всем городам Украины, где население лояльно к Партии Регионов. Возможно такой шаг стабилизирует ситуацию и даст Виктору Януковичу число сторонников и общественную поддержку."
 RUS_convene_csto_council: "Собрать совет ОДКБ"
 RUS_convene_csto_council_desc: "Мы соберем сессию ОДКБ, рассмотрев вопросы обеспечения коллективной безопасности в сложной международной обстановке. Будет проведено совместное заседание министров иностранных дел, обороны и секретарей советов безопасности государств-членов ОДКБ, на котором будут рассмотрены важные вопросы."
 RUS_coordination_of_ukrainian_security_with_ours: "Координация силовиков Украины с нашими"
 RUS_coordination_of_ukrainian_security_with_ours_desc: "Необходимо помочь нашим друзьям из Украины в этот трудный период в разгар уличных беспорядков. К сожалению украинские силовики не способны в одиночку разобраться со столь крупным беспределом на улицах Киева, в связи с этим мы должны скоординироваться и принимать совместные решения чтобы обезопасить обстановку в столице. И возможно тогда получится угомонить сторонников Майдана и вернуть прежний порядок."
 RUS_deploy_security_forces_to_ukraine: "Отправить силовые структуры в Украину"
 RUS_deploy_security_forces_to_ukraine_desc: "Видно что МВД Украины не справляется со всем хаосом и насилием на улицах Киева который устроили сторонники Майдана. Протестующие перешли все черты и рамки, захватывают правительственные здания, захватывают оружия, возводят баррикады, убивают людей. Уже известно о числе погибших среди «Беркутовцев» на Майдане, если мы это не остановим, то только Бог знает к чему это может привести, но в любом случае мы должны вмешаться пока есть время. Правительство Украины официально запросили нас помочь им, мы согласовали это предложение и готовы подать руку помощи нашим друзьям."
 RUS_import_titushki: "Завоз титушек"
 RUS_import_titushki_desc: "На Украине существует такой чудный феномен как «Титушки», вкратце говоря это маргиналы которые готовы за пару сотен гривен стать буйным звеном на любом протесте. Биться с силовиками и с оппонентами, в первых рядах митингующих кричать громче всех и первее всех. Именно так званные титушки способны продвинуть пророссийские митинги и довести их до успеха. Мы можем нанять подобных людей в Ростове-на-Дону или в условном Белгороде, и завозить их в города юго-востока Украины."
 RUS_support_our_regions: "Поддержка «наших» регионов"
 RUS_support_our_regions_desc: "Харьков, Донецк, Одесса, Крым, Луганск - города и регионы где до сих пор бытует русская культура, на любой улице слышна русская речь, на магазинах русские надписи, а в школах читают русских писателей. Бесспорно многие жители юго-востока Украины с теплом относятся к России, и мы должны дать им понять, что Россия в том числе с теплом относится к ним. И что именно Россия в любой момент готова будет протянуть руку помощи русскоговорящему населению Украины."
 RUS_support_pro_kremlin_media_in_ukraine: "Создание прокремлёвских медиа в Украине"
 RUS_support_pro_kremlin_media_in_ukraine_desc: "В современном мире не менее важным является такой феномен как информационная война, война между средствами массовой информации, война пропагандистов, журналистов, военкоров и блогеров. Людям неведомо что происходит в сотнях километрах от них где то на горячей точке или в закрытых кабинетах политиков, и рассказать об этом им могут только СМИ. Но у каждого своя правда, в том числе и у нас, чтобы добиться лояльности украинского народа, мы можем тайно финансировать близкие нам медиа, такие как «112 Украина», «NewsOne», «ZIK» и другие украинские телеканалы."
 RUS_support_the_party_of_regions: "Поддержка «партии» Регионов"
 RUS_support_the_party_of_regions_desc: "Партия Регионов одна из немногих пророссийских партий на Украине, и несомненно самая крупная из них. Чтобы сохранить наше влияние на Украине, нам нужно поощрять Партию Регионов и надеется на то что они будут держать верх в рейтингах на популярность среди украинцев. Через Партию Регионов мы можем влиять на политику Украины, словно тянув за ниточки политиков как кукол, которые безмолвно будут выполнять наши приказы."
 RUS_PMC:0 "Создать ЧВК"
 sevastopol:0 "Захватить Севастополь"
 RUS_support_independent_crimea:0 "Поддержать независимость Крыма"
 RUS_support_independent_crimea_desc: "Нынче в Крыме патовая ситуация для Киева, после переворота Януковича на улицах Крыма вышли пророссийские сторонники. Мы, как государство поддерживающие население Крыма, поддержим их митинги.Теперь настал наш черед возращать наши утраченные земли, мы начнем операцию в Крыму."
 RUS_referendum_in_crimea:0 "Провести референдум в Крыму"
 RUS_referendum_in_crimea_desc: "Спустя время после нашей операции, мы взяли контроль над главными административными зданиями в Крыму. Смотря на поддержку населения на прошлых украинских землях, мы проведем референдум в Крыму."

