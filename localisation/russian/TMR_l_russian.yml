l_russian:
 TMR_accept_refugees: "Принять пророссийских беженцев"
 TMR_accept_refugees_desc: "После провала ОНР обстановка резко ожесточилась: начались задержания, проверки и давление на людей, которых подозревают в симпатиях к пророссийским силам. Мы не можем оставить их на произвол судьбы. Приднестровье обязано открыть двери для беженцев и взять на себя гуманитарную нагрузку, даже если это ударит по внутренней стабильности."
 TMR_border_deployments: "Развёртывание у границы"
 TMR_border_deployments_desc: "Перебрасываем подразделения к ключевым участкам и приводим в порядок узлы подвоза. Нужны связь, тыловые пункты и готовые маршруты для быстрого манёвра. Граница должна выглядеть как реальная линия угрозы, а не формальность."
 TMR_border_hardening: "Ужесточить режим охраны границы"
 TMR_border_hardening_desc: "Перестроить контроль на границе под затяжной кризис: больше проверок, быстрее реакции, меньше уязвимых участков. Это не решает проблему полностью, но повышает предсказуемость."
 TMR_bridgeheads: "Создать плацдармы"
 TMR_bridgeheads_desc: "Закрепляемся на опорных рубежах и создаём условия для дальнейшего продвижения. Берём под контроль дороги, переправы и узлы связи, чтобы не потерять темп. Любая пауза сейчас — шанс для противника перегруппироваться."
 TMR_broadcasting_concept_2014: "Новая информационная стратегия"
 TMR_broadcasting_concept_2014_desc: "Перестроить медиаполитику под кризисный период: единые тезисы, более чёткая коммуникация с населением и модернизация основных инструментов вещания."
 TMR_call_kremlin: "Звонок в Кремль"
 TMR_call_kremlin_desc: "Запрашиваем политическое решение по операции и формат возможной поддержки. Ответ Москвы определит, действуем ли мы с опорой на союзные ресурсы или берём всё на себя. После этого шага пространство для манёвра резко сужается."
 TMR_condemn_kyiv_protests: "Официальное осуждение Майдана"
 TMR_condemn_kyiv_protests_desc: "Зафиксировать позицию на уровне руководства и госструктур: протесты рассматриваются как источник хаоса и угрозы безопасности. Это поможет консолидировать аппарат и общественное мнение."
 TMR_conflict_escalation: "Русская весна"
 TMR_conflict_escalation_desc: "Украина трещит по швам: в крупнейших русскоязычных городах вспыхивает «Русская весна». Крым уже вернулся в Россию, а в Луганске, Одессе и Харькове протестующие берут под контроль административные здания. В Донецке провозглашена ДНР. Киевская власть готовит силовую операцию, но волна уже пошла. Если ОНР удержится, у нас появится шанс прорвать блокаду."
 TMR_coordination_with_russia: "Наладить прямую координацию с Москвой"
 TMR_coordination_with_russia_desc: "Укрепить постоянные каналы связи и согласования. Чем быстрее идут консультации и обмен информацией, тем проще удерживать ситуацию под контролем в период внешней турбулентности."
 TMR_depots_and_logistics: "Тыловые склады и логистика"
 TMR_depots_and_logistics_desc: "Создать материальный запас прочности: транспорт, железнодорожная логистика и минимальные топливные резервы. Даже небольшой резерв может стать критическим при внезапной эскалации."
 TMR_employment_program: "Программа адаптации и трудоустройства"
 TMR_employment_program_desc: "Сместить акцент от экстренного реагирования к долгосрочной интеграции: занятость, переквалификация и снижение социальной нагрузки на бюджет."
 TMR_energy_contracts: "Гарантии энергоснабжения"
 TMR_energy_contracts_desc: "Зафиксировать договорённости по энергоресурсам и снизить вероятность сбоев. Энергетика — фундамент и экономики, и социальной стабильности."
 TMR_eu_stub: "Европейский разворот"
 TMR_eu_stub_desc: "§RЭтот путь будет расширен позже§!: дипломатия, экономика и постепенное отдаление от российских структур влияния."
 TMR_fuel_and_supplies_opr: "Снабжение"
 TMR_fuel_and_supplies_opr_desc: "Передать критически важные ресурсы: топливо, транспорт и минимальную железнодорожную логистику. Цель — удержать темпы и обеспечить функционирование инфраструктуры."
 TMR_gkchs_extra_session: "Внеочередное заседание ГКЧС"
 TMR_gkchs_extra_session_desc: "Созвать профильные органы и перевести управление в режим повышенного реагирования. Основная цель — готовность к резким изменениям ситуации на границах и внутри региона."
 TMR_humanitarian_corridor_opr: "Гуманитарный коридор"
 TMR_humanitarian_corridor_opr_desc: "Открыть канал поддержки, который выглядит гуманитарным, но укрепляет устойчивость союзников и снижает внутреннюю турбулентность на их стороне."
 TMR_integration_course_rf: "Курс на углубление интеграции с РФ"
 TMR_integration_course_rf_desc: "Сделать ставку на более тесную экономическую и политическую связку с Россией. Это улучшает взаимодействие с РФ, но неизбежно ухудшает отношения с Молдовой и Украиной."
 TMR_intelligence_liaison_opr: "Финансовая помощь"
 TMR_intelligence_liaison_opr_desc: "Мы выделим средства на поддержку ОНР и развитие их возможностей. Деньги пойдут на обеспечение, армии и укрепление административных механизмов.."
 TMR_internal_stabilization: "Внутренняя стабилизация"
 TMR_internal_stabilization_desc: "ОНР уничтожена — вместе с ней рухнули и наши надежды на быстрый выход из изоляции. Теперь важнее другое: удержать порядок внутри и снять напряжение. Мы стабилизируем систему и возвращаемся к обычной жизни."
 TMR_kolbasna_mine_depots: "Заминировать складской район"
 TMR_kolbasna_mine_depots_desc: "Готовим объект к уничтожению на случай захвата противником. Закладываем меры подрыва инфраструктуры и ключевых узлов хранения, чтобы лишить врага трофеев. Это крайняя страховка, но иногда она решает всё."
 TMR_kolbasna_unseal_depots: "Расконсервация складов в Колбасне"
 TMR_kolbasna_unseal_depots_desc: "Снимаем консервацию с резервов и приводим склады в рабочее состояние. Параллельно усиливаем охрану и проводим инвентаризацию, чтобы избежать потерь и хаоса. Колбасна — это реальный ресурс, который нельзя упустить."
 TMR_kremlin_approval: "Разрешение получено"
 TMR_kremlin_approval_desc: "Москва дала добро. Теперь можно планировать действия, исходя из более широких возможностей."
 TMR_local_fuel_rationing: "Режим экономии "
 TMR_local_fuel_rationing_desc: "Экономия сегодня — это манёвр завтра."
 TMR_local_support_only: "Опора на собственные ресурсы"
 TMR_local_support_only_desc: "Действуем без союзного плеча: меньше возможностей, больше рисков и выше цена ошибок. Придётся жёстко расставлять приоритеты и экономить всё, что можно. Зато решения принимаются быстрее — и ответственность полностью наша."
 TMR_local_workshops: "Мастерские и сборные пункты"
 TMR_local_workshops_desc: "Разворачиваем ремонт и снабжение на месте, чтобы компенсировать дефицит внешних поставок. Мастерские ускорят восстановление техники и снаряжения, а сборные пункты — пополнение и распределение. В условиях давления это превращается в систему выживания."
 TMR_obey_kremlin: "Послушаться Кремль"
 TMR_obey_kremlin_desc: "Прямой курс на операцию сворачивается по политическим причинам. Мы смещаем акцент на непрямые инструменты и поддержку союзников там, где это возможно. Иногда пауза — это не слабость, а расчёт."
 TMR_ogrw_training: "Учения ОГРВ"
 TMR_ogrw_training_desc: "ОГРВ начинает учения, отрабатывая возможный «крымский сценарий»:молниеносное развёртывание, блокирование Воинских частей и взятие под контроль административных зданий."
 TMR_operational_planning: "Оперативное планирование"
 TMR_operational_planning_desc: "Сводим политическое решение к конкретной карте действий: направления, сроки и резервы. Уточняем взаимодействие штабов и порядок принятия решений. План должен быть простым и исполнимым даже в условиях хаоса."
 TMR_opr_blacksea_route: "Логистический маршрут на юг"
 TMR_opr_blacksea_route_desc: "Расширяем снабжение через альтернативные направления и создаём запасные варианты подвоза. Это повышает мобильность союзников и снижает зависимость от одного коридора. Чем больше маршрутов — тем меньше шанс быть перекрытыми."
 TMR_opr_expand_support: "Расширить поддержку ОНР"
 TMR_opr_expand_support_desc: "Увеличиваем объёмы помощи и делаем поддержку регулярной. Важно не только передать ресурсы, но и удержать их доставку. Чем стабильнее снабжение, тем устойчивее союзник."
 TMR_opr_failure: "ОНР не состоялась"
 TMR_opr_failure_desc: "Проект ОНР провалился, приоритетом становится внутренняя стабильность и минимизация рисков. Время громких шагов уходит — важнее удержать контроль над ситуацией у себя."
 TMR_opr_intel_exchange: "Обмен разведданными"
 TMR_opr_intel_exchange_desc: "Информация — это время, а время — это преимущество. Организуем постоянный обмен данными и согласование оценок обстановки. Координация снижает риск ошибок и повышает точность действий."
 TMR_opr_open_confrontation: "Открытое противостояние"
 TMR_opr_open_confrontation_desc: "Переходим от непрямых инструментов к прямому силовому давлению. Это повышает шансы на быстрый результат, но резко увеличивает риск расширения конфликта. Такой шаг требует готовности платить цену."
 TMR_opr_success: "ОНР удержалась"
 TMR_opr_success_desc: "Успех ОНР меняет правила игры. Появляется шанс закрепиться на южном направлении, создать опору для дальнейших шагов и приблизиться к выходу из изоляции. Теперь нельзя терять темп: поддержка, снабжение и координация должны превратить успех в устойчивый результат."
 TMR_opr_support_pipeline: "Открытая поддержка"
 TMR_opr_support_pipeline_desc: "Мы официально признали ОНР — и тем самым сняли последние ограничения для сотрудничества. Теперь помощь больше не будет «негласной»: мы можем открыто поставлять оружие, боеприпасы и снаряжение, направлять инструкторов и укреплять линии снабжения. ОНР станет нашим надежным форпостом, а любая атака на них будет восприниматься как вызов уже нам."
 TMR_opr_training_camps: "Учебные лагеря для ОНР"
 TMR_opr_training_camps_desc: "Подготовка кадров важнее единичных поставок: люди решают исход столкновений. Инструкторы и обучение повышают дисциплину, устойчивость и управляемость. Это инвестиция, которая работает дольше любого конвоя."
 TMR_passportization: "Ускорить паспортные процедуры"
 TMR_passportization_desc: "Упростить бюрократию и ускорить оформление документов для населения. На практике это усиливает институциональную привязку к российскому пространству."
 TMR_quiet_life_end: "Продолжить политику изоляционизма"
 TMR_quiet_life_end_desc: "Сделать ставку на самосохранение: меньше внешних обязательств, больше внутренней дисциплины и осторожности. Это шаг, который требует дисциплины и быстрых решений. Последствия будут ощущаться как внутри региона, так и за его пределами."
 TMR_raise_folk_militias: "Поднять народные дружины"
 TMR_raise_folk_militias_desc: "Если внешняя поддержка ограничена, придётся опираться на внутренний ресурс. Формируем добровольческие структуры для охраны узлов, патрулей и тыловых задач. Это не замена армии, но способ закрыть уязвимые места."
 TMR_raise_ogrw_readiness: "Поднять ОГРВ"
 TMR_raise_ogrw_readiness_desc: "Переводим ОГРВ в повышенную готовность и ускоряем развёртывание. Усиливаем охрану объектов и отрабатываем сценарии быстрого реагирования. Демонстрация силы должна быть убедительной, иначе она бесполезна."
 TMR_recognize_opr: "Признать ОНР"
 TMR_recognize_opr_desc: "Сделать политический шаг, который укрепит союз и улучшит отношения с ОНР. Это повышает ставку в регионе и делает поддержку более открытой."
 TMR_refugee_registration: "Регистрация и фильтрация потоков"
 TMR_refugee_registration_desc: "Навести порядок в потоках: учёт, проверка, маршрутизация. Это уменьшает риски проникновения угроз, но требует жёстких решений и политических затрат."
 TMR_request_recognition: "Добиваться признания суверенитета"
 TMR_request_recognition_desc: "Перейти от намёков к официальным дипломатическим шагам. Признание — это инструмент легитимации, но он обостряет конфликты интересов с соседними государствами."
 TMR_request_russian_aid: "Запрос экономической поддержки у РФ"
 TMR_request_russian_aid_desc: "Обратиться за финансовыми механизмами стабилизации: субсидии, льготные условия и поддержка ключевых отраслей. В условиях неопределённости это становится вопросом выживания бюджета."
 TMR_return_to_opr_support: "Вернуться к поддержке ОНР"
 TMR_return_to_opr_support_desc: "Если прямой путь закрыт, южное направление остаётся шансом расширить возможности. Ставка делается на снабжение, координацию и укрепление союзников. Поддержка должна быть системной, а не разовой."
 TMR_rus_support_package: "Пакет помощи РФ"
 TMR_rus_support_package_desc: "Разрешение получено — поддержка может перейти из слов в ресурсы. Уточняем объёмы снабжения, инструкторов и координацию на уровне штабов. Это повышает устойчивость и расширяет пространство для действий."
 TMR_second_direction_threat: "Угроза с юга"
 TMR_second_direction_threat_desc: "На Донбассе начинается вооружённое противостояние, и Киев стягивает основные силы на восток. Мы должны вынудить украинское командование держать часть ресурсов у нашей границы: учения, демонстративные перемещения и усиление пограничного режима заставят их распылять внимание и силы."
 TMR_security_border_filtering: "Усилить пограничный контроль"
 TMR_security_border_filtering_desc: "Ужесточить проверки, отладить фильтрацию потоков и перекрыть лазейки для провокаций. Это не решит политический кризис, но снизит риск внезапной дестабилизации."
 TMR_seize_border_posts: "Захват пограничных узлов"
 TMR_seize_border_posts_desc: "КПП, развязки и мосты определяют скорость ввода сил и снабжения. Берём ключевые узлы под контроль, чтобы исключить срывы и задержки. Пограничная инфраструктура должна работать на нас."
 TMR_send_advisors: "Направить советников и инструкторов"
 TMR_send_advisors_desc: "Организовать помощь в подготовке и управлении, усилив командную составляющую союзников. Это дешевле прямого вмешательства и часто эффективнее поставок одной техники."
 TMR_smuggling_to_opr: "Контрабандные поставки"
 TMR_smuggling_to_opr_desc: "Наладить скрытые поставки снаряжения. Это повышает успех ОНР, не требуя официального вмешательства и сохраняя пространство для отрицания."
 TMR_start_operation: "Начать операцию"
 TMR_start_operation_desc: "Переходим от подготовки к действиям — конфликт выходит в открытую фазу. Любая ошибка теперь будет стоить дорого и на фронте, и в дипломатии. Остановить войну сложнее, чем начать её."
 TMR_subsidies_and_credits: "Закрепить субсидии и кредитные линии"
 TMR_subsidies_and_credits_desc: "Оформить конкретные источники денег и условия помощи, чтобы закрыть самые уязвимые статьи расходов. Это даст передышку и снизит риск внутреннего социального давления."
 TMR_support_crimea_operation: "Поддержать российскую операцию в Крыму"
 TMR_support_crimea_operation_desc: "Открыто одобрить действия России и обозначить свою позицию в региональном конфликте. Это усиливает привязку к российскому курсу, но одновременно повышает напряжённость с соседями."
 TMR_support_euromaidan: "Поддержать протестное движение"
 TMR_support_euromaidan_desc: "Открыто заявить о поддержке смены курса в Киеве и попытаться перестроить внешнюю политику под новую реальность. §RВ текущей версии эта ветка отключена§!."
 TMR_support_yanukovych: "Встать на сторону действующей власти в Киеве"
 TMR_support_yanukovych_desc: "Публично поддержать линию официального Киева и обозначить неприятие уличного хаоса. Это укрепляет пророссийский вектор и задаёт тон дальнейшим шагам."
 TMR_temporary_shelters: "Развернуть временные центры размещения"
 TMR_temporary_shelters_desc: "Организовать пункты приёма, жильё и первичную помощь. Мера затратная и непопулярная, но она снижает социальное напряжение и делает процесс управляемым."
 TMR_tourists: "«Туристы»"
 TMR_tourists_desc: "Отправить ограниченный контингент и дополнительное снабжение под прикрытием гражданских перемещений. Задача — усилить ОНР без прямой эскалации на дипломатическом уровне."
 TMR_war_choice_after_failure: "Реванш"
 TMR_war_choice_after_failure_desc: "Если шанс упущен, остаётся вариант силового ответа — даже без союзного плацдарма. Это шаг, который требует дисциплины и быстрых решений. Последствия будут ощущаться как внутри региона, так и за его пределами."
 TMR_war_economy_rails: "Перевести экономику на военные рельсы"
 TMR_war_economy_rails_desc: "Открытое противостояние потребует мобилизации промышленности, транспорта и финансов. Переходим на военные нормы снабжения и ускоряем выпуск всего, что нужно фронту."
 TMR_wargoal_ukraine: "Начать операцию"
 TMR_wargoal_ukraine_desc: "Политическое решение принято. Время переходить к действиям. Это шаг, который требует дисциплины и быстрых решений. Последствия будут ощущаться как внутри региона, так и за его пределами."
 TMR_we_wont_abandon_ours: "Cвоих не бросаем"
 TMR_we_wont_abandon_ours_desc: "Решение принято: действуем даже без одобрения извне. Это путь с меньшими ресурсами и большей ценой ошибок, но отступление означает потерю инициативы. Теперь всё зависит от нашей готовности и дисциплины."

 tmr.1.a: "Дать добро"
 tmr.1.b: "Не разрешать"
 tmr.1.d: "Тирасполь запрашивает политическое решение: разрешить подготовку операции против Украины или запретить любые действия."
 tmr.1.t: "Звонок из Тирасполя"
 tmr.2.a: "Прекрасно"
 tmr.2.d: "Запрос одобрен. Теперь можно действовать с опорой на поддержку Москвы."
 tmr.2.t: "Москва дала добро"
 tmr.3.a: "Послушаться Кремль"
 tmr.3.b: "Своих не бросаем"
 tmr.3.d: "Запрос отклонён. Придётся выбрать: подчиниться или действовать самостоятельно."
 tmr.3.t: "Москва отказала"
 tmr.4.d: "Тирасполь объявил о начале военной операции против Украины."
 tmr.4.t: "ПМР начинает операцию"
 tmr.5.d: "Подразделения ОГРВ выдвигаются из мест постоянной дислокации."
 tmr.5.t: "ОГРВ покидает пункты постоянной дислокации"
 tmr.6.d: "ОГРВ объявляет о взятии под контроль ключевых объектов на севере региона, включая район складов в Колбасне."
 tmr.6.t: "ОГРВ берёт под контроль север Приднестровья"
 tmr.7.d: "Сообщается о разрушительном взрыве в районе складов у Колбасны. Стороны обвиняют друг друга в катастрофической эскалации."
 tmr.7.t: "Взрыв в районе Колбасны"
 tmr.8.a: "Спасти этих дураков"
 tmr.8.b: "Удерживайте склад Колбасне"
 tmr.8.d: "Тирасполь перешёл к действиям без нашего политического разрешения. Нужно решить: спасать их или удержать склад в Колбасном."
 tmr.8.t: "ПМР начала операцию без согласия"
 tmr.9.a: "Напасть на ОГРВ"
 tmr.9.b: "Не трогать их"
 tmr.9.d: "Подразделения ОГРВ взяли под контроль склад в Колбасном. Атаковать их или избежать расширения войны."
 tmr.9.t: "ОГРВ у Колбасны"
 tmr.10.a: "Встать на сторону ОГРВ"
 tmr.10.b: "Не вмешиваться"
 tmr.10.d: "Украина атаковала ОГРВ. Вопрос: вступаем в войну или ограничимся заявлениями?"
 tmr.10.t: "Встать на сторону ОГРВ?"
 tmr.12.a: "Оставить себе"
 tmr.12.b: "Передать Молдове"
 tmr.12.d: "После падения приднестровских структур Украина контролирует ключевые территории региона. Встаёт вопрос: удерживать эти земли или передать их Молдове."
 tmr.12.t: "Судьба Приднестровья"
 tmr.13.a: "Отлично."
 tmr.13.d: "Украинские силы взяли под контроль складской район в Колбасне. Сопротивление подавлено, объекты захвачены практически без потерь. Запасы переходят под контроль Киева."
 tmr.13.t: "Захват склада в Колбасне"
 tmr.14.t: "Судьба новых земель"
 tmr.14.d: "После нашей ошеломляющей победоносной операции на территории Украины по освобождению русского народа, мы должны решить, что делать с новоприобритенной землёй. Должны ли мы дать независимость Одесской Народной Республики или стоит создать конфедерацию?"
 tmr.14.a: "Создать Одессо-приднестровскую конфедерацию"
 tmr.14.b: "Вернуть ОНР"

 TMR_dig_in_tiraspol: "Окопаться в Тирасполе"
 TMR_return_OPR: "Вернуть ОНР"
 TMR_dig_in_tiraspol_tt: "§YБудут возведены укрепления в окрестностях Тирасполя§!"
 TMR_mobilization_tt: "§YБудет проведена народная мобилизация в отряды самообороны§!"
 TMR_end_operation_tt: "§YПриднестровье прекратит операцию и выведит войска§!"
