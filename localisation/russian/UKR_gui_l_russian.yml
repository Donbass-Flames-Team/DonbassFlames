 separatismgui_prorussian_rally_tt:0 " Проведение митинга в поддержку сближения с Россией. Массовое мероприятие должно укрепить позиции сторонников России и ослабить влияние §Cпроукраинских сил§!.\n \n §YДействие при выборе:§!\n Увеличится §Rпророссийское население§! на §G+5%§!\n Уменьшится §Cлояльность к Украине§!\n §YСтоимость принятия решения:§! £pol_power §Y25§!\n §YПерезарядка:§! §Y14§! дн."
 separatism_prorussian_incerase_tt:0 " Запуск широкой кампании пророссийской пропаганды, направленной на популяризацию российских ценностей и ослабление §Cпроукраинских настроений§! в регионе.\n \n §YДействие при выборе:§!\n Увеличится §Rпророссийское население§! на §G+5%§!\n Уменьшится §Cлояльность к Украине§!\n §YСтоимость принятия решения:§! £pol_power §Y25§!\n §YПерезарядка:§! §Y14§! дн."
 separatism_radicalize_people_tt:0 " Формирование и поддержка радикальных пророссийских групп, готовых противостоять §Cпроукраинским организациям§! и дестабилизировать обстановку в регионе.\n \n §YДействие при выборе:§!\n Увеличится §Rпророссийское население§! на §G+5%§!\n Уменьшится §Cлояльность к Украине§!\n §YСтоимость принятия решения:§! £pol_power §Y25§!\n §YПерезарядка:§! §Y14§! дн."
 arms_supplies_from_russia_tt:0 " Организация каналов поставок оружия и контрабанды с территории России для поддержки пророссийских сил и ослабления §Cпроукраинского населения§!.\n \n §YДействие при выборе:§!\n Увеличится §Rпророссийское население§! на §G+5%§!\n Уменьшится §Cлояльность к Украине§!\n §YСтоимость принятия решения:§! £pol_power §Y25§!\n §YПерезарядка:§! §Y14§! дн."




 separatism_hold_proukranian_rally_tt:0 " Проведение митинга в поддержку единства с Украиной.\n \n §YДействие при выборе:§!\n Увеличится §Cпроукраинское население§! на §G+5%§!\n Уменьшится §Rсепаратистская активность§!\n §YСтоимость принятия решения:§! £pol_power §Y25§!\n §YМожно использовать снова через:§! §Y14§! дн."
 separatism_proukranian_incerase_tt:0 " Организация масштабной информационной кампании в поддержку курса на сближение с Украиной.\n \n §YДействие при выборе:§!\n Увеличится §Cпроукраинское население§! на §G5%§!\n Уменьшится §Rсепаратистская активность§!\n §YСтоимость принятия решения:§! £pol_power §Y25§!\n §YМожно использовать снова через:§! §Y14§! дн."
 separatism_deradicalize_people_tt:0 " Программа по укреплению лояльности населения и снижению влияния радикальных элементов.\n \n §YДействие при выборе:§!\n Увеличится §Cпроукраинское население§! на §G5%§!\n Уменьшится §Rсепаратистская активность§!\n §YСтоимость принятия решения:§! £pol_power §Y25§!\n §YМожно использовать снова через:§! §Y14§! дн."
 fight_smuggling_from_russia_tt:0 " Пресечь поставки оружия сепаратистам из РФ. Выявить тайники, заблокировать нелегальные маршруты и задержать контрабандистов для восстановления контроля над регионом.\n \n §YДействие при выборе:§!\n Увеличится §Cпроукраинское население§! на §G5%§!\n Уменьшится §Rсепаратистская активность§!\n §YСтоимость принятия решения:§! £pol_power §Y25§!\n §YМожно использовать снова через:§! §Y14§! дн."


 


