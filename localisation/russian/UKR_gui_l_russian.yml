 SEPARATISM_GUI_HELP_BUTTON:0 "§YСправочник для ГУИ сепаратизма§!\n\n\nГУИ сепаратизма отображает уровень сепаратистских настроений и готовность регионов к восстанию. Чем выше этот показатель, тем больше подразделений, вооружения и территорий получат сепаратисты в случае начала восстания.\n\nРегиональный сепаратизм отражает настроение населения, проживающего в выбранных регионах.\n§RПри высоком уровне пророссийских настроений сепаратисты получают дополнительные баффы, население активнее поддерживает их и чаще присоединяется к их рядам.§!\n§5При высоком уровне проукраинских настроений действует аналогичный принцип - увеличивается количество баффов у ВСУ, а население оказывает им большую поддержку.§!"

