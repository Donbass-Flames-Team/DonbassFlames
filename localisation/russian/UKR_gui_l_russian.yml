 MENU_UPDATELOGO:0 "§OТекущая версия: Alpha 0.0.1§!\n\n§HЧТО ПЛАНИРУЕТСЯ НА РЕЛИЗЕ 0.1:§!\n- §R[WIP]§! Контент для Украины, Российской Федерации, Донецкой Народной Республики, Луганской Народной Республики, Харьковской Народной Республики и Одесской Народной Республики\n- §G[ГОТОВО]§! Новая уникальная карта восточной Европы\n- §G[ГОТОВО]§! Уникальная GUI «Регионального сепаратизма» для Украины\n- §G[ГОТОВО]§! Уникальная механика радикализации Евромайдана для Украины\n- §Y[DEMO]§! Уникальная GUI Верховной Рады для Украины\n- §R[WIP]§! Национальные духи для всех стран\n- §G[ГОТОВО]§! Обновленный минималистичный интерфейс игры для более приятной игры в мод\n- §G[ГОТОВО]§! Новое меню выбора сценариев\n- §G[ГОТОВО]§! Специально подобранная музыка для более лучшего погружения в атмосферу мода\n- §R[WIP]§! Уникальная механика президентских выборов для Украины\n- §R[WIP]§! Уникальные ветки для президентов Украины\n- §R[WIP]§! Уникальная механика генштаба для всех сторон\n- §R[WIP]§! Уникальная механика артилерийских ударов для всех сторон\n- §G[ГОТОВО]§! Решения на создание добровольческих батальонов для зоны АТО для Украины\n- §R[WIP]§! Портреты для всех правителей стран на карте на момент 21.11.2013\n- §R[WIP]§! Уникальная механика эскалации\n\n§YСледите за обновлениями мода§! на нашем §CDiscord-сервере§! и §CTelegram-канале!§!"


