l_russian:
  world_events.1.t:0 "Шотландский референдум"
  world_events.1.d:0 "В Шотландии прошёл референдум о независимости."
  world_events.1.a:0 "Понятно"

  world_events.2.t:0 "Спалах Эболы в Западной Африке"
  world_events.2.d:0 "Эпидемия лихорадки Эбола охватила страны Западной Африки."
  world_events.2.a:0 "Тревожно"

  world_events.3.t:0 "ИГИЛ"
  world_events.3.d:0 "Радикальная группировка ИГИЛ стремительно расширяет контроль в Ираке и Сирии, объявляя «халифат»."
  world_events.3.a:0 "Опасно"

  world_events.4.t:0 "Теракты в Париже"
  world_events.4.d:0 "Серия координированных атак в Париже привела к большим жертвам и шокировала Европу."
  world_events.4.a:0 "Ужас"

  world_events.5.t:0 "Парижська климатическая угода"
  world_events.5.d:0 "На конференции COP21 в Париже страны согласовали глобальные цели по сокращению выбросов и ограничению потепления."
  world_events.5.a:0 "Зафиксировано"

  world_events.6.t:0 "Европейский миграционный кризис"
  world_events.6.d:0 "Потоки беженцев и мигрантов усиливают напряжение внутри ЕС."
  world_events.6.a:0 "Понятно"

  world_events.7.t:0 "Brexit"
  world_events.7.d:0 "В Великобритании прошёл референдум о членстве в ЕС. Итог голосования запускает процесс выхода."
  world_events.7.a:0 "Вот это да"

  world_events.8.t:0 "Попытка переворота в Турции"
  world_events.8.d:0 "В Турции предпринята попытка военного переворота. Власть удержалась, но последовавшие чистки резко изменили политику страны."
  world_events.8.a:0 "Нехорошо"

  world_events.9.t:0 "Битва за Алеппо"
  world_events.9.d:0 "Бои за Алеппо стали переломным моментом сирийской войны."
  world_events.9.a:0 "Понятно"

  world_events.10.t:0 "Испытания в КНДР"
  world_events.10.d:0 "Серия ракетных и ядерных испытаний КНДР приводит к росту напряжённости в Восточной Азии. Санкции усиливаются."
  world_events.10.a:0 "Тревожно"

  world_events.11.t:0 "Конституционный кризис в Испании"
  world_events.11.d:0 "Противостояние Мадрида и каталонских властей приводит к острому политическому кризису."
  world_events.11.a:0 "Понятно"

  world_events.12.t:0 "Протесты «жёлтых жилетов»"
  world_events.12.d:0 "Во Франции вспыхнули массовые протесты «жёлтых жилетов»."
  world_events.12.a:0 "Опять протесты"

  world_events.13.t:0 "Чемпионат мира по футболу 2018"
  world_events.13.d:0 "Чемпионат мира по футболу в России становится крупнейшим спортивным событием года."
  world_events.13.a:0 "Футбол!"

  world_events.14.t:0 "Новый вирус!"
  world_events.14.d:0 "Появляются первые сообщения о вспышке неизвестной пневмонии."
  world_events.14.a:0 "Следим"

  world_events.15.t:0 "COVID-19"
  world_events.15.d:0 "COVID-19 распространяется по всему миру."
  world_events.15.a:0 "Тяжело"

  world_events.16.t:0 "Black Lives Matter"
  world_events.16.d:0 "После убийства Джорджа Флойда в США вспыхивают массовые протесты."
  world_events.16.a:0 "Понятно"

  world_events.17.t:0 "Взрыв в порту Бейрута"
  world_events.17.d:0 "Мощный взрыв в порту Бейрута приводит к масштабным разрушениям и человеческим жертвам."
  world_events.17.a:0 "Ужас"

  world_events.18.t:0 "Война в Нагорном Карабахе"
  world_events.18.d:0 "Боевые действия в Нагорном Карабахе вспыхнули с новой силой, применяются беспилотники и высокоточное оружие."
  world_events.18.a:0 "Тревожно"

  world_events.19.t:0 "Старт массовой вакцинации"
  world_events.19.d:0 "Первые вакцины получают одобрения и начинается массовая вакцинация."
  world_events.19.a:0 "Наконец-то"

  world_events.20.t:0 "Пожары в Австралии"
  world_events.20.d:0 "Катастрофические лесные пожары в Австралии приводят к огромному ущербу природе и экономике."
  world_events.20.a:0 "Кошмар"

  world_events.21.t:0 "Штурм Капитолия США"
  world_events.21.d:0 "Сторонники действующего президента ворвались в здание Капитолия во время утверждения результатов выборов."
  world_events.21.a:0 "Шок"

  world_events.22.t:0 "Возвращение Талибана"
  world_events.22.d:0 "После вывода войск США и НАТО власть в Афганистане стремительно перешла к Талибану."
  world_events.22.a:0 "Понятно"

  world_events.23.t:0 "Новая волна COVID-19"
  world_events.23.d:0 "Не придумав текст."
  world_events.23.a:0 "Опять..."

  world_events.24.t:0 "Суэцкий канал заблокирован"
  world_events.24.d:0 "Контейнеровоз Ever Given застрял в Суэцком канале, остановив один из важнейших торговых маршрутов."
  world_events.24.a:0 "Невероятно"

  world_events.25.t:0 "Pegasus"
  world_events.25.d:0 "Расследование показывает масштаб использования шпионского ПО Pegasus против политиков, журналистов и активистов."
  world_events.25.a:0 "Жесть"

  world_events.26.t:0 "Смерть Елизаветы II"
  world_events.26.d:0 "Умирает королева Елизавета II. На престол вступает Чарльз III."
  world_events.26.a:0 "Эпоха закончилась"

  world_events.27.t:0 "Чемпионат мира 2022 в Катаре"
  world_events.27.d:0 "ЧМ-2022 в Катаре становится крупнейшим спортивным событием года, но сопровождается спорами о правах человека."
  world_events.27.a:0 "Футбол!"

  world_events.28.t:0 "Война Израиль–ХАМАС"
  world_events.28.d:0 "ХЗ що тут писать хто взагалі дограє до 2023?."
  world_events.28.a:0 "Ужас"

  world_events.29.t:0 "Землетрясения в Турции и Сирии"
  world_events.29.d:0 "Сильнейшие землетрясения приводят к огромному числу жертв и разрушений."
  world_events.29.a:0 "Соболезнуем"

  world_events.30.t:0 "Бум ИИ"
  world_events.30.d:0 "Генеративные модели ИИ становятся массовым инструментом в бизнесе и образовании. Мир ускоренно перестраивает рынки труда, регулирование и конкуренцию. Этот текст был написан при помощи ии"
  world_events.30.a:0 "Новая эпоха"

  world_events.31.t:0 "США: итоги президентских выборов 2016 года"
  world_events.31.d:0 "8 ноября 2016 года в Соединённых Штатах прошли президентские выборы. По итогам голосования победу одержал Дональд Трамп."
  world_events.31.a:0 "Понятно"

  world_events.32.t:0 "США: итоги президентских выборов 2020 года"
  world_events.32.d:0 "3 ноября 2020 года в Соединённых Штатах состоялись президентские выборы. Победу одержал Джо Байден."
  world_events.32.a:0 "Понятно"

  world_events.33.t:0 "США: итоги президентских выборов 2024 года"
  world_events.33.d:0 "5 ноября 2024 года в Соединённых Штатах прошли президентские выборы. Победу одержал Дональд Трамп."
  world_events.33.a:0 "Понятно"
