l_russian:
  world_events.1.t:0 "Референдум о независимости Шотландии"
  world_events.1.d:0 "Референдум о независимости Шотландии состоялся 18 сентября 2014 года. На голосование был вынесен вопрос: «Должна ли Шотландия стать независимой страной?» с вариантами ответа «Yes/No». Право голоса имели жители Шотландии, включая граждан ЕС и стран Содружества, постоянно проживавших в регионе, а также впервые на общенациональном уровне в Великобритании — избиратели с 16 лет. Явка составила 84,6%, что стало одной из самых высоких в современной истории Великобритании. Против независимости «No» проголосовали 55,3% (2 001 926), за независимость «Yes» — 44,7% (1 617 989). После поражения сторонников независимости первый министр Шотландии Алекс Салмонд объявил об отставке. Вслед за референдумом британские власти инициировали расширение полномочий шотландского парламента, закреплённое последующими законодательными актами."
  world_events.1.a:0 "Понятно"

  world_events.2.t:0 "Спалах Эболы в Западной Африке"
  world_events.2.d:0 "Спалах лихорадки Эбола в Западной Африке начался в конце 2013 года в юго-восточной Гвинее и был официально объявлен ВОЗ 23 марта 2014 года . В дальнейшем заболевание распространилось прежде всего на Гвинею, Либерию и Сьерра-Леоне, где сформировались основные очаги эпидемии . 8 августа 2014 года ВОЗ признала ситуацию чрезвычайной в области общественного здравоохранения, имеющей международное значение. В рамках международного ответа 19 сентября 2014 года ООН учредила UNMEER — первую в истории ООН чрезвычайную миссию в сфере здравоохранения. По данным ВОЗ, суммарно было зарегистрировано более 28 600 инфицирований и 11 325 смертей . В июне 2016 года ВОЗ объявила вспышку завершённой."
  world_events.2.a:0 "Тревожно"

  world_events.3.t:0 "ИГИЛ"
  world_events.3.d:0 "В июне 2014 года радикальная исламистская организация Исламское государство (ИГИЛ) начала стремительное наступление на территории Ирака и Сирии. 10 июня 2014 года боевики захватили город Мосул — второй по величине город Ирака. 29 июня 2014 года лидер группировки Абу Бакр аль-Багдади объявил о создании «халифата» и провозгласил себя халифом. Организация заявила о ликвидации границы между Ираком и Сирией и претендовала на руководство всеми мусульманами. На пике своего влияния в 2014–2015 годах ИГИЛ контролировала значительные территории с населением в несколько миллионов человек. Международное сообщество сформировало коалицию во главе с США для борьбы с группировкой, начав авиаудары в августе 2014 года. К марту 2019 года группировка потеряла последний контролируемый населённый пункт в Сирии, однако отдельные ячейки продолжили действовать подпольно."
  world_events.3.a:0 "Опасно"

  world_events.4.t:0 "Теракты в Париже"
  world_events.4.d:0 "13 ноября 2015 года в Париже и пригороде Сен-Дени произошла серия координированных террористических атак. Атаки включали взрывы у стадиона Stade de France, стрельбу и взрыв у кафе и ресторанов в 10-м и 11-м округах Парижа, а также захват заложников и массовое убийство в концертном зале Bataclan. По данным Европола, погибли 130 человек, 368 получили ранения. Ответственность за нападения заявило «Исламское государство». Президент Франции Франсуа Олланд охарактеризовал нападения как «акт войны». Сразу после атак во Франции был введён режим чрезвычайного положения, оформленный декретом от 14 ноября 2015 года. События стали крупнейшим по числу погибших терактом во Франции в новейшей истории и одним из самых смертоносных в ЕС после взрывов в Мадриде 2004 года."
  world_events.4.a:0 "Ужас"

  world_events.5.t:0 "Парижська климатическая угода"
  world_events.5.d:0 "Конференция ООН по климату COP21 прошла в Париже с 30 ноября по 11 декабря 2015 года и завершилась принятием Парижского соглашения решением 1/CP.21. Парижское соглашение закрепило долгосрочную цель удержать рост средней глобальной температуры значительно ниже 2°C по сравнению с доиндустриальным уровнем и прилагать усилия для ограничения потепления до 1,5°C. Соглашение ввело систему национально определяемых вкладов (NDC), в рамках которой государства представляют и обновляют свои планы по сокращению выбросов и мерам адаптации. Предусмотрен регулярный цикл повышения амбиций и глобальная оценка прогресса, а также расширенные требования к прозрачности и отчётности по действиям и поддержке. Парижское соглашение вступило в силу 4 ноября 2016 года после достижения порога ратификаций: не менее 55 сторон, представляющих как минимум 55% глобальных выбросов."
  world_events.5.a:0 "Зафиксировано"

  world_events.6.t:0 "Европейский миграционный кризис"
  world_events.6.d:0 "резкое увеличение числа беженцев и мигрантов, прибывавших в страны Европейского союза в 2015–2016 годах через Средиземное море и Балканский маршрут. Основной поток составили граждане Сирии, Ирака, Афганистана и ряда африканских государств, покидавшие зоны вооружённых конфликтов и гуманитарных кризисов. В 2015 году в Европу морским путём прибыло более одного миллиона человек. Наиболее загруженными странами первого въезда стали Греция и Италия. Кризис сопровождался многочисленными человеческими жертвами при попытках пересечения моря. Ситуация вызвала серьёзные политические разногласия внутри ЕС по вопросам распределения беженцев и усиления пограничного контроля. В марте 2016 года было заключено соглашение между ЕС и Турцией о сдерживании нерегулярной миграции."
  world_events.6.a:0 "Понятно"

  world_events.7.t:0 "Brexit"
  world_events.7.d:0 "23 июня 2016 года в Великобритании состоялся референдум, на котором 51,9% избирателей поддержали выход из ЕС, 48,1% высказались за сохранение членства. После референдума премьер-министр Дэвид Кэмерон объявил об отставке. 29 марта 2017 года правительство официально уведомило ЕС о намерении выйти, запустив процедуру по статье 50 Договора о Европейском союзе. Переговоры между сторонами продолжались более трёх лет и сопровождались политическим кризисом в британском парламенте. 31 января 2020 года Соединённое Королевство формально покинуло ЕС и перешло в переходный период. 24 декабря 2020 года было подписано Соглашение о торговле и сотрудничестве между Великобританией и ЕС. Переходный период завершился 31 декабря 2020 года, после чего отношения стали регулироваться новым договором. Brexit стал первым случаем выхода государства из Европейского союза."
  world_events.7.a:0 "Вот это да"

  world_events.8.t:0 "Попытка переворота в Турции"
  world_events.8.d:0 "В ноч з 15 на 16 июля 2016 года в Турции была предпринята попытка военного переворота. Группа военнослужащих попыталась взять под контроль ключевые объекты в Анкаре и Стамбуле, включая мосты, аэропорты и здание парламента. В ходе столкновений погибли более 250 человек, свыше двух тысяч получили ранения. Президент Турции Реджеп Тайип Эрдоган призвал граждан выйти на улицы для противодействия мятежникам. Попытка переворота была подавлена в течение суток, а власти обвинили в её организации движение Фетхуллаха Гюлена. В стране было введено чрезвычайное положение сроком на два года. В последующие месяцы начались масштабные чистки в армии, судебной системе, полиции, образовательных учреждениях и СМИ. События 2016 года привели к усилению президентской власти и переходу Турции к президентской форме правления по итогам конституционного референдума 2017 года.."
  world_events.8.a:0 "Нехорошо"

  world_events.9.t:0 "Битва за Алеппо"
  world_events.9.d:0 "Бои за Алеппо — серия масштабных сражений в ходе гражданской войны в Сирии, продолжавшихся с 2012 по 2016 год. Город Алеппо являлся крупнейшим экономическим центром страны и имел стратегическое значение. В 2012 году город был разделён между правительственными силами и различными оппозиционными группировками. Ключевой этап боёв пришёлся на 2016 год, когда сирийская армия при поддержке России и союзных формирований начала наступление на восточные районы города. В ходе операции применялись авиаудары и артиллерия, что привело к масштабным разрушениям инфраструктуры. В декабре 2016 года правительственные силы установили полный контроль над городом после эвакуации оппозиционных бойцов и мирных жителей. Потеря Алеппо стала серьёзным стратегическим поражением для вооружённой оппозиции. Сражение рассматривается как переломный момент войны, укрепивший позиции правительства Сирии."
  world_events.9.a:0 "Понятно"

  world_events.10.t:0 "Испытания в КНДР"
  world_events.10.d:0 "В 2016–2017 годах Корейская Народно-Демократическая Республика провела серию ракетных и ядерных испытаний. В январе и сентябре 2016 года были осуществлены ядерные испытания, а в 2017 году испытания продолжились с повышенной интенсивностью. В июле 2017 года КНДР заявила об успешном запуске межконтинентальной баллистической ракеты, способной достичь территории США. 3 сентября 2017 года было проведено шестое и наиболее мощное ядерное испытание. В ответ Совет Безопасности ООН принял ряд резолюций, существенно ужесточивших международные санкции против страны. Ограничения затронули экспорт угля, текстиля, морепродуктов и поставки нефтепродуктов. США, Южная Корея и Япония усилили военное сотрудничество и расширили системы противоракетной обороны."
  world_events.10.a:0 "Тревожно"

  world_events.11.t:0 "Конституционный кризис в Испании"
  world_events.11.d:0 "Конституционный кризис в Испании 2017 года был связан с попыткой автономного сообщества Каталония добиться независимости. 1 октября 2017 года региональные власти провели референдум о независимости, признанный Конституционным судом Испании незаконным. Голосование сопровождалось вмешательством полиции и массовыми протестами. 27 октября 2017 года парламент Каталонии принял декларацию о независимости. В тот же день правительство Испании применило статью 155 Конституции, временно приостановив автономию региона и распустив каталонский парламент. Часть лидеров движения за независимость была арестована, другие покинули страну. В декабре 2017 года в Каталонии прошли досрочные региональные выборы."
  world_events.11.a:0 "Понятно"

  world_events.12.t:0 "Протесты «жёлтых жилетов»"
  world_events.12.d:0 "Массовые протесты движения «жёлтых жилетов» начались во Франции в ноябре 2018 года. Поводом стало повышение налога на топливо и рост цен на бензин и дизельное топливо. Акции быстро переросли в более широкое социальное движение против роста стоимости жизни и экономической политики правительства. Протесты сопровождались блокированием дорог, массовыми демонстрациями и столкновениями с полицией, особенно в Париже. В ряде случаев происходили акты вандализма и поджоги. Власти задействовали значительные силы безопасности для поддержания порядка. Президент Франции объявил о ряде социально-экономических уступок, включая повышение минимальной заработной платы и отмену части налоговых мер. Движение стало одним из крупнейших протестных выступлений во Франции в XXI веке."
  world_events.12.a:0 "Опять протесты"

  world_events.13.t:0 "Чемпионат мира по футболу 2018"
  world_events.13.d:0 "Чемпионат мира по футболу 2018 года прошёл с 14 июня по 15 июля 2018 года в России. Турнир впервые проводился на территории Российской Федерации и стал первым чемпионатом мира в Восточной Европе. В соревновании приняли участие 32 национальные сборные. Матчи проходили в 11 городах на 12 стадионах. Финальный матч состоялся в Москве на стадионе «Лужники». Победителем турнира стала сборная Франции, обыгравшая в финале Хорватию со счётом 4:2. Бронзовые медали завоевала сборная Бельгии. Турнир посетили более трёх миллионов зрителей, а телевизионная аудитория составила миллиарды человек по всему миру. Чемпионат стал крупнейшим спортивным событием года."
  world_events.13.a:0 "Футбол!"

  world_events.14.t:0 "Новый вирус!"
  world_events.14.d:0 "В декабре 2019 года власти Китая сообщили о случаях неизвестной пневмонии в городе Ухань провинции Хубэй. Первые пациенты были связаны с местным рынком морепродуктов, который вскоре был закрыт для проведения санитарных мероприятий. 31 декабря 2019 года Китай официально уведомил Всемирную организацию здравоохранения о выявленных случаях.В течение января случаи заболевания были зарегистрированы за пределами Китая. 30 января 2020 года ВОЗ объявила ситуацию чрезвычайной в области общественного здравоохранения международного значения."
  world_events.14.a:0 "Следим"

  world_events.15.t:0 "COVID-19"
  world_events.15.d:0 "В начале 2020 года заболевание COVID-19 начало стремительно распространяться за пределами Китая. К февралю случаи были зарегистрированы в странах Азии, Европы, Северной Америки и Ближнего Востока. 11 марта 2020 года Всемирная организация здравоохранения объявила пандемию. Государства ввели карантинные меры, ограничения на передвижение, закрытие границ и временную приостановку работы предприятий и учебных заведений. Системы здравоохранения многих стран столкнулись с высокой нагрузкой."
  world_events.15.a:0 "Тяжело"

  world_events.16.t:0 "Black Lives Matter"
  world_events.16.d:0 "Black Lives Matter — общественное движение, выступающее против расовой дискриминации и насилия в отношении афроамериканцев в США. Движение возникло в 2013 году после оправдания Джорджа Циммермана по делу об убийстве Трейвона Мартина. Массовые протесты под этим лозунгом развернулись в мае–июне 2020 года после гибели Джорджа Флойда в Миннеаполисе при задержании полицией. Акции прошли в сотнях городов США и в ряде других стран. Протесты сопровождались как мирными демонстрациями, так и отдельными случаями беспорядков. Движение привлекло внимание к вопросам полицейского насилия, системного расизма и реформ правоохранительных органов. В ряде штатов были инициированы законодательные изменения и пересмотр полицейских практик. Black Lives Matter стало одним из крупнейших общественных движений в современной истории США."
  world_events.16.a:0 "Понятно"

  world_events.17.t:0 "Взрыв в порту Бейрута"
  world_events.17.d:0 "4 августа 2020 года в порту Бейрута произошёл мощный взрыв, ставший одной из крупнейших неядерных техногенных катастроф в истории. Причиной стало возгорание и детонация около 2750 тонн аммиачной селитры, хранившейся на складе с 2013 года. В результате взрыва погибли более 200 человек, свыше 6 тысяч получили ранения. Значительная часть портовой инфраструктуры была уничтожена, повреждены десятки тысяч зданий. Взрыв ощущался на расстоянии сотен километров. Через несколько дней правительство страны подало в отставку."
  world_events.17.a:0 "Ужас"

  world_events.18.t:0 "Война в Нагорном Карабахе"
  world_events.18.d:0 "Война в Нагорном Карабахе 2020 года — вооружённый конфликт между Азербайджаном и Арменией, начавшийся 27 сентября 2020 года. Боевые действия развернулись вокруг Нагорного Карабаха и прилегающих районов, находившихся под контролем армянских сил с 1990-х годов. В ходе конфликта активно применялись беспилотные летательные аппараты, артиллерия и ракетные системы. Азербайджанские войска установили контроль над значительной частью ранее утраченных территорий, включая город Шуша. 9 ноября 2020 года при посредничестве России было подписано соглашение о прекращении огня. В соответствии с догово- рённостями часть районов перешла под контроль Азербайджана, а в регионе были размещены российские миротворческие силы. Конфликт привёл к тысячам погибших и масштабным разрушениям. Ситуация в регионе осталась нестабильной и после окончания активной фазы боевых действий."
  world_events.18.a:0 "Тревожно"

  world_events.19.t:0 "Старт массовой вакцинации"
  world_events.19.d:0 "Старт массовой вакцинации против COVID-19 начался в декабре 2020 года после экстренного одобрения первых вакцин. Первыми к применению были допущены препараты на основе мРНК, разработанные компаниями Pfizer/BioNTech и Moderna. Вакцинация сначала охватила медицинских работников, пожилых людей и группы повышенного риска. В 2021 году кампании иммунизации распространились на широкие слои населения в большинстве стран мира. Были развернуты крупные центры вакцинации и организованы мобильные пункты прививок. В течение года миллиарды доз были произведены и распределены через национальные программы и международные механизмы. Массовая вакцинация способствовала снижению тяжёлых форм заболевания и смертности. Кампания стала одной из крупнейших в истории глобального здравоохранения."
  world_events.19.a:0 "Наконец-то"

  world_events.20.t:0 "Пожары в Австралии"
  world_events.20.d:0 "Пожары в Австралии 2019–2020 годов, известные как «чёрное лето», стали одними из самых масштабных в истории страны. Пожао начался в середине 2019 года и достиг пика в конце 2019 — начале 2020 года. Огнём было охвачено более 18 миллионов гектаров территории. Погибли десятки человек, тысячи домов были уничтожены. По оценкам экологов, пострадали или погибли миллиарды животных. Крупные города, включая Сидней и Мельбурн, длительное время находились под плотной дымовой завесой. Пожары были обусловлены сочетанием засухи, высоких температур и сильного ветра."
  world_events.20.a:0 "Кошмар"

  world_events.21.t:0 "Штурм Капитолия США"
  world_events.21.d:0 "6 января 2021 года в Вашингтоне произошёл штурм здания Капитолия США сторонниками действующего на тот момент президента Дональда Трампа. В этот день Конгресс проводил заседание по утверждению результатов президентских выборов 2020 года. После митинга у Белого дома часть протестующих прорвалась через охрану и проникла в здание Капитолия, что привело к временной эвакуации законодателей и приостановке заседания. В ходе событий погибли несколько человек, десятки получили ранения, включая сотрудников полиции. Беспорядки были подавлены в течение нескольких часов при участии федеральных сил и Национальной гвардии. Впоследствии начались масштабные расследования и судебные процессы против участников штурма. Палата представителей объявила Дональду Трампу импичмент по обвинению в подстрекательстве к мятежу."
  world_events.21.a:0 "Шок"

  world_events.22.t:0 "Возвращение Талибана"
  world_events.22.d:0 "В 2021 году после решения США о завершении военной миссии начался поэтапный вывод войск США и НАТО из Афганистана. Наступление движения «Талибан» активизировалось весной и летом 2021 года, сопровождаясь быстрым захватом провинциальных центров. 15 августа 2021 года талибы вошли в Кабул, после чего президент Ашраф Гани покинул страну. Правительственные силы практически прекратили сопротивление, и власть перешла к «Талибану». В аэропорту Кабула прошла масштабная эвакуация иностранных граждан и афганцев, сотрудничавших с международными структурами. 31 августа 2021 года США официально завершили военное присутствие в стране. Было объявлено о восстановлении Исламского Эмирата Афганистан. После смены власти международное сообщество ввело ограничения и заморозило часть афганских активов, что усугубило экономический кризис в стране."
  world_events.22.a:0 "Понятно"

  world_events.23.t:0 "Новая волна COVID-19"
  world_events.23.d:0 "Новая волна COVID-19 была зафиксирована во многих странах в конце 2021 — начале 2022 года. Рост заболеваемости был связан с распространением новых вариантов вируса, включая штамм «Омикрон». Он отличался высокой заразностью и быстрым распространением. Во многих государствах вновь были введены ограничения на массовые мероприятия и передвижение. Системы здравоохранения столкнулись с увеличением числа госпитализаций. При этом уровень летальности в ряде стран оказался ниже по сравнению с предыдущими волнами благодаря вакцинации и формированию коллективного иммунитета. Власти усилили кампании по ревакцинации и бустерным дозам. Новая волна продемонстрировала продолжающуюся эволюцию вируса и необходимость адаптации санитарных мер."
  world_events.23.a:0 "Опять..."

  world_events.24.t:0 "Суэцкий канал заблокирован"
  world_events.24.d:0 "23 марта 2021 года контейнеровоз Ever Given сел на мель в южной части Суэцкого канала, полностью перекрыв движение по одному из ключевых мировых торговых маршрутов. Судно длиной около 400 метров следовало из Китая в Нидерланды. Блокировка канала продолжалась шесть дней и привела к образованию очереди из сотен судов. Суэцкий канал обеспечивает значительную долю мировых морских перевозок и является важным звеном между Европой и Азией. Инцидент вызвал задержки поставок нефти, газа и промышленных товаров. Для освобождения судна были задействованы буксиры, земснаряды и проводились дноуглубительные работы. 29 марта 2021 года контейнеровоз был успешно снят с мели и движение восстановлено."
  world_events.24.a:0 "Невероятно"

  world_events.25.t:0 "Pegasus"
  world_events.25.d:0 "Pegasus — программное обеспечение для скрытого наблюдения, разработанное израильской компанией NSO Group. Программа способна незаметно проникать в смартфоны и получать доступ к сообщениям, микрофону, камере и другим данным устройства. В 2021 году международное журналистское расследование, получившее название «Pegasus Project», сообщило о возможном использовании программы для слежки за журналистами, политиками и правозащитниками в различных странах. Расследование вызвало широкий международный резонанс и дипломатические споры. Несколько государств инициировали проверки и судебные разбирательства. Компания-разработчик заявляла, что продаёт программное обеспечение исключительно государственным органам для борьбы с терроризмом и преступностью. Скандал усилил дискуссии о регулировании кибернаблюдения и защите цифровых прав человека."
  world_events.25.a:0 "Жесть"

  world_events.26.t:0 "Смерть Елизаветы II"
  world_events.26.d:0 "Елизавета II, королева Соединённого Королевства, скончалась 8 сентября 2022 года в замке Балморал в Шотландии в возрасте 96 лет. Она занимала престол с 1952 года и была самым долго правящим монархом в истории Великобритании. После её смерти престол автоматически перешёл к её сыну, провозглашённому королём Карлом III. В стране был объявлен национальный траур продолжительностью десять дней. Церемония прощания прошла в Вестминстерском дворце, куда пришли сотни тысяч людей. Государственные похороны состоялись 19 сентября 2022 года в Лондоне при участии представителей десятков государств. Смерть Елизаветы II стала важным событием в истории Великобритании и ознаменовала завершение эпохи её 70-летнего правления."
  world_events.26.a:0 "Эпоха закончилась"

  world_events.27.t:0 "Чемпионат мира 2022 в Катаре"
  world_events.27.d:0 "Чемпионат мира по футболу 2022 года прошёл с 20 ноября по 18 декабря 2022 года в Катаре. Турнир стал первым в истории чемпионатом мира, проведённым на Ближнем Востоке, и впервые состоялся в зимний период. В соревновании приняли участие 32 национальные сборные. Матчи проходили на восьми стадионах в пяти городах страны. Финальный матч состоялся на стадионе «Лусаил». Сборная Аргентины завоевала титул, обыграв Францию в финале в серии пенальти после ничьей 3:3. Турнир сопровождался усиленными мерами безопасности и широким международным вниманием. Чемпионат стал одним из самых просматриваемых спортивных событий в мире."
  world_events.27.a:0 "Футбол!"

  world_events.28.t:0 "Война Израиль–ХАМАС"
  world_events.28.d:0 "Вооружённый конфликт между Израилем и движением ХАМАС резко обострился 7 октября 2023 года после масштабной атаки боевиков ХАМАС на юг Израиля. В ходе нападения были убиты и захвачены в заложники сотни людей. Израиль объявил о состоянии войны и начал масштабную военную операцию в секторе Газа. Последовали интенсивные авиаудары и наземные действия. Боевые действия привели к значительным человеческим жертвам и разрушениям инфраструктуры. Конфликт вызвал гуманитарный кризис в секторе Газа и международные дипломатические усилия по достижению прекращения огня. Ситуация сопровождалась ростом напряжённости на Ближнем Востоке."
  world_events.28.a:0 "Ужас"

  world_events.29.t:0 "Землетрясения в Турции и Сирии"
  world_events.29.d:0 "6 февраля 2023 года на юго-востоке Турции и в северной Сирии произошли мощные землетрясения магнитудой 7,8 и 7,5. Эпицентр находился в провинции Кахраманмараш. Стихийное бедствие вызвало масштабные разрушения в десятках городов, включая Газиантеп, Антакью и Алеппо. Погибли более 50 тысяч человек, сотни тысяч остались без жилья. Были разрушены жилые дома, больницы, дороги и объекты инфраструктуры. Землетрясения стали одними из самых разрушительных в истории современной Турции. Катастрофа усугубила гуманитарную ситуацию в Сирии, уже пострадавшей от многолетнего вооружённого конфликта."
  world_events.29.a:0 "Соболезнуем"

  world_events.30.t:0 "Бум ИИ"
  world_events.30.d:0 "С 2022–2023 годов генеративные модели искусственного интеллекта получили массовое распространение в бизнесе, образовании и креативных индустриях. Технологии на основе крупных языковых и мультимодальных моделей стали использоваться для автоматизации обработки текстов, создания изображений, программирования и аналитики данных. Компании начали интегрировать ИИ-инструменты в рабочие процессы, что привело к ускорению цифровой трансформации и изменению структуры занятости. Образовательные учреждения столкнулись с необходимостью пересмотра подходов к обучению и оценке знаний. Рынки труда адаптируются к появлению новых профессий и трансформации существующих специальностей. Усиление конкуренции между технологическими компаниями ускорило инвестиции в развитие ИИ-инфраструктуры. Представленный текст создан с использованием технологий искусственного интеллекта."
  world_events.30.a:0 "Новая эпоха"

  world_events.31.t:0 "США: итоги президентских выборов 2016 года"
  world_events.31.d:0 "Президентские выборы в США состоялись 8 ноября 2016 года. Кандидатом от Республиканской партии выступил Дональд Трамп, от Демократической партии — Хиллари Клинтон. По итогам голосования Трамп получил 304 голоса выборщиков, Клинтон — 227. При этом Клинтон набрала больше голосов избирателей по стране, однако победа определяется коллегией выборщиков. Явка составила около 55% зарегистрированных избирателей. Выборы сопровождались активной предвыборной кампанией и широким общественным резонансом. В январе 2017 года Дональд Трамп официально вступил в должность 45-го президента США."
  world_events.31.a:0 "Понятно"

  world_events.32.t:0 "США: итоги президентских выборов 2020 года"
  world_events.32.d:0 "Президентские выборы в США состоялись 3 ноября 2020 года. Кандидатом от Демократической партии выступил Джо Байден, от Республиканской партии — действующий президент Дональд Трамп. По итогам голосования Байден получил 306 голосов выборщиков, Трамп — 232. В общенациональном голосовании Байден набрал более 81 миллиона голосов, что стало рекордным показателем на тот момент. Явка оказалась одной из самых высоких за последние десятилетия. Выборы проходили на фоне пандемии COVID-19, что привело к масштабному использованию досрочного и почтового голосования. 6 января 2021 года Конгресс утвердил результаты голосования коллегии выборщиков. 20 января 2021 года Джо Байден вступил в должность 46-го президента США."
  world_events.32.a:0 "Понятно"

  world_events.33.t:0 "США: итоги президентских выборов 2024 года"
  world_events.33.d:0 "Выборы президента США прошли 5 ноября 2024 года. По итогам голосования Дональд Трамп, выдвинутый от Республиканской партии, победил кандидата от Демократической партии Камалу Харрис и набрал 312 голосов выборщиков при необходимых 270. Трамп также выиграл национальное голосование, став первым республиканцем с 2004 года, которому это удалось после неудачи в 2020 году. Камала Харрис получила 226 голосов выборщиков и признала поражение. Результаты были официально подтверждены Конгрессом США в январе 2025 года, и 20 января 2025 года Трамп вступил в должность 47-го президента США. Победа Трампа стала историческим случаем: он стал вторым президентом в истории США, переизбранным на непоследовательный второй срок."
  world_events.33.a:0 "Понятно"
