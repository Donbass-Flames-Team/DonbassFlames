l_russian:
 BM_HISTORY_TITLE: "Краткая история"
 EUROMAIDAN_NAME: "  Евромайдан"
 EUROMAIDAN_DESC: "Вечером 21 ноября 2013 года, после неожиданного решения правительства приостановить подготовку к подписанию Соглашения об ассоциации с ЕС, на Майдане Независимости в Киеве собрались около 1500–2000 студентов и активистов, организованных через социальные сети. Они вышли с украинскими и европейскими флагами, выражая протест против поворота политики в сторону Таможенного союза и демонстрируя свою поддержку европейского курса Украины. Собравшиеся сохраняли мирный, но твёрдый и решительный настрой: горели свечи, звучали песни, люди обменивались лозунгами и плакатами, приветствовали друг друга и делились надеждой на перемены, символизируя мирное сопротивление, единство и гражданскую солидарность. Несмотря на холод и темноту позднего вечера, энергия, решимость и уверенность участников ощущались во всем Майдане — каждый чувствовал, что становится частью исторического момента, который может изменить судьбу страны и определить её будущее. Это спонтанное собрание стало первым массовым выступлением, которое положило начало длительному движению протеста. В последующие дни и недели оно постепенно переросло в многомесячные акции с участием десятков тысяч людей по всей стране, объединённых идеей европейского выбора, стремлением к реформам, желанием отстаивать свои права и поддерживать демократические ценности. Эти события стали символом гражданской солидарности, решимости народа влиять на политический курс и защищать демократические принципы. Этот день вошёл в историю как начало одной из крупнейших демократических акций в истории Украины, оставив неизгладимый след в сознании общества и вдохновив многих на участие в движении за свободу и будущее страны."
 UKR_EC_DESC: "Страна балансирует между Евросоюзом и Россией. Власть усиливает контроль, экономика нестабильна, но курс на интеграцию с Западом ещё сохраняется. Отказ от соглашения с ЕС становится точкой перелома: вспыхивают протесты, начинается политический кризис, за которым следуют смена режима, утрата территорий и вооружённый конфликт."
 RUS_EC_DESC: "В стране стабильность, впереди Олимпиада в Сочи - важный имиджевый проект. Экономика держится на ресурсах, власть централизована, внешняя политика сосредоточена на сохранении влияния в регионе. Рост напряжённости в Украине ставит новые задачи перед руководством. Москва ищет баланс между противодействием Западу и сохранением стабильности внутри страны."
 BLR_EC_DESC: "Тесно связана с Россией в политике, экономике и обороне. Власть контролирует внутреннюю ситуацию, подавляя оппозицию. Экономика зависит от российской поддержки. Внешняя политика ориентирована на союз с РФ и противостояние Западу. "
 ROM_EC_DESC: "Страна продолжает укреплять евроатлантические связи, развивает экономику и модернизирует вооружённые силы. Внешняя политика сосредоточена на безопасности в регионе и интеграции с Западом.Рост напряжённости в соседней Украине вызывает беспокойство. Бухарест усиливает меры для защиты своих интересов и стабильности на восточных границах."
 POL_EC_DESC: "Страна укрепляет свои позиции в Евросоюзе и НАТО, активно модернизирует армию и экономику. Польша стремится усилить влияние в Восточной Европе и поддерживать стабильность на своих границах. Обострение кризиса в Украине вызывает тревогу и побуждает к активному участию в региональной безопасности. Варшава готовится к новым вызовам на востоке Европы."
 MOL_EC_DESC: "Страна укрепляет связи с Европой, одновременно балансируя с влиянием России. Экономика остаётся слабой, внутренние проблемы и конфликт в Приднестровье сохраняют нестабильность."
 TMR_EC_DESC: "Самопровозглашённое непризнанное образование с устойчивой поддержкой России. Контролирует собственную территорию, имеет собственные вооружённые формирования и административные структуры. ПМР остаётся в изоляции, поддерживая статус-кво в замороженном конфликте с Молдовой."
 SOONDONBASS_WAR_NAME: "Донбасс в огне"
 SOONDONBASS_WAR_DESC: "После месяцев протестов, политических кризисов и аннексии Крыма ситуация на востоке Украины стремительно обострилась. Пророссийские силы и сепаратисты начали активные действия в Донецкой и Луганской областях, захватывая административные здания, блокируя дороги и дестабилизируя жизнь местного населения. Города и поселки погрузились в атмосферу тревоги и неопределенности, жители пытались понять, как сохранить безопасность и защитить свои семьи. Власти готовятся начать антитеррористическую операцию (АТО) в ближайшие дни с целью восстановления контроля над захваченными территориями, защиты гражданского населения и стабилизации обстановки. Военные, силовики и волонтеры мобилизуются для выполнения сложной и опасной задачи, каждый понимает, что предстоящие действия станут испытанием и определят дальнейший ход событий. Этот период стал критическим моментом для всех сторон конфликта: украинских сил, местного населения и пророссийских формирований. Каждый день приносил новые вызовы и напряжение, каждая неделя могла изменить баланс сил в регионе. Действия, предпринятые в этот момент, определяли будущее востока страны, политическую и военную ситуацию, а также внутренние и внешние перспективы Украины. Вскоре эти события переросли в полномасштабный конфликт, затронувший десятки тысяч людей, усилив национальное единство и одновременно углубив разделение общества. Этот период вошёл в историю как время серьёзного испытания для страны, символ решимости граждан защищать свои права, территориальную целостность и демократические ценности, оставив глубокий след в сознании общества и вдохновив многих на участие в защите будущего Украины."
