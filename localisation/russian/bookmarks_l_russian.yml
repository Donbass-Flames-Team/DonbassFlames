l_russian:
 BM_HISTORY_TITLE: "Краткая история"
 EUROMAIDAN_NAME: " Евромайдан"
 EUROMAIDAN_DESC: "Вечером 21 ноября 2013 года, после неожиданного решения правительства приостановить подготовку к подписанию Соглашения об ассоциации с ЕС, на Майдане Независимости в Киеве собрались около 1500–2000 студентов и активистов, организованных через социальные сети. Они вышли с украинскими и европейскими флагами, выражая протест против разворота политики в сторону Таможенного союза и поддерживая европейский курс Украины. Собравшиеся сохраняли мирный, но твёрдый и решительный настрой: горели свечи, звучали песни, люди держали плакаты и лозунги, делились надеждой на перемены, символизируя единство и гражданскую солидарность. Несмотря на холод и поздний час, на Майдане ощущались энергия и уверенность — многие понимали, что становятся частью исторического момента. Это спонтанное собрание стало первым массовым выступлением, положившим начало длительному протестному движению. В последующие дни и недели оно переросло в многомесячные акции с участием десятков тысяч людей по всей стране, объединённых идеей европейского выбора, стремлением к реформам и защите демократических ценностей. Эти события вошли в историю как начало одной из крупнейших демократических акций в Украине. \n\n\n\n\n\n\n\nЭтот сценарий фиксирует «точку бифуркации» в новейшей истории Украины — момент коллективного выбора, который окончательно оформил цивилизационный разрыв с советским прошлым и определил вектор развития на десятилетия вперед"
 NOTES: "Примечание"
 RUS_EC_DESC: "В стране стабильность, впереди Олимпиада в Сочи - важный имиджевый проект. Экономика держится на ресурсах, власть централизована, внешняя политика сосредоточена на сохранении влияния в регионе. Рост напряжённости в Украине ставит новые задачи перед руководством. Москва ищет баланс между противодействием Западу и сохранением стабильности внутри страны."
 BLR_EC_DESC: "§RСТРАНА БЕЗ КОНТЕНТА!§! Тесно связана с Россией в политике, экономике и обороне. Власть контролирует внутреннюю ситуацию, подавляя оппозицию. Экономика зависит от российской поддержки. Внешняя политика ориентирована на союз с РФ и противостояние Западу. "
 ROM_EC_DESC: "§RСТРАНА БЕЗ КОНТЕНТА!§! Страна продолжает укреплять евроатлантические связи, развивает экономику и модернизирует вооружённые силы. Внешняя политика сосредоточена на безопасности в регионе и интеграции с Западом.Рост напряжённости в соседней Украине вызывает беспокойство. Бухарест усиливает меры для защиты своих интересов и стабильности на восточных границах."
 POL_EC_DESC: "§RСТРАНА БЕЗ КОНТЕНТА!§! Страна укрепляет свои позиции в Евросоюзе и НАТО, активно модернизирует армию и экономику. Польша стремится усилить влияние в Восточной Европе и поддерживать стабильность на своих границах. Обострение кризиса в Украине вызывает тревогу и побуждает к активному участию в региональной безопасности. Варшава готовится к новым вызовам на востоке Европы."
 MOL_EC_DESC: "§RСТРАНА БЕЗ КОНТЕНТА!§! Страна укрепляет связи с Европой, одновременно балансируя с влиянием России. Экономика остаётся слабой, внутренние проблемы и конфликт в Приднестровье сохраняют нестабильность."
 TMR_EC_DESC: "§RСТРАНА БЕЗ КОНТЕНТА!§! Самопровозглашённое непризнанное образование с устойчивой поддержкой России. Контролирует собственную территорию, имеет собственные вооружённые формирования и административные структуры. ПМР остаётся в изоляции, поддерживая статус-кво в замороженном конфликте с Молдовой."
 SOONDONBASS_WAR_NAME: "Донбасс в огне"
 SOONDONBASS_WAR_DESC: "После месяцев протестов, политических кризисов и аннексии Крыма ситуация на востоке Украины обострилась. Пророссийские силы и сепаратисты начали активные действия в Донецкой и Луганской областях, захватывая административные здания, блокируя дороги и дестабилизируя жизнь местного населения. Города и поселки погрузились в тревогу, жители пытались понять, как сохранить безопасность и защитить семьи. Власти готовились к антитеррористической операции (АТО) для восстановления контроля, защиты граждан и стабилизации обстановки. Военные, силовики и волонтеры мобилизовались для выполнения сложной задачи, понимая, что предстоящие действия станут испытанием. Этот период стал критическим для всех сторон конфликта: украинских сил, местного населения и пророссийских формирований. Каждый день приносил новые вызовы, каждая неделя могла изменить баланс сил в регионе. События вскоре переросли в полномасштабный конфликт, затронувший десятки тысяч людей, усилив национальное единство и одновременно углубив разделение общества. Этот период вошёл в историю как время серьёзного испытания для страны и символ решимости граждан защищать свои права, территориальную целостность и демократические ценности. \n\n\n\n\n\n\n\nСледует учитывать, что описываемые события стали началом войны нового типа — «гибридного конфликта», где внутреннее гражданское напряжение было использовано и усилено прямым внешним вмешательством, что сделало ситуацию крайне сложной для разрешения традиционными методами."
 HUN_EC_DESC: "§RСТРАНА БЕЗ КОНТЕНТА!§! Страна остаётся членом ЕС и НАТО, но всё чаще ведёт прагматичную политику, стараясь сохранять рабочие отношения и с Западом, и с Москвой. Экономические интересы и тема энергетики занимают ключевое место, из-за чего Будапешт избегает резких шагов во внешней политике. Усиление напряжённости вокруг Украины воспринимается как риск для стабильности в регионе."
 CRI_EC_DESC: "§RСТРАНА БЕЗ КОНТЕНТА!§! Автономия в составе Украины, важный стратегический регион с базой Черноморского флота РФ и сложной внутренней политикой. Общество разделено, сильны пророссийские настроения, а вопрос статуса и влияния Москвы постоянно присутствует в повестке. На фоне украинского кризиса Крым становится одной из главных точек давления и потенциальной эскалации."
 LIT_EC_DESC: "§RСТРАНА БЕЗ КОНТЕНТА!§! Страна укрепляет связи в ЕС и НАТО и воспринимает Россию как главный источник угроз в регионе. Литва поддерживает европейский курс Украины и внимательно следит за событиями в Киеве, считая их важными для безопасности Восточной Европы. Рост напряжённости подталкивает Вильнюс к усилению обороны и дипломатической активности."
 UKR_DW_DESC: "После аннексии Крыма и вспышки боёв на востоке страна входит в фазу открытой войны. Киев проводит мобилизацию и разворачивает АТО, пытаясь восстановить контроль над территориями и удержать управляемость государства. Экономика и общество работают в режиме кризиса, а цена ошибок растёт с каждым месяцем."
 RUS_DW_DESC: "Москва закрепляет результаты крымской операции и усиливает давление на Украину, пытаясь сохранить влияние в регионе. На фоне санкций и международной изоляции власть делает ставку на мобилизационную риторику и демонстрацию силы. Кремль стремится удерживать конфликт в управляемой форме, не допуская окончательного разворота Украины к Западу."
 DPR_DW_DESC: "Самопровозглашённые структуры пытаются удержать Донецк и ключевые узлы, формируя собственные органы управления и вооружённые отряды. Поддержка извне и приток добровольцев усиливают устойчивость, но фронт быстро превращает регион в зону разрушений. Конфликт радикализирует местную политику и углубляет разрыв с Киевом."
 LPR_DW_DESC: "В Луганской области сепаратистские силы закрепляются в городах и на коммуникациях, строя параллельную систему власти. Бои приобретают затяжной характер, а контроль над территорией постоянно меняется. Регион погружается в гуманитарный и управленческий кризис."
 POL_DW_DESC: "§RСТРАНА БЕЗ КОНТЕНТА!§! Польша воспринимает войну в Украине как прямую угрозу безопасности Восточной Европы и активно поддерживает Киев политически. Варшава выступает за усиление НАТО и давление на Россию через санкции, готовясь к долгому кризису у своих границ. Внутри страны ускоряется модернизация обороны и координация с союзниками."
 LIT_DW_DESC: "§RСТРАНА БЕЗ КОНТЕНТА!§! Литва занимает максимально жёсткую позицию против действий России и выступает одним из главных сторонников Украины в ЕС и НАТО. Вильнюс поддерживает санкции и настаивает на усилении восточного фланга Альянса. Конфликт ускоряет оборонные и кибермеры внутри страны."
 ROM_DW_DESC: "§RСТРАНА БЕЗ КОНТЕНТА!§! Румыния усиливает фокус на безопасности Чёрного моря и восточных границ на фоне войны у соседей. Бухарест поддерживает курс ЕС и НАТО, настаивая на усилении присутствия Альянса в регионе. Дополнительную тревогу вызывает фактор Молдовы и Приднестровья."
 MOL_DW_DESC: "§RСТРАНА БЕЗ КОНТЕНТА!§! Страна оказывается под повышенным давлением из-за войны рядом и риска дестабилизации вокруг Приднестровья. Кишинёв пытается удержать европейский курс, но слабая экономика и внутренние разногласия ограничивают возможности. Власти усиливают меры безопасности и осторожно балансируют во внешней политике."
 HUN_DW_DESC: "§RСТРАНА БЕЗ КОНТЕНТА!§! Венгрия придерживается осторожной линии и избегает резких шагов, делая ставку на прагматичную дипломатию внутри ЕС. Экономические и энергетические риски, а также тема венгерского меньшинства в Закарпатье повышают чувствительность к конфликту. Будапешт поддерживает общие решения Запада, но предпочитает более мягкую риторику."
 SER_DW_DESC: "§RСТРАНА БЕЗ КОНТЕНТА!§! Сербия сохраняет нейтралитет и старается не разрывать связи ни с ЕС, ни с Россией, рассматривая войну как опасный прецедент. Белград ограничивается осторожными заявлениями и дипломатическим балансированием, избегая прямой поддержки одной из сторон. Внутри страны усиливаются споры о внешнеполитическом выборе."
 BLR_DW_DESC: "§RСТРАНА БЕЗ КОНТЕНТА!§! Беларусь остаётся тесно связана с Россией, но стремится не втягиваться напрямую в войну, сохраняя контроль над внутренней ситуацией. Минск использует роль площадки для переговоров и контактов, одновременно минимизируя риски от санкций и эскалации. Внешняя политика подчинена задаче сохранения режима и стабильности."
 TMR_DW_DESC: "§RСТРАНА БЕЗ КОНТЕНТА!§! Самопровозглашённое непризнанное образование с устойчивой поддержкой России. Война в Украине повышает стратегическую значимость региона и усиливает тревогу у соседей. ПМР сохраняет статус-кво, опираясь на собственные силовые структуры и внешние гарантии, оставаясь фактором постоянного давления на Молдову."
