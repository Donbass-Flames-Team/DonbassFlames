l_russian:
 BM_HISTORY_TITLE: "Краткая история"
 EUROMAIDAN_NAME: "Евромайдан"
 EUROMAIDAN_DESC: "С 21 ноября 2013 года в Украине начался Евромайдан — массовые протесты, вызванные решением правительства приостановить подписание Соглашения об ассоциации с ЕС. Движение быстро переросло в масштабное противостояние между гражданами и властью, выражавшее недовольство коррупцией и авторитаризмом режима Януковича. К февралю 2014 года протесты достигли пика: в Киеве произошли кровавые столкновения, погибли десятки людей. 22 февраля Янукович бежал из страны, власть сменилась."
 UKR_EC_DESC: "Страна балансирует между Евросоюзом и Россией. Власть усиливает контроль, экономика нестабильна, но курс на интеграцию с Западом ещё сохраняется. Отказ от соглашения с ЕС становится точкой перелома: вспыхивают протесты, начинается политический кризис, за которым следуют смена режима, утрата территорий и вооружённый конфликт."
 RUS_EC_DESC: "В стране стабильность, впереди Олимпиада в Сочи - важный имиджевый проект. Экономика держится на ресурсах, власть централизована, внешняя политика сосредоточена на сохранении влияния в регионе. Рост напряжённости в Украине ставит новые задачи перед руководством. Москва ищет баланс между противодействием Западу и сохранением стабильности внутри страны."
 BLR_EC_DESC: "Тесно связана с Россией в политике, экономике и обороне. Власть контролирует внутреннюю ситуацию, подавляя оппозицию. Экономика зависит от российской поддержки. Внешняя политика ориентирована на союз с РФ и противостояние Западу. "
 ROM_EC_DESC: "Страна продолжает укреплять евроатлантические связи, развивает экономику и модернизирует вооружённые силы. Внешняя политика сосредоточена на безопасности в регионе и интеграции с Западом.Рост напряжённости в соседней Украине вызывает беспокойство. Бухарест усиливает меры для защиты своих интересов и стабильности на восточных границах."
 POL_EC_DESC: "Страна укрепляет свои позиции в Евросоюзе и НАТО, активно модернизирует армию и экономику. Польша стремится усилить влияние в Восточной Европе и поддерживать стабильность на своих границах. Обострение кризиса в Украине вызывает тревогу и побуждает к активному участию в региональной безопасности. Варшава готовится к новым вызовам на востоке Европы."
 MOL_EC_DESC: "Страна укрепляет связи с Европой, одновременно балансируя с влиянием России. Экономика остаётся слабой, внутренние проблемы и конфликт в Приднестровье сохраняют нестабильность."
 TMR_EC_DESC: "Самопровозглашённое непризнанное образование с устойчивой поддержкой России. Контролирует собственную территорию, имеет собственные вооружённые формирования и административные структуры. ПМР остаётся в изоляции, поддерживая статус-кво в замороженном конфликте с Молдовой."
