 UKR_yanukovychs_results: "Режим под опасностью"
 UKR_yanukovychs_results_desc: "Политический кризис достигает апогея. Протесты на Майдане перерастают в массовое народное восстание. Против режима выступают студенты, оппозиция, простые граждане. Власть трещит по швам — лояльность элит под вопросом, а международное давление растёт. Если не принять решительных мер, дни правления Януковича сочтены."
