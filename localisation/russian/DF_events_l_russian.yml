 russia.11.t: "Минскские протоколы"
 russia.11.d: "Минские протоколы были подписаны для урегулирования конфликта на востоке Украины между правительственными силами и пророссийскими сепаратистами. Документ предусматривает прекращение огня, обмен пленными и проведение конституционной реформы в Украине с целью предоставления большей автономии регионам Донецк и Луганск. Однако, несмотря на подписание протоколов, боевые действия продолжались, и обе стороны обвиняли друг друга в нарушении соглашения."
 russia.11.a: "Отлично"
 russia.12.t: "Перекрытие подачи воды в Крым"
 russia.12.d: "В результате перекрытия подачи воды в Крым, местные жители и военные силы России столкнулись с серьёзными трудностями в обеспечении жизнедеятельности региона."
 russia.12.a: "Возмутительно!"
 russia.13.t: "Второе Минское соглашение"
 russia.13.d: "В связи с продолжающейся эскалацией конфликта стороны подписали расширенное соглашение, включавшее усиленные меры по прекращению огня, отвод войск и тяжёлого вооружения, восстановление контроля Украины над границей, проведение конституционной реформы и местных выборов на Донбассе. Минск II стал ключевым международным механизмом по деэскалации конфликта, хотя соблюдение соглашения оставалось проблематичным."
 russia.13.a: "Отлично" 



 news_events.9.t: "Порошенко стал президентом"
 news_events.9.d: "После событий Евромайдана и бегства Виктора Януковича Украина оказалась в состоянии политического и экономического кризиса. В мае 2014 года состоялись досрочные президентские выборы, на которых бизнесмен и политик Пётр Порошенко одержал уверенную победу уже в первом туре. Он пообещал нации путь в Европу, прекращение войны на Востоке и проведение реформ. Однако многие сомневались, удастся ли ему выполнить эти обещания в условиях острой борьбы с сепаратизмом, внешнего давления и падения экономики."
 news_events.9.a: "Новая надежда"
 news_events.9.b: "Нелегитимный президент"
 news_events.9.c: "Интересно"
 news_events.10.t: "США: итоги президентских выборов 2016 года"
 news_events.10.d: "8 ноября 2016 года в Соединённых Штатах прошли президентские выборы. По итогам голосования победу одержал Дональд Трамп. Результаты кампании вызвали широкий резонанс в стране и за рубежом."
 news_events.10.a: "Понятно"
 news_events.11.t: "США: итоги президентских выборов 2020 года"
 news_events.11.d: "3 ноября 2020 года в Соединённых Штатах состоялись президентские выборы. Победу одержал Джо Байден. Начинается период формирования новой администрации и передачи власти."
 news_events.11.a: "Понятно"
 news_events.12.t: "США: итоги президентских выборов 2024 года"
 news_events.12.d: "5 ноября 2024 года в Соединённых Штатах прошли президентские выборы. Победу одержал Дональд Трамп. Итоги выборов становятся важным фактором международной повестки."
 news_events.12.a: "Понятно"
 news_events.13.a: "Понятно"
 news_events.13.t: "Катастрофа Boeing 777 в Донецкой области"
 news_events.13.d: "Авиалайнер Boeing 777-200ER авиакомпании Malaysia Airlines выполнял плановый рейс MH17 по маршруту Амстердам—Куала-Лумпур, но примерно через 2 часа и 49 минут после взлёта был поражён ракетой пво, выпущенной из неизвестного зенитно-ракетного комплекса, и разрушился на несколько частей. Обломки лайнера рухнули на землю в районе сёл Грабово, Рассыпное, Петропавловка и посёлка городского типа Рассыпное. Погибли все находившиеся на его борту 298 человек - 283 пассажира и 15 членов экипажа. Украинская сторона утверждает, что самолёт был сбит пророссийскими силами системой пво, которая была передана Россией, официальные лицы России отвергают все обвинения в свой адрес, и обвиняют в этой катастрофе Украину."
 news_events.13.a: "УЖАС"


 ukraine.1.t: "Янукович покинул Киев"
 ukraine.1.d: "Сразу после подписания соглашения об урегулировании кризиса в Украине, президент Украины Виктор Янукович покинул Киев в неизвестном направлений. Официальных заявлений не делается, указов не подписывается, связь с администрацией обрывается. Правительственные здания остаются без политического руководства."
 ukraine.1.a: "Куда это он?"
