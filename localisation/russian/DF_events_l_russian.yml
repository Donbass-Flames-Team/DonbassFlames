 ukraine.17.t: "Выборы 2014 года"
 ukraine.17.d: "Выборы 2014 года прошли успешно. Правительство выбрало нового президента и парламент. Однако, ситуация в стране остается напряженной, и многие регионы требуют большей автономии. Правительство пытается найти компромисс, но безуспешно."
 ukraine.17.a: "Понятно"
 ukraine.18.t: "Протесты усиливаются"
 ukraine.18.d: "Протесты усиливаются в городе Киеве и по всей Украине. Протестующие требуют отставки правительства и проведения новых выборов. Правительство пытается подавить протесты, но безуспешно. Ситуация становится все более напряженной. Местные власти заявляют, что не могут контролировать ситуацию."
 ukraine.18.a: "Нужно срочно навести порядок!"
 ukraine.19.t: "Националисты устраивают погромы"
 ukraine.19.d: "Националисты из \"Правого сектора\" и \"Свободы\" устроили погромы в Донецке и Луганске, разгромив несколько административных зданий и избив местных чиновников. Полиция не вмешивалась, а местные власти заявили, что не могут контролировать ситуацию."
 ukraine.19.a: "Нужно срочно навести порядок!"
 ukraine.21.t: "Выборы 2014 года"
 ukraine.21.d: "Выборы 2014 года прошли успешно. Правительство выбрало нового президента и парламент. Однако, ситуация в стране остается напряженной, и многие регионы требуют большей автономии. Правительство пытается найти компромисс, но безуспешно."
 ukraine.21.a: "Понятно"
 ukraine.22.t: "Янукович в Донецке"
 ukraine.22.d: "Бывший президент Украины Виктор Янукович прибыл в Донецк, где его встретили местные власти и пророссийские активисты. Янукович заявил, что не признает легитимность нынешнего правительства Украины и готов сотрудничать с Донецкой Народной Республикой. Его приезд вызвал волну протестов в Киеве и других городах Украины."
 ukraine.22.a: "Нужно его поймать!"
 ukraine.22.b: "Он не представляет угрозы"
 ukraine.23.t: "Выход сериала «Слуга Народа»"
 ukraine.23.d: "На телевидении выходит сатирический сериал «Слуга народа», рассказывающий историю обычного учителя истории, который неожиданно становится президентом страны. Проект задумывался как комедия и социальная сатира, высмеивающая коррупцию, бюрократию и разрыв между властью и обществом, однако сериал быстро выходит за рамки развлекательного формата. Фразы героев расходятся на цитаты, сцены активно обсуждаются в обществе, а образ «простого человека у власти» становится культурным феноменом. Для части зрителей сериал превращается в форму общественного запроса на обновление и справедливость, для других остаётся удачной телевизионной фантазией."
 ukraine.23.a: "Понятно"
 ukraine.24.t: "Пожар в Доме профсоюзов в Одессе"
 ukraine.24.d: "На фоне резкого политического противостояния в Одессе столкновения между проукраинскими и пророссийскими группами переросли в массовые беспорядки. Уличные драки, применение подручных средств и хаос привели к тому, что протестующие укрылись в Доме профсоюзов на Куликовом поле. В ходе столкновений в здании начался пожар. Огонь и задымление быстро охватили помещения, что привело к многочисленным жертвам. Погибли десятки людей, многие получили травмы."
 ukraine.24.a: "Ужас"
 ukraine.25.t: "Внеочередные выборы в Верховную Раду"
 ukraine.25.d: "После бегства Януковича и начала политического кризиса в Украине, правительство решило провести внеочередные выборы в Верховную Раду, чтобы стабилизировать ситуацию в стране."
 ukraine.25.a: "Понятно"
 ukraine.26.t: "Захват Славянска"
 ukraine.26.d: "Вооружённые люди в камуфляжной форме без опознавательных знаков захватили административные здания в Славянске, провозгласив создание Донецкой Народной Республики. Они установили контроль над городом, что привело к началу вооружённого конфликта на востоке Украины."
 ukraine.26.a: "К оружию, братья! Время защищать Родину!"
 ukraine.27.t: "Замечены российские военные в Крыму"
 ukraine.27.d: "Российские военные без опознавательных знаков были замечены в Крыму, что вызвало обеспокоенность международного сообщества и усилило напряжённость в регионе. "
 ukraine.27.a: "Оккупанты!"
 ukraine.28.t: "Первая волна мобилизации"
 ukraine.28.d: "Правительство Украины объявило первую волну мобилизации в ответ на растущую угрозу сепаратизма и внешнего вмешательства на востоке страны. Тысячи граждан были призваны на военную службу для защиты территориальной целостности Украины."
 ukraine.28.a: "За Батьківщину!"
 ukraine.29.t: "Вторая волна мобилизации"
 ukraine.29.d: "Правительство Украины объявило вторую волну мобилизации в ответ на продолжающуюся угрозу сепаратизма и внешнего вмешательства на востоке страны. Тысячи граждан были призваны на военную службу для защиты территориальной целостности Украины."
 ukraine.29.a: "За Батьківщину!"
 ukraine.30.t: "Третья волна мобилизации"
 ukraine.30.d: "Правительство Украины объявило третью волну мобилизации в ответ на продолжающуюся угрозу сепаратизма и внешнего вмешательства на востоке страны. Тысячи граждан были призваны на военную службу для защиты территориальной целостности Украины."
 ukraine.30.a: "За Батьківщину!"
 ukraine.31.t: "Кровопролитие в Киеве"
 ukraine.31.d: "Произошло резкое обострение ситуации, сопровождавшееся массовым кровопролитием. Возобновившиеся столкновения митингующих с милицией, сопровождавшиеся действиями неизвестных снайперов, привели к гибели десятков участников протестов и сотрудников правоохранительных органов. По данным Минздрава Украины в Киеве погибли 77 человек."
 ukraine.31.a: "Какой ужас!"
 ukraine.32.t: "Титушки из России"
 ukraine.32.d: "Россия отправила к нам группу новых «титушек»  для поддержки пророссийских сил на востоке Украины. Эти люди хорошо подготовлены и оснащены, что значительно усиливает позиции анти-майдана в регионе."
 ukraine.32.a: "Они пригодятся"
 ukraine.33.t: "Обстрел автобуса под Волновахой"
 ukraine.33.d: "13 января 2015 года возле Волновахи на трассе вблизи блокпоста под обстрел попал пассажирский автобус, в котором находились мирные жители. По сообщениям с места, автобус следовал по маршруту через прифронтовую зону, когда в районе дороги разорвались снаряды, и осколки пробили кузов.\n\nВ результате атаки есть погибшие и раненые. Часть пострадавших получила тяжёлые осколочные ранения. На место прибыли медики и спасатели, раненых эвакуируют в ближайшие больницы, уточняются списки жертв.\n\nИнцидент резко усилил напряжённость в регионе. Стороны конфликта обмениваются обвинениями в причастности к обстрелу, а вопрос безопасности гражданского транспорта в зоне боевых действий вновь выходит на первый план."
 ukraine.33.a: "Понятно"
 ukraine.34.t: "Сбитие нашего Ил-76 под Луганском"
 ukraine.34.d: "Военно-транспортный самолёт Ил-76МД Вооружённых сил Украины при посадке в аэропорту «Луганск» был сбит сепаратистами из ПЗРК «Игла». На борту сбитого самолёта находился экипаж из 9 человек и 40 десантников из состава 25-й отдельной воздушно-десантной бригады. Самолётом управлял экипаж из состава 25-й транспортной авиабригады под руководством заместителя командира авиаэскадрильи гвардии подполковника Александра Белого, предварительно весь экипаж самолета и десантники погибли при падении."
 ukraine.34.a: "Большая потеря..."
 ukraine.35.t: "Засада в Мариуполе"
 ukraine.35.d: "14 июля 2014 г. в Мариуполе произошла трагедия. Пророссийские боевики, под руководством Мангуста, обстреляли колонну пограничников на пост-мосту в районе завода «Азовсталь». Террористы в густонаселенной местности использовали стрелковое оружие и гранатометы. В результате атаки погибли 5 военнослужащих и 7 были ранены. Бойцы батальона «Азов» прибыли на место, чтобы отбить атаку и зачистить территорию."
 ukraine.35.a: "Хули они там делают?!"
 ukraine.36.t: "Сбитие Малазийского боинга"
 ukraine.36.d: "Авиалайнер Boeing 777-200ER авиакомпании Malaysia Airlines выполнял плановый рейс MH17 по маршруту Амстердам—Куала-Лумпур, но примерно через 2 часа и 49 минут после взлёта был поражён ракетой пво, выпущенной из неизвестного зенитно-ракетного комплекса, и разрушился на несколько частей. Обломки лайнера рухнули на землю в районе сёл Грабово, Рассыпное, Петропавловка и посёлка городского типа Рассыпное. Погибли все находившиеся на его борту 298 человек - 283 пассажира и 15 членов экипажа."
 ukraine.36.a: "Ебанные русские"
 ukraine.37.t: "Расширение Правого Корпуса"
 ukraine.37.d: "Правый Корпус расширился на несколько батальонов"
 ukraine.37.a: "Слава Украине!"
 ukraine.38.a: "Иностранная помощь"
 ukraine.38.d: "Франция отправила украинской армии 1000 бронежилетов, наборы медицинской помощи. В тот же день США передали 2000 бронежилетов, 1500 наборов медицинской помощи, 1000 спальных ковриков, 3600 камуфляжных жакетов, 400 коробок марлевых бинтов и 1000 чехлов на каски."
 ukraine.38.t: "Ну сойдёт..."
 ukraine.39.t: "Скандал в Верховной Раде"
 ukraine.39.d: "НАБУ провело расследование и обнаружило что голоса некоторых депутатов подкуплены."
 ukraine.39.a: "Черт!"
 ukraine.40.t: "Россия прислала свои спецслужбы"
 ukraine.40.d: "На фоне массовых протестов и нарастающей нестабильности в Украине руководство России рассматривает ситуацию как угрозу региональной безопасности и собственным интересам. По закрытым каналам принимается решение об отправке сотрудников российских спецслужб для оказания консультационной и организационной помощи нашим силовым структурам."
 ukraine.40.a: "Отлично"
 ukraine.41.t: "Россия финансирует анти-майдановские СМИ"
 ukraine.41.d: "Россия финансирует анти-майдановские СМИ, поддерживая прокремлёвские телеканалы, финансируя ботов и троллей, а также распространяя фейковые новости и дезинформацию, что подрывает доверие к протестующим и усиливает пророссийские настроение."
 ukraine.41.a: "Спасибо матушке России!"

 ukraine.42.t: "Разрушение памятника Ленину"
 ukraine.42.d: "Протестующие повалили памятник Ленину и осквернили его."
 ukraine.42.a: "Это осквернение истории!"

 ukraine.43.t: "Попытка подавления майдана"
 ukraine.43.d: "Наши силовики попытались выдвинуть протестующих запределы центральной площади, но это увенчалось неуспехом и люди стали все больше в нас разочаровываться."
 ukraine.43.a: "Понятно"
 ukraine.44.t: "Отставка Азарова"
 ukraine.44.d: "Для поиска компромисса с протестующими, мы выполнили одно из их требований и отправили в отставку правительство Азарова."
 ukraine.44.a: "Нам не нужна гражданская война"
 ukraine.45.t: "Битва за Донецкий Аэропорт"
