l_russian:
 russia.1.t: "Операция в Крыму"
 russia.1.d: "На фоне политического хаоса в Киеве и бегства президента Януковича, перед нами встает вопрос о безопасности Черноморского флота и русскоязычного населения Крыма. Мы должны взять ситуацию под контроль, используя «силы самообороны» и спецподразделения, чтобы предотвратить дестабилизацию полуострова и подготовить почву для его воссоединения с Россией."
 russia.1.a: "Работаем!"
 russia.2.t: "Крым вернулся в родную гавань"
 russia.2.d: "После проведения референдума и подписания договора о принятии Республики Крым в состав Российской Федерации, полуостров официально стал частью нашей страны. Севастополь вновь стал городом русской славы в составе России. Мир реагирует неоднозначно, но историческая справедливость восторжествовала."
 russia.2.a: "Вернулся в родную гавань!"
 russia.3.t: "Война затянулась"
 russia.3.d: "То, что планировалось как быстрая операция по стабилизации ситуации, переросло в затяжной вооруженный конфликт. Линия фронта стабилизировалась, и теперь обе стороны зарываются в землю. Экономика и дипломатия переходят в режим долгого противостояния."
 russia.3.a: "Ясно"
 russia.4.t: "Украина принимает соглашения"
 russia.4.d: "Дипломатическое давление и успехи на фронте принесли плоды. Киев согласился подписать предложенные нами условия урегулирования. Это дает нам время для закрепления достигнутых результатов и деэскалации на наших условиях."
 russia.4.a: "Хорошо"
 russia.5.t: "Украина отказывается от соглашений"
 russia.5.d: "Киевский режим отверг все наши предложения по мирному урегулированию, выбрав путь дальнейшей эскалации и опоры на западную помощь. Это означает, что конфликт будет продолжаться до победного конца."
 russia.5.a: "Твари"  
 russia.6.t: "Переворот на Украине"
 russia.6.d: "События на Майдане достигли критической точки. Радикалы захватили правительственный квартал, а законный президент Виктор Янукович вынужден скрываться. В стране фактически произошел государственный переворот. Жизнь президента находится в опасности."
 russia.6.a: "Нужно срочно эвакуировать Януковича!"
 russia.7.t: "Янукович был эвакуирован"
 russia.7.d: "В ходе филигранной операции наших спецслужб Виктор Янукович был вывезен с территории Украины в Россию. Теперь у нас есть козырь в виде легитимного, хоть и беглого главы государства, который может свидетельствовать о незаконности новой киевской власти."
 russia.7.a: "Хорошо сработано!"
 russia.8.t: "Янукович задержан"
 russia.8.d: "Несмотря на все усилия, эвакуация провалилась. Виктор Янукович был задержан силами, лояльными новому правительству в Киеве. Теперь его ждет суд, а мы потеряли важный инструмент дипломатического влияния."
 russia.8.a: "Блять"
 russia.10.t: "Референдум в Крыме"
 russia.10.d: "Жители Крыма и Севастополя пришли на избирательные участки, чтобы определить свое будущее. Подавляющее большинство высказалось за вхождение в состав Российской Федерации. Этот день войдет в историю как символ народного волеизъявления."
 russia.10.a: "Крым возвращается в родную гавань!"
 russia.11.t: "Минскские протоколы"
 russia.11.d: "Минские протоколы были подписаны для урегулирования конфликта на востоке Украины между правительственными силами и пророссийскими сепаратистами. Документ предусматривает прекращение огня, обмен пленными и проведение конституционной реформы в Украине с целью предоставления большей автономии регионам Донецк и Луганск. Однако, несмотря на подписание протоколов, боевые действия продолжались, и обе стороны обвиняли друг друга в нарушении соглашения."
 russia.11.a: "Отлично"
 russia.12.t: "Перекрытие подачи воды в Крым"
 russia.12.d: "В результате перекрытия подачи воды в Крым через Северо-Крымский канал, местные жители и военные силы России столкнулись с серьёзными трудностями в обеспечении жизнедеятельности региона. Украина использует водную блокаду как инструмент давления, что создает угрозу гуманитарной катастрофы."
 russia.12.a: "Возмутительно!"
 russia.13.t: "Второе Минское соглашение"
 russia.13.d: "В связи с продолжающейся эскалацией конфликта стороны подписали расширенное соглашение, включавшее усиленные меры по прекращению огня, отвод войск и тяжёлого вооружения, восстановление контроля Украины над границей, проведение конституционной реформы и местных выборов на Донбассе. Минск II стал ключевым международным механизмом по деэскалации конфликта, хотя соблюдение соглашения оставалось проблематичным."
 russia.13.a: "Отлично" 


 news_events.1.t: "Смена власти в Украине"
 news_events.1.d: "После месяцев протестов, уличного насилия и политического паралича власть в Украине переходит к новым силам. Действующий президент покидает столицу, парламент берёт инициативу в свои руки и объявляет о формировании нового политического курса. Для одних государств это - победа народного протеста и шанс на демократические реформы. Для других - неконституционный переворот, создающий опасный прецедент смены власти под давлением улицы."
 news_events.1.a: "Конец диктатуры!"
 news_events.1.b: "Переворот!"
 news_events.1.c: "Понятно"
 news_events.2.t: "Образование ДНР"
 news_events.2.d: "На фоне смены власти в Киеве и распада вертикали управления на востоке страны протестное движение в Донецке принимает новую форму. Захвачены здания областной администрации и силовых структур. Над ними поднимаются новые символы власти. Самопровозглашённые лидеры объявляют о создании Донецкой Народной Республики. Заявляется отказ признавать решения центрального правительства Украины и курс на самостоятельное политическое будущее. Формируются временные органы власти, отряды вооружённой охраны и собственная администрация."
 news_events.2.a: "Сепаратисты!"
 news_events.2.b: "Русские вперед!"
 news_events.2.c: "Понятно"
 news_events.3.t: "Образование ЛНР"
 news_events.3.d: "На фоне смены власти в Киеве и распада вертикали управления на востоке страны протестное движение в Луганске принимает новую форму. Захвачены здания областной администрации и силовых структур. Над ними поднимаются новые символы власти. Самопровозглашённые лидеры объявляют о создании Луганской Народной Республики. Заявляется отказ признавать решения центрального правительства Украины и курс на самостоятельное политическое будущее. Формируются временные органы власти, отряды вооружённой охраны и собственная администрация."
 news_events.3.a: "Сепаратисты!"
 news_events.3.b: "Русские вперед!"
 news_events.3.c: "Понятно"
 news_events.4.t: "Образование ХНР"
 news_events.4.d: "На фоне смены власти в Киеве и распада вертикали управления на востоке страны протестное движение в Харькове принимает новую форму. Захвачены здания областной администрации и силовых структур. Над ними поднимаются новые символы власти. Самопровозглашённые лидеры объявляют о создании Харьковской Народной Республики. Заявляется отказ признавать решения центрального правительства Украины и курс на самостоятельное политическое будущее. Формируются временные органы власти, отряды вооружённой охраны и собственная администрация."
 news_events.4.a: "Сепаратисты!"
 news_events.4.b: "Русские вперед!"
 news_events.4.c: "Понятно"
 news_events.5.t: "Образование ОНР"
 news_events.5.d: "На фоне смены власти в Киеве и распада вертикали управления на востоке страны протестное движение в Одессе принимает новую форму. Захвачены здания областной администрации и силовых структур. Над ними поднимаются новые символы власти. Самопровозглашённые лидеры объявляют о создании Одесской Народной Республики. Заявляется отказ признавать решения центрального правительства Украины и курс на самостоятельное политическое будущее. Формируются временные органы власти, отряды вооружённой охраны и собственная администрация."
 news_events.5.a: "Сепаратисты!"
 news_events.5.b: "Русские вперед!"
 news_events.5.c: "Понятно"
 news_events.6.t: "Зелёные человечки в Крыму"
 news_events.6.d: "На территории Автономной Республики Крым зафиксировано появление неизвестных вооружённых подразделений без опознавательных знаков. Люди в современной военной форме, оснащённые новейшим стрелковым оружием и средствами связи, начали занимать ключевые объекты инфраструктуры: здания парламента и правительства Крыма, аэропорты, узлы связи и воинские части.Официально их принадлежность не подтверждена. Представители Российской Федерации заявляют, что речь идёт о «местных силах самообороны», действующих в целях защиты русскоязычного населения и предотвращения хаоса после смены власти в Киеве. Украинское руководство, в свою очередь, называет происходящее актом внешней агрессии и нарушением территориальной целостности страны."
 news_events.6.a: "Русские оккупанты!"
 news_events.6.b: "Начало Крымской весны"
 news_events.6.c: "Ужас!"
 news_events.7.t: "Аннексия Крыма"
 news_events.7.d: "После стремительных событий февраля на территории Крыма был проведён референдум о статусе полуострова. По официальным данным крымских властей, большинство участников высказалось за выход из состава Украины и присоединение к Российской Федерации. Голосование прошло в условиях фактического контроля полуострова вооружёнными формированиями без опознавательных знаков. В кратчайшие сроки Российская Федерация объявила о принятии Республики Крым и города Севастополя в свой состав. В Москве подписание соответствующих документов было представлено как «восстановление исторической справедливости» и реализация права народов на самоопределение. Украина и подавляющее большинство государств мира отказались признать итоги референдума, назвав произошедшее незаконной аннексией и грубым нарушением международного права. В ответ на действия России были введены первые санкции, что ознаменовало начало длительного политического и экономического противостояния между Россией и Западом."
 news_events.7.a: "Русские оккупанты!"
 news_events.7.b: "Начало Крымской весны"
 news_events.7.c: "Ужас!"
 news_events.8.t: "Референдум в Крыму"
 news_events.8.d: "На фоне политического кризиса в Украине и фактического контроля Крыма вооружёнными формированиями без опознавательных знаков, власти Автономной Республики Крым объявили о проведении внеочередного референдума о будущем статусе полуострова. Жителям было предложено выбрать между выходом из состава Украины с последующим присоединением к Российской Федерации или восстановлением Конституции Крыма 1992 года. Возможность сохранения прежнего статуса автономии в составе Украины в бюллетенях отсутствовала. По официальным данным организаторов, явка составила более 80%, а подавляющее большинство участников проголосовало за присоединение к России. Результаты были оперативно утверждены местными органами власти и поддержаны руководством Российской Федерации."
 news_events.8.a: "Русские оккупанты!"
 news_events.8.b: "Крымский народ сделал выбор"
 news_events.8.c: "Ужас!"
 
 

 news_events.9.t: "Порошенко стал президентом"
 news_events.9.d: "После событий Евромайдана и бегства Виктора Януковича Украина оказалась в состоянии политического и экономического кризиса. В мае 2014 года состоялись досрочные президентские выборы, на которых бизнесмен и политик Пётр Порошенко одержал уверенную победу уже в первом туре. Он пообещал нации путь в Европу, прекращение войны на Востоке и проведение реформ. Однако многие сомневались, удастся ли ему выполнить эти обещания в условиях острой борьбы с сепаратизмом, внешнего давления и падения экономики."
 news_events.9.a: "Новая надежда"
 news_events.9.b: "Нелегитимный президент"
 news_events.9.c: "Интересно"
 news_events.13.a: "Понятно"
 news_events.13.t: "Катастрофа Boeing 777 в Донецкой области"
 news_events.13.d: "Авиалайнер Boeing 777-200ER авиакомпании Malaysia Airlines выполнял плановый рейс MH17 по маршруту Амстердам—Куала-Лумпур, но примерно через 2 часа и 49 минут после взлёта был поражён ракетой пво, выпущенной из неизвестного зенитно-ракетного комплекса, и разрушился на несколько частей. Обломки лайнера рухнули на землю в районе сёл Грабово, Рассыпное, Петропавловка и посёлка городского типа Рассыпное. Погибли все находившиеся на его борту 298 человек - 283 пассажира и 15 членов экипажа. Украинская сторона утверждает, что самолёт был сбит пророссийскими силами системой пво, которая была передана Россией, официальные лицы России отвергают все обвинения в свой адрес, и обвиняют в этой катастрофе Украину."
 news_events.13.a: "УЖАС"
 news_events.14.t: "Обстрел автобуса под Волновахой"
 news_events.14.d: "Трагедия под Волновахой потрясла мировое сообщество. Пассажирский автобус попал под артиллерийский обстрел возле блокпоста. Жертвами стали мирные жители, направлявшиеся по своим делам. Стороны конфликта немедленно обменялись обвинениями, но факт остается фактом: гражданское население продолжает нести самые тяжелые потери в этой войне."
 news_events.14.a: "Ужас"
 news_events.15.t: "ЕС Вводит санкции"
 news_events.15.d: "В ответ на действия России на Украине и присоединение Крыма, Европейский Союз объявил о введении пакета экономических и персональных санкций. Эти меры направлены на ограничение доступа российских компаний к западному капиталу и технологиям, а также на заморозку активов ряда должностных лиц."
 news_events.15.a: "Понятно"
 news_events.16.t: "Минские протоколы"
 news_events.16.d: "После месяцев ожесточённых боёв на востоке Украины, значительных потерь среди военных и мирного населения, а также нарастающего международного давления, в столице Беларуси были подписаны соглашения, получившие название Минские протоколы.\n\nДокумент был согласован представителями Украины, Российской Федерации и Организации по безопасности и сотрудничеству в Европе, а также подписан представителями самопровозглашённых Донецкой и Луганской народных республик. Основной целью протоколов объявлялось немедленное прекращение огня и поиск политического решения конфликта.\n\nМинские протоколы предусматривали прекращение боевых действий, обмен пленными, децентрализацию власти в Украине, проведение местных выборов в отдельных районах Донецкой и Луганской областей, а также вывод незаконных вооружённых формирований и военной техники. Отдельное внимание уделялось восстановлению социально-экономических связей и контролю над украино-российской границей."
 news_events.16.a: "Наконец-то мир?"
 news_events.17.t: "Минские протоколы"
 news_events.17.d: "После резкого обострения боевых действий зимой 2014–2015 годов и тяжёлых боёв за Дебальцево конфликт на востоке Украины вновь оказался на грани масштабной эскалации. На фоне угрозы срыва предыдущих договорённостей лидеры Германии, Франции, Украины и России собрались в Минске для экстренных переговоров в формате «нормандской четвёрки».\n\nПо итогам многочасовых переговоров был подписан документ под названием «Комплекс мер по выполнению Минских соглашений», неофициально известный как Минск-2. Его подписали представители Украины, Российской Федерации, ОБСЕ, а также Донецкой и Луганской народных республик.\n\nСоглашение предусматривало немедленное и всеобъемлющее прекращение огня, отвод тяжёлых вооружений от линии соприкосновения, создание зоны безопасности под контролем ОБСЕ, а также амнистию участников конфликта. В политической части документа закреплялись положения о конституционной реформе в Украине, особом статусе отдельных районов Донецкой и Луганской областей и проведении там местных выборов."
 news_events.17.a: "Наконец-то мир?"
 news_events.18.t: "Возобновление боевых действий"
 news_events.18.d: "Несмотря на подписание Минских протоколов в сентябре 2014 года и формальное объявление режима прекращения огня, боевые действия на востоке Украины не были остановлены полностью. Уже в первые недели после заключения соглашений стороны обвинили друг друга в систематических нарушениях перемирия.\n\nПерестрелки и артиллерийские удары вдоль линии соприкосновения постепенно переросли в полномасштабные боевые столкновения. Особо напряжённой оставалась обстановка вокруг Донецка, Луганска, аэропортов и стратегических транспортных узлов. Обе стороны укрепляли позиции, подтягивали резервы и фактически готовились к продолжению конфликта, несмотря на дипломатические заявления о приверженности миру."
 news_events.18.a: "Ужас!"
 news_events.19.t: "Частичная мобилизация в Украине"
 news_events.19.d: "После начала российского вторжения и аннексии Крыма правительство Украины объявило частичную мобилизацию для защиты суверенитета страны. Были призваны военнообязанные, усилены пограничные и внутренние войска. Военные части в Крыму и на востоке страны переведены в повышенную боевую готовность, а военные комиссии начали набор резервистов для патрулирования границ и охраны стратегических объектов."
 news_events.19.a: "Слава Украине"
 news_events.19.b: "Очерендой акт агрессии"
 news_events.19.b: "Понятно"
 news_events.20.t: "Сепаратисты захватили Дебальцево"
 news_events.20.d: "В феврале силы сепаратистов установили контроль над Дебальцево - ключевым железнодорожным и автомобильным узлом на Донбассе. После ожесточённых боёв украинские подразделения начали отход из города, понеся значительные потери. Событие произошло на фоне Минских соглашений и вызвало резкую международную реакцию. Киев заявил о нарушении перемирия, тогда как представители сепаратистов утверждали, что Дебальцево не входило в зону прекращения огня. Мировые СМИ расценили падение города как серьёзное изменение баланса сил в регионе."
 news_events.20.a: "Ужас!"
 news_events.20.b: "Свобода Донбассу!"
 news_events.20.b: "Понятно"
 news_events.21.t: "Путин и Порошенко провели двусторонние переговоры"
 news_events.21.d: "В Минске состоялись переговоры между президентом России Владимиром Путиным и главой Украины Петром Порошенко. Присутствовавшая на встрече глава дипломатии Евросоюза Кэтрин Эштон сказала по итогам встречи, что разговор получился откровенным, но позитивным."
 news_events.21.a: "Отлично!"
 news_events.21.b: "Отлично!"
 news_events.21.b: "Понятно"

 ukraine.1.t: "Янукович покинул Киев"
 ukraine.1.d: "Сразу после подписания соглашения об урегулировании кризиса в Украине, президент Украины Виктор Янукович покинул Киев в неизвестном направлений. Официальных заявлений не делается, указов не подписывается, связь с администрацией обрывается. Правительственные здания остаются без политического руководства."
 ukraine.1.a: "Куда это он?"
 ukraine.2.t: "Потеря контроля над Донецком"
 ukraine.2.d: "Ситуация на востоке страны окончательно вышла из-под контроля. Сегодня организованные группы вооруженных людей, называющие себя «народным ополчением», при поддержке протестующих взяли штурмом здание областной государственной администрации в Донецке. Украинские флаги сорваны, а над городом подняты знамена самопровозглашенной «республики». Местная милиция в массе своей отказалась оказывать сопротивление или открыто перешла на сторону бунтовщиков. Центральная власть фактически утратила рычаги управления ключевым промышленным центром Донбасса."
 ukraine.2.a: "Это лишь временный кризис"
 ukraine.2.b: "Мы больше не подчиняемся Киеву"
 ukraine.3.t: "Восстание в Луганской области"
 ukraine.3.d: "Волна протестов и захватов административных зданий захлестнула Луганск. Группы активистов, вооруженные и поддерживаемые местным населением, объявили о неподчинении киевским властям. Формируются отряды ополчения, а над городом водружаются флаги новой республики."
 ukraine.3.a: "Слава Украине!"
 ukraine.3.b: "Свободу Донбассу!"
 ukraine.4.t: "Восстание в Харьковской области"
 ukraine.4.d: "В Харькове ситуация накалилась до предела. Пророссийские активисты заняли здание ОГА и объявили о создании Харьковской Народной Республики. На улицах города происходят столкновения между сторонниками Майдана и их противниками. Судьба региона висит на волоске."
 ukraine.4.a: "Слава Украине!"
 ukraine.4.b: "Свободу Новороссии!"
 ukraine.5.t: "Восстание в Одесской области"
 ukraine.5.d: "Одесса стала ареной жесткого противостояния. Активисты Антимайдана разбили палаточный городок на Куликовом поле, требуя федерализации и защиты русского языка. Напряженность растет с каждым днем, угрожая перерасти в открытые столкновения."
 ukraine.5.a: "Слава Украине!"
 ukraine.5.b: "Свободу Новороссии!"
 ukraine.6.t: "Что делать дальше?"
 ukraine.6.d: "В столице начинаются массовые акции протеста после решения правительства изменить внешнеполитический курс страны. На центральные площади выходят тысячи людей - студенты, активисты и оппозиционные силы требуют пересмотра решений власти и продолжения европейской интеграции. Ситуация остаётся напряжённой, протесты пока носят мирный характер, однако их масштабы быстро растут. Региональные администрации внимательно следят за развитием событий, а международное сообщество уже делает первые заявления. Мы должны решить, каким путём действовать дальше - идти на уступки или попытаться восстановить полный контроль над улицами."
 ukraine.6.a: "Нужно решить этот временный кризис"
 ukraine.7.t: "Пророссийские протесты в Луганске"
 ukraine.7.d: "Тысячи жителей Луганска вышли на улицы, требуя референдума и сближения с Россией. Протестующие возмущены политикой новой власти в Киеве и готовы защищать свои интересы любыми способами."
 ukraine.7.a: "Протесты усиливаются!"
 ukraine.8.t: "Проукраинские протесты в Луганске"
 ukraine.8.d: "Несмотря на давление, сторонники единства Украины вышли на митинг в Луганске. Они заявляют, что Донбасс — это Украина, и выступают против вмешательства соседнего государства в дела их региона."
 ukraine.8.a: "Протесты усиливаются!"
 ukraine.9.t: "Пророссийские протесты в Донецке"
 ukraine.9.d: "Донецк бурлит. Площадь Ленина заполнена людьми с российскими триколорами. Лозунги о независимости Донбасса звучат все громче, а местная власть кажется парализованной перед лицом многотысячной толпы."
 ukraine.9.a: "Протесты усиливаются!"
 ukraine.10.t: "Проукраинские протесты в Донецке"
 ukraine.10.d: "Активисты за единство Украины собрались в центре Донецка, чтобы показать, что город не хочет отделяться. Акция проходит в напряженной атмосфере, под угрозой нападения со стороны радикально настроенных оппонентов."
 ukraine.10.a: "Протесты усиливаются!"
 ukraine.11.t: "Пророссийские протесты в Харькове"
 ukraine.11.d: "У памятника Ленину в Харькове собираются сторонники федерализации. Они требуют автономии для региона и не признают легитимность киевского правительства, требуя проведения референдума."
 ukraine.11.a: "Протесты усиливаются!"
 ukraine.12.t: "Проукраинские протесты в Харькове"
 ukraine.12.d: "Харьковский Евромайдан продолжает свои акции. Люди требуют соблюдения законности и сохранения территориальной целостности страны, опасаясь «крымского сценария» в своем городе."
 ukraine.12.a: "Протесты усиливаются!"
 ukraine.13.t: "Пророссийские протесты в Одессе"
 ukraine.13.d: "Марш сторонников Антимайдана прошел по улицам Одессы. Участники выступают за сохранение связей с Россией и против влияния радикальных националистов на политику страны."
 ukraine.13.a: "Протесты усиливаются!"
 ukraine.14.t: "Проукраинские протесты в Одессе"
 ukraine.14.d: "Одесситы, поддерживающие новую власть, вышли на марш за единство. Они подчеркивают многонациональный характер города и его неразрывную связь с Украиной."
 ukraine.14.a: "Протесты усиливаются!"
 ukraine.15.t: "Пророссийские протесты в Крыму"
 ukraine.15.d: "В Севастополе и Симферополе проходят массовые митинги. Люди требуют защиты от «фашистской угрозы» из Киева и призывают Россию вмешаться в ситуацию."
 ukraine.15.a: "Протесты усиливаются!"
 ukraine.16.t: "Проукраинские протесты в Крыму"
 ukraine.16.d: "Крымские татары и украинские активисты вышли к зданию Верховного Совета Крыма, чтобы не допустить принятия сепаратистских решений. Ситуация накалена до предела, возможны стычки."
 ukraine.16.a: "Протесты усиливаются!"
 ukraine.17.t: "Выборы 2014 года"
 ukraine.17.d: "Выборы 2014 года прошли успешно. Правительство выбрало нового президента и парламент. Однако, ситуация в стране остается напряженной, и многие регионы требуют большей автономии. Правительство пытается найти компромисс, но безуспешно."
 ukraine.17.a: "Понятно"
 ukraine.18.t: "Протесты усиливаются"
 ukraine.18.d: "Протесты усиливаются в городе Киеве и по всей Украине. Протестующие требуют отставки правительства и проведения новых выборов. Правительство пытается подавить протесты, но безуспешно. Ситуация становится все более напряженной. Местные власти заявляют, что не могут контролировать ситуацию."
 ukraine.18.a: "Нужно срочно навести порядок!"
 ukraine.19.t: "Националисты устраивают погромы"
 ukraine.19.d: "Националисты из \"Правого сектора\" и \"Свободы\" устроили погромы в Донецке и Луганске, разгромив несколько административных зданий и избив местных чиновников. Полиция не вмешивалась, а местные власти заявили, что не могут контролировать ситуацию."
 ukraine.19.a: "Нужно срочно навести порядок!"
 ukraine.21.t: "Выборы 2014 года"
 ukraine.21.d: "Выборы 2014 года прошли успешно. Правительство выбрало нового президента и парламент. Однако, ситуация в стране остается напряженной, и многие регионы требуют большей автономии. Правительство пытается найти компромисс, но безуспешно."
 ukraine.21.a: "Понятно"
 ukraine.22.t: "Янукович в Донецке"
 ukraine.22.d: "Бывший президент Украины Виктор Янукович прибыл в Донецк, где его встретили местные власти и пророссийские активисты. Янукович заявил, что не признает легитимность нынешнего правительства Украины и готов сотрудничать с Донецкой Народной Республикой. Его приезд вызвал волну протестов в Киеве и других городах Украины."
 ukraine.22.a: "Нужно его поймать!"
 ukraine.22.b: "Он не представляет угрозы"
 ukraine.23.t: "Выход сериала «Слуга Народа»"
 ukraine.23.d: "На телевидении выходит сатирический сериал «Слуга народа», рассказывающий историю обычного учителя истории, который неожиданно становится президентом страны. Проект задумывался как комедия и социальная сатира, высмеивающая коррупцию, бюрократию и разрыв между властью и обществом, однако сериал быстро выходит за рамки развлекательного формата. Фразы героев расходятся на цитаты, сцены активно обсуждаются в обществе, а образ «простого человека у власти» становится культурным феноменом. Для части зрителей сериал превращается в форму общественного запроса на обновление и справедливость, для других остаётся удачной телевизионной фантазией."
 ukraine.23.a: "Понятно"
 ukraine.24.t: "Пожар в Доме профсоюзов в Одессе"
 ukraine.24.d: "На фоне резкого политического противостояния в Одессе столкновения между проукраинскими и пророссийскими группами переросли в массовые беспорядки. Уличные драки, применение подручных средств и хаос привели к тому, что протестующие укрылись в Доме профсоюзов на Куликовом поле. В ходе столкновений в здании начался пожар. Огонь и задымление быстро охватили помещения, что привело к многочисленным жертвам. Погибли десятки людей, многие получили травмы."
 ukraine.24.a: "Ужас"
 ukraine.25.t: "Внеочередные выборы в Верховную Раду"
 ukraine.25.d: "После бегства Януковича и начала политического кризиса в Украине, правительство решило провести внеочередные выборы в Верховную Раду, чтобы стабилизировать ситуацию в стране."
 ukraine.25.a: "Понятно"
 ukraine.26.t: "Захват Славянска"
 ukraine.26.d: "Вооружённые люди в камуфляжной форме без опознавательных знаков захватили административные здания в Славянске, провозгласив создание Донецкой Народной Республики. Они установили контроль над городом, что привело к началу вооружённого конфликта на востоке Украины."
 ukraine.26.a: "К оружию, братья! Время защищать Родину!"
 ukraine.27.t: "Замечены российские военные в Крыму"
 ukraine.27.d: "Российские военные без опознавательных знаков были замечены в Крыму, что вызвало обеспокоенность международного сообщества и усилило напряжённость в регионе. "
 ukraine.27.a: "Оккупанты!"
 ukraine.28.t: "Первая волна мобилизации"
 ukraine.28.d: "Правительство Украины объявило первую волну мобилизации в ответ на растущую угрозу сепаратизма и внешнего вмешательства на востоке страны. Тысячи граждан были призваны на военную службу для защиты территориальной целостности Украины."
 ukraine.28.a: "За Батьківщину!"
 ukraine.29.t: "Вторая волна мобилизации"
 ukraine.29.d: "Правительство Украины объявило вторую волну мобилизации в ответ на продолжающуюся угрозу сепаратизма и внешнего вмешательства на востоке страны. Тысячи граждан были призваны на военную службу для защиты территориальной целостности Украины."
 ukraine.29.a: "За Батьківщину!"
 ukraine.30.t: "Третья волна мобилизации"
 ukraine.30.d: "Правительство Украины объявило третью волну мобилизации в ответ на продолжающуюся угрозу сепаратизма и внешнего вмешательства на востоке страны. Тысячи граждан были призваны на военную службу для защиты территориальной целостности Украины."
 ukraine.30.a: "За Батьківщину!"
 ukraine.31.t: "Кровопролитие в Киеве"
 ukraine.31.d: "Произошло резкое обострение ситуации, сопровождавшееся массовым кровопролитием. Возобновившиеся столкновения митингующих с милицией, сопровождавшиеся действиями неизвестных снайперов, привели к гибели десятков участников протестов и сотрудников правоохранительных органов. По данным Минздрава Украины в Киеве погибли 77 человек."
 ukraine.31.a: "Какой ужас!"
 ukraine.32.t: "Титушки из России"
 ukraine.32.d: "Россия отправила к нам группу новых «титушек»  для поддержки пророссийских сил на востоке Украины. Эти люди хорошо подготовлены и оснащены, что значительно усиливает позиции анти-майдана в регионе."
 ukraine.32.a: "Они пригодятся"
 ukraine.33.t: "Обстрел автобуса под Волновахой"
 ukraine.33.d: "13 января 2015 года возле Волновахи на трассе вблизи блокпоста под обстрел попал пассажирский автобус, в котором находились мирные жители. По сообщениям с места, автобус следовал по маршруту через прифронтовую зону, когда в районе дороги разорвались снаряды, и осколки пробили кузов.\n\nВ результате атаки есть погибшие и раненые. Часть пострадавших получила тяжёлые осколочные ранения. На место прибыли медики и спасатели, раненых эвакуируют в ближайшие больницы, уточняются списки жертв.\n\nИнцидент резко усилил напряжённость в регионе. Стороны конфликта обмениваются обвинениями в причастности к обстрелу, а вопрос безопасности гражданского транспорта в зоне боевых действий вновь выходит на первый план."
 ukraine.33.a: "Нужно принять меры!"
 ukraine.34.t: "Сбитие нашего Ил-76 под Луганском"
 ukraine.34.d: "Военно-транспортный самолёт Ил-76МД Вооружённых сил Украины при посадке в аэропорту «Луганск» был сбит сепаратистами из ПЗРК «Игла». На борту сбитого самолёта находился экипаж из 9 человек и 40 десантников из состава 25-й отдельной воздушно-десантной бригады. Самолётом управлял экипаж из состава 25-й транспортной авиабригады под руководством заместителя командира авиаэскадрильи гвардии подполковника Александра Белого, предварительно весь экипаж самолета и десантники погибли при падении."
 ukraine.34.a: "Большая потеря..."
 ukraine.35.t: "Засада в Мариуполе"
 ukraine.35.d: "14 июля 2014 г. в Мариуполе произошла трагедия. Пророссийские боевики, под руководством Мангуста, обстреляли колонну пограничников на пост-мосту в районе завода «Азовсталь». Террористы в густонаселенной местности использовали стрелковое оружие и гранатометы. В результате атаки погибли 5 военнослужащих и 7 были ранены. Бойцы батальона «Азов» прибыли на место, чтобы отбить атаку и зачистить территорию."
 ukraine.35.a: "Хули они там делают?!"
 ukraine.36.t: "Сбитие Малазийского боинга"
 ukraine.36.d: "Авиалайнер Boeing 777-200ER авиакомпании Malaysia Airlines выполнял плановый рейс MH17 по маршруту Амстердам—Куала-Лумпур, но примерно через 2 часа и 49 минут после взлёта был поражён ракетой пво, выпущенной из неизвестного зенитно-ракетного комплекса, и разрушился на несколько частей. Обломки лайнера рухнули на землю в районе сёл Грабово, Рассыпное, Петропавловка и посёлка городского типа Рассыпное. Погибли все находившиеся на его борту 298 человек - 283 пассажира и 15 членов экипажа."
 ukraine.36.a: "Ебанные русские"
 ukraine.37.t: "Расширение Правого Корпуса"
 ukraine.37.d: "Правый Корпус расширился на несколько батальонов"
 ukraine.37.a: "Слава Украине!"
 ukraine.38.a: "Иностранная помощь"
 ukraine.38.d: "Франция отправила украинской армии 1000 бронежилетов, наборы медицинской помощи. В тот же день США передали 2000 бронежилетов, 1500 наборов медицинской помощи, 1000 спальных ковриков, 3600 камуфляжных жакетов, 400 коробок марлевых бинтов и 1000 чехлов на каски."
 ukraine.38.t: "Ну сойдёт..."
 ukraine.39.t: "Скандал в Верховной Раде"
 ukraine.39.d: "НАБУ провело расследование и обнаружило что голоса некоторых депутатов подкуплены."
 ukraine.39.a: "Черт!"
 ukraine.40.t: "Россия прислала свои спецслужбы"
 ukraine.40.d: "На фоне массовых протестов и нарастающей нестабильности в Украине руководство России рассматривает ситуацию как угрозу региональной безопасности и собственным интересам. По закрытым каналам принимается решение об отправке сотрудников российских спецслужб для оказания консультационной и организационной помощи нашим силовым структурам."
 ukraine.40.a: "Отлично"
 ukraine.41.t: "Россия финансирует анти-майдановские СМИ"
 ukraine.41.d: "Россия финансирует анти-майдановские СМИ, поддерживая прокремлёвские телеканалы, финансируя ботов и троллей, а также распространяя фейковые новости и дезинформацию, что подрывает доверие к протестующим и усиливает пророссийские настроение."
 ukraine.41.a: "Спасибо матушке России!"

 ukraine.42.t: "«Народное вече» в Киеве"
 ukraine.42.d: "В Киеве состоялось второе «народное вече», известное как «Марш миллионов». К традиционным проевропейским и антиправительственным лозугам добавилось требование недопущения вступления Украины в Таможенный союз, что участники связали с недавней встречей президента Януковича с Владимиром Путиным в Сочи.\n\nС утра силовики перекрыли подходы к правительственному кварталу. Параллельно в Мариинском парке прошёл митинг сторонников власти, выступивших в поддержку курса президента и за мирное разрешение кризиса. МВД призвало граждан соблюдать закон и пообещало расследовать случаи превышения силы правоохранителями.\n\nС трибуны Майдана лидеры оппозиции объявили о расширении протеста. Были организованы массовые колонны на улицы Грушевского и Институтскую, началось возведение баррикад и установка палаток у Кабинета министров, Дома офицеров и вдоль ключевых улиц. К вечеру движение в правительственном квартале было практически полностью парализовано. Оппозиция заявила о фактическом контроле над территорией и сформировала не менее 15 отрядов гражданской самообороны.\n\nОдновременно прозвучали ультиматумы власти: в случае отказа отправить правительство в отставку оппозиция пригрозила блокадой резиденции президента и государственных учреждений. СБУ возбудила уголовное производство по факту действий, направленных на захват государственной власти.\n\nВечером был снесён памятник Ленину на Бессарабской площади. Ответственность взяла на себя партия «Свобода», в то время как другие лидеры оппозиции заявили об отсутствии координации и отказались брать на себя ответственность."
 ukraine.42.a: "Ужас!"

 ukraine.43.t: "Попытка подавления майдана"
 ukraine.43.d: "Наши силовики попытались выдвинуть протестующих запределы центральной площади, но это увенчалось неуспехом и люди стали все больше в нас разочаровываться."
 ukraine.43.a: "Понятно"
 ukraine.44.t: "Отставка Азарова"
 ukraine.44.d: "Для поиска компромисса с протестующими, мы выполнили одно из их требований и отправили в отставку правительство Азарова."
 ukraine.44.a: "Нам не нужна гражданская война"
 ukraine.45.t: "Битва за Донецкий Аэропорт"
 ukraine.45.d: "Силы сепаратистов наступают на аэропрт"
 ukraine.45.a: "Это нарушение мира!"
 ukraine.46.t: "Мы отстояли аэропорт"
 ukraine.46.d: "Силы сепаратистов наступают на аэропрт"
 ukraine.46.a: "Отлично!"
 ukraine.47.t: "Мы потреяли аэропорт"
 ukraine.47.d: "Силы сепаратистов захватили Донецкий аэропрт в ходе наступленя"
 ukraine.47.a: "Ужас!"
 ukraine.48.t: "Уточнение границ в Херсонской области"
 ukraine.48.d: "После длительных переговоров и взаимных обвинений в нарушении территориальной целостности, российские подразделения покинули позиции на Чонгарском полуострове и северной части Арбатской стрелки. Войска отошли за линию административной границы Автономной Республики Крым. Несмотря на то, что Крым остается оккупированным, этот успех на дипломатическом фронте показывает, что агрессор готов отступать под международным давлением."
 ukraine.48.a: "Первая победа"
 ukraine.49.t: "Стрельба на Рымарской"
 ukraine.49.d: "В ночь с 14 на 15 мая в Харькове, на улице Рымарской, произошел бой. Слышались пистолетные и автоматные выстрелы, взрывы гранат, крики и стоны раненных... Конфликт начался около 9 часов вечера на площади Свободы, неизвестные на микроавтобусе с днепропетровскими номерами, будто бы, цеплялись к людям с георгиевскими лентами. Пассажиры микроавтобуса намеренно вступили в конфликт с пророссийскими активистами, бросали взрывпакеты, после чего поехали на улицу Рымарскую в офис «Просвиты», где и припарковали автомобиль. За ними направились пророссийские активисты и предприняли попытку штурма здания. Из здания была открыта стрельба, из окон полетели коктейли Молотова. В результате перестрелки погибли два человека, у одного огнестрельное ранение, второй скончался - от травматического оружия."
 ukraine.49.a: "О боже мой!"
 ukraine.50.t: "Бои на Грушевского"
 ukraine.50.d: "В эту неделю произошли переломные события и протест перестал быть мирным. Его участники, возмущенные принятием «диктаторских законов», начали наступление на Верховную Раду и устроили столкновения с силовиками. «Беркут» ответил резиновыми пулями, свето-шумовыми гранатами и водой из брандспойтов. Бои шли несколько дней, пролилась первая кровь – погибли четверо участников Евромайдана."
 ukraine.50.a: "Это не наша вина!"
 ukraine.51.t: "Восстановление порядка в Харькове"
 ukraine.51.d: "После серии протестов и беспорядков в Харькове, правительство Украины решило восстановить порядок в городе. Были усилены меры безопасности, проведены аресты и задержания участников беспорядков, а также введены дополнительные патрули для обеспечения общественной безопасности."
 ukraine.51.a: "Отлично"
 ukraine.52.t: "Сепаратисты наступают на Авдеевку"
 ukraine.52.d: "После захвата Донецкого аэропорта, сепаратисты начали наступление на город Авдеевка, расположенный неподалеку. Город подвергся интенсивным обстрелам и атакам, что привело к значительным разрушениям и жертвам среди мирного населения. Украинские силы пытались удержать город, но сепаратисты продолжали наступление, что вызвало серьёзную гуманитарную кризис в регионе."
 ukraine.52.a: "Отправьте подкрепление!"
 ukraine.53.t: "Восстановление НГУ"
 ukraine.53.d: "Национальная гвардия Украины была официально восстановлена в апреле 2014 года в ответ на растущую нестабильность и угрозу сепаратизма в стране. Новая Национальная гвардия была создана на базе внутренних войск МВД Украины и предназначена для выполнения задач по обеспечению общественной безопасности, борьбе с терроризмом и защите территориальной целостности страны."
 ukraine.53.a: "Отлично"
 ukraine.54.t: "Возобновление боевых действий"
 ukraine.54.d: "После подписание Минских соглашений, сепаратисты нарушили его, обстреляв автобус под Волновахой, в результате чего погибло большое количество мирных жителей. Мы не можем оставить это без ответа и должны возобновить боевые действия против сепаратистов."
 ukraine.54.a: "За Батьківщину!"
 ukraine.55.t: "Соглашение об урегулировании кризиса в Украине"
 ukraine.55.d: "После месяцев уличных протестов, столкновений и сотен жертв столица стоит на грани окончательного распада государственного управления. Под давлением улицы, силовых структур, олигархических групп и международных посредников стороны идут на переговоры. Президент Украины и лидеры парламентской оппозиции подписывают соглашение, призванное немедленно остановить кровопролитие и вернуть конфликт в политическое русло. Посредниками выступают представители Европейского союза. Российский представитель участвует в переговорах, но не подписывает документ. Соглашение предусматривает возврат к Конституции 2004 года, ограничение президентской власти, формирование правительства национального доверия и проведение досрочных президентских выборов. В обмен оппозиция обязуется прекратить насилие и разоружить протестующих."
 ukraine.55.a: "Отлично!"
 ukraine.56.t: "Юлия Тимошенко освобождена"
 ukraine.56.d: "Бывший премьер-министр Украины Юлия Тимошенко была освобождена из-под стражи после того, как Верховный суд Украины отменил её приговор по делу о превышении служебных полномочий. Решение суда было воспринято как шаг к политическому примирению в стране и улучшению отношений с Европейским союзом. Сразу после освобождение Тимошенко начала активную предвыборную кампанию."
 ukraine.56.a: "Понятно"
 ukraine.57.t: "Формирование Правого Сектора"
 ukraine.57.d: "На фоне продолжающихся протестов на Майдане зафиксировано объединение ряда радикальных националистических организаций под общим названием «Правый сектор». Новая структура заявляет о самостоятельной координации действий и отказывается подчиняться как оппозиционным политикам, так и государственным органам."
 ukraine.57.a: "За что деды воевали??"
 ukraine.58.t: "Марш на Верховную Раду"
 ukraine.58.d: "Утром оппозиция объявила «мирное наступление» на Верховную раду, требуя немедленного возвращения к Конституции 2004 года. Колонна протестующих, возглавляемая депутатами и бойцами самообороны Майдана, была остановлена милицейскими кордонами у правительственного квартала. Столкновения быстро переросли в уличные бои: загорелись грузовики, применялись бутылки с зажигательной смесью, светошумовые гранаты и слезоточивый газ.\n\nК середине дня беспорядки охватили центр Киева. На улицах Институтской и Грушевского шли ожесточённые столкновения, возводились баррикады, город был окутан дымом. Был захвачен Дом офицеров, использованный как временный медпункт. Протестующие сообщали о захвате сотрудников «Беркута».\n\nК вечеру ситуация окончательно вышла из-под контроля. Был подожжён офис Партии регионов, зафиксированы огнестрельные ранения с обеих сторон, появились сообщения о действиях неизвестных снайперов. В ночь на 19 февраля на западе страны начались захваты оружия. Страна вступила в фазу открытого насилия."
 ukraine.58.a: "Остановитесь!"
 ukraine.59.t: "Заявление СБУ"
 ukraine.59.d: "На фоне стремительной эскалации насилия Служба безопасности Украины объявила о начале подготовки к проведению антитеррористической операции на территории страны. По заявлению СБУ, события последних суток свидетельствуют о массовом применении огнестрельного оружия экстремистскими группировками и переходе протеста в фазу организованного вооружённого противостояния."
 ukraine.59.a: "Подавите их!"
 ukraine.60.t: "Стрельба на Майдане"
 ukraine.60.d: "В ходе эскалации противостояния в центре Киева протесты на Майдане переросли в наиболее кровавую фазу. В утренние и дневные часы были зафиксированы многочисленные случаи огнестрельных ранений среди участников протестов. По свидетельствам очевидцев и данным последующих расследований, стрельба велась с применением снайперского оружия.\n\nОгонь открывался по протестующим с различных позиций в районе Майдана и прилегающих улиц. Погибшие и раненые фиксировались преимущественно от прицельных выстрелов, что указывало на организованный характер применения оружия. В течение короткого времени число жертв резко возросло, что привело к массовой панике и дезорганизации на площади."
 ukraine.60.a: "Ужас!"
 ukraine.61.t: "Акции Анти-Майдана в Донецке"
 ukraine.61.d: "В Донецке прошёл массовый митинг против Евромайдана. По данным организаторов и милиции, в акции приняли участие от 12 до 15 тысяч человек. Участники демонстрации выражали поддержку действующей власти и осуждали действия оппозиционных сил на Майдане. Мероприятие прошло мирно, без серьёзных инцидентов, но стало показателем регионального раскола в общественном мнении."
 ukraine.61.a: "Наши!"
 ukraine.62.t: "Факельное шествие в Киеве"
 ukraine.62.d: "В Киеве прошло факельное шествие активистов партии «Свобода» и футбольных фанатов в честь дня рождения Степана Бандеры. Лидер УДАРа Виталий Кличко подчеркнул, что акция является инициативой исключительно партии «Свобода» и не имеет отношения к всеукраинскому Майдану. Во время шествия в здание отеля «Премьер-Палас» была брошена дымовая шашка; впоследствии партия заявила о дисциплинарном исключении двух участников за этот инцидент."
 ukraine.62.a: "Фашисты!"
 ukraine.63.t: "Суд над Януковичем"
 ukraine.63.d: "В Оболонском районном суде Киева начинается процесс по делу о государственной измене бывшего президента Виктора Януковича. Его обвиняют в пособничестве российским властям в аннексии Крыма и развязывании войны на Донбассе. Суд проходит заочно, так как обвиняемый скрывается в России."
 ukraine.63.a: "Справедливость восторжествует"
 ukraine.64.t: "Женевские переговоры"
 ukraine.64.d: "В Женеве прошли переговоры с участием Украины, России, США и ЕС. По их итогам стороны договорились о мерах по деэскалации кризиса: разоружении незаконных формирований, освобождении захваченных зданий и общественных пространств, а также амнистии участникам протестов, сложившим оружие, за исключением виновных в тяжких преступлениях. Контроль за выполнением договорённостей возлагался на миссию ОБСЕ. Отдельно было заявлено о начале всеобъемлющего конституционного диалога с участием всех регионов."
 ukraine.64.a: "Нужно остановить кровопролитие!"
 ukraine.65.t: "Срыв Женевских договорённостей"
 ukraine.65.d: "В реке Казённый Торец были обнаружены тела депутата Горловского городского совета Владимира Рыбака, похищенного 17 апреля, а также двух украинских добровольцев - Юрия Дяковского и Юрия Поправки. Их гибель стала прямым свидетельством эскалации насилия в Донбассе. В тот же день исполняющий обязанности президента Украины Александр Турчинов заявил о срыве Женевских договорённостей и объявил о возобновлении антитеррористической операции. По его словам, вооружённые группы, действующие в Донецком регионе, перешли к пыткам и убийствам, бросив открытый вызов украинскому государству и международному сообществу, демонстративно проигнорировав решения, принятые в Женеве."
 ukraine.65.a: "Нет пощады террористам!"
 ukraine.66.t: "Ракетная атака под Зеленопольем"
 ukraine.66.d: "В районе Зеленополья по крупному месту сосредоточения украинских войск был нанесён массированный ракетно-артиллерийский удар. Ранним утром над позицией были зафиксированы беспилотники, после чего украинские подразделения потеряли связь по тактической радиосети. Спустя минуты район накрыл плотный огонь. В результате атаки погибли более тридцати украинских военнослужащих, десятки получили тяжёлые ранения, а боевая мощь свыше двух батальонов была фактически уничтожена."
 ukraine.66.a: "Придется отступить и перегруппироваться..."
 ukraine.67.t: "Обстрел микрорайона Восточный в Мариуполе"
 ukraine.67.d: "Утром удар пришёлся по блокпостам №14 и №15 и окрестностям Сартаны и Гнутово, нарушив электроснабжение Восточного микрорайона. В 09:15 начался массированный обстрел жилых кварталов, школ, рынков и улиц, что вызвало срочную эвакуацию населения. В результате погибло несколько десятков гражданских, повреждены десятки домов, школы, детсады, рынки, объекты инфраструктуры и автомобили, частично остановлена подача электроэнергии, воды и газа. Во второй половине дня район вновь подвергся обстрелам, усилив гуманитарный кризис."
 ukraine.67.a: "Террористы!"
 ukraine.68.t: "Ракетный удар по Краматорску"
 ukraine.68.d: "По данным СНБО Украины, в 12:30 был нанесён массированный удар из РСЗО «Смерч». Всего выпущено 32 ракеты: 18 попали в район штаба АТО, 14 — в жилые кварталы. Часть снарядов поразила центр города, повредив центральную площадь и Дворец культуры НКМЗ. По данным местных экстренных служб, повреждены 41 здание, погибло 17 человек, ещё 47 получили ранения."
 ukraine.68.a: "Ужас!"
 ukraine.69.t: "Массовое пересечение границы войсками РФ"
 ukraine.69.d: "К началу августа украинские силы вплотную приблизились к восстановлению контроля над государственной границей с Россией. Территория, удерживаемая пророссийскими силами, сократилась в несколько раз, а пути снабжения оказались под угрозой полного перерезания. До этого момента фиксировались лишь отдельные и эпизодические случаи участия военнослужащих Российской Федерации. Однако ситуация резко изменилась. Российская Федерация перешла к открытому военному вмешательству. Несколько механизированных и десантных батальонно-тактических групп регулярной армии РФ, общей численностью около 3000–4000 военнослужащих, пересекли границу Украины в нескольких местах."
 ukraine.69.a: "Путин не вводи войска!!!"
 ukraine.70.t: "Пересечение границы в Новоазовске"
 ukraine.70.d: "В августе 2014 года на фоне стремительного наступления украинских сил и угрозы полного перерезания границы с Российской Федерацией ситуация на востоке Украины резко обострилась. Пророссийские формирования оказались под давлением, а их линии снабжения - на грани срыва. В этот момент подразделения регулярных Вооружённых сил Российской Федерации начали пересечение государственной границы Украины. Колонны бронетехники и личного состава прошли вне официальных пунктов пропуска, используя полевые дороги и малонаселённые участки. В операцию были вовлечены батальонно-тактические группы, укомплектованные мотострелковыми и десантными подразделениями, усиленные танками и артиллерией."
 ukraine.70.a: "Бля" 
 ukraine.71.t: "Потеря контроля в Харьковской области"
 ukraine.71.d: "Харьков больше не является единственным очагом сопротивления. Пока в областном центре продолжаются столкновения и политический кризис, по всей Харьковской области начинают подниматься новые ячейки восстания. В Балаклее, Изюме, Купянске, Лозовой и Чугуеве фиксируются захваты администраций, блокирование трасс и появление вооружённых групп «самообороны». Местные активисты действуют автономно, не дожидаясь приказов из Харькова. В ход идут трофейное оружие, охотничьи ружья и захваченные склады МВД."
 ukraine.71.a: "Отправьте дополнительные силы!"
 ukraine.72.t: "Саммит «Восточного партнёрства»"
 ukraine.72.d: "В Вильнюсе прошёл саммит «Восточного партнёрства», на котором соглашение об ассоциации Украины с Европейским союзом подписано не было. Это решение вызвало разочарование среди сторонников евроинтеграции. 29 ноября оргкомитет Евромайдана объявил о прекращении акции. На площади Независимости остались лишь около 200–400 человек, решивших провести последнюю ночь протеста."
 ukraine.72.a: "Зачем нам нужна Гейропа?"
 ukraine.73.t: "Противостояние «Майдановцев» и «Антимайдановцев»"
 ukraine.73.d: "С 14 декабря Партия регионов начала бессрочную акцию «Антимайдан» в поддержку действующей власти на Европейской площади и в Мариинском парке. В течение 14–15 декабря противостояние сторонников и противников власти достигло пика, в Киеве впервые одновременно прошли два массовых митинга - Майдан и Антимайдан. Очередное «народное вече», собравшее, по разным оценкам, до 200 тысяч человек, показало изменение повестки протеста. На первый план вышло требование не допустить подписания соглашения о вступлении Украины в Таможенный союз на фоне предстоящего визита президента Виктора Януковича в Москву."
 ukraine.73.a: "Люди за нас!"
 ukraine.74.t: "Создание объединения «Майдан»"
 ukraine.74.d: "На очередном «Народном вече» было объявлено о создании общественной организации Народное объединение «Майдан». Сопредседателями Совета объединения стали лидеры оппозиции и общественные деятели, включая Олега Тягнибока, Виталия Кличко, Арсения Яценюка, Юрия Луценко, Юлию Тимошенко, Руслану Лыжичко и Сергея Квита.ю"
 ukraine.74.a: "Да чего они хотят?"
 ukraine.75.t: "Нападение на студенческий городок в Харькове"
 ukraine.75.d: "Поздно вечером 11 июня 2015 года в Харькове произошло резонансное нападение на территорию студенческого городка, где расположены общежития нескольких высших учебных заведений. Около сорока нападавших, скрывавших лица под масками и футболками, ворвались на улицу Отакара Яроша и устроили массовый погром, применяя холодное оружие, палки и подручные предметы.Нападение носило хаотичный, но крайне жестокий характер, нападавшие избивали всех, кто попадался им на пути, разрушали имущество и нападали на прохожих. Основной удар пришёлся по иностранным студентам, проживавшим в общежитиях. В результате атаки пострадали девять человек, шестеро были госпитализированы, в том числе четыре гражданина Иордании, двое из которых находились в критическом состоянии. Два человека погибли, ими оказались лица без постоянного места жительства. Правоохранительные органы возбудили уголовные дела по статьям о хулиганстве, покушении на убийство и разбое. Были задержаны пятеро подозреваемых, однако впоследствии они были отпущены. Представители милиции заявили, что не усматривают признаков межэтнического конфликта, что вызвало резкую критику со стороны общественности и правозащитников."
 ukraine.75.a: "Такое недопустимо!"
 ukraine.76.t: "Олег Моргун арестован"
 ukraine.76.d: "Сегодня за пределами Мариуполя, на одном из блокпостов, исполняющий обязанности начальника городской милиции Олег Моргун был задержан народным депутатом Олегом Ляшко и бойцами добровольческого батальона «Шахтёрск». Ляшко заявил, что задержание произошло по подозрению в контактах с сепаратистами после событий мая 2014 года. Моргун на момент задержания отрицает обвинения и утверждает, что действовал в рамках своих полномочий."
 ukraine.76.a: "Отлично"
 ukraine.77.t: "Противостояние в Мариуполе"
 ukraine.77.d: "Вечером 3 мая в Мариуполе произошла резкая дестабилизация обстановки. В центральных районах города была зафиксирована стрельба и поджоги, что вызвало панику среди мирного населения. Местные жители восприняли происходящее как начало активной фазы антитеррористической операции. По сообщениям очевидцев, в городе действовали неизвестные вооружённые лица в чёрной форме и масках без опознавательных знаков. В ходе ночных беспорядков были подожжены автомобильные покрышки, загорелось здание коммерческого банка, повреждены автомобили и торговые помещения, разгромлен офис одного из кандидатов в президенты Украины. Согласно официальной информации правоохранительных органов, днём 3 мая группа лиц под видом доставки продовольствия прибыла на блокпост Вооружённых сил Украины в районе посёлка Рыбацкое. В продуктах содержались препараты, выведшие из строя военнослужащих. Пятеро украинских солдат были захвачены вместе с оружием и доставлены в здание городского совета, находившееся под контролем пророссийских сил. После переговоров пленные были освобождены, однако захваченное оружие возвращено не было."
 ukraine.77.a: "Ужас!"
 ukraine.78.t: "Захват горсовета в Мариуполе"
 ukraine.78.d: "13 апреля в Мариуполе прошёл массовый пророссийский митинг, который быстро перерос в силовую акцию. Около тысячи протестующих прорвали милицейский заслон и заняли здание городской администрации. С фасада были сняты государственные флаги Украины, вместо них вывешены флаги Донецкой области, красное знамя и флаг самопровозглашённой Донецкой Народной Республики. На здании появился транспарант «Донецкая Народная Республика».Входы в горсовет были забаррикадированы, территория вокруг обнесена колючей проволокой. Участники захвата объявили о роспуске действующего депутатского корпуса и провозгласили город частью ДНР. Несмотря на полную боевую готовность, подразделения милиции не стали штурмовать здание, опасаясь массовых жертв.\n\nВо второй половине дня несколько сотен радикально настроенных активистов направились к зданию городского управления милиции, где проходил небольшой митинг в поддержку территориальной целостности Украины. Произошло жестокое избиение участников митинга, девять человек получили тяжёлые травмы, шестеро были госпитализированы в реанимацию, включая депутата городского совета.\n\nГородской голова Юрий Хотлубей выступил с обращением, призвав стороны не допустить кровопролития и заявив о готовности к переговорам. Вечером захватчики объявили о формировании собственного «городского совета» и избрании «народного мэра», который должен был исполнять обязанности до освобождения прежнего руководства. Переговоры с милицией велись через представителей самопровозглашённых властей.\n\nНесмотря на захват административного здания, в первые дни в нём не было зафиксировано мародёрства. Сотрудникам горсовета предложили продолжить работу, однако доступ в здание оставался ограниченным. Ситуация в городе оставалась крайне напряжённой и свидетельствовала о фактической утрате Киевом контроля над Мариуполем."
 ukraine.78.a: "Ужас!" 
 ukraine.79.t: "Ночная попытка вернуть горсовет Мариуполя"
 ukraine.79.d: "В ночь на 24 апреля около 30 проукраинских активистов в масках и с битами попытались выбить сторонников ДНР из здания Мариупольского горсовета. В ходе столкновений были ранены 5 человек. После прибытия милиции нападавшие скрылись. МВД Украины заявило, что в акции участвовали местные гражданские активисты. Были открыты уголовные дела. Утром мэр Юрий Хотлубей и силовики попытались договориться с представителями ДНР об освобождении здания, но безрезультатно. Оцепление сняли, над горсоветом вновь подняли российский флаг.\n\nПри осмотре здания обнаружены бутылки с зажигательной смесью и оружие. Вечером у горсовета прошёл митинг около 1000 сторонников ДНР. Активисты заявили о подготовке к референдуму 11 мая и отказались признать власть городского головы."
 ukraine.79.a: "Ясно"
 ukraine.80.t: "Рост влияния ДНР в Мариуполе"
 ukraine.80.d: "В конце апреля появились сообщения о подготовке сторонников ДНР к возможному захвату Мариуполя. 30 апреля после локальных митингов над зданиями районных администраций были вывешены флаги ДНР. По данным Генпрокуратуры Украины, флаги устанавливались активистами самовольно, без полного захвата зданий.\n\n1 мая в городе прошли массовые первомайские шествия под флагами ДНР и КПУ. Несколько тысяч человек скандировали лозунги в поддержку референдума и России. Активисты ДНР заявили о «смене» городских силовых руководителей и усилении давления на органы власти.\n\nВ тот же день новым начальником городской милиции был назначен полковник Валерий Андрущук. Однако вскоре появились сообщения о его отставке после конфликта с активистами ДНР. После этого над зданиями милиции, СБУ и прокуратуры были подняты флаги ДНР."
 ukraine.80.a: "Что же творится??"
 ukraine.81.t: "События в Донецке"
 ukraine.81.d: "1 марта пророссийские активисты захватили здание Донецкой ОГА и подняли российский флаг. Произошли столкновения со сторонниками Евромайдана. Донецкий облсовет под давлением митингующих поддержал идею референдума и выдвижение Павла Губарева в качестве «народного губернатора».\n\n2 марта и.о. президента Александр Турчинов уволил губернатора Андрея Шишацкого и назначил Сергея Таруту. Это решение вызвало новые митинги и радикализацию протестов. После отказа облсовета признать Губарева протестующие вновь захватили здание ОГА.\n\nВ последующие дни в Донецке прошли как пророссийские, так и проукраинские митинги. 5 марта активисты захватили здания госказначейства и телекомпании «Донбасс», а также напали на участников акции «За единую Украину».\n\n6 марта милиция восстановила контроль над захваченными зданиями. Вечером того же дня Павел Губарев был задержан СБУ по обвинениям в сепаратизме и насильственном захвате власти, а затем арестован судом на два месяца."
 ukraine.81.a: "Ясно" 
 ukraine.82.t: "Столкновения митингов в Донецке"
 ukraine.82.d: "13 марта в Донецке в течение дня проходил массовый пророссийский митинг под российскими флагами и лозунгами против НАТО, ЕС и «политических репрессий». Вечером началась акция в поддержку единства Украины, однако она была атакована значительно более многочисленными пророссийскими активистами.В ходе столкновений применялись петарды, дымовые шашки и камни. Были атакованы автомобили милиции, предпринимались попытки их перевернуть. По официальным данным, пострадали около 50 человек, погибли двое, среди них — Герой Украины Дмитрий Чернявский.Милиция задерживала наиболее агрессивных участников, однако под давлением толпы была вынуждена отпустить задержанных. События продемонстрировали утрату контроля над уличной ситуацией в городе."
 ukraine.82.a: "Ужас!!"
 ukraine.83.t: "Игорь Стрелков ликвидирован"
 ukraine.83.d: "В ходе ожесточённых боёв за Славянск поступили подтверждённые сообщения о гибели Игоря Стрелкова. По имеющимся данным, он погиб непосредственно во время боевых столкновений в городе, находясь в зоне активных боевых действий. Смерть Стрелкова стала серьёзным ударом для сил, оборонявших Славянск. Его утрата привела к дезорганизации управления, снижению боевого духа и усилению разногласий среди командиров. Бои за город продолжаются, однако ситуация для противостоящей стороны заметно осложнилась."
 ukraine.83.a: "Отлично!"
 ukraine.84.t: "Коллона Стрелкова покидает Славянск"
 ukraine.84.d: "условиях усиливающегося давления и нехватки ресурсов колонна сил под командованием Игоря Стрелкова начала организованный выход из Славянска. Под покровом ночи подразделения покидают город, оставляя позиции и технику, которую невозможно эвакуировать."
 ukraine.84.a: "Отлично!"
 ukraine.85.t: "Создание Азова"
 ukraine.85.d: "На фоне эскалации конфликта и нехватки боеспособных подразделений в юго-восточных регионах Украины начинается формирование нового добровольческого батальона - «Азов». В его основу входят активисты, добровольцы и бывшие силовики, готовые участвовать в боевых действиях против вооружённых формирований сепаратистов."
 ukraine.85.a: "Отлично!"
 ukraine.85.b: "Слава Азову!"
 ukraine.86.t: "Окружение и оставление блокпоста 32"
 ukraine.86.d: "С октября украинский блокпост номер 32, расположенный на перекрёстке «Бахмутской трассы» Р66 (Т1303) вблизи села Смелое, оказался фактически заблокирован вооружёнными формированиями противника. Поставки воды, продовольствия и боеприпасов были перерезаны, что резко ухудшило положение гарнизона. Украинское командование предприняло несколько попыток деблокирования, задействовав подразделения 24-й механизированной бригады, Национальной гвардии и десантников. Однако почти каждая попытка прорыва сопровождалась серьёзными потерями в личном составе и бронетехнике. По подтверждённым данным, было потеряно не менее 16 военнослужащих и 17 единиц бронетехники.\n\nК концу октября ситуация на блокпосту стала критической, значительная часть личного состава была истощена и выведена из строя болезнями. 27 октября, в соответствии с достигнутыми договорённостями, украинские войска организованно покинули блокпост номер 32."
 ukraine.86.a: "Это нарушение Минских протоколов!"
 ukraine.87.t: "Сбитый вертолёт под Славянском"
 ukraine.87.d: "Во время выполнения задачи по снабжению украинских подразделений и ротации личного состава в районе Славянска был сбит вертолёт Национальной гвардии Украины. Машина возвращалась на базу после доставки продовольствия на блокпост возле горы Карачун, когда была поражена ракетой из переносного зенитного комплекса, выпущенной силами ДНР.Вертолёт потерпел крушение и взорвался после удара о землю.\n\nПогибли 12 военнослужащих, среди них генерал-майор Сергей Кульчицкий, добровольно отправившийся на выполнение миссии. Выжил только штурман, доставленный в тяжёлом состоянии в больницу Харькова."
 ukraine.87.a: "Отдать честь героям..."
 ukraine.88.t: "Россия предлагает провести встречу в Минске"
 ukraine.88.d: "На фоне продолжающегося конфликта и эскалации насилия в Донбассе Россия выступила с инициативой проведения встречи в Минске с участием представителей Украины, России, ОБСЕ и лидеров самопровозглашённых республик. Целью встречи было обсуждение путей деэскалации конфликта, прекращения огня и начала политического диалога. Инициатива была воспринята с осторожностью, однако многие видели в ней шанс на достижение мира."
 ukraine.88.a: "Надеемся на мир!"
 ukraine.89.t: "Телефонный разговор президентов Украины и России"
 ukraine.89.d: "Президент Украины провёл телефонный разговор с президентом России, стремясь добиться немедленного прекращения боевых действий на Донбассе. По итогам беседы украинская сторона заявила о достижении взаимопонимания относительно шагов, необходимых для установления режима прекращения огня и начала мирного урегулирования конфликта."
 ukraine.89.a: "Надеемся на мир!"


 DPR.1.t: "Россия вводит войска"
 DPR.1.d: "Российская Федерация приняла решение об официальном вводе своих подразделений на территорию республик для обеспечения мира и безопасности. Колонны техники движутся к линии соприкосновения под радостные возгласы местных жителей."
 DPR.1.a: "Ура!! Слава России!"
 DPR.2.t: "Донецкий аэропорт наш!"
 DPR.2.d: "После многомесячных кровопролитных боев, «киборги» были выбиты из руин терминалов. Донецкий аэропорт полностью перешел под контроль сил ДНР. Это символическая и стратегическая победа для нашей республики."
 DPR.2.a: "Ура!! Слава Новороссии!"
 DPR.3.t: "Фиаско в Донецком аэропорту"
 DPR.3.d: "Наступление на аэропорт закончилось катастрофой. Наши силы понесли тяжелые потери под огнем украинской артиллерии и были вынуждены отступить. Аэропорт остается под контролем ВСУ."
 DPR.3.a: "Они первые напали!"
 DPR.4.t: "Гиркин в Славянске"
 DPR.4.d: "Группа вооруженных добровольцев под руководством Игоря Гиркина (Стрелкова) заняла Славянск. Это событие стало искрой, разжегшей пламя вооруженного сопротивления на всем Донбассе. Город превращается в неприступную крепость."
 DPR.4.a: "Отлично"
 DPR.5.t: "Формирование Оплота"
 DPR.5.d: "На базе организации «Оплот» сформировано мощное боевое подразделение. Бойцы «Оплота» уже зарекомендовали себя в уличных столкновениях и теперь готовы к полномасштабным боевым действиям."
 DPR.5.a: "Работаем братья!"
 DPR.6.t: "Формирование Дизеля"
 DPR.6.d: "Создан отдельный танковый батальон «Дизель». Это подразделение станет стальным кулаком республики, обеспечивая необходимую огневую мощь на самых сложных участках фронта."
 DPR.6.a: "Работаем братья!"
 DPR.7.t: "Формирование Спарты"
 DPR.7.d: "Арсен Павлов, известный под позывным «Моторола», объявил о создании батальона «Спарта». Подразделение будет специализироваться на разведке и штурмовых операциях в городских условиях."
 DPR.7.a: "Работаем братья!"
 DPR.8.t: "Формирование Сомали"
 DPR.8.d: "Михаил Толстых, позывной «Гиви», возглавил новый штурмовой батальон «Сомали». Бойцы этого подразделения известны своей отвагой и высокой дисциплиной в бою."
 DPR.8.a: "Работаем братья!"
 DPR.12.t: "Прибытие ДШРГ «Русич»"
 DPR.12.d: "Прибыли добровольцы из ДШРГ русич, готовые сражаться за интересы русского мира. Эти опытные бойцы значительно усилят наш потенциал в проведении диверсионных и разведывательных операций."
 DPR.12.a: "Прибытие ДШРГ «Русич»"
 DPR.13.t: "Прибытие ДШРГ «Русич»"
 DPR.13.d: "Прибыли добровольцы из ДШРГ русич, готовые сражаться за интересы русского мира. Эти опытные бойцы значительно усилят наш потенциал в проведении диверсионных и разведывательных операций."
 DPR.13.a: "Прибытие ДШРГ «Русич»"
 DPR.14.t: "Прибытие ДШРГ «Русич»"
 DPR.14.d: "Прибыли добровольцы из ДШРГ русич, готовые сражаться за интересы русского мира. Эти опытные бойцы значительно усилят наш потенциал в проведении диверсионных и разведывательных операций."
 DPR.14.a: "Прибытие ДШРГ «Русич»"
 DPR.15.t: "Колонна Гиркина выехала из Славянска"
 DPR.15.d: "Колонна Гиркина выехала из Славянска"
 DPR.15.a: "Понятно"
 DPR.16.t: "Игорь Стрелков Гиркин убит"
 DPR.16.d: "В ходе ожесточённых боёв за Славянск поступили подтверждённые сообщения о гибели Игоря Стрелкова. По имеющимся данным, он погиб непосредственно во время боевых столкновений в городе, находясь в зоне активных боевых действий. Смерть Стрелкова стала серьёзным ударом для сил, оборонявших Славянск. Его утрата привела к дезорганизации управления, снижению боевого духа и усилению разногласий среди командиров. Бои за город продолжаются, однако ситуация для противостоящей стороны заметно осложнилась."
 DPR.16.a: "Ужас!"