 df_yanukovich: "Выходец из индустриального Донбасса, ставший олицетворением донецкой политико-экономической группы и системы «крепких хозяйственников». Его лидерство завязано на хрупком компромиссе между олигархическими кланами и попытке усидеть на двух стульях между геополитическими гигантами. Внутренняя политика Януковича, выстроенная на жесткой вертикали и лояльности «Семьи», привела к критическому уровню коррупции и социальной напряженности. Сейчас он загнан в угол: экономика требует кредитов, Москва — интеграции, а улица — перемен. Неспособность лидера принять окончательное решение превратила Украину в пороховую бочку Европы, где любая ошибка президента может запустить процесс распада государственности или начала гражданской войны. Его судьба теперь зависит от того, хватит ли у него воли подавить оппозицию или мастерства, чтобы вновь договориться со всеми сразу."