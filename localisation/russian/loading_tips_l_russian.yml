 LOADING_TIP_0: "«Учи историю! Готовь революцию! Оставляй аудиторию! Выходи на улицу!» - Сергей Жадан"
 LOADING_TIP_1: "«Свобода держится на трёх китах: Рынок, демократия и пули в животах» - Сергей Жадан"
 LOADING_TIP_2: "«Ма, какой военкомат? Мы давно не с кем не воюем, Мы внеблоковая страна. Ты видела нашего министра обороны? Вот у нас вся оборона такая. У нас оборона хуже, чем оборона "Челси". Короче, ма, я пас, я не пойду.» - Сергей Жадан"
 LOADING_TIP_3: "«Товарищ москаль, на Украину шуток не скаль» - Пётр Порошенко"
 LOADING_TIP_4: "«Проект «Новороссии» потерпел крах» - Пётр Порошенко"
 LOADING_TIP_5: "«Хотите носить оружие - прошу добровольцем, в военкомат» - Пётр Порошенко"
 LOADING_TIP_5: "«Прощай, немытая Россия» - Пётр Порошенко"
 LOADING_TIP_6: "«Украина к нашему мирному предложению не прислушалась, вопрос будем решать по-другому» – Александр Захарченко"