LOADING_TIP_74: «Если ты выжил в Запорожье, тебе не страшен апокалипсис» — Суровая запорожская жизненная мудрость от Евгения Черняка.
LOADING_TIP_75: «Мост достроим, даже если мне придётся самому класть асфальт ночью» — Обещание Владимира Буряка в разгар долгостроя.
LOADING_TIP_76: «Хортица — это место, где просыпается генетический код казака» — Александр Старух о силе сакрального острова.
