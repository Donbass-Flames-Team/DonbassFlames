l_russian:
LOADING_TIP_0: "«А сегодня в завтрашний день не все могут смотреть. Вернее смотреть могут не только лишь все, мало кто может это делать» — Виталий Кличко"
LOADING_TIP_1: "«У меня есть два заместителя, четыре из которых уже месяц лежат в Кабмине» — Виталий Кличко"
LOADING_TIP_2: "«Единственное, есть такой господин Вакаров, если он когда нибудь соизволит вернуться на родину а не остаться в Российской Федерации, я бы с удовольствием показал ему, как вырываются кадыки. Лёгким. Элегантным. Движением. Правой. Руки. Или левой...» — Дмитрий Гордон"
LOADING_TIP_3: "«Ха-ха-ха-ха, лысый парик, а там шевелюра... Интересная мысль, кто-то меня разоблачил» — Дмитрий Гордон, в ответ Владимиру Соловьеву"
LOADING_TIP_4: "«Я не вижу запаха» — Виталий Кличко"
LOADING_TIP_5: "«Гордо встану грудью за спиной Украины» — Виталий Кличко"
LOADING_TIP_6: "«Что плохого в том, что я поддерживал этих страусов? Что плохого в этом? Они просто жили там» — Виктор Янукович"
LOADING_TIP_7: "«Наши дети пойдут в школы и детские сады, а их дети будут сидеть в подвалах!» — Петр Порошенко"
LOADING_TIP_8: "«Циничные бандеры... бандиты с оружием в руках» — Петр Порошенко"
LOADING_TIP_9: "«Остановитесь!» — Виктор Янукович"
LOADING_TIP_10: "«Выйди отсюда, разбойник! Плохо слышишь? Иди гуляй» — Владимир Зеленский"
LOADING_TIP_11: "«Я не лох какой-то, я президент этой страны» — Владимир Зеленский"
LOADING_TIP_12: "«Ха-ха-ха-ха, это вообще новое что-то, «нацистский поскрёбыш», надо записать» — Дмитрий Гордон, отреагировал на новое сочетание «оскорбительных» слов от Владимира Соловьева"
LOADING_TIP_13: "«Я президент Света!» — Владимир Зеленский (оговорка в интервью)"
LOADING_TIP_14: "«Спусковой крючок войны всё-таки нажал я» — Игорь Гиркин (Стрелков)"
LOADING_TIP_15: "«Мы будем брать Лондон! Вся Британия должна быть захвачена» — Александр Захарченко"
LOADING_TIP_16: "«В случае ядерной войны не все мы умрём» — Максим Кац"
LOADING_TIP_17: "«Называй не «Головожопый», это уже не смешно, называй «Жопоголовый», так будет по новому» — Дмитрий Гордон, в ответ на «оскорбление» Владимира Соловьева"
LOADING_TIP_18: "«Ну что, Владимир Рудольфович Соловьев, он же Володя, он же Гога, он же Гоша, я думаю что в тайне, ночами, ты на меня дрочишь, иначе чем еще объяснить что ты так часто показываешь и так много обо мне говоришь» — Дмитрий Гордон"
LOADING_TIP_19: "«Дорогие украинцы, я обещаю вам пойти в Президенты Украины и сразу выполняю: я иду в Президенты Украины! Давайте сделаем это вместе. С Новым годом, с новым слугой народа!» — Владимир Зеленский в новогоднем обращении 31.12.2018 на канале «1+1»"
LOADING_TIP_20: "«Если вы не понимаете — мы быстро идём к катастрофе» — Игорь Стрелков"
LOADING_TIP_21: "«Мне нужно оружие, а не такси» — Владимир Зеленский"
LOADING_TIP_22: "«Сколько стоит? 375? Сафонов, оплатить! Давай. Сколько стоит? Сафонов, оплатить! И сколько стоит? Да... Сафонов, в кассу оплати, попробуй. Я инвалид...» — Владимир Жириновский, раздает указания помощнику в аптеке"
LOADING_TIP_23: "«Ополчение Боинг не сбивало» — Игорь Гиркин (Стрелков), в интервью у Дмитрия Гордона"
LOADING_TIP_24: "«Без общения с умными людьми, пусть даже врагами, развитие невозможно» — Игорь Гиркин (Стрелков)"
LOADING_TIP_25: "«Хоть в России все хуево, Украину мочит Вова и торгуя «русским миром», он продаст родную мать, Соловьев ужасно мутен, это понял даже Путин, но такого пиздабола, очень сложно отыскать» — Дмитрий Гордон в своей песне о Владимире Соловьеве «Итальянский партизан»"
LOADING_TIP_26: "«Во-первых, я - не ваш оппонент, я - ваш приговор» — Владимир Зеленский, во время дебатов Петру Порошенко"
LOADING_TIP_27: "«Ты мне не попадайся на глаза, я тебе кадык вырву, сука! Ты кому сказал сдохнуть? Мне сказал сдохнуть? Приедь сюда, скажи мне в глаза это, если у тебя смелости хватит» — Дмитрий Гордон в ответ Игорю Степуре"
LOADING_TIP_28: "«Все жители Брянска, которые снимали прилёты и жаловались что ПВО не работала — это твари и они должны сидеть в тюрьме» — Владимир Соловьев"
LOADING_TIP_29: "«Да, Вов, ты был полковником, ты и поешь лучше, я тебе скажу по секрету, у тебя и писька больше, лишь бы не плакал» — Дмитрий Гордон, в ответ Владимиру Соловьеву"
LOADING_TIP_30: "«Я хочу сказать российской армии: пиздуйте нахуй отсюда, ёбаные пид***сы!» — Дмитрий Гордон в интервью телеканалу «Дождь»"
LOADING_TIP_31: "«Русский военный корабль, иди нахуй!» — Пограничник с острова Змеиный, ответ на ультиматум крейсера «Москва» о сдаче в плен, 24 февраля 2022 года"
LOADING_TIP_32: "«Добрый день, мы из ДНР!» — Локальный TikTok тренд весны 2022 года, переделанный с украинского трека"
LOADING_TIP_33: "«Я отправляю тебе конфеты, кружку и мой пламенный привет, не забывай обо мне и я не забуду о тебе» — Дмитрий Гордон, обращение к Владимиру Соловьеву"
LOADING_TIP_34: "«Президент тут. Мы все тут. Защищаем нашу независимость» — Владимир Зеленский (25 февраля 2022)"
LOADING_TIP_35: "«Без света или без вас? Без вас» — Владимир Зеленский"
LOADING_TIP_36: "«Вам нічого не видно без контактних лінз, вас боронить шкіра адвокатських валіз, капітани пліз, не потрібно сліз, розкажи мені потім, що таке лібералізм» — Сергей Жадан в своей песне «Сомалі»"
LOADING_TIP_37: "«Ма, який воєнкомат? Ми давно ні з ким не воюємо, Ми - позаблокова країна. Ти бачила нашого міністра оборони? Ось у нас вся оборона така. В нас оборона гірша, ніж оборона Челсі. Ну, ма, ну як чому? Як це чому? а тому, що я дебіл! Ти розумієш - дебіл! А дебілів у армію не беруть! Навіть, в нашу, українську!» — Сергей Жадан в своей песне «Воєнкомат» в далеком 2008 году"
LOADING_TIP_38: "«Вот для беларусов, есть у нас подарок, украинцам и Европе - перекроем газ» — Владимир Соловьев, поет на концерте в 2008 году"
LOADING_TIP_39: "««А теперь слушайте меня сука блять, это чьи-то блять отцы и чьи-то сыновья, и те мрази, которые не дают нам боеприпасы, сука, будут в аду жрать их потроха блять! Пид***сы. У нас нехватка боеприпасов 70% Шойгу, Герасимов, где, сука, боеприпасы? Посмотрите на них, сука!» — Евгений Пригожин"
LOADING_TIP_40: "«Нравится, не нравится — терпи, моя красавица» — Владимир Путин"
LOADING_TIP_41: "«Мы ещё всерьёз и не начинали» — Владимир Путин"
LOADING_TIP_42: "«— Гасло! — НКВД, пропустите! — Таких ми не пропускаємо! Гасло я вас запитую. — Какое гасло? — Це ви повинні знати, а не я. — У тебя автомат на этом, на предохранителе. — Ви впевнені? — Точно, да. — Він ще ї стріляє до того, дуже добро і цільно. Я вас запитую - гасло! Чи москаль? — Я русский. Русский! — Руский? — Русский? — Скажете гасло, тоді впущу. — Не скажу. Ми так довго будем стояти з вами. — Ну значит мы уходим» — Олег Царев, разговаривает с охранником на входе во львовский ресторан «Криївка»"
LOADING_TIP_43: "«Спецоперация идёт строго по плану» — Игорь Конашенков"
LOADING_TIP_44: "«— Когда началась Вторая мировая война? — Что? — Когда началась Вторая мировая война? — Волынская резня была в... — Когда началась Вторая мировая война? — В 41. — Да вы что? — Да да. — Не в 39? — Нет. — Не в сентябре 39? — Нет. — Не с раздела Польши? — Нет » — Олег Царев, в известном интервью Роману Скрыпину"
LOADING_TIP_45: "«Кстати, меня рассмешила эта бледная спирохета, этот человек — использованный гондон» — Владимир Соловьев"
LOADING_TIP_46: "«Бандеровская идеология, это когда людей убивавли сотнями тысяч за то что они не были украинцами, да, Волынская резня» — Олег Царев"
LOADING_TIP_47: "«Це Ляшко, доброго дня, а ми в ліфті застряли, як харашо?! Слиш, він каже харашо» — Олег Ляшко"
LOADING_TIP_48: "«Показуй документи! Це режимний об'єкт, ти не міг сюди попасти просто так, ключ! Де ключ?! Стій бо будем биться блядь! Я тобі покажу! Я сказав, документи і ключ. Почув чи не почув? Стій я сказав! Ага, тобі вже погано, да? Ти хочеш побиться?» — Олег Ляшко, в монологе с неизвестным мужчиной в которого вцепился руками"
LOADING_TIP_49: "«Россия не заканчивается нигде» — Владимир Путин"
LOADING_TIP_50: "«Ну чего, уроды конченые, довольны? Взяли, суки, Киев? с НАТО хорошо повоевали? Поделили Европу с Америкой? Кучка старых фантазеров, у которых ничего, кроме понтов, за душой нет. Что ж вам, мрази, на жопе ровно то не сиделось? Смотрели бы дальше свои мультики о ракетах, летящих в Майами. Куда же вы полезли?» — Максим Кац"
LOADING_TIP_51: "«Тем более мы в начале ролика выяснили, что следы замести не может даже целая администрация российского президента, а тут — мариупольская школа, конечно не могло такого быть» — Максим Кац, в видео о 66 школе"
LOADING_TIP_52: "«Друзья, по Красному Лиману новости тревожные. На данный момент он в полукольце. Очень неприятные новости, но мы должны смотреть трезво на ситуацию» — Денис Пушилин, текст из поста в Telegram-канале, за несколько часов до того, как на Красной площади будут кричать «Гойда»"
LOADING_TIP_53: "«Существует такое старорусское междометие «Гойда!», означающее призыв к немедленному действию. Как же нам не хватало этого сейчас!» — Иван Охлобыстин, выступление на Красной площади после референдумов, 30 сентября 2022 года"
LOADING_TIP_54: "«Вот идиотка, убери ее отсюда! Убери эту проститутку, эту грязь отсюда убери! Чёрная грязь! Отвратительная баба! Блядь последняя!» — Владимир Жириновский, вскрикивает сразу после того, как в него плеснула водой из стакана Ксения Собчак на дебатах 2018 года"
LOADING_TIP_55: "«Дараґій, Микіла Яновіч, сеґодня вас міжуть відправіти у відстійку і ви маєте туді піті з усіма кровосісями, ваш кабінєт міністрів не ефіктівєн, недієздатєн, ви довелі людей до зубажіння, і коли ви гавірячи про економіку зґаїдуєте папєредніків...» — Олег Ляшко, в речи в Верхновной Раде высмеивает произношение Николая Азарова"
LOADING_TIP_56: "«Я дуже злий, я дуже злий на Юльку» — Олег Ляшко"
LOADING_TIP_57: "«Задовбали, скотиняки» — Олег Ляшко"
LOADING_TIP_58: "«Хотите жить — бегите. Хотите жить — сдавайтесь в плен. Хотите жить — боритесь. Боритесь на своих улицах и за свою свободу У вас и так всё забрали. Или у кого-то из вас есть нефтяные вышки? есть дворцы? есть виноградники? а может, у вас есть яхты или какой-то банк? Вы за что вообще боретесь? У вас есть только кредиты, что-то вечером пожрать и теперь мобилизация. Боритесь за своё, не лезьте на нашу землю» — Владимир Зеленский"
LOADING_TIP_59: "«Фиктивным младенцам вернуть эту землю, государство и на этом все закончиться, мы даже не будем оглашать фамилии этих людей» — Виктор Янукович"
LOADING_TIP_60: "«Если мы серьезны, то мы защитим Мариуполь. Вот в чем вопрос: серьезны мы или нет? Являемся ли мы Европой, Западом, НАТО? И одна вещь ясна — Макрон не серьезен. Это большая проблема. Он едет и предлагает Путину «финляндизацию» Украины... это катастрофа» — Гюнтер Фелингер-Ян"
LOADING_TIP_61: "«9 февраля 2022 года в Мариуполе, я призывал НАТО защитить Мариуполь, но мы не смогли... Освободите Мариуполь и не продавайте его России. Любое соглашение должно включать Мариуполь в НАТО и ЕС» — Гюнтер Фелингер-Ян"
LOADING_TIP_62: "«Как же вы не заметили, мы же сегодня над моей Украиной дрались! А воздух другой, а небо голубее и земля зеленее» — Леонид Быков"
LOADING_TIP_63: "«Будем жить!» — Леонид Быков"
LOADING_TIP_64: "«Как-то нам говорили: будет доллар по 45 грн при Зеленском, будет хаос, будет война — смотрите, ничего не случилось» — Владимир Зеленский"
LOADING_TIP_65: "«Я уже говорил не раз и еще раз скажу: счастливый Донецк, счастливый Донбасс может быть только в единой Украине» — Ринат Ахметов"
LOADING_TIP_66: "«Територію нашої держави треба зробити небезпечною для життя наших громадян» — Виктор Янукович"
LOADING_TIP_67: "«Так, Саша, ну шо ти, налей мені соромно не було» — Виктор Янукович"
LOADING_TIP_68: "«Увікни, уві, увікн, увікни, вікнить» — Виктор Янукович"
LOADING_TIP_69: "«Задачи по освобождению Купянска выполнены в полном объеме» — Сергей Кузовлев, фраза из представления к награде «Герой России» за «взятие» города, который на тот момент оставался под контролем ВСУ"
LOADING_TIP_70: "«Лучше убейте меня, но я не буду лгать. Я должен честно сказать: Россия стоит на грани катастрофы. И если сегодня не отрегулировать эти винтики, то самолет рассыплется в воздухе» — Евгений Пригожин"
LOADING_TIP_71: "«Счастливый дедушка думает, что ему хорошо. Но что делать стране, если выяснится, что дедушка — законченный мудак?» — Евгений Пригожин"
LOADING_TIP_72: "«Вы хотите декоммунизацию? Ну что же, нас это вполне устраивает. Мы готовы показать вам, что значит для Украины настоящая декоммунизация» — Владимир Путин"
LOADING_TIP_73: "«Кто как обзывается, тот так и называется» — Владимир Путин"
LOADING_TIP_74: "«Мы как мученики попадем в рай, а они просто сдохнут» — Владимир Путин"
LOADING_TIP_75: "«Мы будем преследовать террористов везде. В аэропорту — в аэропорту. Значит, вы уж меня извините, в туалете поймаем, мы и в сортире их замочим» — Владимир Путин"
LOADING_TIP_76: "«(Разводит руками и улыбается)» — Сергей Шойгу, в ответ на вопрос журналиста «России 1» Евгения Попова «Победим?»"
LOADING_TIP_77: "«Украина будет воевать с нами не больше 3-4 дней. Там некому будет против нас воевать» — Александр Лукашенко"
LOADING_TIP_78: "«В горячей войне мы Украину победим за два дня. Чего там ее побеждать-то? Это же Украина» — Маргарита Симоньян"
LOADING_TIP_79: "«Питають дружину, «Де ти береш гроші?», она каже - «В тумбачкє»» — Виктор Янукович"
LOADING_TIP_80: "«Немножко текст по дебильному написан» — Михаил Добкин, жалуется на сценаристов"
LOADING_TIP_81: "«Не будем говорить о плохом а лучше сделаем» — Виктор Янукович"
LOADING_TIP_82: "«Любимый город, может спать спокойно и видеть сны» — Виктор Янукович, исполняет свою любимую песню"
LOADING_TIP_83: "«Якщо вас хвилюют питання, коли буде кабріолєт Audi червоново цвєта доставлений до вєтєрана вісьмідєсяти піті ричного — то він не буде доставлєний. Якби ви конкретезували би своє питання, може воно стосується кормов для кішок, для цуценят. Потому што кішки та цуценята чиїсь там, не могут покупати себє в кішичачих магазінах» — Наталия Королевская"
LOADING_TIP_84: "«Я сейчас покажу, откуда на Беларусь готовилось нападение» — Александр Лукашенко"
LOADING_TIP_85: "«Денег нет, но вы держитесь!» — Дмитрий Медведев, в разговоре с местными жителями во время визита в Крым"
LOADING_TIP_86: "«Куля в лоб — так куля в лоб» — Арсений Яценюк, на сцене на Майдане Независимости"
LOADING_TIP_87: "«Ці руки нічого не крали!» — Виктор Ющенко"
LOADING_TIP_88: "«— В каких условиях вы сидели? — Барак. — Обама. — Ну, типо» — диалог Дмитрия Гордона и Михаила Ходорковского, ставший мемом 2020 года"
