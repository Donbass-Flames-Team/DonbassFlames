l_russian:
 LPR_republic_without_power:0 "Республика без власти"
 LPR_republic_without_power_desc:0 "Формально есть правительство, но на местах царит хаос и самоуправство."
 
 LPR_power_of_gun:0 "Власть ствола"
 LPR_power_of_gun_desc:0 "Сила держится через оружие; группы на местах контролируют районы, решения принимаются по силе, а не закону."
 
 LPR_fragmented_gangs:0 "Разрозненные банды"
 LPR_fragmented_gangs_desc:0 "Территории поделены между локальными вооружёнными группировками; каждый квартал живёт по своим правилам, грабежи и контроль ресурсов обычны."
 
 LPR_eastern_intervention:0 "Вмешательство с Востока"
 LPR_eastern_intervention_desc:0 "Скрытая поддержка извне: техника, советники, регулярные силы, решающие исход боёв в тени."
 
 LPR_unauthorized_commanders:0 "Самовольные командиры"
 LPR_unauthorized_commanders_desc:0 "На местах появляются свои лидеры, которые сами решают, как действовать. Каждый отряд ведёт себя независимо, выполняя свои цели, не считаясь с формальными приказами республики. Решения часто принимаются импульсивно, а конфликты между группами усиливают хаос."
 
 LPR_mercenaries_and_supporters:0 "Наёмники и сторонники"
 LPR_mercenaries_and_supporters_desc:0 "В регионе действуют наёмники и советники извне, формируя боевые группы и поддерживая хаос на линии фронта."
