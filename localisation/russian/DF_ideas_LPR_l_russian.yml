l_russian:
 LPR_republic_without_power: "Республика без власти"
 LPR_republic_without_power_desc: "Формально есть правительство, но на местах царит хаос и самоуправство."
 LPR_power_of_gun: "Власть ствола"
 LPR_power_of_gun_desc: "Сила держится через оружие; группы на местах контролируют районы, решения принимаются по силе, а не закону."
 LPR_fragmented_gangs: "Разрозненные банды"
 LPR_fragmented_gangs_desc: "Территории поделены между локальными вооружёнными группировками; каждый квартал живёт по своим правилам, грабежи и контроль ресурсов обычны."
 LPR_eastern_intervention: "Вмешательство с Востока"
 LPR_eastern_intervention_desc: "Скрытая поддержка извне: техника, советники, регулярные силы, решающие исход боёв в тени."
 LPR_unauthorized_commanders: "Самовольные командиры"
 LPR_unauthorized_commanders_desc: "На местах появляются свои лидеры, которые сами решают, как действовать. Каждый отряд ведёт себя независимо, выполняя свои цели, не считаясь с формальными приказами республики. Решения часто принимаются импульсивно, а конфликты между группами усиливают хаос."
 LPR_mercenaries_and_supporters: "Наёмники и сторонники"
 LPR_mercenaries_and_supporters_desc: "В регионе действуют наёмники и советники извне, формируя боевые группы и поддерживая хаос на линии фронта."