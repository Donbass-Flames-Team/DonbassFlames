 mod_dev_status_desc:0 "НАША КОМАНДА ЕЖЕДНЕВНО ТРУДИТСЯ НАД РАСШИРЕНИЕМ ИГРОВЫХ ВОЗМОЖНОСТЕЙ И ПРОРАБОТКОЙ КОНТЕНТА.\nТЕКУЩАЯ ВЕРСИЯ МОДА МОЖЕТ СОДЕРЖАТЬ ОШИБКИ,\nНО ИМЕННО ВАШЕ УЧАСТИЕ В ТЕСТИРОВАНИИ ПОМОГАЕТ НАМ ДЕЛАТЬ МОДИФИКАЦИЮ ЛУЧШЕ, СТАБИЛЬНЕЕ И КАЧЕСТВЕННЕЕ С КАЖДЫМ ОБНОВЛЕНИЕМ."
