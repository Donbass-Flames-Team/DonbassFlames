 country_info_startgui_ukr:0 "С 21 ноября 2013 года в Украине начался Евромайдан — массовые протесты, вызванные решением правительства приостановить подписание Соглашения об ассоциации с ЕС. Движение быстро переросло в масштабное противостояние между гражданами и властью, выражавшее недовольство коррупцией и авторитаризмом режима Януковича. К февралю 2014 года протесты достигли пика: в Киеве произошли кровавые столкновения, погибли десятки людей. 22 февраля Янукович бежал из страны, власть сменилась. Вскоре после этого Россия аннексировала Крым, а в восточных областях Украины начались пророссийские выступления, которые к апрелю 2014 года переросли в вооружённый конфликт на Донбассе."
