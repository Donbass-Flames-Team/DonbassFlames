l_russian:
 TMR_accept_refugees:0 "Принять пророссийских беженцев"
 TMR_accept_refugees_desc:0 "После провала ОНР обстановка резко ожесточилась: начались задержания, проверки и давление на людей, которых подозревают в симпатиях к пророссийским силам. Мы не можем оставить их на произвол судьбы. Приднестровье обязано открыть двери для беженцев и взять на себя гуманитарную нагрузку, даже если это ударит по внутренней стабильности."
 TMR_border_deployments:0 "Развёртывание у границы"
 TMR_border_deployments_desc:0 "Перебрасываем подразделения к ключевым участкам и приводим в порядок узлы подвоза. Нужны связь, тыловые пункты и готовые маршруты для быстрого манёвра. Граница должна выглядеть как реальная линия угрозы, а не формальность."
 TMR_border_hardening:0 "Ужесточить режим охраны границы"
 TMR_border_hardening_desc:0 "Перестроить контроль на границе под затяжной кризис: больше проверок, быстрее реакции, меньше уязвимых участков. Это не решает проблему полностью, но повышает предсказуемость."
 TMR_bridgeheads:0 "Создать плацдармы"
 TMR_bridgeheads_desc:0 "Закрепляемся на опорных рубежах и создаём условия для дальнейшего продвижения. Берём под контроль дороги, переправы и узлы связи, чтобы не потерять темп. Любая пауза сейчас — шанс для противника перегруппироваться."
 TMR_broadcasting_concept_2014:0 "Новая информационная стратегия"
 TMR_broadcasting_concept_2014_desc:0 "Перестроить медиаполитику под кризисный период: единые тезисы, более чёткая коммуникация с населением и модернизация основных инструментов вещания."
 TMR_call_kremlin:0 "Звонок в Кремль"
 TMR_call_kremlin_desc:0 "Запрашиваем политическое решение по операции и формат возможной поддержки. Ответ Москвы определит, действуем ли мы с опорой на союзные ресурсы или берём всё на себя. После этого шага пространство для манёвра резко сужается."
 TMR_condemn_kyiv_protests:0 "Официальное осуждение Майдана"
 TMR_condemn_kyiv_protests_desc:0 "Зафиксировать позицию на уровне руководства и госструктур: протесты рассматриваются как источник хаоса и угрозы безопасности. Это поможет консолидировать аппарат и общественное мнение."
 TMR_conflict_escalation:0 "Русская весна"
 TMR_conflict_escalation_desc:0 "Украина трещит по швам: в крупнейших русскоязычных городах вспыхивает «Русская весна». Крым уже вернулся в Россию, а в Луганске, Одессе и Харькове протестующие берут под контроль административные здания. В Донецке провозглашена ДНР. Киевская власть готовит силовую операцию, но волна уже пошла. Если ОНР удержится, у нас появится шанс прорвать блокаду."
 TMR_coordination_with_russia:0 "Наладить прямую координацию с Москвой"
 TMR_coordination_with_russia_desc:0 "Укрепить постоянные каналы связи и согласования. Чем быстрее идут консультации и обмен информацией, тем проще удерживать ситуацию под контролем в период внешней турбулентности."
 TMR_depots_and_logistics:0 "Тыловые склады и логистика"
 TMR_depots_and_logistics_desc:0 "Создать материальный запас прочности: транспорт, железнодорожная логистика и минимальные топливные резервы. Даже небольшой резерв может стать критическим при внезапной эскалации."
 TMR_emergency_budget:0 "Антикризисное перераспределение бюджета"
 TMR_emergency_budget_desc:0 "Сконцентрировать ресурсы на первоочередных задачах: управляемости, социальной стабильности и функционировании ключевой инфраструктуры. Всё второстепенное временно отходит на второй план."
 TMR_employment_program:0 "Программа адаптации и трудоустройства"
 TMR_employment_program_desc:0 "Сместить акцент от экстренного реагирования к долгосрочной интеграции: занятость, переквалификация и снижение социальной нагрузки на бюджет."
 TMR_energy_contracts:0 "Гарантии энергоснабжения"
 TMR_energy_contracts_desc:0 "Зафиксировать договорённости по энергоресурсам и снизить вероятность сбоев. Энергетика — фундамент и экономики, и социальной стабильности."
 TMR_eu_stub:0 "Европейский разворот"
 TMR_eu_stub_desc:0 "§RЭтот путь будет расширен позже§!: дипломатия, экономика и постепенное отдаление от российских структур влияния."
 TMR_fuel_and_supplies_opr:0 "Топливо и снабжение для ОНР"
 TMR_fuel_and_supplies_opr_desc:0 "Передать критически важные ресурсы: топливо, транспорт и минимальную железнодорожную логистику. Цель — удержать темпы и обеспечить функционирование инфраструктуры."
 TMR_gkchs_extra_session:0 "Внеочередное заседание ГКЧС"
 TMR_gkchs_extra_session_desc:0 "Созвать профильные органы и перевести управление в режим повышенного реагирования. Основная цель — готовность к резким изменениям ситуации на границах и внутри региона."
 TMR_humanitarian_corridor_opr:0 "Гуманитарный коридор для ОНР"
 TMR_humanitarian_corridor_opr_desc:0 "Открыть канал поддержки, который выглядит гуманитарным, но укрепляет устойчивость союзников и снижает внутреннюю турбулентность на их стороне."
 TMR_integration_course_rf:0 "Курс на углубление интеграции с РФ"
 TMR_integration_course_rf_desc:0 "Сделать ставку на более тесную экономическую и политическую связку с Россией. Это улучшает взаимодействие с РФ, но неизбежно ухудшает отношения с Молдовой и Украиной."
 TMR_intelligence_liaison_opr:0 "Канал связи и координации"
 TMR_intelligence_liaison_opr_desc:0 "Выстроить устойчивый обмен информацией и согласование решений. Без связи поддержка превращается в хаос — координация определяет эффективность."
 TMR_internal_stabilization:0 "Внутренняя стабилизация"
 TMR_internal_stabilization_desc:0 "ОНР уничтожена — вместе с ней рухнули и наши надежды на быстрый выход из изоляции. Теперь важнее другое: удержать порядок внутри и снять напряжение. Мы стабилизируем систему и возвращаемся к обычной жизни."
 TMR_kolbasna_mine_depots:0 "Заминировать складской район"
 TMR_kolbasna_mine_depots_desc:0 "Готовим объект к уничтожению на случай захвата противником. Закладываем меры подрыва инфраструктуры и ключевых узлов хранения, чтобы лишить врага трофеев. Это крайняя страховка, но иногда она решает всё."
 TMR_kolbasna_unseal_depots:0 "Расконсервация складов в Колбасне"
 TMR_kolbasna_unseal_depots_desc:0 "Снимаем консервацию с резервов и приводим склады в рабочее состояние. Параллельно усиливаем охрану и проводим инвентаризацию, чтобы избежать потерь и хаоса. Колбасна — это реальный ресурс, который нельзя упустить."
 tmr.1.a:0 "Дать добро"
 tmr.1.b:0 "Не разрешать"
 tmr.1.d:0 "Тирасполь запрашивает политическое решение: разрешить подготовку операции против Украины или запретить любые действия."
 tmr.1.t:0 "Звонок из Тирасполя"
 tmr.2.a:0 "Прекрасно"
 tmr.2.d:0 "Запрос одобрен. Теперь можно действовать с опорой на поддержку Москвы."
 tmr.2.t:0 "Москва дала добро"
 tmr.3.a:0 "Послушаться Кремль"
 tmr.3.b:0 "ПМР своих не бросает"
 tmr.3.d:0 "Запрос отклонён. Тирасполю придётся выбрать: подчиниться или действовать самостоятельно."
 tmr.3.t:0 "Москва отказала"
 TMR_kremlin_approval:0 "Разрешение получено"
 TMR_kremlin_approval_desc:0 "Москва дала добро на дальнейшие шаги и обозначила рамки поддержки. Теперь можно планировать действия, исходя из более широких возможностей. Вместе с этим растут и ставки — и ответственность."
 TMR_local_fuel_rationing:0 "Режим экономии топлива"
 TMR_local_fuel_rationing_desc:0 "Топливо становится критическим ресурсом, и его нельзя тратить на второстепенное. Вводим приоритеты и жёсткий учёт, концентрируя резервы на ключевых задачах. Экономия сегодня — это манёвр завтра."
 TMR_local_support_only:0 "Опора на собственные ресурсы"
 TMR_local_support_only_desc:0 "Действуем без союзного плеча: меньше возможностей, больше рисков и выше цена ошибок. Придётся жёстко расставлять приоритеты и экономить всё, что можно. Зато решения принимаются быстрее — и ответственность полностью наша."
 TMR_local_workshops:0 "Мастерские и сборные пункты"
 TMR_local_workshops_desc:0 "Разворачиваем ремонт и снабжение на месте, чтобы компенсировать дефицит внешних поставок. Мастерские ускорят восстановление техники и снаряжения, а сборные пункты — пополнение и распределение. В условиях давления это превращается в систему выживания."
 TMR_november_choice:0 "Выбор Тирасполя"
 TMR_november_choice_desc:0 "Киевские события становятся поворотной точкой для всего региона. Тирасполь должен определить, какую линию будет публично поддерживать и как подготовиться к возможной дестабилизации на границах."
 TMR_obey_kremlin:0 "Послушаться Кремль"
 TMR_obey_kremlin_desc:0 "Прямой курс на операцию сворачивается по политическим причинам. Мы смещаем акцент на непрямые инструменты и поддержку союзников там, где это возможно. Иногда пауза — это не слабость, а расчёт."
 TMR_ogrw_training:0 "Учения ОГРВ"
 TMR_ogrw_training_desc:0 "ОГРВ начинает учения, отрабатывая возможный «крымский сценарий»:молниеносное развёртывание, блокирование Воинских частей и взятие под контроль административных зданий."
 TMR_operational_planning:0 "Оперативное планирование"
 TMR_operational_planning_desc:0 "Сводим политическое решение к конкретной карте действий: направления, сроки и резервы. Уточняем взаимодействие штабов и порядок принятия решений. План должен быть простым и исполнимым даже в условиях хаоса."
 TMR_opr_blacksea_route:0 "Логистический маршрут на юг"
 TMR_opr_blacksea_route_desc:0 "Расширяем снабжение через альтернативные направления и создаём запасные варианты подвоза. Это повышает мобильность союзников и снижает зависимость от одного коридора. Чем больше маршрутов — тем меньше шанс быть перекрытыми."
 TMR_opr_expand_support:0 "Расширить поддержку ОНР"
 TMR_opr_expand_support_desc:0 "Увеличиваем объёмы помощи и делаем поддержку регулярной. Важно не только передать ресурсы, но и удержать их доставку. Чем стабильнее снабжение, тем устойчивее союзник."
 TMR_opr_failure:0 "ОНР не состоялась"
 TMR_opr_failure_desc:0 "Проект ОНР провалился, приоритетом становится внутренняя стабильность и минимизация рисков. Время громких шагов уходит — важнее удержать контроль над ситуацией у себя."
 TMR_opr_intel_exchange:0 "Обмен разведданными"
 TMR_opr_intel_exchange_desc:0 "Информация — это время, а время — это преимущество. Организуем постоянный обмен данными и согласование оценок обстановки. Координация снижает риск ошибок и повышает точность действий."
 TMR_opr_joint_pressure:0 "Совместное давление на юге"
 TMR_opr_joint_pressure_desc:0 "Закрепляем эффект через координацию и непрерывное давление в южном секторе. Цель — вынудить противника держать там ресурсы и терять инициативу. Постоянное напряжение работает лучше разовых всплесков."
 TMR_opr_open_confrontation:0 "Открытое противостояние"
 TMR_opr_open_confrontation_desc:0 "Переходим от непрямых инструментов к прямому силовому давлению. Это повышает шансы на быстрый результат, но резко увеличивает риск расширения конфликта. Такой шаг требует готовности платить цену."
 TMR_opr_success:0 "ОНР удержалась"
 TMR_opr_success_desc:0 "Успех ОНР меняет правила игры. Появляется шанс закрепиться на южном направлении, создать опору для дальнейших шагов и приблизиться к выходу из изоляции. Теперь нельзя терять темп: поддержка, снабжение и координация должны превратить успех в устойчивый результат."
 TMR_opr_support_pipeline:0 "Канал снабжения ОНР"
 TMR_opr_support_pipeline_desc:0 "Сводим разрозненные поставки в единую систему: маршруты, распределение и контроль. Канал должен быть гибким, чтобы переживать блокировки и провокации. Войну выигрывают те, у кого работает логистика."
 TMR_opr_training_camps:0 "Учебные лагеря для ОНР"
 TMR_opr_training_camps_desc:0 "Подготовка кадров важнее единичных поставок: люди решают исход столкновений. Инструкторы и обучение повышают дисциплину, устойчивость и управляемость. Это инвестиция, которая работает дольше любого конвоя."
 TMR_passportization:0 "Ускорить паспортные процедуры"
 TMR_passportization_desc:0 "Упростить бюрократию и ускорить оформление документов для населения. На практике это усиливает институциональную привязку к российскому пространству."
 TMR_prepare_operation_common:0 "Подготовка операции"
 TMR_prepare_operation_common_desc:0 "Нужно свести политическое решение к конкретным шагам: планирование, снабжение и готовность. Это шаг, который требует дисциплины и быстрых решений. Последствия будут ощущаться как внутри региона, так и за его пределами."
 TMR_public_campaign_solidarity:0 "Единая повестка"
 TMR_public_campaign_solidarity_desc:0 "Поддержать выбранный курс через управляемые мероприятия, символику и публичные заявления. Смысл прост: показать единство и снизить пространство для оппозиционных трактовок."
 TMR_quiet_life_end:0 "Продолжить политику изоляционизма"
 TMR_quiet_life_end_desc:0 "Сделать ставку на самосохранение: меньше внешних обязательств, больше внутренней дисциплины и осторожности. Это шаг, который требует дисциплины и быстрых решений. Последствия будут ощущаться как внутри региона, так и за его пределами."
 TMR_raise_folk_militias:0 "Поднять народные дружины"
 TMR_raise_folk_militias_desc:0 "Если внешняя поддержка ограничена, придётся опираться на внутренний ресурс. Формируем добровольческие структуры для охраны узлов, патрулей и тыловых задач. Это не замена армии, но способ закрыть уязвимые места."
 TMR_raise_ogrw_readiness:0 "Поднять ОГРВ"
 TMR_raise_ogrw_readiness_desc:0 "Переводим ОГРВ в повышенную готовность и ускоряем развёртывание. Усиливаем охрану объектов и отрабатываем сценарии быстрого реагирования. Демонстрация силы должна быть убедительной, иначе она бесполезна."
 TMR_recognize_opr:0 "Признать ОНР"
 TMR_recognize_opr_desc:0 "Сделать политический шаг, который укрепит союз и улучшит отношения с ОНР. Это повышает ставку в регионе и делает поддержку более открытой."
 TMR_refugee_registration:0 "Регистрация и фильтрация потоков"
 TMR_refugee_registration_desc:0 "Навести порядок в потоках: учёт, проверка, маршрутизация. Это уменьшает риски проникновения угроз, но требует жёстких решений и политических затрат."
 TMR_request_recognition:0 "Добиваться признания суверенитета"
 TMR_request_recognition_desc:0 "Перейти от намёков к официальным дипломатическим шагам. Признание — это инструмент легитимации, но он обостряет конфликты интересов с соседними государствами."
 TMR_request_russian_aid:0 "Запрос экономической поддержки у РФ"
 TMR_request_russian_aid_desc:0 "Обратиться за финансовыми механизмами стабилизации: субсидии, льготные условия и поддержка ключевых отраслей. В условиях неопределённости это становится вопросом выживания бюджета."
 TMR_return_to_opr_support:0 "Вернуться к поддержке ОНР"
 TMR_return_to_opr_support_desc:0 "Если прямой путь закрыт, южное направление остаётся шансом расширить возможности. Ставка делается на снабжение, координацию и укрепление союзников. Поддержка должна быть системной, а не разовой."
 TMR_rus_recon_support:0 "Координация и разведподдержка РФ"
 TMR_rus_recon_support_desc:0 "Налаживаем обмен информацией и согласование целей на уровне штабов. Разведданные и связь уменьшают неопределённость и позволяют действовать точнее. В современной войне слепота часто опаснее нехватки оружия."
 TMR_rus_support_package:0 "Пакет помощи РФ"
 TMR_rus_support_package_desc:0 "Разрешение получено — поддержка может перейти из слов в ресурсы. Уточняем объёмы снабжения, инструкторов и координацию на уровне штабов. Это повышает устойчивость и расширяет пространство для действий."
 TMR_second_direction_threat:0 "Угроза с юга"
 TMR_second_direction_threat_desc:0 "На Донбассе начинается вооружённое противостояние, и Киев стягивает основные силы на восток. Мы должны вынудить украинское командование держать часть ресурсов у нашей границы: учения, демонстративные перемещения и усиление пограничного режима заставят их распылять внимание и силы."
 TMR_secure_supply_lines:0 "Обеспечить линии снабжения"
 TMR_secure_supply_lines_desc:0 "Без устойчивого подвоза любая операция захлебнётся на первом же рубеже. Выстраиваем маршруты, резервы топлива и охрану тыла, чтобы сохранить темп. Логистика — это то, что превращает инициативу в результат."
 TMR_security_border_filtering:0 "Усилить пограничный контроль"
 TMR_security_border_filtering_desc:0 "Ужесточить проверки, отладить фильтрацию потоков и перекрыть лазейки для провокаций. Это не решит политический кризис, но снизит риск внезапной дестабилизации."
 TMR_seize_border_posts:0 "Захват пограничных узлов"
 TMR_seize_border_posts_desc:0 "КПП, развязки и мосты определяют скорость ввода сил и снабжения. Берём ключевые узлы под контроль, чтобы исключить срывы и задержки. Пограничная инфраструктура должна работать на нас."
 TMR_send_advisors:0 "Направить советников и инструкторов"
 TMR_send_advisors_desc:0 "Организовать помощь в подготовке и управлении, усилив командную составляющую союзников. Это дешевле прямого вмешательства и часто эффективнее поставок одной техники."
 TMR_smuggling_to_opr:0 "Контрабандные поставки"
 TMR_smuggling_to_opr_desc:0 "Наладить скрытые поставки снаряжения. Это повышает успех ОНР, не требуя официального вмешательства и сохраняя пространство для отрицания."
 TMR_start_operation:0 "Начать операцию"
 TMR_start_operation_desc:0 "Переходим от подготовки к действиям — конфликт выходит в открытую фазу. Любая ошибка теперь будет стоить дорого и на фронте, и в дипломатии. Остановить войну сложнее, чем начать её."
 TMR_subsidies_and_credits:0 "Закрепить субсидии и кредитные линии"
 TMR_subsidies_and_credits_desc:0 "Оформить конкретные источники денег и условия помощи, чтобы закрыть самые уязвимые статьи расходов. Это даст передышку и снизит риск внутреннего социального давления."
 TMR_support_crimea_operation:0 "Поддержать российскую операцию в Крыму"
 TMR_support_crimea_operation_desc:0 "Открыто одобрить действия России и обозначить свою позицию в региональном конфликте. Это усиливает привязку к российскому курсу, но одновременно повышает напряжённость с соседями."
 TMR_support_euromaidan:0 "Поддержать протестное движение"
 TMR_support_euromaidan_desc:0 "Открыто заявить о поддержке смены курса в Киеве и попытаться перестроить внешнюю политику под новую реальность. §RВ текущей версии эта ветка отключена§!."
 TMR_support_yanukovych:0 "Встать на сторону действующей власти в Киеве"
 TMR_support_yanukovych_desc:0 "Публично поддержать линию официального Киева и обозначить неприятие уличного хаоса. Это укрепляет пророссийский вектор и задаёт тон дальнейшим шагам."
 TMR_temporary_shelters:0 "Развернуть временные центры размещения"
 TMR_temporary_shelters_desc:0 "Организовать пункты приёма, жильё и первичную помощь. Мера затратная и непопулярная, но она снижает социальное напряжение и делает процесс управляемым."
 TMR_tourists:0 "«Туристы»"
 TMR_tourists_desc:0 "Отправить ограниченный контингент и дополнительное снабжение под прикрытием гражданских перемещений. Задача — усилить ОНР без прямой эскалации на дипломатическом уровне."
 tmr.4.d:0 "Тирасполь объявил о начале военной операции против Украины. Напряжённость в регионе резко выросла."
 tmr.4.t:0 "ПМР начинает операцию"
 tmr.8.a:0 "Спасти этих дураков"
 tmr.8.b:0 "Удерживайте склад Колбасне"
 tmr.8.d:0 "Тирасполь перешёл к действиям без нашего политического разрешения. Нужно решить: спасать их или удержать Колбасну любой ценой."
 tmr.8.t:0 "ПМР начала операцию без согласия"
 tmr.7.d:0 "Сообщается о разрушительном взрыве в районе складов у Колбасны. Стороны обвиняют друг друга в катастрофической эскалации."
 tmr.7.t:0 "Взрыв в районе Колбасны"
 tmr.13.a:0 "Отлично."
 tmr.13.d:0 "Украинские силы взяли под контроль складской район в Колбасне. Сопротивление подавлено, объекты захвачены практически без потерь. Запасы и инфраструктура переходят под контроль Киева."
 tmr.13.t:0 "Захват склада в Колбасне"
 tmr.5.d:0 "Подразделения ОГРВ выдвигаются из мест постоянной дислокации. Стороны трактуют это как опасную эскалацию."
 tmr.5.t:0 "ОГРВ покидает пункты постоянной дислокации"
 tmr.9.a:0 "Напасть на ОГРВ"
 tmr.9.b:0 "Не трогать их"
 tmr.9.d:0 "Подразделения ОГРВ (CRT) взяли под контроль район складов. Киев должен решить: атаковать их или избежать расширения войны."
 tmr.9.t:0 "ОГРВ у Колбасны"
 tmr.12.a:0 "Оставить себе"
 tmr.12.b:0 "Передать Молдове"
 tmr.12.d:0 "После падения приднестровских структур Украина контролирует ключевые территории региона. Встаёт вопрос: удерживать эти земли под прямым управлением или передать их Молдове."
 tmr.12.t:0 "Судьба Приднестровья"
 tmr.6.d:0 "ОГРВ объявляет о взятии под контроль ключевых объектов на севере региона, включая район складов в Колбасне."
 tmr.6.t:0 "ОГРВ берёт под контроль север Приднестровья"
 tmr.10.a:0 "Встать на сторону ОГРВ"
 tmr.10.b:0 "Не вмешиваться"
 tmr.10.d:0 "Украина атаковала ОГРВ. Вопрос: вступаем в войну или ограничимся заявлениями?"
 tmr.10.t:0 "Встать на сторону ОГРВ?"
 TMR_war_choice_after_failure:0 "Реванш на южном направлении"
 TMR_war_choice_after_failure_desc:0 "Если шанс упущен, остаётся вариант силового ответа — даже без союзного плацдарма. Это шаг, который требует дисциплины и быстрых решений. Последствия будут ощущаться как внутри региона, так и за его пределами."
 TMR_war_economy_rails:0 "Перевести экономику на военные рельсы"
 TMR_war_economy_rails_desc:0 "Открытое противостояние потребует мобилизации промышленности, транспорта и финансов. Переходим на военные нормы снабжения и ускоряем выпуск всего, что нужно фронту."
 TMR_wargoal_ukraine:0 "Начать операцию"
 TMR_wargoal_ukraine_desc:0 "Политическое решение принято. Время переходить к действиям. Это шаг, который требует дисциплины и быстрых решений. Последствия будут ощущаться как внутри региона, так и за его пределами."
 TMR_we_want_russia_too:0 "Заявить о стремлении к российскому вектору"
 TMR_we_want_russia_too_desc:0 "Сделать политическое заявление, которое закрепляет курс на сближение. Цель — сформировать ожидания и внутри, и снаружи: мы ориентируемся на РФ как на ключевого партнёра."
 TMR_we_wont_abandon_ours:0 "ПМР своих не бросает"
 TMR_we_wont_abandon_ours_desc:0 "Решение принято: действуем даже без одобрения извне. Это путь с меньшими ресурсами и большей ценой ошибок, но отступление означает потерю инициативы. Теперь всё зависит от нашей готовности и дисциплины."
