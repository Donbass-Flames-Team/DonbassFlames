UKR_volunteer_battalion_11_desc: "Состоит из местных добровольцев. Поддерживает порядок в Киеве, проходит подготовку к боевым действиям.\n\n\t§G3 дивизии будут добавлены к доступным войскам§!"
UKR_volunteer_battalion_aidar_desc: "Формируется из добровольцев из восточных регионов. Обучается для рейдов и зачисток, находится под контролем командования.\n\n\t§G5 дивизий будут добавлены к доступным войскам§!"
UKR_volunteer_battalion_artemivsk_desc: "Включает местных жителей Артёмовска (Бахмута). Занимается охраной объектов и организацией порядка в городе.\n\n\t§G3 дивизии будут добавлены к доступным войскам§!"
UKR_volunteer_battalion_bogdan_desc: "Небольшое подразделение из добровольцев. Поддерживает порядок в регионе и проходит базовую подготовку.\n\n\t§G1 дивизия будет добавлена к доступным войскам§!"
UKR_volunteer_battalion_chernigyv_desc: "Состоит из местных жителей Чернигова. Обеспечивает безопасность общественных объектов и готовится к переброске.\n\n\t§G1 дивизия будет добавлена к доступным войскам§!"
UKR_volunteer_battalion_dnipro_desc: "Включает добровольцев из Днепропетровска (Днепра) и области. Занимается охраной ключевых объектов, готовится к формированию дивизий.\n\n\t§G5 дивизий будут добавлены к доступным войскам§!"
UKR_volunteer_battalion_dnipro2_desc: "Подразделение из добровольцев Днепропетровска (Днепра) и области. Проходит тактическую подготовку и поддерживает порядок в регионе.\n\n\t§G4 дивизии будут добавлены к доступным войскам§!"
UKR_volunteer_battalion_dnipropetrovsk_desc: "Формируется из местных добровольцев. Обеспечивает порядок в Днепропетровске (Днепре) и подготовку к возможным боевым действиям.\n\n\t§G3 дивизии будут добавлены к доступным войскам§!"
UKR_volunteer_battalion_kharkov_desc: "Состоит из добровольцев Харькова. Контролирует порядок в городе и готовится к дальнейшему развертыванию.\n\n\t§G3 дивизии будут добавлены к доступным войскам§!"
UKR_volunteer_battalion_kherson_desc: "Небольшой отряд из Херсона. Занимается охраной городских объектов и подготовкой к боевым задачам.\n\n\t§G1 дивизия будет добавлена к доступным войскам§!"
UKR_volunteer_battalion_kievskarus_desc: "Отряд из Киева. Обеспечивает порядок и готовится к формированию дивизий.\n\n\t§G3 дивизии будут добавлены к доступным войскам§!"
UKR_volunteer_battalion_kirovograd_desc: "Формируется из добровольцев Кировограда (Кропивницкого). Проходит подготовку для рейдов и зачисток.\n\n\t§G5 дивизий будут добавлены к доступным войскам§!"
UKR_volunteer_battalion_kremenchuk_desc: "Небольшая рота из Кременчуга. Занимается охраной и поддержкой порядка.\n\n\t§G1 дивизия будет добавлена к доступным войскам§!"
UKR_volunteer_battalion_krivbas_desc: "Подразделение из Кривого Рога. Контролирует порядок в регионе и готовится к формированию дивизий.\n\n\t§G4 дивизии будут добавлены к доступным войскам§!"
UKR_volunteer_battalion_kulchickogo_desc: "Отряд добровольцев имени Кульчицького. Занимается охраной и тактической подготовкой.\n\n\t§G4 дивизии будут добавлены к доступным войскам§!"
UKR_volunteer_battalion_luhansk_desc: "Состоит из местных добровольцев Луганска. Обеспечивает порядок и готовится к развертыванию в зоне боевых действий.\n\n\t§G3 дивизии будут добавлены к доступным войскам§!"
UKR_volunteer_battalion_lviv_desc: "Подразделение из Львова. Поддерживает порядок в городе и проходит подготовку.\n\n\t§G3 дивизии будут добавлены к доступным войскам§!"
UKR_volunteer_battalion_mikolaiv_desc: "Готов к охране ключевых объектов Николаева. Состоит из местных добровольцев.\n\n\t§G3 дивизии будут добавлены к доступным войскам§!"
UKR_volunteer_battalion_oun_desc: "Подразделение для патрулирования и поддержки операций.\n\n\t§G4 дивизии будут добавлены к доступным войскам§!"
UKR_volunteer_battalion_poltava_desc: "Отряд для охраны территории и патрулирования в Полтаве. Состоит из местных добровольцев.\n\n\t§G3 дивизии будут добавлены к доступным войскам§!"
UKR_volunteer_battalion_praviysektor_desc: "Крупное формирование для организации операций и патрулирования.\n\n\t§G6 дивизий будут добавлены к доступным войскам§!"
UKR_volunteer_battalion_shatarsk_desc: "Подразделение для охраны и патрулирования района Шахтёрска. Состоит из местных добровольцев.\n\n\t§G3 дивизии будут добавлены к доступным войскам§!"
UKR_volunteer_battalion_sich_desc: "Готов к проведению рейдов и обеспечению безопасности.\n\n\t§G4 дивизии будут добавлены к доступным войскам§!"
UKR_volunteer_battalion_sicheslav_desc: "Небольшое подразделение для патрулирования.\n\n\t§G1 дивизия будет добавлена к доступным войскам§!"
UKR_volunteer_battalion_slabozansina_desc: "Подразделение, готовое к охране и локальным операциям.\n\n\t§G3 дивизии будут добавлены к доступным войскам§!"
UKR_volunteer_battalion_svitaz_desc: "Небольшое подразделение для охраны объектов.\n\n\t§G1 дивизия будет добавлена к доступным войскам§!"
UKR_volunteer_battalion_vinitsa_desc: "Подразделение для патрулирования и обеспечения порядка в Виннице. Состоит из местных добровольцев.\n\n\t§G3 дивизии будут добавлены к доступным войскам§!"


