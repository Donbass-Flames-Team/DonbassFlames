l_russian:
 UKR_government_in_anarchy: "Анархия в правительстве"
 UKR_government_in_anarchy_desc: "Бывший президент сбежал из страны, а парламент не в состоянии взять на себя руководство. Власть парализована, институты не функционируют. Государство погружается в политический хаос, и на улицах Киева царит безвластие. Никто не контролирует ситуацию, и каждый решает, как ему действовать."
 UKR_start_of_ato: "Начало Антитеррористической операции"
 UKR_start_of_ato_desc: "Мы столкнулись с вооружённой угрозой, ставящей под сомнение суверенитет и порядок. Правительство принимает решение начать масштабную Антитеррористическую операцию. Операция будет запущена после указа главы государства и решения Совета национальной безопасности и обороны."
 UKR_new_parliament_composition: "Новый состав парламента"
 UKR_new_parliament_composition_desc: "Сформирован новый парламент после бегства Януковича. Начинается новый этап в управлении страной."
 UKR_mobilization_of_reservists: "Мобилизация резервистов"
 UKR_mobilization_of_reservists_desc: "Начинается мобилизация резервистов для усиления обороноспособности и подготовки к возможным столкновениям."
 UKR_deal_with_prorussians_protests: "Договор с пророссийскими протестующими"
 UKR_deal_with_prorussians_protests_desc: "Попытка договориться с пророссийскими активистами и снизить напряжённость в стране."
 UKR_recapture_part_of_donetsk_region: "Возвращение части Донецкой области"
 UKR_recapture_part_of_donetsk_region_desc: "Военные операции направлены на возвращение контроля над частью Донецкой области."
 UKR_recapture_part_of_luhansk_region: "Возвращение части Луганской области"
 UKR_recapture_part_of_luhansk_region_desc: "Военные операции направлены на возвращение контроля над частью Луганской области."
 UKR_send_additional_forces_to_odessa: "Отправка дополнительных сил в Одессу"
 UKR_send_additional_forces_to_odessa_desc: "Подкрепления направляются в Одессу для поддержки местных сил и стабилизации ситуации."
 UKR_block_the_crimea: "Блокада Крыма"
 UKR_block_the_crimea_desc: "Начинается блокада Крыма с целью ограничения движения и поставок."
 UKR_end_of_separatism: "Победа над сепаратизмом"
 UKR_end_of_separatism_desc: "Сепаратистские движения подавлены, страна возвращается к единству."
 UKR_send_militties_to_kharkov: "Отправка ополченцев в Харьков"
 UKR_send_militties_to_kharkov_desc: "Местные ополченцы направляются в Харьков для поддержки порядка и безопасности."
 UKR_crush_kharkov_people_republic: "Разгром Харьковской народной республики"
 UKR_crush_kharkov_people_republic_desc: "Военные действия направлены на ликвидацию самопровозглашённой Харьковской народной республики."
 UKR_humanitarion_help_to_people: "Гуманитарная помощь населению"
 UKR_humanitarion_help_to_people_desc: "Организация помощи гражданскому населению в зонах конфликта."
 UKR_strengthen_slavyansk: "Укрепление Славянска"
 UKR_strengthen_slavyansk_desc: "Усиление обороны и безопасности в городе Славянск."
 UKR_strengthen_kramatorsk: "Укрепление Краматорска"
 UKR_strengthen_kramatorsk_desc: "Усиление обороны и безопасности в городе Краматорск."
 UKR_emergency_redeployment_of_troops: "Чрезвычайное перебазирование войск"
 UKR_emergency_redeployment_of_troops_desc: "Быстрая переброска войск для реагирования на кризисные ситуации."
 UKR_organize_defense: "Организация обороны"
 UKR_organize_defense_desc: "Меры по организации и укреплению обороны страны."
 UKR_prepare_the_defense_of_cities: "Подготовка обороны городов"
 UKR_prepare_the_defense_of_cities_desc: "Подготовка и укрепление оборонительных позиций в ключевых городах."
 UKR_launch_counterattacks: "Начало контрнаступлений"
 UKR_launch_counterattacks_desc: "Проведение контрнаступательных операций против мятежников."
 UKR_volunteer_battalions: "Добровольческие батальоны"
 UKR_volunteer_battalions_desc: "Формирование добровольческих батальонов для поддержки армии."
 UKR_volunteer_battalion_azov: "Добровольческий батальон 'Азов'"
 UKR_volunteer_battalion_azov_desc: "Создание и развертывание батальона 'Азов' для борьбы с сепаратистами."
 UKR_volunteer_battalion_of_mvd: "Добровольческий батальон МВД"
 UKR_volunteer_battalion_of_mvd_desc: "Формирование добровольческого батальона при Министерстве внутренних дел."


