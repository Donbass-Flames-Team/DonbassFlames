l_russian:
 DRP_introduce_martial_law:0 "Ввести военное положение"
 DRP_introduce_martial_law_desc:0 "Ситуация в восточных регионах накалена до предела. Чтобы купировать угрозу захвата административных зданий и координировать действия силовиков, мы наделяем администрацию чрезвычайными полномочиями. Формальный режим АТО позволит задействовать армию и спецподразделения для наведения порядка в области."
 DRP_mobilization_of_mvd:0 "Мобилизовать силовых структур"
 DRP_mobilization_of_mvd_desc:0 "Старая правоохранительная система парализована политическим кризисом. Нам необходимо провести жесткую проверку личного состава МВД и СБУ в регионе на верность присяге. Те, кто останется с нами, станут фундаментом новой системы безопасности Приднепровья."
 DRP_barricades:0 "Соурудить блокпосты"
 DRP_barricades_desc:0 "Днепропетровск — это логистический ключ к югу и центру Украины. Мы должны превратить область в крепость, перекрыв основные магистрали бетонными укреплениями. Контроль дорог позволит пресечь передвижение диверсионных групп и подвоз оружия со стороны охваченного беспорядками Донбасса."
 DRP_mobilization_of_activists:0 "Призвать активистов"
 DRP_mobilization_of_activists_desc:0 "Революционная энергия улиц должна быть упорядочена. Мы создаем Штаб национальной защиты, куда войдут активисты Майдана и добровольцы. Это позволит быстро сформировать мотивированные отряды самообороны, готовые заменить деморализованную милицию в критический момент."
 DRP_expand_the_company_10000:0 "Расширить компанию 10000 долларов"
 DRP_expand_the_company_10000_desc:0 "Для борьбы с профессиональными наемниками нужны нестандартные методы. Мы объявляем о выплате солидных денежных вознаграждений за каждого задержанного диверсанта и каждую единицу сданного оружия. Пусть финансовая выгода станет дополнительным стимулом для нейтрализации врага."
 DRP_liberate_the_dnieper_from_the_separatists:0 "Освободить Днепропетровск от сепаратистов"
 DRP_liberate_the_dnieper_from_the_separatists_desc:0 "Двоевластие в регионе недопустимо. Объединенные силы милиции и новосозданных добровольческих формирований должны окончательно ликвидировать очаги пророссийских протестов. Днепропетровская область должна остаться стабильным тылом и опорой для дальнейших операций."