l_russian:
 DPR_republic_without_state:0 "Республика без государства"
 DPR_republic_without_state_desc:0 "ДНР объявила о независимости, но без армии, бюджета и признания. Фактически — территория, где законы существуют только на бумаге, а каждый день — борьба за выживание."
 
 DPR_power_of_bandits:0 "Власть бандитов"
 DPR_power_of_bandits_desc:0 "Республикой управляют боевики и криминальные авторитеты вроде Моторолы, Гиви и Безлера. Каждый контролирует свои районы и ресурсы, а политические структуры номинальны. Страх и оружие решают всё."
 
 DPR_russian_spring:0 "Русская Весна"
 DPR_russian_spring_desc:0 "Идеология «русского мира» оправдывает восстание. Москва оказывает скрытую поддержку, а лозунги «за Родину, против фашизма» мотивируют боевиков. Республика получает внешнюю опору, но теряет часть автономии."
 
 DPR_blockade_and_chaos:0 "Блокада и хаос"
 DPR_blockade_and_chaos_desc:0 "Экономика парализована, снабжение перекрыто. Гуманитарка, контрабанда и оружие идут своими путями. Городской хаос усиливает беззаконие и партизанскую активность."
 
 DPR_war_for_donbass:0 "Война за Донбасс"
 DPR_war_for_donbass_desc:0 "Каждый город, каждый квартал — поле боя. На карту поставлено всё: дома, улицы, жизнь людей. Война перестаёт быть политикой: это теперь повседневная реальность региона."
 
 DPR_hidden_presence:0 "Скрытое присутствие"
 DPR_hidden_presence_desc:0 "В республике действуют силы, официально не замеченные: регулярные военные, советники, техника. Они решают исход боёв, но остаются в тени, создавая ощущение, что война ведётся «сама собой»."
