l_english:
 consumer_economy_decisions:0 "Managing the Civilian Economy" 
 consumer_economy_decisions_desc:0 "We should harness our civilian industry to produce clothing, electronics, and other consumer goods. By supplying both domestic needs and foreign markets, we can generate valuable income, strengthen stability, and expand our economic influence at home and abroad. \n\n§O Our Clothing Stockpile§! Is §YCurrently:§! [?clothing_stockpile] \n§O Our Electronics Stockpile§! Is §YCurrently:§! [?electronics_stockpile] \n§O Our Automobiles Stockpile§! Is §YCurrently:§! [?automobiles_stockpile]" 
 CE_produce_clothing:0 "Produce Civilian Clothing" 
 CE_produce_clothing_desc:0 "We can assign some of our civilian industry to civilian clothes production in order to sell them in markets and generate profits and some liquidity for our nation when they are produced! \n §Y+1,000 Clothing Produced§"
 CE_mass_produce_clothing:0 "Mass Produce Civilian Clothing" 
 CE_mass_produce_clothing_desc:0 "We can assign some of our civilian industry to civilian clothes mass production in order to sell them in markets and generate profits and some liquidity for our nation when they are produced! \n §Y+3,000 Clothing Produced§"
 CE_sell_clothes:0 "Sell Civilian Clothing" 
 CE_sell_clothes_desc:0 "We can sell some of our stockpile of civilian clothes to international or domestic markets for some profit! \n §R-1,000 Clothing Sold§"
 CE_mass_sell_clothes:0 "Mass Sell Civilian Clothing" 
 CE_mass_sell_clothes_desc:0 "We can mass sell some of our stockpile of civilian clothes to international or domestic markets for some profit! \n §R-3,000 Clothing Sold§"
 clothing_production_tooltip:0 "We will dedicate our factories to producing clothes for the civilian population!"
 CE_produce_electronics:0 "Produce Civilian Electronics" 
 CE_produce_electronics_desc:0 "We can assign some of our civilian industry to civilian Electronics production in order to sell them in markets and generate profits and some liquidity for our nation when they are produced! \n §Y+250 Electronics Produced§"
 CE_mass_produce_electronics:0 "Mass Produce Civilian Electronics" 
 CE_mass_produce_electronics_desc:0 "We can assign some of our civilian industry to civilian Electronics mass production in order to sell them in markets and generate profits and some liquidity for our nation when they are produced! \n §Y+750 Electronics Produced§"
 CE_sell_electronics:0 "Sell Civilian Electronics" 
 CE_sell_electronics_desc:0 "We can sell some of our stockpile of civilian Electronics to international or domestic markets for some profit! \n §R-250 Electronics Sold§"
 CE_mass_sell_electronics:0 "Mass Sell Civilian Electronics" 
 CE_mass_sell_electronics_desc:0 "We can mass sell some of our stockpile of civilian Electronics to international or domestic markets for some profit! \n §R-750 Electronics Sold§"
 electronics_production_tooltip:0 "We will dedicate our factories to producing Electronics for the civilian population!"
 CE_produce_automobiles:0 "Produce Civilian Automobiles" 
 CE_produce_automobiles_desc:0 "We can assign some of our civilian industry to civilian Automobiles production in order to sell them in markets and generate profits and some liquidity for our nation when they are produced! \n §Y+100 Automobiles Produced§"
 CE_mass_produce_automobiles:0 "Mass Produce Civilian Automobiles" 
 CE_mass_produce_automobiles_desc:0 "We can assign some of our civilian industry to civilian Automobiles mass production in order to sell them in markets and generate profits and some liquidity for our nation when they are produced! \n §Y+300 Automobiles Produced§"
 CE_sell_automobiles:0 "Sell Civilian Automobiles" 
 CE_sell_automobiles_desc:0 "We can sell some of our stockpile of civilian Automobiles to international or domestic markets for some profit! \n §R-100 Automobiles Sold§"
 CE_mass_sell_automobiles:0 "Mass Sell Civilian Automobiles" 
 CE_mass_sell_automobiles_desc:0 "We can mass sell some of our stockpile of civilian Automobiles to international or domestic markets for some profit! \n §R-300 Automobiles Sold§"
 Automobiles_production_tooltip:0 "We will dedicate our factories to producing Automobiles for the civilian population!"
 national_economy_action_decisions:0 "National Economic Action" 
 national_economy_action_decisions_desc:0 "The lifeblood of a nation flows through its economy. By directing policy, mobilizing resources, and making bold investments, we can shape the destiny of our industries, our cities, and our people. From rallying the markets and expanding production to building vital infrastructure and enacting tough measures in times of crisis, every choice we make will leave a mark on our national prosperity." 
 NEA_rally_civil_markets:0 "Rally Civilian Markets" 
 NEA_rally_civil_markets_desc:0 "By injecting funds and resources into key sectors, we stimulate trade, restore investor confidence, and establish a new factory for civilian production."
 NEA_military_investments:0 "Invest in Military Production" 
 NEA_military_investments_desc:0 "Channeling state funds, raw materials, and skilled labor into our arms industry will accelerate weapons output and strengthen our military readiness."
 NEA_naval_investments:0 "Build New Shipyards" 
 NEA_naval_investments_desc:0 "Allocating capital, steel, and manpower to expand our docks will boost both naval warship civilian vessels construction."
 NEA_infrastructure_investments:0 "Expand Our Infrastructure Networks" 
 NEA_infrastructure_investments_desc:0 "By funding the expansion of roads, communication lines, power grids, and water systems, we strengthen the backbone of our economy and improve resource flow across the nation."
 NEA_military_volunteers:0 "Military Volunteering Campaign" 
 NEA_military_volunteers_desc:0 "Investing in recruitment drives, training facilities, and enlistment incentives will inspire thousands to take up arms in defense of the nation."
 NEA_establish_research:0 "Establish New Research Institution" 
 NEA_establish_research_desc:0 "By allocating funds, equipment, and expert staff to new laboratories and think tanks, we can accelerate innovation and expand our scientific horizons."
 NEA_steel_investments:0 "Build a Steel Mill" 
 NEA_steel_investments_desc:0 "Pouring capital, machinery, and skilled labor into a new steelworks will secure a steady supply of metal for both civilian industry and the war effort."
 NEA_expand_mining_industry:0 "Expand Mining Industry" 
 NEA_expand_mining_industry_desc:0 "By investing in new excavation sites and modern equipment, we can tap into untapped mineral reserves — though the exact metals we uncover remain uncertain until the earth yields its secrets."
 NEA_expand_civil_administration:0 "Expand Civil Administration" 
 NEA_expand_civil_administration_desc:0 "Allocating funds, offices, and trained staff to expand our bureaucracy will improve governance, streamline resource management, and extend the reach of state authority."
 NEA_expand_education_infrastructure:0 "Invest into Education" 
 NEA_expand_education_infrastructure_desc:0 "By funding new schools, universities, and training centers, we can cultivate a more skilled populace and lay the foundation for long-term national progress."
 NEA_invest_media_complex:0 "Establish New Broadcasting Network" 
 NEA_invest_media_complex_desc:0 "Investing in studios, transmitters, and press agencies expands our mass media, allowing the state to shape public opinion, spread information, and unify the nation’s voice."
 NEA_invest_hospital:0 "Build a Hospital" 
 NEA_invest_hospital_desc:0 "Dedicating resources to modern medical facilities ensures better care for our citizens, strengthens public health, and improves the resilience of our workforce and our military."
 NEA_construct_housing:0 "Establish Residential Zone" 
 NEA_construct_housing_desc:0 "Constructing new housing developments not only provides homes for families but also creates fresh opportunities for businesses and opens the door for more workers to find stable employment and improve their livelihoods."
 NEA_expand_oil_industry:0 "Expand Oil Industry" 
 NEA_expand_oil_industry_desc:0 "By investing in new wells, refineries, and drilling equipment, we can increase fuel production and secure the vital lifeblood of both our economy and military. \n §YRequires Synthetic Oil to be research!§"

